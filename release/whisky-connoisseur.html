されるものはどれか。","choices":["第一次世界大戦中の穀物節約のため","20世紀の禁酒運動の影響のため","植民地時代の密造ラム酒などの取り締まりのため","国際貿易協定の遵守のため"],"answer":2,"explanation":"タスマニアの小規模蒸留規制は19世紀の植民地時代に密造酒(違法な蒸留酒)の取り締まりを目的として導入されたとされ、これが1990年代まで存続していた。","difficulty":4},{"id":"WLD-084","domain":"wld","level":"master","category":"business","tags":["sullivans-cove","tasmania-distillery","history","business"],"region":"australia","question":"サリバンズ・コーヴを展開する企業の当初の社名として正しいものはどれか。","choices":["キング・アイランド・ディスティラリー","ホバート・ウイスキー・カンパニー","デリック・ケイシー蒸留所","タスマニア・ディスティラリー社(Tasmania Distillery Pty Ltd)"],"answer":3,"explanation":"サリバンズ・コーヴは当初「タスマニア・ディスティラリー社(Tasmania Distillery Pty Ltd)」として1994年に設立された企業により展開された。","difficulty":5},{"id":"WLD-085","domain":"wld","level":"master","category":"production","tags":["penderyn","faraday-still","production","chemistry"],"region":"england-wales","question":"ペンダーウィン蒸留所のファラデー・スチルの構造的特徴として正しい説明はどれか。","choices":["単式蒸留器に精留塔(コラム)を組み合わせたハイブリッド構造を持つ","伝統的なスコットランド式ポットスチルを3基連結した構造である","蒸留を行わず浸漬抽出のみで原酒を得る装置である","加熱を一切用いない常温蒸留装置である"],"answer":0,"explanation":"ファラデー・スチルは単式蒸留器(ポットスチル)に精留塔(コラム)を組み合わせたハイブリッド構造を持ち、一度の工程で高いアルコール度数の原酒を得られるよう設計されている。","difficulty":4},{"id":"WLD-086","domain":"wld","level":"master","category":"brand","tags":["english-whisky-co","chapter-series","brand","history"],"region":"england-wales","question":"セント・ジョージズ蒸留所が初期のリリースに用いた製品シリーズの通称として正しいものはどれか。","choices":["ソリストシリーズ","チャプター(Chapter)シリーズ","カスク・エディションズ","ヴィンテージ・コレクション"],"answer":1,"explanation":"セント・ジョージズ蒸留所は熟成年数が浅い設立初期において、「チャプター」と名付けたシリーズで段階的にリリースを行ったことで知られる。","difficulty":5},{"id":"WLD-087","domain":"wld","level":"master","category":"ingredients","tags":["cotswolds","local-barley","ingredients","culture"],"region":"england-wales","question":"コッツウォルズ蒸留所が原料調達において特にこだわりとして掲げていることで知られる点はどれか。","choices":["スコットランド産ピートのみの使用","インド産大麦のブレンド使用","地元コッツウォルズ地方で栽培された大麦の使用","カナダ産ライ麦の輸入使用"],"answer":2,"explanation":"コッツウォルズ蒸留所は地元コッツウォルズ地方で栽培された大麦の使用にこだわることをブランドの特徴の一つとして掲げている。","difficulty":4},{"id":"WLD-088","domain":"wld","level":"master","category":"maturation","tags":["mackmyra","swedish-oak","cask-type","maturation"],"region":"europe-other","question":"マックミラが熟成に用いる樽材として、伝統的なアメリカンオークやヨーロピアンオークに加え特徴的に用いることがある樽材はどれか。","choices":["日本産ミズナラ","フランス産アカシア材","カナダ産メープル材","スウェーデン産オーク(スモーランド地方の樫材など)"],"answer":3,"explanation":"マックミラはアメリカンオークやヨーロピアンオークに加え、スウェーデン国内産のオーク材を用いた樽で熟成した原酒をブレンドに使用することがある。","difficulty":5},{"id":"WLD-089","domain":"wld","level":"master","category":"brand","tags":["warenghem","armorik","brand","france"],"region":"europe-other","question":"フランス初のウイスキーブランドの一つとされ、ワレンゲム蒸留所が展開する銘柄名として正しいものはどれか。","choices":["アルモリック(Armorik)","マックミラ","ペンダーウィン","カバラン"],"answer":0,"explanation":"ワレンゲム蒸留所が展開する「アルモリック」はフランス初期のウイスキーブランドの一つとして知られ、ブルターニュ地方の古称「アルモリカ」に由来する。","difficulty":4},{"id":"WLD-090","domain":"wld","level":"master","category":"history","tags":["mackmyra","history","culture","business"],"region":"europe-other","question":"マックミラの創業経緯として一般に語られる内容はどれか。","choices":["国営企業として政府主導で設立された","数人の友人グループが趣味的な話し合いから創業に至った","既存の大手酒造企業の一事業部として設立された","スコットランドの蒸留所の子会社として設立された"],"answer":1,"explanation":"マックミラは1999年、複数の友人グループがウイスキー造りへの興味から意気投合し創業に至ったという経緯で知られる。","difficulty":5},{"id":"SEN-001","level":"expert","type":"color","color_hex":"#F8F6E8","category":"tasting","question":"グラスの液面を白い背景で見たところ、ほぼ透明に近い淡い色合いだった。この色調の名称として最も適切なものはどれか。","choices":["麦わら色","無色（ホワイト）","山吹色","琥珀色"],"answer":1,"explanation":"無色（ホワイト）は樽熟成を経ていないニューメイク（ニューポット）に典型的な色調で、木樽由来の色素をほとんど含まない。麦わら色以降は樽由来の色素抽出が進んだ状態を示す。","tags":["color","new_make"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-002","level":"expert","type":"color","color_hex":"#F2E6A8","category":"tasting","question":"この液色（淡い黄色みを帯びた色調）は数年程度の短期熟成によく見られる。最も適切な色名はどれか。","choices":["淡い麦わら色","無色（ホワイト）","ゴールド","古金色"],"answer":0,"explanation":"淡い麦わら色は数年程度のバーボン樽熟成でみられる初期段階の色調である。無色は未熟成、ゴールド以降はより長期の熟成段階を示す。","tags":["color","early_maturation"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-003","level":"expert","type":"color","color_hex":"#EBDD82","category":"tasting","question":"標準的なブレンデッドウイスキーの熟成初期段階に多く見られる色調の名称はどれか。","choices":["山吹色","琥珀色","麦わら色","赤銅色"],"answer":2,"explanation":"麦わら色は淡い麦わら色よりやや濃く、熟成が進行しつつある段階の代表的な呼称である。","tags":["color","blended"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-004","level":"expert","type":"color","color_hex":"#E4C85C","category":"tasting","question":"この色調は黄色味の強い橙がかった色で、植物のヤマブキ（山吹）の花に由来する和の伝統色名がある。最も適切な名称はどれか。","choices":["ゴールド","山吹色","古金色","麦わら色"],"answer":1,"explanation":"山吹色は日本の伝統色名の一つで、黄色みの強い橙色を指す。バーボン樽熟成が中間段階まで進んだ原酒でよく見られる。","tags":["color","traditional_name"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-005","level":"expert","type":"color","color_hex":"#DDB444","category":"tasting","question":"バーボン樽で良好に熟成が進んだ原酒に典型的な、明るく輝く黄金色を指す名称はどれか。","choices":["古金色","ゴールド","琥珀色","淡い麦わら色"],"answer":1,"explanation":"ゴールドは山吹色よりも明るさと透明感が増した黄金色で、バーボン樽熟成の良好な進行を示す代表的な色調である。","tags":["color","bourbon_cask"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-006","level":"expert","type":"color","color_hex":"#D29D3A","category":"tasting","question":"ゴールドよりも赤みと深みを増した、やや落ち着いた金色を指す名称として最も適切なものはどれか。","choices":["古金色","山吹色","深い琥珀色","マホガニー"],"answer":0,"explanation":"古金色はゴールドより赤みが強く落ち着いた色調で、長期のバーボン樽熟成や軽度のシェリー樽の影響がみられる段階に相当する。","tags":["color","aged_gold"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-007","level":"expert","type":"color","color_hex":"#C57E2A","category":"tasting","question":"シェリー樽由来の色素抽出が進んだ原酒や、バーボン樽で長期熟成した原酒に多くみられる、鉱物の名を冠した色調はどれか。","choices":["赤銅色","琥珀色","マホガニー","古金色"],"answer":1,"explanation":"琥珀色（アンバー）は鉱物の琥珀に似た黄褐色で、シェリー樽熟成・長期のバーボン樽熟成の双方でみられる代表的な色調である。","tags":["color","amber"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-008","level":"expert","type":"color","color_hex":"#B66720","category":"tasting","question":"琥珀色よりもさらに赤みと濃さが増した色調で、オロロソシェリー樽での熟成によくみられるものはどれか。","choices":["深い琥珀色","赤銅色","古金色","濃いマホガニー"],"answer":0,"explanation":"深い琥珀色は琥珀色よりも赤みと彩度が増した段階で、オロロソシェリー樽熟成原酒に典型的である。","tags":["color","sherry_cask"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-009","level":"professional","type":"color","color_hex":"#A6531C","category":"tasting","question":"琥珀色や深い琥珀色よりもさらに赤みを増し、銅を連想させる色調を指す名称として最も適切なものはどれか。","choices":["赤銅色","琥珀色","マホガニー","山吹色"],"answer":0,"explanation":"赤銅色は深い琥珀色よりも赤味と濃度が強く、長期のシェリー樽熟成でよくみられる色調である。","tags":["color","copper"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-010","level":"professional","type":"color","color_hex":"#8E3F18","category":"tasting","question":"家具材の銘木を語源とする、赤褐色でやや暗い色調を指す名称はどれか。","choices":["濃いマホガニー","赤銅色","マホガニー","黒に近い褐色"],"answer":2,"explanation":"マホガニーは家具材として知られる銘木の色に由来し、PXシェリー樽など長期の樽熟成を経た原酒でみられる。","tags":["color","mahogany"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-011","level":"professional","type":"color","color_hex":"#6F2F15","category":"tasting","question":"マホガニーよりもさらに暗く沈んだ赤褐色を指す名称として最も適切なものはどれか。","choices":["黒に近い褐色","濃いマホガニー","赤銅色","古金色"],"answer":1,"explanation":"濃いマホガニーはマホガニーよりも暗度が増した色調で、ヘビーシェリー樽などによる長期熟成の結果としてみられる。","tags":["color","dark_mahogany"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-012","level":"professional","type":"color","color_hex":"#4C2011","category":"tasting","question":"グラスの底が見えにくいほど暗く、黒に近い褐色を指す名称として最も適切なものはどれか。","choices":["深い琥珀色","濃いマホガニー","黒に近い褐色","赤銅色"],"answer":2,"explanation":"黒に近い褐色は色調表現の中で最も暗い段階で、極長期のシェリー樽熟成やカラメル色素の添加が疑われる濃度である。","tags":["color","near_black"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-013","level":"professional","type":"color","color_hex":"#B66720","category":"maturation","question":"この深い琥珀色（#B66720）を呈する原酒の熟成に用いられた樽として、最も可能性が高いものはどれか。","choices":["新樽（バージンオーク）由来の短期熟成","ファーストフィルのオロロソシェリー樽","リフィルのバーボン樽での短期熟成","ステンレスタンクでの貯蔵"],"answer":1,"explanation":"深い琥珀色のように赤みと濃さの強い色調は、ワイン成分やタンニンを多く含むファーストフィルのオロロソシェリー樽での熟成に由来することが多い。バーボン樽やリフィル樽は色素抽出が穏やかで、より淡い色調にとどまる。","tags":["color","cask_type","sherry"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-014","level":"professional","type":"color","color_hex":"#DDB444","category":"maturation","question":"この明るいゴールド（#DDB444）を呈する原酒の熟成に最も一般的に使われる樽はどれか。","choices":["PXシェリー樽","エックス・バーボン樽（元バーボン樽）","ワイン樽（赤ワイン）","ヘビートーストの新樽で極長期熟成"],"answer":1,"explanation":"エックス・バーボン樽（ex-bourbon cask）は色素抽出が穏やかで、明るい黄金色を呈することが多い。シェリー樽やワイン樽はより赤みの強い色調になりやすい。","tags":["color","cask_type","bourbon"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-015","level":"professional","type":"color","color_hex":"#8E3F18","category":"maturation","question":"マホガニー色（#8E3F18）を呈する原酒の色調に最も強く寄与している樽の要素はどれか。","choices":["樽材から溶出するリグニン由来のバニリンのみ","オロロソやPXなど赤ワイン系シェリーの残留成分とタンニン","蒸留時の還流（リフラックス）の強さ","モルティングにおける泥炭（ピート）の焚き込み量"],"answer":1,"explanation":"マホガニーのような赤褐色は、赤ワイン系（オロロソ、ペドロヒメネス等）のシェリー樽に残留した色素・タンニン成分の抽出によるところが大きい。バニリンは黄色みや香味に寄与するが、これほど濃い赤褐色の主因にはなりにくい。","tags":["color","cask_type","sherry"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-016","level":"professional","type":"color","color_hex":"#D29D3A","category":"maturation","question":"同じ蒸留所・同じ蒸留年の原酒でも、ファーストフィル樽とリフィル樽で色調に差が生じる理由として最も適切なものはどれか。","choices":["リフィル樽は木材の密度が高くなるため","ファーストフィル樽は樽材中の抽出可能な色素・タンニンが多く残っており抽出量が多いため","リフィル樽の方が加熱処理（チャー）が強いため","ファーストフィル樽は貯蔵温度が常に高いため"],"answer":1,"explanation":"樽は使用を重ねるごとに木材中の抽出可能な色素・タンニン・香味成分が減少する。そのためファーストフィル樽はリフィル樽に比べて短期間でも色調・香味の抽出が強く進む。","tags":["color","cask_type","first_fill"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-017","level":"master","type":"color","color_hex":"#C57E2A","category":"maturation","question":"熟成年数がほぼ同じ2種の原酒A・Bのうち、Aは琥珀色（#C57E2A）、Bはそれより明らかに淡い麦わら色だった。この色差の原因として最も可能性が低いものはどれか。","choices":["Aの方が小型のカスク（クォーターカスク等）で熟成し表面積比が大きかった","Aの方がシェリー樽、Bがバーボン樽で熟成した","Aの熟成に用いた酵母株がBと異なっていた","Aの方がファーストフィル樽、Bがリフィル樽であった"],"answer":2,"explanation":"色調の差は主に樽種・使用回数・カスクサイズ（表面積対容量比）・熟成環境など樽由来の要因で説明される。酵母株の違いは主に香味成分（エステル等）の生成に影響するが、色調そのものへの直接的な寄与は小さい。","tags":["color","cask_type","cask_size"],"difficulty":3,"domain":"sen","region":null},{"id":"SEN-018","level":"master","type":"color","color_hex":"#A6531C","category":"regulation","question":"赤銅色（#A6531C）の原酒について、色調だけから熟成年数を正確に推定することが難しい理由として最も適切なものはどれか。","choices":["赤銅色は必ず10年以上熟成した原酒にしか現れないため","スコッチウイスキー等ではスピリットカラメル（E150a）による色調整が認められており、樽由来の色調と区別がつきにくいため","赤銅色は蒸留直後のニューメイクにも自然に生じる色であるため","赤銅色は温度による錯覚であり実際には麦わら色と同一であるため"],"answer":1,"explanation":"スコッチウイスキーの規則ではスピリットカラメル（E150a）による色調整が認められており、風味への影響は小さいとされる一方、色調は樽熟成由来か添加由来かの外観のみでの判別が困難である。そのため色調のみから熟成年数を正確に推定することはできない。","tags":["color","regulation","caramel"],"difficulty":3,"domain":"sen","region":null},{"id":"SEN-019","level":"expert","type":"color","color_hex":"#B66720","category":"regulation","question":"スコッチウイスキーにおいて、色調を調整するために添加が認められている物質として最も適切なものはどれか。","choices":["人工着色料タートラジン","スピリットカラメル（E150a）","カラメル以外の食用色素全般","着色料の添加は一切認められていない"],"answer":1,"explanation":"スコッチウイスキーの規則ではスピリットカラメル（E150a）のみが色調整用の添加物として認められている。他の着色料の使用は認められていない。","tags":["color","regulation","scotch"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-020","level":"expert","type":"color","color_hex":"#8E3F18","category":"regulation","question":"アメリカン・ストレートバーボンウイスキーの規則における色調に関する記述として最も適切なものはどれか。","choices":["カラメル色素の添加が広く認められている","着色・香味付けのための添加物は認められておらず、色調は樽熟成由来に限られる","熟成年数に応じて着色料の添加量が法律で定められている","着色は蒸留前のマッシュ段階でのみ認められる"],"answer":1,"explanation":"ストレートバーボンウイスキーは、アルコール度数調整のための加水以外の添加物（着色料・香味料を含む）が認められておらず、色調は新樽（バージンオーク）での熟成のみに由来する。","tags":["color","regulation","bourbon"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-021","level":"professional","type":"color","color_hex":"#C57E2A","category":"regulation","question":"スピリットカラメル（E150a）による色調整に関する説明として最も適切なものはどれか。","choices":["風味に大きな甘みを付与するために添加される","主に外観の色調を均一化する目的で用いられ、風味への影響は限定的とされる","熟成年数を法的に証明するために添加が義務付けられている","ピート香を強調するために添加される"],"answer":1,"explanation":"スピリットカラメルはバッチ間の色調のばらつきを均一化する目的で用いられることが多く、風味への影響は限定的とされる。ただし色調のみからの熟成度判定を難しくする一因でもある。","tags":["color","regulation","caramel"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-022","level":"professional","type":"color","color_hex":"#A6531C","category":"maturation","question":"台湾やインドなど高温多湿な気候の産地で、比較的若い熟成年数でも赤銅色のような濃い色調に達しやすい理由として最も適切なものはどれか。","choices":["高温により樽材と原酒の相互作用（抽出・浸透）が促進され、熟成が加速するため","高温地域では必ずカラメル色素の添加が義務付けられているため","高温により麦芽由来の色素が直接生成されるため","高温では蒸留の際に色素が生成されるため"],"answer":0,"explanation":"気温が高い環境では樽材の膨張収縮や原酒の樽材への浸透・抽出が活発になり、熟成が加速する。そのため冷涼な気候の産地に比べて短い熟成年数でも色調・香味の抽出が進みやすい。ただし天使の分け前（エンジェルズシェア）による目減りも大きくなる。","tags":["color","maturation","climate"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-023","level":"master","type":"color","color_hex":"#D29D3A","category":"maturation","question":"同一原酒を同一期間、通常サイズのホグスヘッド樽とクォーターカスク（小型樽）でそれぞれ熟成させた場合の色調の違いに関する説明として最も適切なものはどれか。","choices":["樽サイズは色調に影響しない","クォーターカスクは容量に対する内側表面積の比率が大きいため、同期間でもより濃い色調になりやすい","ホグスヘッドの方が必ず濃い色調になる","色調の差は樽の産地の違いのみで決まる"],"answer":1,"explanation":"小型樽は容量に対する樽材表面積の比率（表面積対容量比）が大きく、原酒と樽材の接触が相対的に多くなるため、同じ熟成期間でも色調・香味の抽出が進みやすい。","tags":["color","maturation","cask_size"],"difficulty":3,"domain":"sen","region":null},{"id":"SEN-024","level":"master","type":"color","color_hex":"#6F2F15","category":"maturation","question":"濃いマホガニー色（#6F2F15）の原酒を試飲し、非常に長期熟成のシェリー樽由来と判断したが、実際には熟成年数が短くカラメル色素が添加されていた可能性も否定できない。この事例が示す官能評価上の留意点として最も適切なものはどれか。","choices":["色調は熟成年数や樽種を100%正確に示す指標であり、他の要素は無視してよい","色調はあくまで補助的な手がかりであり、香り・味わい・公式情報（熟成年数表記や規則）と併せて総合的に評価すべきである","濃い色調の原酒は必ずノンカラメル・カスクストレングスである","色調評価は温度や光源の影響を受けないため常に同一条件で判定できる"],"answer":1,"explanation":"色調はカラメル添加や樽種・気候などさまざまな要因の影響を受けるため、単独で熟成年数や樽種を断定する根拠にはならない。官能評価では香り・味わい・入手可能な公式情報と併せて総合的に判断することが求められる。","tags":["color","maturation","evaluation"],"difficulty":3,"domain":"sen","region":null},{"id":"SEN-025","level":"expert","type":"aroma","color_hex":null,"category":"tasting","question":"ウイスキーの果実様のフルーティな香りの主な由来として最も適切なものはどれか。","choices":["発酵過程で酵母が生成するエステル類","樽材の炭化（チャー）により生じるフェノール類","麦芽の乾燥に用いる泥炭の煙由来成分","蒸留後の加水による化学反応"],"answer":0,"explanation":"フルーティな香りの多くは発酵中に酵母が生成するエステル類（酢酸イソアミル、ヘキサン酸エチル等）に由来する。ピート由来のフェノール類は燻煙香、樽由来はバニラ香など別の系統の香味を形成する。","tags":["aroma","ester","fermentation"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-026","level":"expert","type":"aroma","color_hex":null,"category":"tasting","question":"バナナのような香りを特徴づける代表的なエステルとして最も適切なものはどれか。","choices":["酢酸イソアミル（イソアミルアセテート）","ヘキサン酸エチル（エチルヘキサノエート）","グアイアコール","バニリン"],"answer":0,"explanation":"酢酸イソアミル（イソアミルアセテート）はバナナ様の香りを特徴づける代表的なエステルであり、若い原酒やスペイサイドモルトなどで感じられることが多い。","tags":["aroma","ester","banana"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-027","level":"expert","type":"aroma","color_hex":null,"category":"tasting","question":"青リンゴのような香りを特徴づける代表的なエステルとして最も適切なものはどれか。","choices":["ヘキサン酸エチル（エチルヘキサノエート）","フェノール","バニリン","ジアセチル"],"answer":0,"explanation":"ヘキサン酸エチル（エチルヘキサノエート）は青リンゴ様の香りに寄与する代表的なエステルであり、フルーティな系統の香りを構成する重要な成分の一つである。","tags":["aroma","ester","apple"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-028","level":"expert","type":"aroma","color_hex":null,"category":"tasting","question":"花のような香り立ちを表現する際に用いられる系統として最も適切なものはどれか。","choices":["フローラル","フェイニー","ワイニー","スモーキー"],"answer":0,"explanation":"フローラル系はスミレやリナロールを想起させる花のような香りを指す官能表現の系統であり、フルーティ系と近い分類に位置づけられることが多い。","tags":["aroma","floral"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-029","level":"expert","type":"aroma","color_hex":null,"category":"tasting","question":"十分に熟成が進んだウイスキーによくみられる、蜜のような甘い香りを表す表現として最も適切なものはどれか。","choices":["ハニー（蜂蜜香）","フェイニー","硫黄香","青草香"],"answer":0,"explanation":"ハニー（蜂蜜香）は熟成が良好に進んだ原酒に特徴的な甘い香りの表現で、樽熟成による糖分様成分の生成や酸化熟成の進行を示すことが多い。","tags":["aroma","honey","maturation"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-030","level":"expert","type":"aroma","color_hex":null,"category":"tasting","question":"蒸留直後のニューメイクに多くみられる、穀物・ビスケットを想起させる香りの系統として最も適切なものはどれか。","choices":["麦芽香・穀物香（モルティ/シリアル）","ワイニー","フェイニー","ピーティ"],"answer":0,"explanation":"麦芽香・穀物香（モルティ）は原料の大麦麦芽に由来する香りの系統で、樽熟成が浅いニューメイクや若い原酒で特に強く感じられる。","tags":["aroma","malty","new_make"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-031","level":"expert","type":"aroma","color_hex":null,"category":"tasting","question":"革製品やタバコの葉を想起させる、やや重厚で野性的な香りの系統を指す官能用語として最も適切なものはどれか。","choices":["フェイニー（feinty）","フローラル","ハニー","エステリー"],"answer":0,"explanation":"フェイニーは革、タバコ葉、農場的（ファーミー）な香りを含む重厚な香りの系統を指す官能用語で、蒸留のテイル（後留）寄りの成分に由来することが多い。","tags":["aroma","feinty"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-032","level":"expert","type":"aroma","color_hex":null,"category":"tasting","question":"ピート香（スモーキーな香り）の主成分となる化学物質群として最も適切なものはどれか。","choices":["フェノール類（グアイアコール、クレゾール等）","エステル類","アルデヒド類のみ","乳酸菌由来の有機酸"],"answer":0,"explanation":"ピート香はグアイアコールやクレゾールなどのフェノール類に由来する。これらは泥炭を焚いて麦芽を乾燥させる際の煙に含まれ、麦芽に吸着することで生じる。","tags":["aroma","peat","phenol"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-033","level":"expert","type":"aroma","color_hex":null,"category":"tasting","question":"麦芽のピート香の強さを表す際に一般的に用いられる指標として最も適切なものはどれか。","choices":["麦芽中のフェノール値（ppm）","蒸留時のアルコール度数","樽の炭化レベル（チャーレベル）","仕込み水のpH"],"answer":0,"explanation":"ピート香の強さは一般に麦芽中のフェノール化合物濃度（ppm、フェノール値）で表される。数値が高いほど重厚なピート香が期待される目安となるが、実際に感じられる香りの強さとは必ずしも比例しない。","tags":["aroma","peat","measurement"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-034","level":"expert","type":"aroma","color_hex":null,"category":"tasting","question":"重厚なピート香と潮風・ヨード様のニュアンスを特徴とすることで知られる産地として最も適切なものはどれか。","choices":["アイラ","スペイサイド","キャンベルタウン","ローランド"],"answer":0,"explanation":"アイラ島の多くの蒸留所は重厚なピート香と潮風・ヨード様の香りを特徴とすることで知られる。ただしアイラ島内でも蒸留所ごとにピートの強弱には差がある。","tags":["aroma","region","islay"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-035","level":"professional","type":"aroma","color_hex":null,"category":"tasting","question":"フルーティで華やかな香りを特徴とする蒸留所が多いことで知られる産地として最も適切なものはどれか。","choices":["スペイサイド","キャンベルタウン","アイラ","アイルランド全域"],"answer":0,"explanation":"スペイサイド地方はフルーティで華やかな香りを特徴とする蒸留所が多いことで知られる。ただし地域特性はあくまで傾向であり、個々の蒸留所により大きく異なる。","tags":["aroma","region","speyside"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-036","level":"professional","type":"aroma","color_hex":null,"category":"tasting","question":"塩気やオイリーな質感を伴う個性的な香味で知られる、現存する蒸留所数が少ない産地として最も適切なものはどれか。","choices":["キャンベルタウン","スペイサイド","ローランド","アイラ"],"answer":0,"explanation":"キャンベルタウンはかつて多くの蒸留所を擁したが現存数は少なく、塩気やオイリーな質感を伴う個性的な香味で知られる。","tags":["aroma","region","campbeltown"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-037","level":"professional","type":"aroma","color_hex":null,"category":"tasting","question":"オーク樽熟成によって付与される甘いバニラ様の香りの主成分として最も適切なものはどれか。","choices":["バニリン","グアイアコール","酢酸イソアミル","ジメチルスルフィド"],"answer":0,"explanation":"バニリンは樽材のリグニンが加熱（トーストやチャー）により分解されて生じる成分で、樽熟成によるバニラ様の甘い香りの主成分である。","tags":["aroma","oak","vanillin"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-038","level":"professional","type":"aroma","color_hex":null,"category":"tasting","question":"ココナッツを想起させる香りに寄与する、オーク樽由来の代表的な成分として最も適切なものはどれか。","choices":["ウッドラクトン（オークラクトン）","フェノール","エチルヘキサノエート","ジアセチル"],"answer":0,"explanation":"ウッドラクトン（オークラクトン、ウイスキーラクトン）はオーク材に含まれる成分で、ココナッツ様の香りに寄与する代表的な樽由来成分である。","tags":["aroma","oak","lactone"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-039","level":"professional","type":"aroma","color_hex":null,"category":"tasting","question":"シェリー樽熟成原酒に特徴的な、ドライフルーツやクルミを想起させる香りの系統を指す表現として最も適切なものはどれか。","choices":["ワイニー（winey）","フェイニー","エステリー","スモーキー"],"answer":0,"explanation":"ワイニーはシェリーなどワイン系の樽由来の香りの系統を指す官能表現で、レーズンやドライフルーツ、ナッツ、時にダークチョコレートを想起させる。","tags":["aroma","sherry","winey"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-040","level":"professional","type":"aroma","color_hex":null,"category":"tasting","question":"赤ワイン樽でのフィニッシュ（後熟）を経た原酒に付与されやすい香味として最も適切なものはどれか。","choices":["赤い果実様の香りと軽いタンニン感","強いピート香とヨード香","炭酸様の刺激臭","顕著な硫黄臭"],"answer":0,"explanation":"赤ワイン樽でのフィニッシュは、赤い果実（ベリー系）を想起させる香味と軽いタンニンによる渋み・収斂感を付与することが多い。","tags":["aroma","wine_cask","finishing"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-041","level":"professional","type":"aroma","color_hex":null,"category":"tasting","question":"ラム樽でのフィニッシュを経た原酒に付与されやすい香味として最も適切なものはどれか。","choices":["糖蜜（モラセス）やトロピカルフルーツ様の甘い香り","強い硫黄臭","青草のような刺激臭","塩素消毒臭"],"answer":0,"explanation":"ラム樽は糖蜜（モラセス）由来の残糖・香味成分を含むことが多く、フィニッシュに用いると糖蜜様・トロピカルフルーツ様の甘い香味を付与しやすい。","tags":["aroma","rum_cask","finishing"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-042","level":"professional","type":"aroma","color_hex":null,"category":"production","question":"蒸留時の銅（カッパー）との接触が長いほど、生成される新酒（ニューメイク）の香味にどのような傾向が生じるか。","choices":["硫黄系の重い香りが減少し、より軽く華やかな香味になりやすい","硫黄系の重い香りが増加し、より重厚な香味になりやすい","ピート香が新たに生成される","アルコール度数が上昇する"],"answer":0,"explanation":"銅は硫黄化合物と反応してこれを除去する触媒的な役割を果たすため、蒸留時の銅との接触が長い（還流が強い等）ほど硫黄系の重い香りが減少し、より軽く華やかでフルーティな新酒になりやすい。","tags":["aroma","production","copper"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-043","level":"professional","type":"aroma","color_hex":null,"category":"production","question":"蒸留における還流（リフラックス）が強いポットスチルで造られる新酒の傾向として最も適切なものはどれか。","choices":["軽やかでフルーティ、フローラルな酒質になりやすい","重厚でオイリーな酒質になりやすい","必ず高いピート香を持つ","アルコール度数が必ず低くなる"],"answer":0,"explanation":"還流が強い（スチルが背高・くびれが強い等）と、蒸気が銅と接触する機会が増え、また重い成分がスチル内で再凝縮・再蒸発を繰り返すため、より軽くフルーティ・フローラルな新酒になりやすい。","tags":["aroma","production","reflux"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-044","level":"professional","type":"aroma","color_hex":null,"category":"production","question":"蒸留の際、ハーツ（本溜）として取り出す部分のカットポイントを本来より遅め（テイル側）に設定した場合、新酒の香味にどのような傾向が生じやすいか。","choices":["フェイニーで重厚、脂っぽい成分がより多く含まれやすくなる","エステル香が著しく強くなりフルーティになる","ピート香が消失する","色調が濃くなる"],"answer":0,"explanation":"カットポイントをテイル側（後留寄り）に遅く設定すると、脂肪酸や高級アルコール（フーゼル油）などテイルに含まれる重い成分がより多く新酒に取り込まれ、フェイニーで重厚・脂っぽい酒質になりやすい。","tags":["aroma","production","cut_point"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-045","level":"master","type":"aroma","color_hex":null,"category":"tasting","question":"ウイスキーのフレーバーホイールのような官能評価用の分類体系を用いる目的として最も適切なものはどれか。","choices":["個人の感覚的な印象を共通言語化し、評価者間で香味表現の再現性・比較可能性を高めるため","特定銘柄の市場価格を決定するため","蒸留所の生産量を規制するため","アルコール度数を法的に証明するため"],"answer":0,"explanation":"フレーバーホイールは香味を系統立てて分類・命名することで、官能評価における主観的な印象を共通言語化し、評価者間での再現性・比較可能性を高めることを目的とした体系である。","tags":["aroma","flavor_wheel","methodology"],"difficulty":3,"domain":"sen","region":null},{"id":"SEN-046","level":"master","type":"aroma","color_hex":null,"category":"production","question":"同一原料・同一蒸留所であっても、発酵時間を通常より長く取った場合に生じやすい香味的傾向として最も適切なものはどれか。","choices":["乳酸菌等の活動により酸や複雑なエステルが増加し、よりフルーティで複雑な香味になりやすい","発酵時間はエステル生成量に一切影響しない","発酵時間を延ばすと必ずピート香が増加する","発酵時間を延ばすと必ず色調が濃くなる"],"answer":0,"explanation":"発酵時間を長く取ると、酵母以外の乳酸菌などの微生物活動が進み、酸や複雑なエステルの生成が促進されることでよりフルーティで複雑な香味につながりやすいとされる。ただし過度な酸生成は品質低下（オフフレーバー）の原因にもなり得るため管理が必要である。","tags":["aroma","production","fermentation"],"difficulty":3,"domain":"sen","region":null},{"id":"SEN-047","level":"master","type":"aroma","color_hex":null,"category":"maturation","question":"熟成年数の経過に伴う香味変化に関する説明として最も適切なものはどれか。","choices":["新酒由来の刺激的な香りが穏やかになり、樽由来の甘い香味（バニラ・スパイス等）や複雑性が増す傾向がある","熟成年数が経過しても香味は一切変化しない","熟成が進むほど必ずピート香が新たに強く生成される","熟成年数と香味の複雑性には相関がなく無関係である"],"answer":0,"explanation":"熟成が進むにつれ、蒸留直後の刺激的でシャープな香りは穏やかになり、樽材からのバニラ・スパイス・ウッディな香味成分の抽出や酸化反応により複雑性が増す傾向がある。ただし過度な熟成は樽香が支配的になりすぎる、いわゆる「オーバーウッド」につながることもある。","tags":["aroma","maturation","evaluation"],"difficulty":3,"domain":"sen","region":null},{"id":"SEN-048","level":"master","type":"aroma","color_hex":null,"category":"tasting","question":"テイスティングにおいてチューリップ型（すぼまった形状）のノージンググラスが好まれる理由として最も適切なものはどれか。","choices":["香気成分がグラス口部に集中しやすく、香りを効率的に感じ取れるため","グラスの形状はアルコール度数を変化させるため","チューリップ型は氷を入れやすい形状であるため","口が広いグラスより多くの液量を注げるため"],"answer":0,"explanation":"チューリップ型のノージンググラスは口部がすぼまった形状であるため、揮発した香気成分がグラス内に滞留・集中しやすく、効率的に香りを感じ取ることができる。テイスティングにおける標準的なグラス形状として広く用いられる。","tags":["aroma","tasting_technique","glass"],"difficulty":3,"domain":"sen","region":null},{"id":"SEN-049","level":"expert","type":"offflavor","color_hex":null,"category":"tasting","question":"腐った卵や焦げたマッチのような刺激臭を呈するオフフレーバーの主な原因として最も適切なものはどれか。","choices":["蒸留時の銅との接触不足等による硫黄化合物の残留","樽材のバニリンの過剰抽出","発酵時間が短すぎたことによるエステル不足","熟成年数が長すぎたことによる過度な酸化"],"answer":0,"explanation":"腐卵臭・焦げたマッチ臭などの硫黄様オフフレーバーは、蒸留時の銅との接触不足などにより硫黄化合物（硫化水素等）が十分に除去されないまま残留することが主因とされる。シェリー樽で用いられる硫黄燻蒸（サルファーキャンドル）の残留成分が影響する場合もある。","tags":["offflavor","sulfur"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-050","level":"expert","type":"offflavor","color_hex":null,"category":"tasting","question":"茹でたキャベツや調理した野菜を思わせる不快臭の原因物質として最も適切なものはどれか。","choices":["ジメチルスルフィド（DMS）","バニリン","酢酸イソアミル","ウッドラクトン"],"answer":0,"explanation":"ジメチルスルフィド（DMS）は茹でたキャベツや調理野菜を思わせる不快臭の原因物質で、発酵過程での細菌汚染や、麦汁の煮沸不足などにより生成・残留することがある。","tags":["offflavor","dms"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-051","level":"expert","type":"offflavor","color_hex":null,"category":"tasting","question":"除光液（ネイルポリッシュリムーバー）を思わせる刺激的な溶剤臭が過剰に感じられる場合、主に何が原因と考えられるか。","choices":["酢酸エチルなど特定エステル類の過剰生成","泥炭由来フェノール類の過剰","樽材由来タンニンの過剰抽出","加水による希釈不足"],"answer":0,"explanation":"酢酸エチルなどのエステル類は本来フルーティな香味に寄与するが、発酵管理の不良などにより過剰に生成されると、除光液を思わせる刺激的な溶剤臭として感じられ、オフフレーバーとみなされることがある。","tags":["offflavor","solvent","ester"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-052","level":"expert","type":"offflavor","color_hex":null,"category":"tasting","question":"コルク栓を使用したボトルで、湿った段ボールやカビを思わせる臭いが感じられる場合に疑われる原因物質として最も適切なものはどれか。","choices":["2,4,6-トリクロロアニソール（TCA、コルク臭の原因物質）","グアイアコール","ジアセチル","バニリン"],"answer":0,"explanation":"2,4,6-トリクロロアニソール（TCA）はカビの生えたコルク等に由来する化合物で、極めて低濃度でも湿った段ボールやカビを思わせる不快臭（いわゆるコルク臭・ブショネ）の原因となる。ウイスキーはワインに比べ頻度は低いもののコルク栓使用時には注意が必要である。","tags":["offflavor","cork_taint","tca"],"difficulty":1,"domain":"sen","region":null},{"id":"SEN-053","level":"professional","type":"offflavor","color_hex":null,"category":"tasting","question":"開栓後、長期間空気に触れた状態で保管されたウイスキーに生じやすい劣化臭の説明として最も適切なものはどれか。","choices":["酸化反応により酢酸様の酸味臭や段ボール様の臭い（酸化由来成分）が生じやすくなる","開栓後は成分が一切変化しないため風味は保たれる","開栓後はピート香が新たに強く生成される","開栓後は必ず色調が薄くなる"],"answer":0,"explanation":"開栓後に空気との接触が続くと酸化反応が進行し、酢酸様の酸っぱい香りや、トランス-2-ノネナール等に由来する段ボール様の酸化臭（いわゆる「オールドボトルエフェクト」の一因）が生じやすくなる。","tags":["offflavor","oxidation"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-054","level":"professional","type":"offflavor","color_hex":null,"category":"tasting","question":"蒸留時のカットポイントを大幅に遅くし、テイル（後留）成分を過剰に取り込んだ場合に生じやすいオフフレーバーの傾向として最も適切なものはどれか。","choices":["石鹸様・脂っぽい（ソーピー）なフーゼル油由来の重い不快香が強まる","フルーティなエステル香が著しく強調される","ピート香が消失する","色調が極端に淡くなる"],"answer":0,"explanation":"カットポイントを過度にテイル側に取ると、高級アルコール（フーゼル油）や脂肪酸エステルなど重い成分が過剰に取り込まれ、石鹸様（ソーピー）で脂っぽい重い不快香につながりやすい。","tags":["offflavor","cut_point","fusel"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-055","level":"professional","type":"offflavor","color_hex":null,"category":"tasting","question":"発酵過程で乳酸菌等による汚染が過度に進んだ場合に生じやすい、バターやバタースコッチを思わせる香気成分として最も適切なものはどれか。","choices":["ジアセチル","グアイアコール","バニリン","リナロール"],"answer":0,"explanation":"ジアセチルはバター様・バタースコッチ様の香りを持つ成分で、乳酸菌等による発酵過程の汚染により過剰に生成されると、しばしばオフフレーバーとみなされる。適量であれば個性の一部となる場合もあるが過剰は品質低下の指標となる。","tags":["offflavor","diacetyl","fermentation"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-056","level":"professional","type":"offflavor","color_hex":null,"category":"tasting","question":"焦げたゴムを思わせる不快な香りが感じられる場合に考えられる原因として最も適切なものはどれか。","choices":["硫黄化合物の過剰残留や樽の過度な炭化（オーバーチャー）","熟成不足による青草臭","発酵時間の不足によるエステル欠如","加水による過度な希釈"],"answer":0,"explanation":"焦げたゴムを思わせる不快臭は、硫黄化合物の過剰な残留や、樽の炭化（チャー）が過度であることに由来する場合がある。硫黄系オフフレーバーの一種として扱われることが多い。","tags":["offflavor","sulfur","char"],"difficulty":2,"domain":"sen","region":null},{"id":"SEN-057","level":"master","type":"offflavor","color_hex":null,"category":"tasting","question":"熟成が浅い、あるいは未熟な原酒に感じられる青草（グラッシー）のような刺激的な香りに関する説明として最も適切なものはどれか。","choices":["樽熟成による丸みや複雑性がまだ十分に付与されておらず、原料由来の未熟な青臭さが相対的に目立つ状態を示すことが多い","青草臭は必ず特定の病原菌汚染の証拠であり例外なく重大な欠陥である","青草臭は熟成年数に関わらず一定であり熟成の指標にはならない","青草臭はピート由来フェノール類の直接の分解生成物である"],"answer":0,"explanation":"青草様の刺激的な香りは、樽熟成による丸みや複雑性の付与が十分でない若い原酒や未熟な状態でしばしば感じられる。これは必ずしも重大な欠陥ではなく、熟成の進行度を示す官能上の手がかりの一つとして扱われることが多い。","tags":["offflavor","immature","grassy"],"difficulty":3,"domain":"sen","region":null},{"id":"SEN-058","level":"master","type":"offflavor","color_hex":null,"category":"tasting","question":"消毒薬や絆創膏を思わせるいわゆるTCP様の異臭が生じる原因として最も適切なものはどれか。","choices":["塩素処理された仕込み水中の塩素とフェノール類が反応して生じるクロロフェノール類","泥炭由来フェノール類そのものが単独で生じさせる通常のピート香","樽材のバニリンが酸化して生じる成分","エステル類の加水分解生成物"],"answer":0,"explanation":"TCP様の消毒薬・絆創膏を思わせる異臭は、塩素処理された仕込み水中に残留する塩素とフェノール類（ピート由来等）が反応してクロロフェノール類を生成することが原因とされる。通常のピート香（スモーキーな心地よい香り）とは区別されるオフフレーバーである。","tags":["offflavor","tcp","chlorophenol"],"difficulty":3,"domain":"sen","region":null},{"id":"SEN-059","level":"master","type":"offflavor","color_hex":null,"category":"tasting","question":"貯蔵環境の衛生管理が不十分な倉庫で長期熟成された原酒に、木材の腐朽やカビを思わせる不快臭が生じることがある。この現象の主な要因として最も適切なものはどれか。","choices":["倉庫や樽周辺の衛生状態不良による微生物（カビ等）の繁殖や、老朽化した樽材からの異臭移行","熟成年数が長いこと自体が直接の原因であり衛生状態とは無関係である","カラメル色素の添加が直接の原因である","蒸留時の還流不足が直接の原因である"],"answer":0,"explanation":"木材腐朽臭やカビ臭は、貯蔵倉庫や樽周辺の衛生状態が不十分な場合に生じる微生物（カビ等）の繁殖や、老朽化・劣化した樽材からの異臭移行が主な要因となることが多い。単純な熟成年数の長さのみが原因ではない。","tags":["offflavor","warehouse","mold"],"difficulty":3,"domain":"sen","region":null},{"id":"SEN-060","level":"master","type":"offflavor","color_hex":null,"category":"tasting","question":"官能評価において、特定の香気特徴を安易に「オフフレーバー（欠陥）」と判定する前に確認すべき事項として最も適切なものはどれか。","choices":["その特徴が蒸留所のハウススタイルや原料・製法由来の個性である可能性、また空気接触（エアレーション）により変化・消失する一時的なものである可能性を確認する","香りに何らかの刺激があれば製法や個性を問わず即座に欠陥と断定してよい","オフフレーバーの判定には常に化学分析のみを用い官能評価は不要である","一度でも硫黄様の香りを感じた原酒はすべて出荷不適格と判定してよい"],"answer":0,"explanation":"一部の硫黄様ニュアンスなどは、蒸留所のハウススタイルや原料・製法由来の個性として意図的に許容される場合があり、また空気接触（エアレーション）によって変化・消失する一時的な特徴であることも多い。官能評価では安易に欠陥と断定せず、持続性や文脈、既知のハウススタイル等を踏まえて総合的に判断することが求められる。","tags":["offflavor","evaluation","critical_thinking"],"difficulty":3,"domain":"sen","region":null}];
