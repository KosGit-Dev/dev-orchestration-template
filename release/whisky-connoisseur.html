window.WCQ_MAP = {"points":[{"id":"pt-speyside","name":"スペイサイド","country":"スコットランド","lat":57.5,"lon":-3.2,"region":"scotland-speyside","kind":"region","trivia":"スペイ川流域を中心に広がるスコットランド最大のウイスキー産地で、スコットランドの蒸留所の半数近くが集まるとされる。マッカランやグレンフィディックなど世界的に有名な銘柄を数多く輩出し、フルーティーでエレガントな味わいの原酒が多いといわれる。良質な水源と肥沃な大麦畑に恵まれた土地で、19世紀の密造酒時代から蒸留業が根付いてきた。","quiz_tags":["speyside","scotland","region"]},{"id":"pt-islay","name":"アイラ","country":"スコットランド","lat":55.75,"lon":-6.2,"region":"scotland-islay","kind":"region","trivia":"スコットランド西方の小島で、ピートを焚いた強いスモーキーフレーバーのウイスキーで世界的に知られる産地。島の南岸キルダルトン地区にはラフロイグ、アードベッグ、ラガヴーリンの3蒸留所が隣接して立地する。島内で採れる泥炭（ピート）は海藻由来の成分を含むとされ、独特のヨード香の一因といわれる。","quiz_tags":["islay","peat","scotland"]},{"id":"pt-highland","name":"ハイランド","country":"スコットランド","lat":57.2,"lon":-4.5,"region":"scotland-highland","kind":"region","trivia":"スコットランド北部から中央部にかけて広がる、地理的に最も広大な産地区分。北ハイランドは軽やかでフローラル、東ハイランドはスパイシーな傾向があるなど、蒸留所ごとの個性差が大きいことで知られる。グレンモーレンジィのように背の高いポットスチルを用いる蒸留所が多いのも特徴の一つとされる。","quiz_tags":["highland","scotland","region"]},{"id":"pt-lowland","name":"ローランド","country":"スコットランド","lat":55.7,"lon":-3.8,"region":"scotland-lowland","kind":"region","trivia":"スコットランド南部に広がる産地で、伝統的に軽やかでライトな味わいのウイスキーが多いとされる。20世紀後半には稼働蒸留所が数軒まで減少した時期もあったが、近年は新規蒸留所の設立が相次いでいる。一部の蒸留所では今も三回蒸留の伝統が受け継がれている。","quiz_tags":["lowland","scotland","triple-distillation"]},{"id":"pt-campbeltown","name":"キャンベルタウン","country":"スコットランド","lat":55.42,"lon":-5.6,"region":"scotland-campbeltown","kind":"region","trivia":"キンタイア半島に位置し、かつては「世界のウイスキーの首都」と呼ばれ最盛期には30以上の蒸留所が稼働していた港町。20世紀前半に多くが閉鎖・統合され、現存する稼働蒸留所はスプリングバンクを含む数軒のみとなった。オイリーで塩気を感じさせる独特の風味が特徴とされる。","quiz_tags":["campbeltown","scotland","history"]},{"id":"pt-islands","name":"アイランズ","country":"スコットランド","lat":57.3,"lon":-6.2,"region":"scotland-islands","kind":"region","trivia":"アイラ島を除く、スカイ島やオークニー諸島、マル島、ジュラ島など複数の島々をまとめて指す呼び方で、法的な公式区分ではなくハイランドの一部として扱われることもある。海に囲まれた立地から、潮の香りを思わせる個性を持つ原酒が多いとされる。タリスカーやハイランドパークなどがこの区分の代表格とされる。","quiz_tags":["islands","scotland","region"]},{"id":"pt-macallan","name":"マッカラン","country":"スコットランド","lat":57.47,"lon":-3.19,"region":"scotland-speyside","kind":"distillery","trivia":"スペイサイドを代表する蒸留所で、1824年に創業した合法蒸留所の一つ。シェリー樽での熟成に強いこだわりを持つことで知られ、他の蒸留所より小型のポットスチルを使うことでも知られる。オークションでは希少なオールドボトルが高額で取引されることでも有名。","quiz_tags":["macallan","speyside","sherry-cask"]},{"id":"pt-glenfiddich","name":"グレンフィディック","country":"スコットランド","lat":57.44,"lon":-3.13,"region":"scotland-speyside","kind":"distillery","trivia":"1887年創業、現在も創業家であるウィリアム・グラント&サンズが所有し続けているスペイサイドの蒸留所。1960年代にシングルモルトを積極的に海外市場へ売り出した先駆けの一つとされ、鹿のロゴで知られる。敷地内に自社ボトリング設備を持つ点も特徴的。","quiz_tags":["glenfiddich","speyside","single-malt"]},{"id":"pt-ardbeg","name":"アードベッグ","country":"スコットランド","lat":55.64,"lon":-6.11,"region":"scotland-islay","kind":"distillery","trivia":"アイラ島南岸に位置し、強いピート香を特徴とする蒸留所。1997年にグレンモーレンジィ社に買収され、同社を通じて現在はLVMHグループ傘下にある。フェノール値の高いモルトを使用することで知られる。","quiz_tags":["ardbeg","islay","peat"]},{"id":"pt-laphroaig","name":"ラフロイグ","country":"スコットランド","lat":55.63,"lon":-6.15,"region":"scotland-islay","kind":"distillery","trivia":"アイラ島の蒸留所で、消毒薬のような強いヨード香とスモーキーさが際立つ味わいで知られる。1994年に英国王室からロイヤルワラント（王室御用達）を授与されたことがある銘柄とされる。自社のフロアモルティング設備を今も稼働させている数少ない蒸留所の一つ。","quiz_tags":["laphroaig","islay","royal-warrant"]},{"id":"pt-springbank","name":"スプリングバンク","country":"スコットランド","lat":55.42,"lon":-5.6,"region":"scotland-campbeltown","kind":"distillery","trivia":"キャンベルタウンに現存する伝統的な家族経営の蒸留所で、製麦から瓶詰めまで全工程を自社で行う数少ない蒸留所として知られる。二回半蒸留と呼ばれる独特の蒸留方式を採用することでも知られる。ピートの効いたロングロウや無泥炭のヘーゼルバーンなど、自社ブランド内で複数の異なるスタイルの原酒を造り分けていることでも知られる。","quiz_tags":["springbank","campbeltown","independent"]},{"id":"pt-talisker","name":"タリスカー","country":"スコットランド","lat":57.3,"lon":-6.35,"region":"scotland-islands","kind":"distillery","trivia":"スカイ島で長らく唯一の蒸留所として知られ、1830年頃に創業した。2回蒸留ながら、ラインアームに設けた還流用のパイプ（ピュリファイア）とワームタブ（虫管）式の冷却器を用いる独特の製法により、胡椒のようなスパイシーさと潮の香りを併せ持つ味わいが生まれるとされる。詩人ロバート・ルイス・スティーヴンソンが「すべての飲み物の王様」と称賛したという逸話でも知られる。","quiz_tags":["talisker","skye","islands"]},{"id":"pt-highland-park","name":"ハイランドパーク","country":"スコットランド","lat":58.98,"lon":-2.96,"region":"scotland-islands","kind":"distillery","trivia":"オークニー諸島カークウォールに位置する、スコットランドで最も北にあるウイスキー蒸留所。自社でフロアモルティングを行い、地元産のヒースを含むピートを使用することで知られる。ヴァイキングの歴史を色濃く残る土地に位置することでも知られる。","quiz_tags":["highlandpark","orkney","islands"]},{"id":"pt-glenmorangie","name":"グレンモーレンジィ","country":"スコットランド","lat":57.8,"lon":-4.06,"region":"scotland-highland","kind":"distillery","trivia":"1843年創業のハイランドの蒸留所で、スコットランドで最も背の高い部類のポットスチルを持つことで知られる。首の長い蒸留器により、軽やかでフローラルな原酒が生まれるとされる。さまざまなワイン樽での後熟（フィニッシュ）を早くから取り入れた蒸留所としても知られる。","quiz_tags":["glenmorangie","highland","stills"]},{"id":"pt-midleton","name":"ミドルトン","country":"アイルランド","lat":51.92,"lon":-8.17,"region":"ireland","kind":"distillery","trivia":"アイルランドを代表する大規模蒸留所で、ジェムソンをはじめとする主要銘柄の多くを生産する。単式蒸留器と連続式蒸留器を併設し、ポットスチルウイスキーとグレーンウイスキーの両方を自社で造り分けられることで知られる。敷地内には旧蒸留所を保存した「オールドミドルトン蒸留所」の見学施設もある。","quiz_tags":["midleton","ireland","jameson"]},{"id":"pt-bushmills","name":"ブッシュミルズ","country":"イギリス（北アイルランド）","lat":55.2,"lon":-6.52,"region":"ireland","kind":"distillery","trivia":"北アイルランドに位置し、1608年に国王ジェームズ1世から蒸留に関する免許が与えられた地域にあるとされ、世界最古級のライセンスを持つ蒸留所と称されることが多い。現在の蒸留所建屋は18世紀以降のものとされる。世界遺産ジャイアンツ・コーズウェイの近くに位置することでも知られる。","quiz_tags":["bushmills","ireland","history"]},{"id":"pt-bardstown","name":"バーズタウン","country":"アメリカ合衆国","lat":37.81,"lon":-85.47,"region":"usa-kentucky","kind":"region","trivia":"「バーボンの首都」と呼ばれるケンタッキー州の町で、周辺にヘブンヒルなど多くの大手バーボン蒸留所が集まる。バーボン産業の歴史を伝えるオスカーゲッツ・ウイスキー博物館などが所在する。毎年秋には大規模なバーボン祭りが開催されることでも知られる。","quiz_tags":["bourbon","kentucky","usa"]},{"id":"pt-lynchburg","name":"リンチバーグ","country":"アメリカ合衆国","lat":35.28,"lon":-86.38,"region":"usa-tennessee","kind":"region","trivia":"テネシーウイスキーを代表するジャックダニエルの蒸留所がある、人口の少ない小さな町。原酒を樽詰めする前にサトウカエデの木炭でろ過するリンカーン郡プロセスと呼ばれる工程を経る点が、多くのバーボンとの違いとされる。町のあるムーア郡は現在も禁酒（ドライカウンティ）を続けていることで知られる。","quiz_tags":["tennessee-whiskey","jackdaniels","usa"]},{"id":"pt-louisville","name":"ルイビル","country":"アメリカ合衆国","lat":38.25,"lon":-85.76,"region":"usa-kentucky","kind":"landmark","trivia":"ケンタッキー州最大の都市で、オハイオ川沿いの水運の要衝として発展した。かつて「ウイスキー・ロウ」と呼ばれる一帯にバーボン関連の商社や倉庫が集積した歴史を持つ。近年は都市部にも複数の蒸留所が新設され、バーボン観光の拠点の一つとなっている。","quiz_tags":["louisville","kentucky","whiskeyrow"]},{"id":"pt-windsor","name":"ウィンザー","country":"カナダ","lat":42.3,"lon":-83.03,"region":"canada","kind":"region","trivia":"アメリカのデトロイトとデトロイト川を挟んで向かい合う、オンタリオ州の都市。1920年代のアメリカ禁酒法時代には、対岸への酒類密輸の拠点となった歴史を持つ。ハイラム・ウォーカーが興したカナディアンクラブの蒸留所が現在も稼働している。","quiz_tags":["canada","canadianclub","prohibition"]},{"id":"pt-yamazaki","name":"山崎","country":"日本","lat":34.89,"lon":135.67,"region":"japan","kind":"distillery","trivia":"1923年に竣工した日本初のモルトウイスキー専用蒸留所で、京都府と大阪府の境、桂川・宇治川・木津川が合流する地点近くに位置する。創業者の鳥井信治郎と、後にニッカウヰスキーを興す竹鶴政孝が深く関わったことで知られる。良質な水源と昼夜の寒暖差、霧の発生しやすい気候がウイスキー造りに適した土地とされてきた。","quiz_tags":["yamazaki","japan","suntory"]},{"id":"pt-hakushu","name":"白州","country":"日本","lat":35.78,"lon":138.4,"region":"japan","kind":"distillery","trivia":"山梨県北杜市、南アルプス山麓の標高約700メートルの森の中に位置するサントリーの蒸留所で「森の蒸溜所」とも呼ばれる。複数のポットスチル形状や加熱方式を使い分け、多彩な原酒を生み出すことで知られる。敷地内には南アルプスの伏流水を汲む場所や、ウイスキー博物館なども設けられている。","quiz_tags":["hakushu","japan","suntory"]},{"id":"pt-yoichi","name":"余市","country":"日本","lat":43.2,"lon":140.77,"region":"japan","kind":"distillery","trivia":"北海道余市町に位置する、ニッカウヰスキー創業の地となった蒸留所。竹鶴政孝がスコットランドの気候に似た土地として選び、1934年に設立した。今も石炭直火蒸留を行う数少ない蒸留所の一つとして知られる。","quiz_tags":["yoichi","japan","nikka"]},{"id":"pt-miyagikyo","name":"宮城峡","country":"日本","lat":38.36,"lon":140.83,"region":"japan","kind":"distillery","trivia":"宮城県仙台市、広瀬川と新川の合流地点近くに1969年に設立されたニッカウヰスキーの蒸留所。石炭直火蒸留で力強い酒質を目指した余市とは対照的に、軽やかでフルーティーな原酒造りを狙って竹鶴政孝が土地を選定したとされる。スチーム間接加熱式の蒸留器を使用することでも知られる。","quiz_tags":["miyagikyo","japan","nikka"]},{"id":"pt-chichibu","name":"秩父","country":"日本","lat":36.02,"lon":139.13,"region":"japan","kind":"distillery","trivia":"埼玉県秩父市にある小規模蒸留所で、2008年にベンチャーウイスキー社によって設立された。地元産大麦の使用やミズナラ樽熟成への積極的な取り組みなど、日本のクラフトウイスキー・ブームの先駆けとして国際的評価を高めたことで知られる。創業者は羽生蒸溜所を営んでいた老舗酒造家の出身とされる。","quiz_tags":["chichibu","japan","craft"]},{"id":"pt-fuji-gotemba","name":"富士御殿場","country":"日本","lat":35.31,"lon":138.93,"region":"japan","kind":"distillery","trivia":"静岡県御殿場市、富士山麓に位置するキリンの蒸留所。単式蒸留器と連続式蒸留器の両方を自社で保有し、一つの蒸留所内でモルトとグレーンの両方を製造できる点が特徴とされる。1973年に稼働を開始した。","quiz_tags":["fujigotemba","japan","kirin"]},{"id":"pt-mars-shinshu","name":"マルス信州","country":"日本","lat":35.83,"lon":137.92,"region":"japan","kind":"distillery","trivia":"長野県宮田村、中央アルプスの麓、標高約798メートルに位置する本坊酒造の蒸留所で、日本で最も標高が高い場所にあるウイスキー蒸留所とされる。冷涼な気候によりゆっくりと熟成が進むといわれる。焼酎メーカーとしての歴史を持つ本坊酒造が1985年に蒸留所を移転して現在の姿になった。","quiz_tags":["marsshinshu","japan","altitude"]},{"id":"pt-kanosuke","name":"嘉之助","country":"日本","lat":31.35,"lon":130.36,"region":"japan","kind":"distillery","trivia":"鹿児島県日置市にある小正醸造の蒸留所で、2017年に稼働を開始した比較的新しいウイスキー蒸留所。焼酎蔵として培ってきた蒸留技術を背景に持ち、温暖な南国の気候による独特の熟成環境が特徴とされる。名称は創業家の先代である「嘉之助」氏に由来する。","quiz_tags":["kanosuke","japan","kagoshima"]},{"id":"pt-kavalan","name":"カバラン","country":"台湾","lat":24.77,"lon":121.75,"region":"taiwan","kind":"distillery","trivia":"台湾東部の宜蘭県に位置し、2005年に金車グループによって設立された台湾を代表するウイスキー蒸留所。亜熱帯の高温多湿な気候により熟成が非常に速く進むとされ、樽由来の風味が短期間で強く付くといわれる。国際的な品評会で数々の賞を受賞し、世界的な評価を大きく高めたことで知られる。","quiz_tags":["kavalan","taiwan","tropical-aging"]},{"id":"pt-amrut","name":"アムルット","country":"インド","lat":12.97,"lon":77.59,"region":"india","kind":"distillery","trivia":"インド南部バンガロールに拠点を置く、インドを代表するウイスキーメーカー。標高の高い土地の温暖な気候により熟成が早く進むとされる。2004年にシングルモルト「アムルット」を海外市場へ本格的に展開し、インド産ウイスキーの存在感を世界に示したことで知られる。","quiz_tags":["amrut","india","bangalore"]},{"id":"pt-tasmania","name":"タスマニア","country":"オーストラリア","lat":-42.88,"lon":147.33,"region":"australia","kind":"region","trivia":"オーストラリア南部の島州で、冷涼な気候と良質な水源を背景に1990年代以降クラフトウイスキー蒸留所が数多く誕生した。1992年創業のラーク・ディスティラリーは、現代オーストラリアンウイスキーの草分けとされる。国際的な品評会で高い評価を得る銘柄が相次いだことで、オーストラリアンウイスキーの世界的な知名度が大きく高まった地域とされる。","quiz_tags":["tasmania","australia","craft"]},{"id":"pt-penderyn","name":"ペンダーリン","country":"ウェールズ","lat":51.79,"lon":-3.57,"region":"england-wales","kind":"distillery","trivia":"ウェールズ南部、ブレコンビーコンズ国立公園内にある蒸留所で、2000年代初頭に稼働を開始した近代ウェールズ初のウイスキー蒸留所とされる。単式蒸留器に精留塔を組み合わせた、ファラデー博士が設計した独特の蒸留器（ファラデー・スチル）を用いることで知られる。地元の山の伏流水を仕込み水に使用している。","quiz_tags":["penderyn","wales"," <script>
/* 共通ユーティリティ・定数・ラベル定義 */
(function () {
  'use strict';

  const LEVELS = {
    expert: { label: 'エキスパート', short: 'EX', order: 1 },
    professional: { label: 'プロフェッショナル', short: 'PR', order: 2 },
    master: { label: 'マスター・オブ・ウイスキー', short: 'MW', order: 3 },
  };

  const CATEGORIES = {
    'region-knowledge': '産地・地理',
    distillery: '蒸留所',
    production: '製造工程',
    ingredients: '原料',
    maturation: '熟成・樽',
    blending: 'ブレンド',
    regulation: '法規・定義',
    history: '歴史',
    people: '人物',
    brand: 'ブランド・製品',
    tasting: 'テイスティング',
    chemistry: '香味成分',
    culture: '文化・カクテル',
    business: '業界・市場',
  };

  const REGIONS = {
    'scotland-speyside': 'スペイサイド',
    'scotland-islay': 'アイラ',
    'scotland-highland': 'ハイランド',
    'scotland-lowland': 'ローランド',
    'scotland-campbeltown': 'キャンベルタウン',
    'scotland-islands': 'アイランズ',
    ireland: 'アイルランド',
    'usa-kentucky': 'ケンタッキー',
    'usa-tennessee': 'テネシー',
    'usa-other': 'アメリカその他',
    canada: 'カナダ',
    japan: '日本',
    taiwan: '台湾',
    india: 'インド',
    australia: 'オーストラリア',
    'england-wales': 'イングランド・ウェールズ',
    'europe-other': '欧州その他',
    'world-other': '世界その他',
  };

  const ESSAY_CATS = {
    history: '歴史',
    production: '製造',
    region: '産地',
    regulation: '法規・定義',
    business: 'ビジネス',
    culture: '文化',
    tasting: 'テイスティング',
    japan: '日本',
  };

  /* Miller 図法（scripts/whisky_map_convert.py と同じ定数） */
  const MAP_W = 1000;
  const LAT_TOP = 78;
  const LAT_BOTTOM = -56;
  function millerY(latDeg) {
    const lat = (latDeg * Math.PI) / 180;
    return 1.25 * Math.log(Math.tan(Math.PI / 4 + 0.4 * lat));
  }
  const Y_TOP = millerY(LAT_TOP);
  const Y_BOTTOM = millerY(LAT_BOTTOM);
  const MAP_H = (MAP_W * (Y_TOP - Y_BOTTOM)) / (2 * Math.PI);
  function project(lon, lat) {
    return {
      x: ((lon + 180) / 360) * MAP_W,
      y: ((Y_TOP - millerY(lat)) / (Y_TOP - Y_BOTTOM)) * MAP_H,
    };
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function sample(arr, n) {
    return shuffle(arr).slice(0, n);
  }

  function pct(c, t) {
    return t > 0 ? Math.round((c / t) * 100) : 0;
  }

  function fmtTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  function el(html) {
    const t = document.createElement('template');
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }

  window.WCQ = window.WCQ || {};
  Object.assign(window.WCQ, {
    LEVELS, CATEGORIES, REGIONS, ESSAY_CATS,
    MAP_W, MAP_H, project,
    esc, shuffle, sample, pct, fmtTime, el,
    levelLabel: (l) => (LEVELS[l] ? LEVELS[l].label : l),
    catLabel: (c) => CATEGORIES[c] || c,
    regionLabel: (r) => REGIONS[r] || r,
  });
})();

<script>
/* 学習状態の永続化（localStorage、使用不可なら揮発メモリへフォールバック） */
(function () {
  'use strict';

  const KEY = 'wcq-state-v1';
  let memoryFallback = null;

  const DEFAULT = () => ({
    answers: {},   // qid -> {c, w, last}
    wrongSet: [],  // 復習対象の qid
    tagStats: {},  // tag -> {c, w}
    catStats: {},  // category -> {c, w}
    levelStats: {},// level -> {c, w}
    essays: {},    // essId -> {draft, ts, points:{}, rubric:{}, done}
    sessions: [],  // {mode, level, total, correct, ts}
    seenTrivia: [],// 地図で閲覧済みポイント id
  });

  function load() {
    if (memoryFallback) return memoryFallback;
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) return DEFAULT();
      const st = JSON.parse(raw);
      return Object.assign(DEFAULT(), st);
    } catch (e) {
      memoryFallback = memoryFallback || DEFAULT();
      return memoryFallback;
    }
  }

  function save(st) {
    try {
      localStorage.setItem(KEY, JSON.stringify(st));
    } catch (e) {
      memoryFallback = st; // プライベートモード等では揮発保存で継続する
    }
  }

  function bump(map, key, correct) {
    if (!map[key]) map[key] = { c: 0, w: 0 };
    if (correct) map[key].c += 1; else map[key].w += 1;
  }

  const Store = {
    get: load,

    recordAnswer(q, correct) {
      const st = load();
      if (!st.answers[q.id]) st.answers[q.id] = { c: 0, w: 0, last: 0 };
      const a = st.answers[q.id];
      if (correct) a.c += 1; else a.w += 1;
      a.last = Date.now();
      const inWrong = st.wrongSet.indexOf(q.id);
      if (correct && inWrong >= 0) st.wrongSet.splice(inWrong, 1);
      if (!correct && inWrong < 0) st.wrongSet.push(q.id);
      (q.tags || []).forEach((t) => bump(st.tagStats, t, correct));
      if (q.category) bump(st.catStats, q.category, correct);
      if (q.level) bump(st.levelStats, q.level, correct);
      save(st);
      return st;
    },

    pushSession(rec) {
      const st = load();
      st.sessions.push(rec);
      if (st.sessions.length > 200) st.sessions = st.sessions.slice(-200);
      save(st);
    },

    markTrivia(id) {
      const st = load();
      if (st.seenTrivia.indexOf(id) < 0) {
        st.seenTrivia.push(id);
        save(st);
      }
    },

    essay(id) {
      const st = load();
      return st.essays[id] || null;
    },

    saveEssay(id, patch) {
      const st = load();
      st.essays[id] = Object.assign(st.essays[id] || { draft: '', points: {}, rubric: {} }, patch, { ts: Date.now() });
      save(st);
    },

    /* タグごとの誤答率（試行2回以上のみ対象） */
    weakTags(minTries) {
      const st = load();
      const min = minTries == null ? 2 : minTries;
      return Object.entries(st.tagStats)
        .map(([tag, s]) => ({ tag, tries: s.c + s.w, rate: s.w / (s.c + s.w) }))
        .filter((x) => x.tries >= min && x.rate > 0)
        .sort((a, b) => b.rate - a.rate || b.tries - a.tries);
    },

    /* 問題ごとの「苦手スコア」: 自身の誤答履歴 + 苦手タグとの一致度 */
    weaknessScore(q) {
      const st = load();
      let score = 0;
      const a = st.answers[q.id];
      if (a && a.c + a.w > 0) score += (a.w / (a.c + a.w)) * 2;
      let tagSum = 0;
      let tagN = 0;
      (q.tags || []).forEach((t) => {
        const s = st.tagStats[t];
        if (s && s.c + s.w >= 2) {
          tagSum += s.w / (s.c + s.w);
          tagN += 1;
        }
      });
      if (tagN > 0) score += tagSum / tagN;
      const cs = st.catStats[q.category];
      if (cs && cs.c + cs.w >= 3) score += (cs.w / (cs.c + cs.w)) * 0.5;
      return score;
    },

    resetAll() {
      memoryFallback = null;
      try { localStorage.removeItem(KEY); } catch (e) { /* noop */ }
    },
  };

  window.WCQ.Store = Store;
})();

</script>
<script>
/* 出題エンジン: 演習・模試・復習・苦手克服・官能クイズを共通で駆動する */
(function () {
  'use strict';
  const U = window.WCQ;

  function pool() {
    return window.WCQ_QUESTIONS || [];
  }

  /* ---- 出題セットの構築 ---- */

  const Builders = {
    level(level, opts) {
      const o = opts || {};
      let qs = pool().filter((q) => (level === 'all' ? true : q.level === level));
      if (o.category) qs = qs.filter((q) => q.category === o.category);
      if (o.unseenFirst) {
        const st = U.Store.get();
        const unseen = qs.filter((q) => !st.answers[q.id]);
        const seen = qs.filter((q) => st.answers[q.id]);
        qs = U.shuffle(unseen).concat(U.shuffle(seen));
        return qs.slice(0, o.count || 10);
      }
      return U.sample(qs, o.count || 10);
    },

    region(region, count) {
      const qs = pool().filter((q) => q.region === region);
      return U.sample(qs, Math.min(count || 10, qs.length));
    },

    review(count) {
      const st = U.Store.get();
      const set = new Set(st.wrongSet);
      const qs = pool().filter((q) => set.has(q.id));
      return U.sample(qs, count ? Math.min(count, qs.length) : qs.length);
    },

    weak(count) {
      const scored = pool()
        .map((q) => ({ q, s: U.Store.weaknessScore(q) }))
        .filter((x) => x.s > 0)
        .sort((a, b) => b.s - a.s);
      const top = scored.slice(0, Math.max((count || 10) * 3, 30)).map((x) => x.q);
      return U.sample(top, Math.min(count || 10, top.length));
    },

    mock(level) {
      const spec = { expert: [60, 60], professional: [60, 70], master: [40, 60] }[level] || [60, 60];
      const qs = pool().filter((q) => q.level === level && q.type !== 'color');
      return { questions: U.sample(qs, spec[0]), timerSec: spec[1] * 60 };
    },

    sensory(kind, count) {
      let qs;
      if (kind === 'color') qs = pool().filter((q) => q.type === 'color');
      else qs = pool().filter((q) => q.type === 'aroma' || q.type === 'offflavor');
      return U.sample(qs, Math.min(count || 10, qs.length));
    },
  };

  /* ---- グラス描画（官能・色判定用） ---- */

  function glassSVG(hex) {
    const c = U.esc(hex || '#C88A2E');
    return `
<svg class="glass" viewBox="0 0 120 140" role="img" aria-label="ウイスキーの色見本">
  <defs>
    <linearGradient id="liq-${c.replace('#', '')}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${c}" stop-opacity="0.72"/>
      <stop offset="1" stop-color="${c}"/>
    </linearGradient>
  </defs>
  <path d="M28 14 h64 v96 q0 16 -32 16 q-32 0 -32 -16 Z" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.35)" stroke-width="2.5"/>
  <path d="M33 58 h54 v50 q0 12 -27 12 q-27 0 -27 -12 Z" fill="url(#liq-${c.replace('#', '')})"/>
  <ellipse cx="60" cy="58" rx="27" ry="5" fill="${c}" opacity="0.9"/>
  <path d="M36 20 q2 44 1 86" stroke="rgba(255,255,255,0.28)" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>`;
  }

  /* ---- セッション実行 ---- */

  function run(view, cfg, onExit) {
    const questions = cfg.questions.filter(Boolean);
    if (!questions.length) {
      view.innerHTML = `<div class="empty card"><p>出題できる問題がありません。</p>
        <button class="btn" data-act="exit">戻る</button></div>`;
      view.querySelector('[data-act=exit]').onclick = onExit;
      return;
    }
    const state = {
      i: 0,
      correct: 0,
      results: [],           // {q, pickedText, correct}
      remain: cfg.timerSec || 0,
      timerId: null,
      instant: cfg.instant !== false, // 即時解説（模試は false）
    };

    function stopTimer() {
      if (state.timerId) { clearInterval(state.timerId); state.timerId = null; }
    }

    function header() {
      const timer = cfg.timerSec
        ? `<span class="q-timer ${state.remain <= 60 ? 'danger' : ''}" id="q-timer">${U.fmtTime(state.remain)}</span>` : '';
      return `
<div class="q-head">
  <button class="icon-btn" data-act="exit" aria-label="中断">✕</button>
  <div class="q-progress"><div class="q-progress-bar" style="width:${(state.i / questions.length) * 100}%"></div></div>
  <span class="q-count">${state.i + 1}/${questions.length}</span>${timer}
</div>`;
    }

    function renderQuestion() {
      const q = questions[state.i];
      const order = U.shuffle(q.choices.map((_, idx) => idx));
      const color = q.color_hex ? `<div class="glass-wrap">${glassSVG(q.color_hex)}</div>` : '';
      view.innerHTML = `
${header()}
<div class="q-card card">
  <div class="q-meta">
    <span class="badge lv-${U.esc(q.level)}">${U.esc(U.levelLabel(q.level))}</span>
    <span class="badge cat">${U.esc(U.catLabel(q.category))}</span>
  </div>
  ${color}
  <p class="q-text">${U.esc(q.question)}</p>
  <div class="choices">
    ${order.map((ci, pos) => `
      <button class="choice" data-ci="${ci}">
        <span class="choice-key">${'ABCD'[pos]}</span>${U.esc(q.choices[ci])}
      </button>`).join('')}
  </div>
</div>`;
      view.querySelector('[data-act=exit]').onclick = () => { stopTimer(); onExit(); };
      view.querySelectorAll('.choice').forEach((btn) => {
        btn.onclick = () => answer(q, Number(btn.dataset.ci), btn);
      });
      tickTimer();
    }

    function tickTimer() {
      if (!cfg.timerSec || state.timerId) return;
      state.timerId = setInterval(() => {
        state.remain -= 1;
        const t = document.getElementById('q-timer');
        if (t) {
          t.textContent = U.fmtTime(Math.max(0, state.remain));
          if (state.remain <= 60) t.classList.add('danger');
        }
        if (state.remain <= 0) { stopTimer(); finish(true); }
      }, 1000);
    }

    function answer(q, ci, btn) {
      const ok = ci === q.answer;
      if (ok) state.correct += 1;
      state.results.push({ q, picked: q.choices[ci], correct: ok });
      U.Store.recordAnswer(q, ok);
      view.querySelectorAll('.choice').forEach((b) => {
        b.disabled = true;
        if (Number(b.dataset.ci) === q.answer) b.classList.add('is-correct');
      });
      if (!ok) btn.classList.add('is-wrong');

      if (state.instant) {
        const card = view.querySelector('.q-card');
        card.appendChild(U.el(`
<div class="explain ${ok ? 'ok' : 'ng'}">
  <div class="explain-title">${ok ? '◯ 正解' : '✕ 不正解'}</div>
  <p>${U.esc(q.explanation || '')}</p>
  <div class="explain-tags">${(q.tags || []).map((t) => `<span class="tag">#${U.esc(t)}</span>`).join('')}</div>
  <button class="btn primary" data-act="next">${state.i + 1 >= questions.length ? '結果を見る' : '次の問題'}</button>
</div>`));
        const nx = card.querySelector('[data-act=next]');
        nx.onclick = next;
        nx.scrollIntoView({ behavior: 'smooth', block: 'end' });
      } else {
        setTimeout(next, 350);
      }
    }

    function next() {
      state.i += 1;
      if (state.i >= questions.length) finish(false);
      else renderQuestion();
    }

    function finish(timeUp) {
      stopTimer();
      const total = state.results.length;
      const rate = U.pct(state.correct, total);
      U.Store.pushSession({ mode: cfg.mode || 'quiz', title: cfg.title || '', total, correct: state.correct, ts: Date.now() });

      const byCat = {};
      state.results.forEach((r) => {
        const c = r.q.category || 'other';
        if (!byCat[c]) byCat[c] = { c: 0, t: 0 };
        byCat[c].t += 1;
        if (r.correct) byCat[c].c += 1;
      });
      const wrongs = state.results.filter((r) => !r.correct);
      const grade = rate >= 90 ? '素晴らしい。マスター級の仕上がりです。'
        : rate >= 70 ? '合格圏です。取りこぼしを復習で潰しましょう。'
          : rate >= 50 ? 'あと一歩。解説を読み込んで再挑戦を。'
            : '基礎から積み直しましょう。復習モードが近道です。';

      view.innerHTML = `
<div class="result card">
  ${timeUp ? '<p class="time-up">⏰ 時間切れ</p>' : ''}
  <div class="ring-wrap">${ringSVG(rate)}</div>
  <p class="result-score">${state.correct} / ${total} 問正解</p>
  <p class="result-grade">${grade}</p>
  <div class="result-cats">
    ${Object.entries(byCat).sort((a, b) => (a[1].c / a[1].t) - (b[1].c / b[1].t)).map(([c, s]) => `
      <div class="mini-bar-row">
        <span class="mini-bar-label">${U.esc(U.catLabel(c))}</span>
        <div class="mini-bar"><div style="width:${U.pct(s.c, s.t)}%"></div></div>
        <span class="mini-bar-val">${s.c}/${s.t}</span>
      </div>`).join('')}
  </div>
  ${wrongs.length ? `
  <details class="wrong-list">
    <summary>間違えた問題（${wrongs.length}問）</summary>
    ${wrongs.map((r) => `
      <div class="wrong-item">
        <p class="wrong-q">${U.esc(r.q.question)}</p>
        <p class="wrong-a">正解: ${U.esc(r.q.choices[r.q.answer])}</p>
        <p class="wrong-e">${U.esc(r.q.explanation || '')}</p>
      </div>`).join('')}
  </details>` : ''}
  <div class="result-actions">
    ${wrongs.length ? '<button class="btn" data-act="retry-wrong">間違いだけ再挑戦</button>' : ''}
    <button class="btn" data-act="again">もう一度</button>
    <button class="btn primary" data-act="exit">終了</button>
  </div>
</div>`;
      view.querySelector('[data-act=exit]').onclick = onExit;
      view.querySelector('[data-act=again]').onclick = () => run(view, cfg, onExit);
      const rw = view.querySelector('[data-act=retry-wrong]');
      if (rw) {
        rw.onclick = () => run(view, {
          mode: 'review', title: '間違い再挑戦', instant: true,
          questions: U.shuffle(wrongs.map((r) => r.q)),
        }, onExit);
      }
    }

    function ringSVG(rate) {
      const r = 54;
      const cLen = 2 * Math.PI * r;
      return `
<svg viewBox="0 0 140 140" class="ring">
  <circle cx="70" cy="70" r="${r}" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="11"/>
  <circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--accent)" stroke-width="11"
    stroke-linecap="round" stroke-dasharray="${(cLen * rate) / 100} ${cLen}"
    transform="rotate(-90 70 70)"/>
  <text x="70" y="66" text-anchor="middle" class="ring-num">${rate}%</text>
  <text x="70" y="88" text-anchor="middle" class="ring-sub">正答率</text>
</svg>`;
    }

    renderQuestion();
  }

  window.WCQ.Quiz = { Builders, run, glassSVG };
})();

</script>
<script>
/* 世界地図モード: パン・ズーム・ポイント選択・豆知識シート */
(function () {
  'use strict';
  const U = window.WCQ;

  const JUMPS = [
    { label: '世界', box: null },
    { label: 'スコットランド', c: [-4.2, 57.0], z: 22 },
    { label: 'アイルランド', c: [-7.5, 53.3], z: 18 },
    { label: '日本', c: [137.5, 38.0], z: 9 },
    { label: '北米', c: [-88, 38], z: 4.2 },
    { label: 'アジア・豪', c: [110, 10], z: 2.6 },
    { label: '欧州', c: [5, 50], z: 7 },
  ];

  const KIND = { region: '産地', distillery: '蒸留所', landmark: '歴史地点' };

  function render(view, goQuiz) {
    const world = window.WCQ_WORLD;
    const points = (window.WCQ_MAP && window.WCQ_MAP.points) || [];
    const st = U.Store.get();
    const seen = new Set(st.seenTrivia);

    view.innerHTML = `
<div class="map-mode">
  <div class="map-jumps">
    ${JUMPS.map((j, i) => `<button class="chip" data-jump="${i}">${j.label}</button>`).join('')}
  </div>
  <div class="map-frame" id="map-frame">
    <svg id="map-svg" viewBox="0 0 ${world.w} ${world.h}" preserveAspectRatio="xMidYMid meet">
      <rect x="-2000" y="-2000" width="5000" height="5000" class="map-sea"/>
      <path d="${world.path}" class="map-land"/>
      <g id="map-pts"></g>
    </svg>
    <div class="map-hint">ドラッグで移動 / ピンチ・ホイールで拡大。琥珀の点をタップ。</div>
  </div>
  <p class="map-progress">豆知識 閲覧済み ${seen.size}/${points.length} 地点</p>
  <div class="sheet" id="map-sheet" hidden></div>
</div>`;

    const svg = view.querySelector('#map-svg');
    const ptsG = view.querySelector('#map-pts');
    const sheet = view.querySelector('#map-sheet');

    /* ビュー状態（viewBox 操作でパン・ズーム） */
    const vb = { x: 0, y: 0, w: world.w, h: world.h };
    function applyVB() {
      svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
      drawPoints();
    }
    function zoomAt(cx, cy, factor) {
      const nw = Math.min(world.w * 1.2, Math.max(world.w / 60, vb.w / factor));
      const k = nw / vb.w;
      vb.x = cx - (cx - vb.x) * k;
      vb.y = cy - (cy - vb.y) * k;
      vb.w = nw;
      vb.h = vb.h * k;
      applyVB();
    }

    function drawPoints() {
      const scale = vb.w / world.w; // 1=全体表示
      const r = Math.max(2.2, 7 * Math.sqrt(scale));
      const showLabels = scale < 0.34;
      ptsG.innerHTML = points.map((p) => {
        const xy = U.project(p.lon, p.lat);
        const cls = `map-pt kind-${p.kind}${seen.has(p.id) ? ' seen' : ''}`;
        const label = showLabels
          ? `<text x="${xy.x + r * 1.6}" y="${xy.y + r * 0.6}" class="map-label" font-size="${Math.max(3.4, 11 * scale * 2.2)}">${U.esc(p.name)}</text>` : '';
        return `<g class="${cls}" data-id="${U.esc(p.id)}">
          <circle cx="${xy.x}" cy="${xy.y}" r="${r * 1.7}" class="map-hit"/>
          <circle cx="${xy.x}" cy="${xy.y}" r="${r}" class="map-dot"/>
          ${label}</g>`;
      }).join('');
      ptsG.querySelectorAll('.map-pt').forEach((g) => {
        g.addEventListener('click', (ev) => {
          ev.stopPropagation();
          openSheet(points.find((p) => p.id === g.dataset.id));
        });
      });
    }

    function openSheet(p) {
      if (!p) return;
      U.Store.markTrivia(p.id);
      seen.add(p.id);
      const regionQs = (window.WCQ_QUESTIONS || []).filter((q) => q.region === p.region);
      const label = U.regionLabel(p.region);
      sheet.hidden = false;
      sheet.innerHTML = `
<div class="sheet-grip"></div>
<div class="sheet-head">
  <div>
    <h3>${U.esc(p.name)}</h3>
    <p class="sheet-sub">${U.esc(p.country)} ・ ${KIND[p.kind] || ''}</p>
  </div>
  <button class="icon-btn" data-act="close" aria-label="閉じる">✕</button>
</div>
<p class="sheet-trivia">${U.esc(p.trivia)}</p>
${regionQs.length ? `
<button class="btn primary wide" data-act="quiz">
  ${U.esc(label)}の問題に挑戦（全${regionQs.length}問から10問）
</button>` : '<p class="sheet-sub">この地域の問題は準備中です。</p>'}`;
      sheet.querySelector('[data-act=close]').onclick = () => { sheet.hidden = true; };
      const qb = sheet.querySelector('[data-act=quiz]');
      if (qb) qb.onclick = () => goQuiz(p.region, label);
      const seenEl = view.querySelector('.map-progress');
      if (seenEl) seenEl.textContent = `豆知識 閲覧済み ${seen.size}/${points.length} 地点`;
    }

    /* パン（ドラッグ）とピンチズーム */
    const frame = view.querySelector('#map-frame');
    const pointers = new Map();
    let lastPinch = 0;
    function toSvgXY(ev) {
      const rect = svg.getBoundingClientRect();
      return {
        x: vb.x + ((ev.clientX - rect.left) / rect.width) * vb.w,
        y: vb.y + ((ev.clientY - rect.top) / rect.height) * vb.h,
      };
    }
    frame.addEventListener('pointerdown', (ev) => {
      pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });
      frame.setPointerCapture(ev.pointerId);
    });
    frame.addEventListener('pointermove', (ev) => {
      if (!pointers.has(ev.pointerId)) return;
      const prev = pointers.get(ev.pointerId);
      pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });
      if (pointers.size === 1) {
        const rect = svg.getBoundingClientRect();
        vb.x -= ((ev.clientX - prev.x) / rect.width) * vb.w;
        vb.y -= ((ev.clientY - prev.y) / rect.height) * vb.h;
        applyVB();
      } else if (pointers.size === 2) {
        const [a, b] = [...pointers.values()];
        const dist = Math.hypot(a.x - b.x, a.y - b.y);
        if (lastPinch > 0) {
          const mid = toSvgXY({ clientX: (a.x + b.x) / 2, clientY: (a.y + b.y) / 2 });
          zoomAt(mid.x, mid.y, dist / lastPinch);
        }
        lastPinch = dist;
      }
    });
    ['pointerup', 'pointercancel', 'pointerleave'].forEach((t) => {
      frame.addEventListener(t, (ev) => {
        pointers.delete(ev.pointerId);
        if (pointers.size < 2) lastPinch = 0;
      });
    });
    frame.addEventListener('wheel', (ev) => {
      ev.preventDefault();
      const p = toSvgXY(ev);
      zoomAt(p.x, p.y, ev.deltaY < 0 ? 1.25 : 0.8);
    }, { passive: false });

    view.querySelectorAll('[data-jump]').forEach((b) => {
      b.onclick = () => {
        const j = JUMPS[Number(b.dataset.jump)];
        if (!j.c) { vb.x = 0; vb.y = 0; vb.w = world.w; vb.h = world.h; }
        else {
          const xy = U.project(j.c[0], j.c[1]);
          const w = world.w / j.z;
          const h = (world.h / world.w) * w;
          vb.x = xy.x - w / 2; vb.y = xy.y - h / 2; vb.w = w; vb.h = h;
        }
        applyVB();
      };
    });

    applyVB();
  }

  window.WCQ.MapMode = { render };
})();

</script>
<script>
/* 官能トレーニングモード: 色判定・色見本帳・香味知識 */
(function () {
  'use strict';
  const U = window.WCQ;

  function scale() {
    return (window.WCQ_SENSORY && window.WCQ_SENSORY.color_scale) || [];
  }

  function renderHome(view, startQuiz) {
    const colorN = (window.WCQ_QUESTIONS || []).filter((q) => q.type === 'color').length;
    const aromaN = (window.WCQ_QUESTIONS || []).filter((q) => q.type === 'aroma' || q.type === 'offflavor').length;
    view.innerHTML = `
<div class="sen-mode">
  <h2 class="mode-title">官能トレーニング</h2>
  <p class="mode-desc">テイスティング試験の第一歩は色調の見極めです。色見本帳で基準を頭に入れ、判定訓練で反復しましょう。</p>
  <div class="mode-grid">
    <button class="mode-card card" data-act="color">
      <span class="mode-icon">🥃</span>
      <h3>色判定トレーニング</h3>

    </button>
    <button class="mode-card card" data-act="chart">
      <span class="mode-icon">🎨</span>
      <h3>色見本帳</h3>
      <p>${scale().length}段階の色調スケールと典型例</p>
    </button>
    <button class="mode-card card" data-act="aroma">
      <span class="mode-icon">👃</span>
      <h3>香味・オフフレーバー</h3>
      <p>フレーバーホイールと香味成分の知識（${aromaN}問）</p>
    </button>
  </div>
  <div id="sen-body"></div>
</div>`;
    view.querySelector('[data-act=color]').onclick = () => startQuiz('color');
    view.querySelector('[data-act=aroma]').onclick = () => startQuiz('aroma');
    view.querySelector('[data-act=chart]').onclick = () => renderChart(view.querySelector('#sen-body'));
  }

  function renderChart(body) {
    body.innerHTML = `
<div class="color-chart">
  <h3 class="chart-title">ウイスキー色調スケール</h3>
  <p class="mode-desc">上から熟成の浅い順。照明は自然光か白色灯で、白い背景に傾けて見るのが基本です。</p>
  ${scale().map((c) => `
  <div class="color-row card">
    <div class="color-glass">${window.WCQ.Quiz.glassSVG(c.hex)}</div>
    <div class="color-info">
      <h4>${U.esc(c.name_ja)} <span class="color-en">${U.esc(c.name_en || '')}</span></h4>
      <p>${U.esc(c.description || '')}</p>
      ${c.typical ? `<p class="color-typical">典型例: ${U.esc(c.typical)}</p>` : ''}
    </div>
  </div>`).join('')}
</div>`;
    body.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  window.WCQ.Sensory = { renderHome };
})();

</script>
<script>
/* 論文対策モード: テーマ一覧・執筆・骨子・模範解答・自己採点 */
(function () {
  'use strict';
  const U = window.WCQ;

  function essays() {
    return window.WCQ_ESSAYS || [];
  }

  function renderList(view, openDetail) {
    const list = essays();
    const cats = ['all'].concat([...new Set(list.map((e) => e.category))]);
    let active = 'all';

    function draw() {
      const items = list.filter((e) => active === 'all' || e.category === active);
      view.querySelector('#ess-list').innerHTML = items.map((e) => {
        const s = U.Store.essay(e.id);
        const status = s && s.done ? '<span class="badge done">自己採点済</span>'
          : s && s.draft ? '<span class="badge draft">下書きあり</span>' : '';
        return `
<button class="ess-card card" data-id="${U.esc(e.id)}">
  <div class="ess-card-top">
    <span class="badge cat">${U.esc(U.ESSAY_CATS[e.category] || e.category)}</span>${status}
  </div>
  <h3>${U.esc(e.title)}</h3>
  <p class="ess-q-preview">${U.esc(e.question)}</p>
</button>`;
      }).join('') || '<p class="empty">テーマがありません。</p>';
      view.querySelectorAll('.ess-card').forEach((c) => {
        c.onclick = () => openDetail(c.dataset.id);
      });
    }

    view.innerHTML = `
<div class="ess-mode">
  <h2 class="mode-title">論文対策 <span class="mode-sub">全${list.length}テーマ</span></h2>
  <p class="mode-desc">マスター・オブ・ウイスキーの筆記は論述が中心です。設問に対して構成を立て、時間内に書き切る訓練をしましょう。</p>
  <div class="chips">
    ${cats.map((c) => `<button class="chip ${c === 'all' ? 'active' : ''}" data-cat="${c}">${c === 'all' ? 'すべて' : U.esc(U.ESSAY_CATS[c] || c)}</button>`).join('')}
  </div>
  <div id="ess-list" class="ess-list"></div>
</div>`;
    view.querySelectorAll('[data-cat]').forEach((b) => {
      b.onclick = () => {
        active = b.dataset.cat;
        view.querySelectorAll('[data-cat]').forEach((x) => x.classList.toggle('active', x === b));
        draw();
      };
    });
    draw();
  }

  function renderDetail(view, id, goBack) {
    const e = essays().find((x) => x.id === id);
    if (!e) { goBack(); return; }
    const saved = U.Store.essay(id) || { draft: '', points: {}, rubric: {} };
    let timerId = null;
    let remain = 0;

    view.innerHTML = `
<div class="ess-detail">
  <div class="q-head">
    <button class="icon-btn" data-act="back" aria-label="戻る">←</button>
    <span class="badge cat">${U.esc(U.ESSAY_CATS[e.category] || e.category)}</span>
    <span class="ess-timer" id="ess-timer"></span>
  </div>
  <div class="card exam-paper">
    <p class="exam-label">設問</p>
    <p class="exam-q">${U.esc(e.question)}</p>
    <p class="exam-chars">目安分量: ${U.esc(e.target_chars || '800〜1200字')}</p>
    <div class="timer-row">
      ${[30, 60, 90].map((m) => `<button class="chip" data-timer="${m}">${m}分で書く</button>`).join('')}
    </div>
  </div>

  <details class="card fold">
    <summary>構成の骨子を見る（まず自力で構成を考えてから）</summary>
    <ol class="outline">${(e.outline || []).map((o) => `<li>${U.esc(o)}</li>`).join('')}</ol>
  </details>

  <details class="card fold">
    <summary>キーポイント チェックリスト（${(e.key_points || []).length}項目）</summary>
    <p class="fold-hint">書き終えてから、盛り込めた論点にチェックを。</p>
    ${(e.key_points || []).map((k, i) => `
      <label class="check-row"><input type="checkbox" data-kp="${i}" ${saved.points[i] ? 'checked' : ''}> ${U.esc(k)}</label>`).join('')}
  </details>

  <div class="card">
    <p class="exam-label">答案（自動保存）</p>
    <textarea id="ess-draft" rows="14" placeholder="ここに論述する。序論→本論→結論の三部構成が基本。">${U.esc(saved.draft)}</textarea>
    <p class="char-count" id="ess-count"></p>
  </div>

  <details class="card fold model-answer">
    <summary>模範解答を見る（自分で書いてから開くこと）</summary>
    <div class="model-body">${U.esc(e.model_answer || '').split('\n').map((p) => `<p>${p}</p>`).join('')}</div>
  </details>

  <div class="card">
    <p class="exam-label">自己採点（採点観点）</p>
    ${(e.rubric || []).map((r, i) => `
      <label class="check-row"><input type="checkbox" data-rb="${i}" ${saved.rubric[i] ? 'checked' : ''}> ${U.esc(r)}</label>`).join('')}
    <button class="btn primary" data-act="done" style="margin-top:12px">採点を保存して完了にする</button>
  </div>
</div>`;

    const ta = view.querySelector('#ess-draft');
    const count = view.querySelector('#ess-count');
    function updateCount() {
      count.textContent = `${ta.value.length} 字`;
    }
    updateCount();
    let deb = null;
    ta.addEventListener('input', () => {
      updateCount();
      clearTimeout(deb);
      deb = setTimeout(() => U.Store.saveEssay(id, { draft: ta.value }), 400);
    });

    view.querySelectorAll('[data-kp]').forEach((cb) => {
      cb.onchange = () => {
        const pts = (U.Store.essay(id) || { points: {} }).points || {};
        pts[cb.dataset.kp] = cb.checked;
        U.Store.saveEssay(id, { points: pts });
      };
    });
    view.querySelectorAll('[data-rb]').forEach((cb) => {
      cb.onchange = () => {
        const rb = (U.Store.essay(id) || { rubric: {} }).rubric || {};
        rb[cb.dataset.rb] = cb.checked;
        U.Store.saveEssay(id, { rubric: rb });
      };
    });
    view.querySelectorAll('[data-timer]').forEach((b) => {
      b.onclick = () => {
        clearInterval(timerId);
        remain = Number(b.dataset.timer) * 60;
        const t = view.querySelector('#ess-timer');
        t.textContent = U.fmtTime(remain);
        timerId = setInterval(() => {
          remain -= 1;
          t.textContent = remain > 0 ? U.fmtTime(remain) : '⏰ 時間切れ';
          t.classList.toggle('danger', remain <= 300);
          if (remain <= 0) clearInterval(timerId);
        }, 1000);
      };
    });
    view.querySelector('[data-act=done]').onclick = () => {
      U.Store.saveEssay(id, { draft: ta.value, done: true });
      goBack();
    };
    view.querySelector('[data-act=back]').onclick = () => {
      clearInterval(timerId);
      U.Store.saveEssay(id, { draft: ta.value });
      goBack();
    };
  }

  window.WCQ.Essay = { renderList, renderDetail };
})();

</script>
<script>
/* 苦手分析ダッシュボード: 進捗・カテゴリ別正答率・苦手タグ */
(function () {
  'use strict';
  const U = window.WCQ;

  function totals() {
    const st = U.Store.get();
    const qs = window.WCQ_QUESTIONS || [];
    let c = 0;
    let w = 0;
    Object.values(st.answers).forEach((a) => { c += a.c; w += a.w; });
    const answeredIds = Object.keys(st.answers).length;
    return { st, qs, c, w, tries: c + w, answeredIds };
  }

  function ring(rate, size, label) {
    const r = 54;
    const cl = 2 * Math.PI * r;
    return `
<svg viewBox="0 0 140 140" class="ring" style="width:${size}px">
  <circle cx="70" cy="70" r="${r}" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="11"/>
  <circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--accent)" stroke-width="11"
    stroke-linecap="round" stroke-dasharray="${(cl * rate) / 100} ${cl}" transform="rotate(-90 70 70)"/>
  <text x="70" y="66" text-anchor="middle" class="ring-num">${rate}%</text>
  <text x="70" y="88" text-anchor="middle" class="ring-sub">${U.esc(label)}</text>
</svg>`;
  }

  function render(view, actions) {
    const { st, qs, c, tries, answeredIds } = totals();
    const rate = U.pct(c, tries);
    const wrongN = st.wrongSet.length;

    /* レベル別: 到達度（回答済み問題数/総数）と正答率 */
    const levelRows = Object.keys(U.LEVELS).map((lv) => {
      const total = qs.filter((q) => q.level === lv).length;
      const seen = qs.filter((q) => q.level === lv && st.answers[q.id]).length;
      const s = st.levelStats[lv] || { c: 0, w: 0 };
      return { lv, total, seen, rate: U.pct(s.c, s.c + s.w), tries: s.c + s.w };
    });

    /* カテゴリ別正答率（試行があるもののみ、正答率昇順 = 苦手が上） */
    const catRows = Object.entries(st.catStats)
      .map(([cat, s]) => ({ cat, tries: s.c + s.w, rate: U.pct(s.c, s.c + s.w) }))
      .filter((x) => x.tries >= 1)
      .sort((a, b) => a.rate - b.rate || b.tries - a.tries);

    const weakTags = U.Store.weakTags(2).slice(0, 8);

    view.innerHTML = `
<div class="stats-mode">
  <h2 class="mode-title">苦手分析</h2>
  ${tries === 0 ? `
  <div class="card empty"><p>まだ回答履歴がありません。演習モードで問題を解くと、ここに分析が表示されます。</p></div>` : `
  <div class="card stats-hero">
    ${ring(rate, 130, '総合正答率')}
    <div class="stats-hero-nums">
      <div class="stat-tile"><span class="stat-num">${tries}</span><span class="stat-label">総回答数</span></div>
      <div class="stat-tile"><span class="stat-num">${answeredIds}<span class="stat-den">/${qs.length}</span></span><span class="stat-label">挑戦済み問題</span></div>
      <div class="stat-tile"><span class="stat-num">${wrongN}</span><span class="stat-label">要復習</span></div>
    </div>
  </div>

  <div class="card">
    <h3 class="card-title">級別の進み具合</h3>
    ${levelRows.map((r) => `
    <div class="lv-row">
      <span class="lv-name">${U.esc(U.levelLabel(r.lv))}</span>
      <div class="mini-bar dual">
        <div class="cover" style="width:${U.pct(r.seen, r.total)}%"></div>
      </div>
      <span class="lv-val">${r.seen}/${r.total}問 ・ 正答率${r.tries ? `${r.rate}%` : '—'}</span>
    </div>`).join('')}
  </div>

  <div class="card">
    <h3 class="card-title">カテゴリ別正答率 <span class="card-note">低い順（＝苦手が上）</span></h3>
    ${catRows.map((r) => `
    <div class="mini-bar-row">
      <span class="mini-bar-label">${U.esc(U.catLabel(r.cat))}</span>
      <div class="mini-bar"><div style="width:${r.rate}%"></div></div>
      <span class="mini-bar-val">${r.rate}%<span class="mini-bar-n">(${r.tries})</span></span>
    </div>`).join('') || '<p class="empty">データ不足</p>'}
  </div>

  <div class="card">
    <h3 class="card-title">苦手キーワード <span class="card-note">誤答率の高いタグ</span></h3>
    ${weakTags.length ? `<div class="weak-tags">
      ${weakTags.map((t) => `<span class="tag warn">#${U.esc(t.tag)} <b>${Math.round(t.rate * 100)}%誤答</b></span>`).join('')}
    </div>` : '<p class="empty">同じタグの問題を2回以上解くと表示されます。</p>'}
  </div>

  <div class="stats-actions">
    <button class="btn primary wide" data-act="weak" ${tries < 5 ? 'disabled' : ''}>苦手克服モードで出題（10問）</button>
    <button class="btn wide" data-act="review" ${wrongN === 0 ? 'disabled' : ''}>間違えた問題を復習（${wrongN}問）</button>
  </div>`}
  <button class="btn danger-line wide" data-act="reset">学習履歴をリセット</button>
</div>`;

    const weakBtn = view.querySelector('[data-act=weak]');
    if (weakBtn) weakBtn.onclick = actions.weak;
    const revBtn = view.querySelector('[data-act=review]');
    if (revBtn) revBtn.onclick = actions.review;
    view.querySelector('[data-act=reset]').onclick = () => {
      if (confirm('学習履歴（回答・復習リスト・論文下書き）をすべて消去します。よろしいですか？')) {
        U.Store.resetAll();
        render(view, actions);
      }
    };
  }

  window.WCQ.Stats = { render };
})();

</script>
<script>
/* ルーター・ホーム画面・演習設定画面 */
(function () {
  'use strict';
  const U = window.WCQ;
  const view = () => document.getElementById('view');

  const NAV = [
    { id: 'home', label: 'ホーム', icon: '🏠' },
    { id: 'map', label: '地図', icon: '🗺️' },
    { id: 'quiz', label: '演習', icon: '✍️' },
    { id: 'sensory', label: '官能', icon: '🥃' },
    { id: 'essay', label: '論文', icon: '📜' },
  ];

  function routeName() {
    return (location.hash || '#home').slice(1);
  }

  function setNav(active) {
    document.querySelectorAll('.nav-btn').forEach((b) => {
      b.classList.toggle('active', b.dataset.route === active.split('/')[0]);
    });
  }

  /* ---- クイズ起動ヘルパ ---- */

  function startQuiz(cfg) {
    document.querySelector('.bottom-nav').classList.add('hidden');
    U.Quiz.run(view(), cfg, () => {
      document.querySelector('.bottom-nav').classList.remove('hidden');
      route(routeName());
    });
  }

  const Launch = {
    level(level, opts) {
      startQuiz({
        mode: 'quiz', title: U.levelLabel(level),
        questions: U.Quiz.Builders.level(level, opts),
      });
    },
    region(region, label) {
      startQuiz({
        mode: 'region', title: label,
        questions: U.Quiz.Builders.region(region, 10),
      });
    },
    review() {
      startQuiz({ mode: 'review', title: '復習', questions: U.Quiz.Builders.review() });
    },
    weak() {
      startQuiz({ mode: 'weak', title: '苦手克服', questions: U.Quiz.Builders.weak(10) });
    },
    mock(level) {
      const m = U.Quiz.Builders.mock(level);
      startQuiz({
        mode: 'mock', title: `${U.levelLabel(level)} 模試`,
        questions: m.questions, timerSec: m.timerSec, instant: false,
      });
    },
    sensory(kind) {
      startQuiz({
        mode: 'sensory', title: kind === 'color' ? '色判定' : '香味',
        questions: U.Quiz.Builders.sensory(kind, 10),
      });
    },
  };

  /* ---- 画面 ---- */

  function renderHome() {
    const st = U.Store.get();
    const qs = window.WCQ_QUESTIONS || [];
    let c = 0;
    let t = 0;
    Object.values(st.answers).forEach((a) => { c += a.c; t += a.c + a.w; });
    const wrongN = st.wrongSet.length;
    const seenN = Object.keys(st.answers).length;
    const last = st.sessions[st.sessions.length - 1];

    view().innerHTML = `
<div class="home">
  <div class="hero card">
    <svg class="hero-still" viewBox="0 0 100 100" aria-hidden="true">
      <g fill="none" stroke="var(--accent)" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M33 12 h34 c0 23 -4 35 -17 41 c-13 -6 -17 -18 -17 -41 Z"/>
        <path d="M50 53 v25 M36 80 h28"/>
        <path d="M36.5 33 h27" opacity="0.65"/>
      </g>
    </svg>
    <h2>ウイスキーコニサー道場</h2>
    <p class="hero-sub">エキスパート / プロフェッショナル / マスター・オブ・ウイスキー 対策</p>
    <div class="hero-stats">
      <div class="stat-tile"><span class="stat-num">${qs.length}</span><span class="stat-label">収録問題</span></div>
      <div class="stat-tile"><span class="stat-num">${seenN}</span><span class="stat-label">挑戦済み</span></div>
      <div class="stat-tile"><span class="stat-num">${t ? U.pct(c, t) : 0}<span class="stat-den">%</span></span><span class="stat-label">正答率</span></div>
    </div>
    ${last ? `<p class="hero-last">前回: ${U.esc(last.title || last.mode)} ${last.correct}/${last.total}問正解</p>` : ''}
  </div>

  ${wrongN ? `
  <button class="banner card" data-act="review">
    <span class="banner-icon">🔁</span>
    <span><b>${wrongN}問</b>の復習が待っています — 間違えた問題だけ解き直す</span>
  </button>` : ''}

  <div class="mode-grid">
    <button class="mode-card card" data-route="quiz"><span class="mode-icon">✍️</span><h3>級別演習</h3><p>級・分野・問題数を選んで演習/模試</p></button>
    <button class="mode-card card" data-route="map"><span class="mode-icon">🗺️</span><h3>世界地図</h3><p>産地をめぐり豆知識と地域問題へ</p></button>
    <button class="mode-card card" data-route="sensory"><span class="mode-icon">🥃</span><h3>官能トレーニング</h3><p>色判定・色見本帳・香味知識</p></button>
    <button class="mode-card card" data-route="essay"><span class="mode-icon">📜</span><h3>論文対策</h3><p>${(window.WCQ_ESSAYS || []).length}テーマ・タイマー・模範解答</p></button>
    <button class="mode-card card" data-route="stats"><span class="mode-icon">📈</span><h3>苦手分析</h3><p>正答率と苦手傾向、苦手克服出題</p></button>
    <button class="mode-card card" data-act="weak" ${t < 5 ? 'disabled' : ''}><span class="mode-icon">🎯</span><h3>苦手克服</h3><p>あなたの誤答傾向から自動出題</p></button>
  </div>
</div>`;
    view().querySelectorAll('[data-route]').forEach((b) => {
      b.onclick = () => { location.hash = `#${b.dataset.route}`; };
    });
    const rv = view().querySelector('[data-act=review]');
    if (rv) rv.onclick = Launch.review;
    const wk = view().querySelector('[data-act=weak]');
    if (wk && !wk.disabled) wk.onclick = Launch.weak;
  }

  function renderQuizSetup() {
    const qs = window.WCQ_QUESTIONS || [];
    const counts = { expert: 0, professional: 0, master: 0 };
    qs.forEach((q) => { if (counts[q.level] != null) counts[q.level] += 1; });
    let level = 'expert';
    let cat = '';
    let num = 10;

    function catOptions() {
      const inLv = qs.filter((q) => level === 'all' || q.level === level);
      const cats = [...new Set(inLv.map((q) => q.category))].sort();
      return `<option value="">すべての分野</option>` +
        cats.map((cN) => `<option value="${cN}" ${cN === cat ? 'selected' : ''}>${U.esc(U.catLabel(cN))}</option>`).join('');
    }

    view().innerHTML = `
<div class="quiz-setup">
  <h2 class="mode-title">級別演習</h2>
  <div class="card">
    <p class="exam-label">受験級</p>
    <div class="lv-select">
      ${Object.keys(U.LEVELS).map((lv) => `
      <button class="lv-btn ${lv === level ? 'active' : ''}" data-lv="${lv}">
        <span class="lv-btn-name">${U.esc(U.levelLabel(lv))}</span>
        <span class="lv-btn-n">${counts[lv]}問収録</span>
      </button>`).join('')}
      <button class="lv-btn ${level === 'all' ? 'active' : ''}" data-lv="all">
        <span class="lv-btn-name">全級ミックス</span><span class="lv-btn-n">${qs.length}問収録</span>
      </button>
    </div>
    <p class="exam-label">分野</p>
    <select id="qs-cat" class="select">${catOptions()}</select>
    <p class="exam-label">問題数</p>
    <div class="chips" id="qs-num">
      ${[10, 25, 50].map((n) => `<button class="chip ${n === num ? 'active' : ''}" data-n="${n}">${n}問</button>`).join('')}
    </div>
    <button class="btn primary wide" data-act="start">演習をはじめる</button>
  </div>
  <div class="card">
    <h3 class="card-title">模擬試験 <span class="card-note">時間制限つき・解説は最後にまとめて</span></h3>
    <div class="mock-row">
      <button class="btn" data-mock="expert">エキスパート模試<br><small>60問 / 60分</small></button>
      <button class="btn" data-mock="professional">プロフェッショナル模試<br><small>60問 / 70分</small></button>
      <button class="btn" data-mock="master">マスター模試<br><small>40問 / 60分</small></button>
    </div>
  </div>
</div>`;
    view().querySelectorAll('[data-lv]').forEach((b) => {
      b.onclick = () => {
        level = b.dataset.lv;
        view().querySelectorAll('[data-lv]').forEach((x) => x.classList.toggle('active', x === b));
        document.getElementById('qs-cat').innerHTML = catOptions();
      };
    });
    view().querySelector('#qs-cat').onchange = (e) => { cat = e.target.value; };
    view().querySelectorAll('#qs-num .chip').forEach((b) => {
      b.onclick = () => {
        num = Number(b.dataset.n);
        view().querySelectorAll('#qs-num .chip').forEach((x) => x.classList.toggle('active', x === b));
      };
    });
    view().querySelector('[data-act=start]').onclick = () => {
      Launch.level(level, { category: cat || null, count: num, unseenFirst: true });
    };
    view().querySelectorAll('[data-mock]').forEach((b) => {
      b.onclick = () => Launch.mock(b.dataset.mock);
    });
  }

  /* ---- ルーティング ---- */

  function route(name) {
    document.querySelector('.bottom-nav').classList.remove('hidden');
    setNav(name);
    const v = view();
    v.scrollTop = 0;
    window.scrollTo(0, 0);
    if (name === 'home' || name === '') renderHome();
    else if (name === 'map') U.MapMode.render(v, (region, label) => Launch.region(region, label));
    else if (name === 'quiz') renderQuizSetup();
    else if (name === 'sensory') U.Sensory.renderHome(v, (kind) => Launch.sensory(kind));
    else if (name === 'essay') U.Essay.renderList(v, (id) => { location.hash = `#essay/${id}`; });
    else if (name.startsWith('essay/')) U.Essay.renderDetail(v, name.slice(6), () => { location.hash = '#essay'; });
    else if (name === 'stats') U.Stats.render(v, { weak: Launch.weak, review: Launch.review });
    else renderHome();
  }

  function init() {
    const nav = document.querySelector('.bottom-nav');
    nav.innerHTML = NAV.map((n) => `
      <button class="nav-btn" data-route="${n.id}"><span class="nav-icon">${n.icon}</span><span>${n.label}</span></button>`).join('');
    nav.querySelectorAll('.nav-btn').forEach((b) => {
      b.onclick = () => { location.hash = `#${b.dataset.route}`; route(b.dataset.route); };
    });
    window.addEventListener('hashchange', () => route(routeName()));
    route(routeName());
  }

  document.addEventListener('DOMContentLoaded', init);
})();

</script>
<script>
// http(s) 配信時のみ Service Worker を登録する（file:// や単一ファイル版では不要）
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  navigator.serviceWorker.register('sw.js').catch(function () { /* オフライン機能なしで継続 */ });
}
</script>
