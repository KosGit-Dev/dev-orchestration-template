香気強度（官能的な強さ）が強く、閾値が低いとされるのはどちらか。","choices":["シス体の方が、トランス体よりも香気強度が強く閾値が低いとされる","トランス体の方が、シス体よりも香気強度が強く閾値が低いとされる","シス体・トランス体で香気強度に差はないとされる","どちらの異性体も無臭でありウイスキーの香りには寄与しない"],"answer":0,"explanation":"ウイスキーラクトンのシス異性体はトランス異性体に比べてココナッツ様の香気強度が強く、官能閾値が低いことが知られている。","difficulty":5},{"id":"TST-074","domain":"tst","level":"master","category":"chemistry","tags":["dimethyl-sulfide","precursor","malting","smm"],"region":null,"question":"麦芽の製麦・乾燥段階でジメチルサルファイド（DMS）を生成する前駆体として知られるアミノ酸由来物質はどれか。","choices":["酢酸イソアミル","S-メチルメチオニン（SMM）","グアイアコール","ウイスキーラクトン"],"answer":1,"explanation":"S-メチルメチオニン（SMM）は麦芽中に存在する前駆体であり、加熱処理によって分解しジメチルサルファイド（DMS）を生じることが知られている。","difficulty":5},{"id":"TST-075","domain":"tst","level":"master","category":"chemistry","tags":["cork-taint","tca","trichloroanisole","off-flavor"],"region":null,"question":"ワインやウイスキーなど木栓（コルク）を用いる酒類において「ブショネ」と呼ばれる汚染臭の主な原因物質として知られているのはどれか。","choices":["ジアセチル","酢酸イソアミル","2,4,6-トリクロロアニソール（TCA）","バニリン"],"answer":2,"explanation":"2,4,6-トリクロロアニソール（TCA）はカビ臭・段ボール臭のような汚染臭「ブショネ」の主な原因物質として知られ、極めて低い閾値で知覚される。","difficulty":5},{"id":"TST-076","domain":"tst","level":"master","category":"chemistry","tags":["fusel-alcohol","isoamyl-alcohol","leucine","ehrlich-pathway"],"region":null,"question":"フーゼルアルコールの一種であるイソアミルアルコールが、酵母のアミノ酸代謝経路（エールリッヒ経路）において主に由来するとされるアミノ酸はどれか。","choices":["グルタミン酸","アルギニン","トリプトファン","ロイシン"],"answer":3,"explanation":"イソアミルアルコールは、酵母がアミノ酸ロイシンを代謝するエールリッヒ経路の副産物として生成されることが知られている。","difficulty":5},{"id":"TST-077","domain":"tst","level":"master","category":"chemistry","tags":["peat-phenol","medicinal-aroma","cresol","guaiacol-comparison"],"region":null,"question":"ピート由来のフェノール系化合物の中で、一般に「消毒薬・ヨードチンキのような香り」に強く関連づけられる傾向が指摘される化合物として適切なものはどれか。","choices":["クレゾール（特にオルト・パラ異性体を含む混合物）","ウイスキーラクトン","酢酸イソアミル","ジアセチル"],"answer":0,"explanation":"クレゾールはグアイアコールに比べてより薬品的・消毒薬様の刺激的な香りに関連づけられることが指摘されている。","difficulty":5},{"id":"TST-078","domain":"tst","level":"master","category":"chemistry","tags":["dimethyl-disulfide","dmds","sulfur-compound","off-flavor"],"region":null,"question":"硫黄化合物の一種であるジメチルジスルフィド（DMDS）が持つとされる香りの特徴として適切な説明はどれか。","choices":["バニラのような甘く上品な香りを持つとされる","ゴムやキャベツを思わせるような刺激的な香りを持つとされる","バナナのようなフルーティーな香りを持つとされる","ココナッツのような甘い香りを持つとされる"],"answer":1,"explanation":"ジメチルジスルフィド（DMDS）はゴムやキャベツ様の刺激的な香りを持つとされる硫黄化合物で、還元的な条件下で生成されやすいとされる。","difficulty":4},{"id":"TST-079","domain":"tst","level":"master","category":"chemistry","tags":["maillard-reaction","oxidative-browning","toasted-aroma","color-formation"],"region":null,"question":"熟成中の樽材との反応や加熱処理によって生じる、トーストしたパンやキャラメルを思わせる香ばしい香気・褐色化に関わるとされる化学反応系はどれか。","choices":["酵母によるアルコール発酵反応のみ","ピートの燃焼によるフェノール生成反応のみ","糖とアミノ化合物が反応するメイラード反応系","蒸留機内での単純な物理的蒸発のみ"],"answer":2,"explanation":"樽材の加熱処理（トースト・チャー）や熟成中の反応では、糖とアミノ化合物によるメイラード反応系が香ばしい香りや褐色物質の生成に関与するとされる。","difficulty":4},{"id":"TST-080","domain":"tst","level":"master","category":"tasting","tags":["flavor-wheel","pentlands-research","charles-maclean","tasting-history"],"region":null,"question":"ウイスキーのフレーバーホイールの発展や香味表現の体系化に大きく貢献したとされる研究機関・専門家として知られる組み合わせはどれか。","choices":["国際サッカー連盟（FIFA）の技術委員会","国際天文学連合（IAU）","世界貿易機関（WTO）の紛争処理部門","ペントランズ・スコッチ・ウイスキー・リサーチ（現SWRI）などの研究機関、およびチャールズ・マクリーンら専門家の著作"],"answer":3,"explanation":"ウイスキーのフレーバーホイールや香味表現の体系化には、スコッチ・ウイスキー・リサーチ・インスティテュート（旧ペントランズ）などの研究機関や、チャールズ・マクリーンをはじめとする専門家の研究・著作が大きく寄与してきた。","difficulty":4},{"id":"TST-081","domain":"tst","level":"master","category":"tasting","tags":["qda","sensory-analysis","descriptive-analysis","tasting-method"],"region":null,"question":"訓練されたパネリストが特定の香味属性の強度を数値的に評価する官能評価手法「QDA（定量的記述分析）」についての説明として適切なものはどれか。","choices":["複数の香味属性をあらかじめ定義し、それぞれの強度を訓練されたパネルが数値的・客観的に評価する手法である","単に消費者の好き嫌いのみを聞き取る簡易的な人気投票の手法である","色調のみを機械測定する分析手法であり、香味は一切評価しない","アルコール度数の化学分析のみを行う手法である"],"answer":0,"explanation":"QDA（Quantitative Descriptive Analysis）は、訓練されたパネリストがあらかじめ定義された香味属性ごとに強度を数値評価する定量的な官能評価手法である。","difficulty":5},{"id":"TST-082","domain":"tst","level":"master","category":"chemistry","tags":["headspace","volatility","alcohol-content","vapor-liquid-equilibrium"],"region":null,"question":"アルコール度数（エタノール濃度）の違いが、グラス上部の香気成分の気相中濃度（ヘッドスペース）にどのように影響するかについての一般的な説明はどれか。","choices":["エタノール濃度は香気成分の揮発挙動に一切影響を与えない","エタノール濃度は香気成分の揮発挙動に影響し、加水による濃度変化がヘッドスペース中の香気成分組成を変化させうる","ヘッドスペース中の香気成分濃度は常にエタノール濃度と無関係に一定である","加水しても香気成分の気相中濃度は理論上変化しない"],"answer":1,"explanation":"エタノール濃度の変化は香気成分の気液平衡に影響を与え、加水によってヘッドスペース中に揮発する香気成分の組成や強度が変化することが知られている。","difficulty":5},{"id":"TST-083","domain":"tst","level":"master","category":"chemistry","tags":["oak-lactone","american-oak","european-oak","isomer-ratio"],"region":null,"question":"一般的に、ヨーロピアンオークとアメリカンオークのウイスキーラクトンのシス体・トランス体の比率傾向について指摘される説明はどれか。","choices":["樹種にかかわらずシス体・トランス体の比率は常に完全に同一である","アメリカンオークにはラクトンが全く含まれない","樹種によってシス体・トランス体の比率傾向に違いが見られるとされ、樽材の産地・樹種の判別材料の一つとして研究対象とされてきた","ヨーロピアンオークにはラクトンが全く含まれない"],"answer":2,"explanation":"オーク材のラクトン異性体比率は樹種によって傾向差があるとされ、木材科学の分野で樽材の由来を推定する手がかりの一つとして研究されてきた。","difficulty":5},{"id":"TST-084","domain":"tst","level":"master","category":"chemistry","tags":["vanillin","odor-threshold","fusel-alcohol-comparison","sensitivity"],"region":null,"question":"バニリンの官能的な閾値についての一般的な説明として適切なものはどれか。","choices":["バニリンは極めて高濃度でなければ知覚できない化合物である","バニリンには官能的な閾値の概念が存在しない","バニリンは常温では完全に無臭の化合物である","フーゼルアルコールなど一部の香気成分と比較して、非常に低い濃度でも人が知覚できるとされる"],"answer":3,"explanation":"バニリンは芳香が強く、比較的低い濃度でも知覚されやすい（閾値が低い）香気成分として知られている。","difficulty":5},{"id":"TST-085","domain":"tst","level":"master","category":"chemistry","tags":["gc-ms","aroma-analysis","analytical-method","instrumental-analysis"],"region":null,"question":"ウイスキーに含まれる微量の香気成分を分離・同定するために広く用いられる標準的な分析手法はどれか。","choices":["ガスクロマトグラフィー質量分析（GC-MS）","磁気共鳴画像法（MRI）","X線回折法（XRD）","核磁気共鳴分光法単独での色調測定"],"answer":0,"explanation":"ガスクロマトグラフィー質量分析（GC-MS）は、揮発性の香気成分を分離し個々の化合物を同定・定量するために広く用いられる標準的な分析手法である。","difficulty":4},{"id":"TST-086","domain":"tst","level":"master","category":"chemistry","tags":["diacetyl","fermentation-byproduct","lactic-acid-bacteria","buttery-note"],"region":null,"question":"バターやバタースコッチ様の香りの原因となるジアセチル（2,3-ブタンジオン）が増加しやすい要因として指摘されるものはどれか。","choices":["ジアセチルは樽材のリグニン分解によってのみ生成される","発酵中の酵母代謝の副産物として生じるほか、乳酸菌などによる汚染で増加することがあるとされる","ジアセチルは蒸留機の銅とのみ反応して生成される","ジアセチルはボトリング工程でのみ人工的に添加される"],"answer":1,"explanation":"ジアセチルは発酵中の酵母代謝の副産物として生じるほか、乳酸菌などの微生物汚染によって増加することがあると指摘されている。","difficulty":5},{"id":"TST-087","domain":"tst","level":"master","category":"chemistry","tags":["sherry-cask","color-reaction","tannin-oxidation","mahogany-hue"],"region":null,"question":"シェリー樽で長期熟成したウイスキーが赤みを帯びたマホガニー色を呈しやすい要因として指摘される説明はどれか。","choices":["シェリー樽の色調はカラメル色素の添加のみによって生じるものである","マホガニー色は必ずアルコール度数の高さのみによって決まる","シェリー樽材由来のタンニンやポリフェノール成分が酸化的な反応を経て色調に寄与するとされる","マホガニー色はピートの使用量のみによって決まる"],"answer":2,"explanation":"シェリー樽材由来のタンニンやポリフェノール成分が熟成中の酸化反応を経て、赤みを帯びた濃い色調（マホガニー色等）の形成に寄与すると考えられている。","difficulty":4},{"id":"TST-088","domain":"tst","level":"master","category":"chemistry","tags":["ester-formation","fermentation-temperature","yeast-strain","flavor-profile"],"region":null,"question":"発酵時の温度や使用する酵母株の違いが、生成されるエステル類の量にどのように影響するかについての一般的な説明として適切なものはどれか。","choices":["発酵条件はエステル生成量に一切影響を与えない","エステル生成量は蒸留段階でのみ決定され、発酵条件とは無関係である","酵母株の違いは色調にのみ影響し、香気成分には一切影響しない","発酵条件（温度や酵母株）によって生成されるエステル類の種類・量が変化し、それが最終的な香味プロファイルに影響するとされる"],"answer":3,"explanation":"発酵温度や酵母株の違いは、生成されるエステル類をはじめとする香気成分のプロファイルに影響を与えることが知られており、蒸留所ごとの個性の一因ともされる。","difficulty":5},{"id":"TST-089","domain":"tst","level":"master","category":"chemistry","tags":["acetaldehyde","ethanol-oxidation","maturation","oxidative-reaction"],"region":null,"question":"熟成中にエタノールが酸化的な反応を経て生じるとされる中間体として知られる化合物はどれか。","choices":["アセトアルデヒド","ウイスキーラクトン","グアイアコール","タンニン"],"answer":0,"explanation":"アセトアルデヒドはエタノールが酸化される過程で生じる中間体の一つとされ、熟成中の穏やかな酸化反応との関連が指摘されている。","difficulty":5},{"id":"TST-090","domain":"tst","level":"master","category":"chemistry","tags":["chill-filtration","fatty-acid-ester","mouthfeel","cloudiness"],"region":null,"question":"低温での冷却濾過（チルフィルタリング）によって主に取り除かれるとされる成分と、それによる影響についての説明として適切なものはどれか。","choices":["チルフィルタリングはアルコール分のみを除去する工程である","長鎖脂肪酸やそのエステルなどの油性成分が除去され、低温や加水時の白濁を防ぐ一方で、口当たりの質感がわずかに変化するとされる","チルフィルタリングは色調成分のみを除去する工程である","チルフィルタリングは硫黄化合物のみを選択的に除去する工程である"],"answer":1,"explanation":"チルフィルタリングは低温下で析出しやすい長鎖脂肪酸やそのエステル等を除去する工程で、外観の白濁を防ぐ一方、口当たり（ボディ感）にわずかな影響を与えるとされる。","difficulty":4},{"id":"USA-001","domain":"usa","level":"expert","category":"regulation","tags":["bourbon","mashbill","corn","federal-regulation","ttb"],"region":null,"question":"連邦規則(27 CFR)におけるバーボンウイスキーの原料規定として正しいものはどれか。","choices":["トウモロコシを原料の51%以上使用する","ライ麦を原料の51%以上使用する","大麦麦芽を原料の51%以上使用する","小麦を原料の51%以上使用する"],"answer":0,"explanation":"バーボンはトウモロコシ(コーン)を全原料の51%以上使うマッシュビルが法的要件である。残りは主にライ麦か小麦、そして大麦麦芽で構成される。","difficulty":1},{"id":"USA-002","domain":"usa","level":"expert","category":"regulation","tags":["bourbon","new-charred-oak","barrel","federal-regulation"],"region":null,"question":"バーボンウイスキーの熟成に使用する容器の規定として正しいものはどれか。","choices":["再使用可能なシェリー樽を使う","未使用で内側を焦がしたオーク製の新樽を使う","内側を焦がしていない新樽を使う","樽材はオークに限定されない"],"answer":1,"explanation":"バーボンは一度も使用していない、内側を焦がしたオーク樽での熟成が義務づけられている。このため一度使った樽はスコッチなど他国の蒸留所へ輸出され再利用されることが多い。","difficulty":1},{"id":"USA-003","domain":"usa","level":"expert","category":"regulation","tags":["bourbon","distillation-proof","federal-regulation","160-proof"],"region":null,"question":"バーボンウイスキーを蒸留する際、アルコール度数の上限として定められているものはどれか。","choices":["190プルーフ","140プルーフ","160プルーフ","125プルーフ"],"answer":2,"explanation":"連邦規則ではバーボンの蒸留は160プルーフ(80%ABV)を超えてはならないと定められている。度数を上げすぎると穀物由来の風味が失われるため、この上限は原料の個性を残す狙いもある。","difficulty":2},{"id":"USA-004","domain":"usa","level":"expert","category":"regulation","tags":["bourbon","barrel-entry-proof","federal-regulation"],"region":null,"question":"バーボンウイスキーを樽詰めする際のアルコール度数の上限はどれか。","choices":["110プルーフ","150プルーフ","100プルーフ","125プルーフ"],"answer":3,"explanation":"樽詰め時の度数は125プルーフ(62.5%ABV)を超えてはならない。度数が高いほど樽材との反応が変わり、風味や収量に影響するため上限が設けられている。","difficulty":2},{"id":"USA-005","domain":"usa","level":"expert","category":"regulation","tags":["bourbon","bottling-proof","federal-regulation"],"region":null,"question":"バーボンウイスキーを瓶詰めする際のアルコール度数の下限はどれか。","choices":["80プルーフ","70プルーフ","90プルーフ","100プルーフ"],"answer":0,"explanation":"瓶詰め時は最低80プルーフ(40%ABV)以上でなければならない。これを下回るとバーボンとして認められない。","difficulty":1},{"id":"USA-006","domain":"usa","level":"expert","category":"regulation","tags":["straight-bourbon","aging-requirement","federal-regulation"],"region":null,"question":"『ストレートバーボン』を名乗るために必要な最低熟成期間はどれか。","choices":["1年","2年","4年","6か月"],"answer":1,"explanation":"ストレートバーボンは新品の内側を焦がしたオーク樽で最低2年間熟成させる必要がある。4年に満たない場合は年数表示(エイジステートメント)の記載も義務づけられる。","difficulty":2},{"id":"USA-007","domain":"usa","level":"expert","category":"regulation","tags":["bourbon","geographic-requirement","kentucky","federal-regulation"],"region":"usa-kentucky","question":"バーボンウイスキーの製造地に関する連邦規則の説明として正しいものはどれか。","choices":["ケンタッキー州内でのみ製造が認められる","ケンタッキー州とテネシー州に限定される","アメリカ合衆国内であればケンタッキー州以外でも製造できる","バーボン郡内でのみ製造が認められる"],"answer":2,"explanation":"バーボンはアメリカ合衆国内で製造されればよく、ケンタッキー州に限定する法的規定はない。ただし気候や水質、歴史的経緯からケンタッキー州が生産の中心地となっている。","difficulty":2},{"id":"USA-008","domain":"usa","level":"expert","category":"ingredients","tags":["mashbill","rye","wheat","secondary-grain"],"region":null,"question":"バーボンのマッシュビルにおいて、トウモロコシに次ぐ副原料として一般的に用いられる穀物の組み合わせはどれか。","choices":["米またはオーツ麦","ソバまたはキビ","大麦麦芽のみ","ライ麦または小麦"],"answer":3,"explanation":"多くのバーボンはトウモロコシに加えてライ麦か小麦のいずれかを風味付けの副原料として用いる。ライ麦を使うとスパイシーに、小麦を使うと穏やかで甘みのある味わいになりやすい。","difficulty":1},{"id":"USA-009","domain":"usa","level":"expert","category":"regulation","tags":["rye-whiskey","mashbill","federal-regulation"],"region":null,"question":"ライウイスキー(Rye Whiskey)のマッシュビル規定として正しいものはどれか。","choices":["ライ麦を原料の51%以上使用する","ライ麦を原料の80%以上使用する","ライ麦を原料の25%以上使用する","ライ麦のみを100%使用する"],"answer":0,"explanation":"ライウイスキーはライ麦を51%以上使用することが規定されており、その他の要件(新品の焦がし樽での熟成など)はバーボンと共通している。","difficulty":1},{"id":"USA-010","domain":"usa","level":"expert","category":"regulation","tags":["tennessee-whiskey","lincoln-county-process","charcoal-mellowing"],"region":"usa-tennessee","question":"テネシーウイスキーが連邦規則上バーボンと区別される主な追加要件はどれか。","choices":["蒸留を3回行う","樽詰め前にサトウカエデの木炭でろ過するリンカーン・カウンティ・プロセスを行う","ピートで穀物を燻煙する","熟成年数を10年以上とする"],"answer":1,"explanation":"テネシーウイスキーはバーボンの規格を満たした上で、樽詰め前にサトウカエデの木炭層をゆっくり通す『リンカーン・カウンティ・プロセス』を経ることが州法および貿易協定上の要件となっている。","difficulty":2},{"id":"USA-011","domain":"usa","level":"expert","category":"production","tags":["sour-mash","backset","fermentation","production"],"region":null,"question":"アメリカンウイスキーの発酵で広く用いられる『サワーマッシュ』製法の説明として正しいものはどれか。","choices":["乳酸菌で穀物を数週間漬け込んでから蒸留する","樽材を酸で処理してから使用する","前回の発酵で生じた蒸留残液(バックセット)の一部を新しい仕込みに加える","発酵前に穀物を天日で酸化させる"],"answer":2,"explanation":"サワーマッシュは前バッチの蒸留残液(バックセットまたはセットバック)を新しい仕込みに加えてpHを安定させ、雑菌汚染を防ぎながら発酵の一貫性を保つ手法である。ジャックダニエルだけでなく多くのアメリカンウイスキー蒸留所で採用されている。","difficulty":2},{"id":"USA-012","domain":"usa","level":"expert","category":"history","tags":["prohibition","18th-amendment","volstead-act","history"],"region":null,"question":"アメリカで禁酒法(全国的な酒類の製造・販売の禁止)が施行されていた期間として正しいものはどれか。","choices":["1917年から1929年","1925年から1940年","1919年から1930年","1920年から1933年"],"answer":3,"explanation":"合衆国憲法修正第18条に基づき1920年から施行された禁酒法は、1933年の修正第21条により廃止されるまで続いた。この間、多くの蒸留所が閉鎖に追い込まれた。","difficulty":1},{"id":"USA-013","domain":"usa","level":"expert","category":"distillery","tags":["jim-beam","clermont","kentucky","distillery-location"],"region":"usa-kentucky","question":"ジムビーム蒸留所が所在する地域として正しいものはどれか。","choices":["ケンタッキー州クレルモント","テネシー州リンチバーグ","ケンタッキー州フランクフォート","バージニア州リッチモンド"],"answer":0,"explanation":"ジムビームの主要蒸留所はケンタッキー州ブリット郡クレルモントにあり、隣接するボストンにボトリング施設を持つ。ビーム家は複数世代にわたりマスターディスティラーを輩出してきた。","difficulty":1},{"id":"USA-014","domain":"usa","level":"expert","category":"distillery","tags":["makers-mark","wheated-bourbon","wax-seal","loretto"],"region":"usa-kentucky","question":"メーカーズマークの特徴として正しいものはどれか。","choices":["ライ麦比率が高いハイライバーボンで知られる","ライ麦の代わりに小麦を使うウィーテッドバーボンで、瓶の口を赤い封蝋で仕上げる","テネシー州で製造されるバーボンである","トウモロコシを80%以上使う"],"answer":1,"explanation":"メーカーズマークはケンタッキー州ロレットの蒸留所で造られ、副原料にライ麦ではなく小麦を使う『ウィーテッドバーボン』の代表格である。手作業で瓶口に赤い封蝋を掛ける外観も特徴的である。","difficulty":1},{"id":"USA-015","domain":"usa","level":"expert","category":"distillery","tags":["wild-turkey","lawrenceburg","kentucky","distillery-location"],"region":"usa-kentucky","question":"ワイルドターキー蒸留所が所在する地域として正しいものはどれか。","choices":["テネシー州タラホーマ","ケンタッキー州バーズタウン","ケンタッキー州ローレンスバーグ","ケンタッキー州ルイビル"],"answer":2,"explanation":"ワイルドターキーはケンタッキー州アンダーソン郡ローレンスバーグに蒸留所を構える。同じ町にはフォアローゼズの蒸留所もある。","difficulty":1},{"id":"USA-016","domain":"usa","level":"expert","category":"distillery","tags":["jack-daniels","lynchburg","moore-county","tennessee"],"region":"usa-tennessee","question":"ジャックダニエル蒸留所が所在する地域として正しいものはどれか。","choices":["テネシー州ナッシュビル","ケンタッキー州バーズタウン","テネシー州メンフィス","テネシー州リンチバーグ"],"answer":3,"explanation":"ジャックダニエルはテネシー州ムーア郡のリンチバーグに蒸留所を置く。ムーア郡は現在も禁酒(ドライカウンティ)の郡だが、蒸留所での限定的な販売は例外的に認められている。","difficulty":1},{"id":"USA-017","domain":"usa","level":"expert","category":"distillery","tags":["four-roses","lawrenceburg","kentucky","distillery-location"],"region":"usa-kentucky","question":"フォアローゼズ蒸留所が所在する地域として正しいものはどれか。","choices":["ケンタッキー州ローレンスバーグ","ケンタッキー州フランクフォート","ケンタッキー州バーズタウン","ケンタッキー州ルイビル"],"answer":0,"explanation":"フォアローゼズはケンタッキー州ローレンスバーグに蒸留所を持ち、熟成・ボトリングは近郊のコックスクリークで行っている。","difficulty":1},{"id":"USA-018","domain":"usa","level":"expert","category":"distillery","tags":["buffalo-trace","frankfort","kentucky","national-historic-landmark"],"region":"usa-kentucky","question":"バッファロートレース蒸留所が所在する地域として正しいものはどれか。","choices":["ケンタッキー州バーズタウン","ケンタッキー州フランクフォート","テネシー州タラホーマ","ケンタッキー州ローレンスバーグ"],"answer":1,"explanation":"バッファロートレースはケンタッキー州の州都フランクフォートに位置し、2013年に全米史跡(National Historic Landmark)に指定された歴史ある蒸留所である。","difficulty":1},{"id":"USA-019","domain":"usa","level":"expert","category":"distillery","tags":["heaven-hill","family-owned","bardstown","independent-distillery"],"region":"usa-kentucky","question":"ヘヴンヒルの説明として正しいものはどれか。","choices":["フォアローゼズと同じくキリンホールディングス傘下である","テネシー州で操業する蒸留所である","アメリカ最大級の独立系・同族経営の蒸留酒メーカーである","2000年代に設立された新興蒸留所である"],"answer":2,"explanation":"ヘヴンヒルは1935年創業のシェイピロ家による同族経営で、アメリカ最大級の独立系蒸留酒メーカーとして知られる。エヴァン・ウィリアムズやエライジャ・クレイグなどのブランドを擁する。","difficulty":2},{"id":"USA-020","domain":"usa","level":"expert","category":"distillery","tags":["woodford-reserve","pot-still","triple-distillation","versailles"],"region":"usa-kentucky","question":"ウッドフォードリザーブの蒸留方法として特徴的なものはどれか。","choices":["連続式カラムスチルのみによる1回蒸留","減圧蒸留","木炭ろ過後にさらに蒸留する4回蒸留","銅製ポットスチルによる3回蒸留"],"answer":3,"explanation":"多くのバーボン蒸留所がカラムスチルとダブラーの組み合わせを使うのに対し、ウッドフォードリザーブは銅製ポットスチルを3基用いた3回蒸留を行う点で異色である。蒸留所はケンタッキー州バーサイユに位置する。","difficulty":2},{"id":"USA-021","domain":"usa","level":"expert","category":"distillery","tags":["george-dickel","whisky-spelling","tennessee","cascade-hollow"],"region":"usa-tennessee","question":"ジョージディッケルの表記や立地に関する説明として正しいものはどれか。","choices":["スコットランド式に倣い『whisky』とeを抜いた表記を用い、テネシー州で操業する","『whiskey』と表記し、ケンタッキー州で操業する","バーボンではなくカナディアンウイスキーに分類される","禁酒法時代に創業した比較的新しいブランドである"],"answer":0,"explanation":"創業者ジョージ・A・ディッケルが自社製品をスコッチに匹敵すると考えたことから、多くのアメリカ製品が『whiskey』と綴る中で同社は『whisky』とeを抜いた表記を用いている。蒸留所はテネシー州のカスケード・ホロー周辺にある。","difficulty":2},{"id":"USA-022","domain":"usa","level":"expert","category":"region-knowledge","tags":["bourbon-county","name-origin","french-monarchy","kentucky"],"region":"usa-kentucky","question":"『バーボン』という名称の由来として広く知られているものはどれか。","choices":["初代蒸留者バーボン氏の名前","フランスのブルボン王朝にちなんで名付けられたケンタッキー州バーボン郡","バーボンストリートというニューオーリンズの通り名","樽材産地であるバーボン山地"],"answer":1,"explanation":"ケンタッキー州バーボン郡は、独立戦争でアメリカを支援したフランスのブルボン王朝にちなんで名付けられた。この地域から出荷されたウイスキーが『バーボン』と呼ばれるようになったという説が広く知られている。","difficulty":2},{"id":"USA-023","domain":"usa","level":"expert","category":"region-knowledge","tags":["bardstown","bourbon-capital","kentucky","tourism"],"region":"usa-kentucky","question":"『バーボンの首都』と称されることが多いケンタッキー州の都市はどれか。","choices":["ルイビル","フランクフォート","バーズタウン","レキシントン"],"answer":2,"explanation":"バーズタウンはヘヴンヒルやウィレット、バートンなど複数の蒸留所が集まり、『世界のバーボンの首都』を自称する町として知られている。","difficulty":1},{"id":"USA-024","domain":"usa","level":"expert","category":"region-knowledge","tags":["limestone-water","kentucky","water-source","region-knowledge"],"region":"usa-kentucky","question":"ケンタッキー州がバーボン生産に適しているとされる理由として挙げられるものはどれか。","choices":["年間を通じて気温がほぼ一定である","泥炭(ピート)が豊富に採れる","海に近く塩分を含む空気が熟成を促す","石灰岩層を通過した鉄分の少ない水が仕込み水に適している"],"answer":3,"explanation":"ケンタッキー州の地下水は石灰岩層でろ過されるため鉄分が少なくカルシウムを多く含み、酵母の発酵や風味に良い影響を与えるとされる。この水質はサラブレッド飼育にも適しているといわれる。","difficulty":2},{"id":"USA-025","domain":"usa","level":"expert","category":"history","tags":["bottled-in-bond-act","1897","history","consumer-protection"],"region":null,"question":"『ボトルド・イン・ボンド法』が制定された年として正しいものはどれか。","choices":["1897年","1920年","1964年","1880年"],"answer":0,"explanation":"ボトルド・イン・ボンド法は1897年に成立した連邦法で、粗悪な混ぜ物ウイスキーから消費者を守るための初期の食品・酒類規制の一つとされる。","difficulty":2},{"id":"USA-026","domain":"usa","level":"expert","category":"people","tags":["jack-daniel","founder","biography","tennessee"],"region":"usa-tennessee","question":"ジャックダニエル蒸留所の創業者の本名として正しいものはどれか。","choices":["ジョージ・A・ディッケル","ジャスパー・ニュートン・ダニエル","ジェイコブ・ビーム","ベンジャミン・プリチャード"],"answer":1,"explanation":"『ジャック』ダニエルの本名はジャスパー・ニュートン・ダニエルであり、10代の若さで蒸留を学び始めたと伝えられている。","difficulty":2},{"id":"USA-027","domain":"usa","level":"expert","category":"people","tags":["elijah-craig","legend","baptist-minister","bourbon-origin-story"],"region":"usa-kentucky","question":"『バーボンの父』と俗に語られることがあるバプテスト派の牧師は誰か。","choices":["E・H・テイラー・ジュニア","エルマー・T・リー","エライジャ・クレイグ","ブッカー・ノー"],"answer":2,"explanation":"エライジャ・クレイグは18世紀後半のバプテスト派牧師で、焦がした樽で最初にコーンウイスキーを熟成させた人物として語られることが多いが、これは後世に広まった逸話であり史実として確定しているわけではない。","difficulty":2},{"id":"USA-028","domain":"usa","level":"expert","category":"brand","tags":["blantons","single-barrel","elmer-t-lee","1984"],"region":"usa-kentucky","question":"1984年に発売され、現代的なシングルバレルバーボンの先駆けとされる銘柄はどれか。","choices":["ノブクリーク","エヴァンウィリアムズ","オールドフォレスター","ブラントンズ"],"answer":3,"explanation":"ブラントンズはエルマー・T・リーによって1984年に発売され、単一樽から瓶詰めする現代的なシングルバレルバーボンというカテゴリーを切り開いた銘柄とされる。","difficulty":2},{"id":"USA-029","domain":"usa","level":"expert","category":"brand","tags":["knob-creek","jim-beam","small-batch","brand"],"region":"usa-kentucky","question":"ジムビーム社が展開する『スモールバッチ・バーボン・コレクション』に含まれる銘柄はどれか。","choices":["ノブクリーク","ワイルドターキー101","エライジャクレイグ","W.L.ウェラー"],"answer":0,"explanation":"ノブクリークはブッカーズ、ベイシルヘイデン、ベイカーズとともにジムビーム社のスモールバッチ・バーボン・コレクションを構成する銘柄の一つである。","difficulty":2},{"id":"USA-030","domain":"usa","level":"expert","category":"brand","tags":["evan-williams","heaven-hill","flagship-brand"],"region":"usa-kentucky","question":"ヘヴンヒル社の看板ブランドの一つで、世界的な販売量の多さで知られるバーボンはどれか。","choices":["メーカーズマーク","エヴァンウィリアムズ","ワイルドターキー","フォアローゼズ"],"answer":1,"explanation":"エヴァンウィリアムズはヘヴンヒル社の主力ブランドであり、世界で最も売れているバーボンの一つに数えられる。ブランド名はルイビルで最初期に蒸留を行ったとされる人物にちなむ。","difficulty":1},{"id":"USA-031","domain":"usa","level":"expert","category":"regulation","tags":["corn-whiskey","mashbill","federal-regulation"],"region":null,"question":"コーンウイスキー(Corn Whiskey)のマッシュビル規定として正しいものはどれか。","choices":["トウモロコシを51%以上使用する","トウモロコシのみを100%使用する","トウモロコシを80%以上使用する","トウモロコシを30%以上使用する"],"answer":2,"explanation":"コーンウイスキーはトウモロコシを80%以上使用することが規定されている。またバーボンと異なり新品の焦がし樽での熟成は義務づけられていない。","difficulty":2},{"id":"USA-032","domain":"usa","level":"expert","category":"regulation","tags":["age-statement","straight-whiskey","labeling","federal-regulation"],"region":null,"question":"熟成4年未満のストレートウイスキーをボトリングする際に義務づけられている表示はどれか。","choices":["蒸留所の緯度経度","使用した酵母の菌株名","樽材の産地","熟成年数(エイジステートメント)"],"answer":3,"explanation":"ストレートウイスキーは熟成期間が4年未満の場合、ラベルに熟成年数を明記することが義務づけられている。4年以上熟成している場合はこの表示義務はない。","difficulty":2},{"id":"USA-033","domain":"usa","level":"expert","category":"ingredients","tags":["malted-barley","enzymes","fermentation","ingredients"],"region":null,"question":"バーボンのマッシュビルに大麦麦芽が少量加えられる主な目的はどれか。","choices":["デンプンを糖に変換する酵素を供給するため","色合いを濃くするため","泡立ちを抑えるため","保存性を高めるため"],"answer":0,"explanation":"大麦麦芽にはデンプンを発酵可能な糖に分解する酵素が豊富に含まれており、トウモロコシなど他の穀物のデンプンを糖化するために少量加えられることが多い。","difficulty":2},{"id":"USA-034","domain":"usa","level":"expert","category":"production","tags":["white-dog","new-make","unaged-spirit","terminology"],"region":null,"question":"熟成前の無色透明なアメリカンウイスキーの蒸留液を俗に何と呼ぶか。","choices":["ニューポット","ホワイトドッグ","スピリッツサフラン","ローワイン"],"answer":1,"explanation":"アメリカでは熟成前の透明な蒸留液を『ホワイトドッグ』と呼ぶことが多い。スコッチでいう『ニューメイクスピリッツ』にあたる。","difficulty":1},{"id":"USA-035","domain":"usa","level":"expert","category":"history","tags":["whiskey-rebellion","alexander-hamilton","excise-tax","history"],"region":null,"question":"1791年にアレクサンダー・ハミルトンが提案した蒸留酒への物品税をきっかけに起きた農民の武装抵抗運動はどれか。","choices":["ボストン茶会事件","シェイズの反乱","ウイスキー反乱","ホームステッド・ストライキ"],"answer":2,"explanation":"ウイスキー反乱は連邦政府が蒸留酒に課した物品税に反発したペンシルベニア州西部の農民らによる抵抗運動で、ワシントン大統領が軍を派遣して鎮圧した。","difficulty":2},{"id":"USA-036","domain":"usa","level":"expert","category":"culture","tags":["mint-julep","kentucky-derby","cocktail","culture"],"region":"usa-kentucky","question":"ケンタッキーダービーの公式カクテルとしてバーボンをベースに作られる飲み物はどれか。","choices":["マンハッタン","オールドファッションド","ウイスキーサワー","ミントジュレップ"],"answer":3,"explanation":"ミントジュレップはバーボン、砂糖、ミント、クラッシュドアイスで作られ、ケンタッキーダービーの公式カクテルとして毎年大量に提供されることで知られる。","difficulty":1},{"id":"USA-037","domain":"usa","level":"expert","category":"brand","tags":["wild-turkey-101","high-proof","brand"],"region":"usa-kentucky","question":"『101』という数字がボトルの名前に含まれる、ワイルドターキーの代表的な高プルーフ銘柄はどれか。","choices":["ワイルドターキー101","ラッセルズリザーブ","キングオブケンタッキー","ロングブランチ"],"answer":0,"explanation":"ワイルドターキー101は101プルーフ(50.5%ABV)でボトリングされる看板銘柄で、同社の力強いスタイルを象徴するバーボンとして知られる。","difficulty":1},{"id":"USA-038","domain":"usa","level":"expert","category":"people","tags":["jimmy-russell","wild-turkey","master-distiller","tenure"],"region":"usa-kentucky","question":"ワイルドターキー蒸留所で1954年から半世紀以上にわたりマスターディスティラーを務めた人物は誰か。","choices":["チャック・コーワン","ジミー・ラッセル","エディ・ラッセル","ジミー・ライトフット"],"answer":1,"explanation":"ジミー・ラッセルは1954年にワイルドターキーへ入社して以来、業界で最も在任期間の長い現役マスターディスティラーとして知られてきた。息子のエディ・ラッセルも同社のマスターディスティラーを務めている。","difficulty":2},{"id":"USA-039","domain":"usa","level":"expert","category":"distillery","tags":["woodford-reserve","brown-forman","ownership"],"region":"usa-kentucky","question":"ウッドフォードリザーブを所有する大手酒類企業はどれか。","choices":["ディアジオ","サゼラック","ブラウンフォーマン","キリンホールディングス"],"answer":2,"explanation":"ウッドフォードリザーブはケンタッキー州ルイビルに本社を置くブラウンフォーマン社が所有する蒸留所で、同社はオールドフォレスターも展開している。","difficulty":2},{"id":"USA-040","domain":"usa","level":"expert","category":"region-knowledge","tags":["kentucky","bourbon-production-share","region-knowledge"],"region":"usa-kentucky","question":"現在世界で流通するバーボンのうち、ケンタッキー州で生産される割合はおおよそどの程度とされるか。","choices":["約50%","約30%","約70%","約95%"],"answer":3,"explanation":"バーボンは法律上アメリカ国内であればどの州でも製造できるが、歴史的経緯と気候・水質の良さから実際にはおよそ95%がケンタッキー州で生産されているといわれる。","difficulty":2},{"id":"USA-041","domain":"usa","level":"professional","category":"regulation","tags":["bottled-in-bond","100-proof","bonded-warehouse","one-distilling-season"],"region":null,"question":"ボトルド・イン・ボンドを名乗るための要件として正しい組み合わせはどれか。","choices":["単一の蒸留所・単一の蒸留期(シーズン)で造られ、政府監督の保税倉庫で最低4年熟成し、100プルーフちょうどで瓶詰めする","複数の蒸留所の原酒をブレンドし、最低2年熟成させ、90プルーフ以上で瓶詰めする","単一の樽から瓶詰めし、熟成年数の下限は定められていない","蒸留所名の記載は任意である"],"answer":0,"explanation":"ボトルド・イン・ボンドは単一の蒸留所・単一の蒸留者による同一蒸留期(1〜6月または7〜12月)の原酒を、政府監督下の保税倉庫で最低4年熟成させ、正確に100プルーフ(50%ABV)で瓶詰めすることが要件となる。ラベルには蒸留した蒸留所名、瓶詰め場所が異なる場合はその場所も表示しなければならない。","difficulty":3},{"id":"USA-042","domain":"usa","level":"professional","category":"regulation","tags":["straight-whiskey","no-additives","federal-regulation","labeling"],"region":null,"question":"『ストレートウイスキー』のラベル表示規定として正しいものはどれか。","choices":["カラメル色素による色調整が認められている","水以外の着色料・香味料・ブレンド用素材の添加が禁止されている","他の蒸留所の原酒を50%まで混和してよい","熟成年数の表示は禁止されている"],"answer":1,"explanation":"ストレートウイスキーは度数調整のための加水以外、着色料や香味料、ブレンド用の中性スピリッツなどを加えることが禁止されている。これがバーボンなど個性の強い風味を保つ根拠となっている。","difficulty":3},{"id":"USA-043","domain":"usa","level":"professional","category":"production","tags":["lincoln-county-process","charcoal-mellowing","sugar-maple","tennessee-whiskey"],"region":"usa-tennessee","question":"リンカーン・カウンティ・プロセスの工程として正しい説明はどれか。","choices":["蒸留後の樽材をサトウカエデの炭で燻す","仕込み水をサトウカエデの炭でろ過する","樽詰め前の新しい蒸留液を、厚く敷き詰めたサトウカエデの木炭層に時間をかけて通す","瓶詰め直前の完成品を活性炭でろ過する"],"answer":2,"explanation":"リンカーン・カウンティ・プロセスは、樽詰め前の新しい蒸留液(ホワイトドッグ)を厚さ数メートルにも及ぶサトウカエデの木炭層にゆっくりと通過させる木炭ろ過(チャコール・メロウイング)の工程を指す。この工程を経ることでテネシーウイスキーとしての性格が形成されるとされる。","difficulty":3},{"id":"USA-044","domain":"usa","level":"professional","category":"production","tags":["backset","setback","ph-control","sour-mash"],"region":null,"question":"サワーマッシュ製法における『バックセット(セットバック)』の役割として正しいものはどれか。","choices":["樽材を柔らかくして風味成分の抽出を促す","蒸留効率を高めるために還流量を増やす","瓶詰め時にアルコール度数を均一化する","新しい仕込みのpHを下げて酸性に保ち、雑菌汚染を抑えつつ発酵を安定させる"],"answer":3,"explanation":"バックセットは前回の蒸留で出た残液(スティルベアーの一部)で、乳酸などを含み酸性である。これを新しい仕込みに加えることでマッシュのpHを下げ、雑菌の繁殖を抑えつつ発酵の再現性を高める効果がある。","difficulty":3},{"id":"USA-045","domain":"usa","level":"professional","category":"regulation","tags":["wheat-whiskey","mashbill","federal-regulation"],"region":null,"question":"ウィートウイスキー(Wheat Whiskey)がその名称を名乗るためのマッシュビル要件はどれか。","choices":["小麦を51%以上使用する","小麦を80%以上使用する","小麦のみを使用する","小麦を25%以上使用する"],"answer":0,"explanation":"ウィートウイスキーは小麦を51%以上使用することが規定されている。バーボンの副原料として小麦を使う『ウィーテッドバーボン』とは、主原料の比率が異なる別カテゴリーである点に注意が必要である。","difficulty":3},{"id":"USA-046","domain":"usa","level":"professional","category":"regulation","tags":["malt-whiskey","mashbill","new-charred-oak","federal-regulation"],"region":null,"question":"アメリカの連邦規則における『モルトウイスキー(Malt Whiskey)』の規定として正しいものはどれか。","choices":["大麦麦芽のみを100%使用し、無着色でなければならない","大麦麦芽を51%以上使用し、新品の焦がしオーク樽で熟成させる","ピートで乾燥させた大麦麦芽を使用することが必須である","再使用樽での熟成のみが認められる"],"answer":1,"explanation":"アメリカのモルトウイスキーは大麦麦芽を51%以上使用し、他のアメリカンウイスキーと同様に新品の内側を焦がしたオーク樽で熟成させる規定がある。スコッチのモルトウイスキーとは樽の再使用可否などの点で規定が異なる。","difficulty":3},{"id":"USA-047","domain":"usa","level":"professional","category":"maturation","tags":["char-level","alligator-char","barrel-toasting","maturation"],"region":null,"question":"バーボン用の樽内側の焦がし方のうち、最も深く焦がすレベルを俗に何と呼ぶか。","choices":["ミディアムトースト","ライトチャー","アリゲーターチャー","ハニーチャー"],"answer":2,"explanation":"樽内側を焦がすレベルは通常#1から#4まであり、最も深く焦がして表面がワニ皮状にひび割れる#4は俗に『アリゲーターチャー』と呼ばれる。多くのバーボン蒸留所でこの深い焦がしが好んで用いられる。","difficulty":3},{"id":"USA-048","domain":"usa","level":"professional","category":"maturation","tags":["angels-share","evaporation","maturation","rickhouse"],"region":null,"question":"熟成中に樽から蒸発して失われるアルコール分・水分を指す通称はどれか。","choices":["デビルズカット","スピリッツロス","バレルバーン","エンジェルズシェア"],"answer":3,"explanation":"熟成中に樽材を通じて蒸発し失われる分は『エンジェルズシェア(天使の分け前)』と呼ばれる。ケンタッキーは夏冬の寒暖差が大きく、この蒸発量がスコットランドなどより多いとされる。","difficulty":3},{"id":"USA-049","domain":"usa","level":"professional","category":"people","tags":["elmer-t-lee","blantons","buffalo-trace","master-distiller"],"region":"usa-kentucky","question":"ブラントンズを生み出したことで知られる元バッファロートレース(旧エインシェントエイジ)のマスターディスティラーは誰か。","choices":["エルマー・T・リー","ハーラン・ウィートリー","ジュリアン・ヴァンウィンクル・ジュニア","ブッカー・ノー"],"answer":0,"explanation":"エルマー・T・リーは1984年にブラントンズを開発し、シングルバレルバーボンという現代的なカテゴリーを確立した人物として知られる。自身の名を冠した銘柄『エルマー・T・リー』も存在する。","difficulty":3},{"id":"USA-050","domain":"usa","level":"professional","category":"people","tags":["booker-noe","jim-beam","bookers","small-batch"],"region":"usa-kentucky","question":"ジムビーム家6代目にあたり、ブッカーズを生み出したマスターディスティラーは誰か。","choices":["フレッド・ノー","ブッカー・ノー","デビッド・ビーム","ベイシル・ヘイデン"],"answer":1,"explanation":"ブッカー・ノーはジムビーム創業者の血を引く6代目マスターディスティラーで、無濾過・樽出し度数に近いブッカーズを開発し、スモールバッチバーボンの先駆けとなった。息子のフレッド・ノーが7代目を継いでいる。","difficulty":3},{"id":"USA-051","domain":"usa","level":"professional","category":"people","tags":["pappy-van-winkle","stitzel-weller","wheated-bourbon","brand-history"],"region":"usa-kentucky","question":"スティッツェル・ウェラー蒸留所を率い、後にパピー・ヴァンウィンクルの名で知られるようになった人物は誰か。","choices":["エルマー・T・リー","E・H・テイラー・ジュニア","ジュリアン・「パピー」・ヴァンウィンクル・ジュニア","ジミー・ラッセル"],"answer":2,"explanation":"ジュリアン・「パピー」・ヴァンウィンクル・ジュニアはケンタッキー州ルイビルのスティッツェル・ウェラー蒸留所を率い、小麦を副原料に使うウィーテッドバーボンの伝統を築いた。彼の名を冠したオールドリップヴァンウィンクルは現在バッファロートレースで製造されている。","difficulty":3},{"id":"USA-052","domain":"usa","level":"professional","category":"distillery","tags":["stitzel-weller","wheated-bourbon","louisville","diageo"],"region":"usa-kentucky","question":"スティッツェル・ウェラー蒸留所の歴史的な位置づけとして正しいものはどれか。","choices":["禁酒法時代に薬用ウイスキーの認可を得なかった蒸留所である","テネシー州で操業していた蒸留所である","2010年代に新規開業した蒸留所である","ウィーテッドバーボンのレシピを確立した歴史的蒸留所で、現在はディアジオが所有する敷地となっている"],"answer":3,"explanation":"スティッツェル・ウェラーはケンタッキー州ルイビルにあり、小麦を使うウィーテッドバーボンのレシピを広めた歴史的蒸留所である。1992年に生産を停止したが、現在はディアジオが敷地を保有し、ビジターセンターなどに活用している。","difficulty":3},{"id":"USA-053","domain":"usa","level":"professional","category":"distillery","tags":["four-roses","ten-recipes","yeast-strain","mashbill"],"region":"usa-kentucky","question":"フォアローゼズが用いる、2種類のマッシュビルと5種類の酵母株を掛け合わせた製法として正しいものはどれか。","choices":["10種類のバーボンレシピを造り分ける","1種類のレシピのみで一貫して造る","毎年レシピを変更する","樽の焦がしレベルを10段階に分ける"],"answer":0,"explanation":"フォアローゼズは2種類のマッシュビル(ライ麦比率の異なるBとE)と5種類の独自酵母株を組み合わせ、合計10種類のバーボンレシピを造り分けることで知られる。ブレンドやシングルレシピの製品展開に活かされている。","difficulty":3},{"id":"USA-054","domain":"usa","level":"professional","category":"distillery","tags":["wild-turkey","high-rye","mashbill"],"region":"usa-kentucky","question":"ワイルドターキーのバーボンのマッシュビルの特徴として正しいものはどれか。","choices":["小麦を主体としたウィーテッドバーボンである","業界内でも比較的ライ麦比率が高いレシピを用いる","トウモロコシを95%以上使う高コーンレシピである","大麦麦芽を使用しない"],"answer":1,"explanation":"ワイルドターキーは他の大手蒸留所と比べてライ麦比率が高めのマッシュビルを用いることで知られ、スパイシーで力強い風味の一因となっている。","difficulty":3},{"id":"USA-055","domain":"usa","level":"professional","category":"distillery","tags":["buffalo-trace","brand-portfolio","eagle-rare","w-l-weller"],"region":"usa-kentucky","question":"バッファロートレース蒸留所が製造するブランドの組み合わせとして正しいものはどれか。","choices":["メーカーズマーク、ノブクリーク、ベイシルヘイデン","ジャックダニエル、ジェントルマンジャック","イーグルレア、ブラントンズ、W.L.ウェラー、サゼラックライ","フォアローゼズ、ワイルドターキー101"],"answer":2,"explanation":"バッファロートレースは自社銘柄のバッファロートレースに加え、イーグルレア、ブラントンズ、W.L.ウェラー、サゼラックライなど幅広いブランドを製造している。パピー・ヴァンウィンクル・シリーズの熟成・瓶詰めも同蒸留所で行われている。","difficulty":3},{"id":"USA-056","domain":"usa","level":"professional","category":"history","tags":["prohibition","medicinal-whiskey","license","history"],"region":null,"question":"禁酒法時代、医薬品としてのウイスキー処方を目的に連邦政府が製造・販売を認めた蒸留所の状況として正しいものはどれか。","choices":["すべての既存蒸留所が薬用として操業を継続できた","医薬品用途であっても製造は一切認められなかった","禁酒法下では医師の処方箋なしでも自由に購入できた","ごく少数の蒸留所に対して薬用ウイスキーの在庫処分・製造の許可が与えられた"],"answer":3,"explanation":"禁酒法下でも医師の処方箋があれば薬用として少量のウイスキー購入が認められており、政府はブラウンフォーマンを含むごく少数の企業にのみ薬用ウイスキーの製造・瓶詰め・在庫処分の免許を与えた。これにより一部の蒸留所は禁酒法期間を生き延びることができた。","difficulty":3},{"id":"USA-057","domain":"usa","level":"professional","category":"people","tags":["e-h-taylor","ofc-distillery","bottled-in-bond","history"],"region":"usa-kentucky","question":"ボトルド・イン・ボンド法の成立に尽力し、OFC蒸留所を建てたことで知られる人物は誰か。","choices":["E・H・テイラー・ジュニア","ブッカー・ノー","ジェイコブ・ビーム","ジミー・ラッセル"],"answer":0,"explanation":"エドマンド・ヘインズ・テイラー・ジュニア(通称『大佐』)は消費者保護を目的とするボトルド・イン・ボンド法の成立に尽力した人物として知られ、現在のバッファロートレース敷地内にOFC蒸留所を建設した。彼の名を冠したコロネル E・H・テイラー・ジュニアというブランドも存在する。","difficulty":3},{"id":"USA-058","domain":"usa","level":"professional","category":"distillery","tags":["buffalo-trace","ofc","george-t-stagg","history"],"region":"usa-kentucky","question":"現在のバッファロートレース蒸留所の敷地がかつて名乗っていた歴史的名称として正しいものはどれか。","choices":["スティッツェル・ウェラー蒸留所","OFC蒸留所やジョージ・T・スタッグ蒸留所","バートン蒸留所","カービンズウェル蒸留所"],"answer":1,"explanation":"現在のバッファロートレースの敷地は、E・H・テイラー・ジュニアが建てたOFC蒸留所を起源とし、その後ジョージ・T・スタッグ蒸留所などの名称を経て現在の名称に至っている。","difficulty":3},{"id":"USA-059","domain":"usa","level":"professional","category":"regulation","tags":["prichards","lincoln-county-process-exemption","tennessee-law"],"region":"usa-tennessee","question":"テネシー州法上、リンカーン・カウンティ・プロセスの実施義務から例外的に除外されている蒸留所はどれか。","choices":["ジョージディッケル蒸留所","ジャックダニエル蒸留所","ベンジャミン・プリチャーズ蒸留所","コルセア蒸留所"],"answer":2,"explanation":"テネシー州法でテネシーウイスキーの要件としてリンカーン・カウンティ・プロセスが定められた際、既に木炭ろ過を行わない製法で操業していたベンジャミン・プリチャーズ蒸留所は例外(グランドファーザー条項)として適用除外された。","difficulty":4},{"id":"USA-060","domain":"usa","level":"professional","category":"history","tags":["21st-amendment","repeal","prohibition","history"],"region":null,"question":"禁酒法を廃止した合衆国憲法修正条項として正しいものはどれか。","choices":["修正第18条","修正第19条","修正第26条","修正第21条"],"answer":3,"explanation":"1933年に批准された修正第21条は、禁酒法を定めた修正第18条を廃止した。これにより州ごとの規制を条件としつつ酒類の製造・販売が再び合法化された。","difficulty":3},{"id":"USA-061","domain":"usa","level":"professional","category":"regulation","tags":["rye-malt-whiskey","mashbill","federal-regulation"],"region":null,"question":"連邦規則が定めるアメリカンウイスキーのカテゴリーのうち、『ライモルトウイスキー(Rye Malt Whiskey)』の原料規定として正しいものはどれか。","choices":["発芽させたライ麦を51%以上使用する","発芽させた大麦を51%以上使用する","未発芽のライ麦を80%以上使用する","小麦とライ麦を等量混合する"],"answer":0,"explanation":"ライモルトウイスキーは発芽させたライ麦(モルテッドライ)を51%以上使用するカテゴリーで、バーボンやライウイスキーなどと並ぶ連邦規則上の細分類の一つである。","difficulty":4},{"id":"USA-062","domain":"usa","level":"professional","category":"brand","tags":["w-l-weller","wheated-bourbon","buffalo-trace"],"region":"usa-kentucky","question":"W.L.ウェラーはどのような特徴を持つブランドか。","choices":["ライ麦100%のライウイスキーである","小麦を副原料に使うウィーテッドバーボンで、現在はバッファロートレースが製造する","テネシー州で製造されるバーボンである","禁酒法後に新規参入したクラフト蒸留所のブランドである"],"answer":1,"explanation":"W.L.ウェラーは副原料に小麦を用いるウィーテッドバーボンのブランドで、現在はバッファロートレース蒸留所が製造している。パピー・ヴァンウィンクル・シリーズと同系統のレシピを持つことでも知られる。","difficulty":3},{"id":"USA-063","domain":"usa","level":"professional","category":"people","tags":["fred-noe","jim-beam","seventh-generation"],"region":"usa-kentucky","question":"ジムビーム家7代目にあたるマスターディスティラーで、ブッカー・ノーの息子は誰か。","choices":["ブッカー・ノー","ジェイコブ・ビーム","フレッド・ノー","デビッド・ビーム"],"answer":2,"explanation":"フレッド・ノーはブッカー・ノーの息子でジムビーム家7代目のマスターディスティラーであり、現在は息子フレディ・ノーとともに同社の製造を担っている。","difficulty":3},{"id":"USA-064","domain":"usa","level":"professional","category":"distillery","tags":["bill-samuels-sr","makers-mark","wheated-recipe","company-lore"],"region":"usa-kentucky","question":"メーカーズマークの創業者ビル・サミュエルズ・シニアが、ライ麦の代わりに小麦を使うレシピを決めた際の逸話として知られているものはどれか。","choices":["ケンタッキーダービーで振る舞われたレシピを参考にした","スコットランドのモルト蒸留所から直接指導を受けた","前所有者の秘伝レシピをそのまま踏襲した","異なる穀物配合でパンを焼いて味を比較し、小麦を使ったパンを気に入ったとされる"],"answer":3,"explanation":"ビル・サミュエルズ・シニアは既存のバーボンとは異なる穏やかな味わいを目指し、異なる穀物配合でパンを焼いて食べ比べ、小麦を使ったパンの風味を気に入ったことから小麦を副原料に採用したという逸話が同社の創業ストーリーとして知られている。","difficulty":3},{"id":"USA-065","domain":"usa","level":"professional","category":"people","tags":["chris-morris","woodford-reserve","master-distiller"],"region":"usa-kentucky","question":"ウッドフォードリザーブのマスターディスティラーを長年務めた人物は誰か。","choices":["クリス・モリス","ハーラン・ウィートリー","チャック・コーワン","デニー・ポッター"],"answer":0,"explanation":"クリス・モリスはブラウンフォーマン社のマスターディスティラーとしてウッドフォードリザーブの製造を長年統括してきた人物である。","difficulty":3},{"id":"USA-066","domain":"usa","level":"professional","category":"production","tags":["column-still","doubler","distillation-equipment"],"region":null,"question":"多くのバーボン蒸留所で採用される一般的な蒸留設備の組み合わせとして正しいものはどれか。","choices":["銅製ポットスチル3基による多段蒸留のみ","連続式のカラムスチルと、それに続くダブラー(またはサンパー)と呼ばれる単式蒸留器","連続式カラムスチルのみで熟成せずボトリングする設備","減圧蒸留装置と凍結濃縮装置の組み合わせ"],"answer":1,"explanation":"多くのバーボン蒸留所では連続稼働できるカラムスチルで一次蒸留を行い、続いて『ダブラー』や『サンパー』と呼ばれる単式蒸留器で二次蒸留を行う組み合わせが一般的である。ウッドフォードリザーブのようにポットスチルのみで行う蒸留所は少数派である。","difficulty":3},{"id":"USA-067","domain":"usa","level":"professional","category":"business","tags":["kentucky-bourbon-trail","tourism","business"],"region":"usa-kentucky","question":"ケンタッキー州の複数の蒸留所を巡る観光ルートとして整備されている取り組みはどれか。","choices":["バーボン・ロード・マップ","ウイスキー・コリドー","ケンタッキー・バーボン・トレイル","ディスティラリー・サーキット"],"answer":2,"explanation":"ケンタッキー・バーボン・トレイルはケンタッキー蒸留酒協会が整備した観光ルートで、大手・小規模蒸留所を巡るスタンプラリー形式のプログラムとして州の観光業に大きく貢献している。","difficulty":3},{"id":"USA-068","domain":"usa","level":"professional","category":"history","tags":["1964-resolution","distinctive-product","congress","history"],"region":null,"question":"1964年、アメリカ連邦議会がバーボンを『アメリカ合衆国固有の産品』と宣言した措置として正しいものはどれか。","choices":["憲法修正条項の批准","最高裁判所の判例","大統領令の発令","両院一致決議(コンカレント・レゾリューション)の採択"],"answer":3,"explanation":"1964年、連邦議会は両院一致決議によりバーボンウイスキーを『アメリカ合衆国固有の産品』と宣言した。これは他国で『バーボン』を名乗る酒類を製造することを事実上排除する国際的な位置づけの根拠ともなっている。","difficulty":4},{"id":"USA-069","domain":"usa","level":"professional","category":"regulation","tags":["blended-straight-whiskey","age-statement","labeling"],"region":null,"question":"複数の蒸留所のストレートウイスキーを混和した『ブレンデッド・ストレートウイスキー』のラベル表示規定として正しいものはどれか。","choices":["使用した原酒のうち最も若い熟成年数を表示しなければならない","最も古い原酒の熟成年数のみ表示すればよい","熟成年数の表示は一切不要である","構成原酒の蒸留所名をすべて省略できる"],"answer":0,"explanation":"複数のストレートウイスキーを混和する場合、表示される熟成年数は使用した原酒の中で最も若いものの年数でなければならないと規定されている。","difficulty":3},{"id":"USA-070","domain":"usa","level":"professional","category":"distillery","tags":["heaven-hill","1996-fire","bernheim","history"],"region":"usa-kentucky","question":"1996年に大規模な火災に見舞われ、その後ルイビルの蒸留所(旧バーンハイム蒸留所)を取得して製造を続けたケンタッキーの蒸留酒メーカーはどれか。","choices":["バートン1792","ヘヴンヒル","ウィレット","メーカーズマーク"],"answer":1,"explanation":"ヘヴンヒルは1996年にバーズタウンの蒸留所が大規模火災で焼失したが、後にルイビルの旧バーンハイム蒸留所を取得して蒸留を再開し、熟成・瓶詰めはバーズタウンで続けている。","difficulty":3},{"id":"USA-071","domain":"usa","level":"professional","category":"brand","tags":["elijah-craig-brand","heaven-hill","legend-tie-in"],"region":"usa-kentucky","question":"ヘヴンヒルが展開する、エライジャ・クレイグの名を冠したバーボンブランドの由来として正しいものはどれか。","choices":["創業者一族の名字である","蒸留所が位置する郡の名前である","『バーボンの父』と語られる18世紀の牧師エライジャ・クレイグにちなむ","初めてボトルド・イン・ボンドを取得した銘柄の記念名である"],"answer":2,"explanation":"ヘヴンヒルのエライジャ・クレイグは、俗に『バーボンの父』と語られる牧師エライジャ・クレイグの名にちなんで名付けられたブランドである。","difficulty":3},{"id":"USA-072","domain":"usa","level":"professional","category":"ingredients","tags":["corn-whiskey","barrel-requirement","uncharred-oak"],"region":null,"question":"『コーンウイスキー』を熟成させる場合に用いる樽の規定として正しいものはどれか。","choices":["バーボンと同じく新品の焦がしオーク樽を用いなければならない","樽材はオークに限らずどの木材でもよい","熟成には陶器製の容器のみ使用が認められる","新品の場合は焦がしていないオーク樽、または以前に他の酒の熟成に使用した樽を用いる"],"answer":3,"explanation":"コーンウイスキーはバーボンと異なり新品の焦がし樽での熟成義務がなく、新品なら焦がしていないオーク樽、あるいは他の酒類の熟成に使用済みの樽を用いることが認められている。","difficulty":3},{"id":"USA-073","domain":"usa","level":"master","category":"regulation","tags":["barrel-entry-proof","1962","regulation-history"],"region":null,"question":"バーボンの樽詰め時アルコール度数の上限が110プルーフから現行の125プルーフに引き上げられた年として正しいものはどれか。","choices":["1962年","1938年","1897年","1984年"],"answer":0,"explanation":"1938年に設定された樽詰め時度数の上限110プルーフは、1962年の規則改正により現行の125プルーフへ引き上げられた。この変更は生産効率と樽材コストの観点から行われたとされる。","difficulty":5},{"id":"USA-074","domain":"usa","level":"master","category":"regulation","tags":["usmca","nafta","distinctive-product","international-trade"],"region":null,"question":"北米自由貿易協定(NAFTA)およびその後継のUSMCAにおいて、『バーボンウイスキー』と『テネシーウイスキー』が国際的にどのように位置づけられているか。","choices":["加盟国であればどこで製造しても同名称を名乗れる","アメリカ合衆国固有の産品として、他の締約国での同名称製品の製造・販売が認められない","カナダのみ例外的に製造が認められている","協定上は特に言及されていない"],"answer":1,"explanation":"NAFTAおよびその後継であるUSMCAでは、バーボンウイスキーとテネシーウイスキーはアメリカ合衆国固有の産品として認識されており、カナダやメキシコで同名称を用いた酒類の製造・販売を認めない取り決めとなっている。","difficulty":5},{"id":"USA-075","domain":"usa","level":"master","category":"distillery","tags":["michters","bombergers","pennsylvania","brand-history"],"region":"usa-other","question":"現在ケンタッキー州で操業するミクターズ(Michter's)のブランド名の起源となった、かつてペンシルベニア州にあった蒸留所として正しいものはどれか。","choices":["スティッツェル・ウェラー蒸留所","OFC蒸留所","ボンバーガーズ蒸留所","バートン蒸留所"],"answer":2,"explanation":"ミクターズの名はペンシルベニア州シェーファーズタウンにあったボンバーガーズ蒸留所(後のミクターズ蒸留所)に由来する。同蒸留所は1990年に閉鎖され、現在のミクターズは商標を取得した別会社がケンタッキー州ルイビル近郊に新設した蒸留所で製造している。","difficulty":5},{"id":"USA-076","domain":"usa","level":"master","category":"distillery","tags":["willett","kentucky-bourbon-distillers","family-owned","bardstown"],"region":"usa-kentucky","question":"1936年創業で、現在もクルスビーン家が経営するバーズタウンの独立系蒸留所はどれか。","choices":["バートン1792","バーズタウン・バーボン・カンパニー","ラックスロウ蒸留所","ウィレット(ケンタッキー・バーボン・ディスティラーズ)"],"answer":3,"explanation":"ウィレットは1936年創業のバーズタウンの蒸留所で、ケンタッキー・バーボン・ディスティラーズという社名でも知られ、現在もクルスビーン家が経営する独立系蒸留所である。","difficulty":4},{"id":"USA-077","domain":"usa","level":"master","category":"distillery","tags":["barton-1792","kentucky-statehood","sazerac"],"region":"usa-kentucky","question":"サゼラック社が所有するバーズタウンの蒸留所で、ブランド名の『1792』がケンタッキー州にとって持つ意味として正しいものはどれか。","choices":["ケンタッキーが合衆国15番目の州として認められた年","バートン蒸留所の創業年","禁酒法が撤廃された年","バーボンの定義が初めて法制化された年"],"answer":0,"explanation":"1792年はケンタッキーがアメリカ合衆国15番目の州として認められた年であり、バートン蒸留所が展開する『1792』ブランドの名称はこの州昇格の年にちなんでいる。","difficulty":4},{"id":"USA-078","domain":"usa","level":"master","category":"distillery","tags":["bardstown-bourbon-company","contract-distilling","new-distillery"],"region":"usa-kentucky","question":"2014年に設立され、自社ブランドの製造に加え他社への受託蒸留(コントラクト・ディスティリング)も手がけるバーズタウンの新興蒸留所はどれか。","choices":["ヘヴンヒル","バーズタウン・バーボン・カンパニー","スティッツェル・ウェラー","OFC蒸留所"],"answer":1,"explanation":"バーズタウン・バーボン・カンパニーは2014年に設立された比較的新しい蒸留所で、自社ブランドの展開だけでなく他のウイスキーブランドのための受託蒸留も行う事業モデルで知られる。","difficulty":4},{"id":"USA-079","domain":"usa","level":"master","category":"history","tags":["national-bourbon-heritage-month","2007","congress"],"region":null,"question":"アメリカ連邦議会が9月を『ナショナル・バーボン・ヘリテージ・マンス』と定めたのはどの年か。","choices":["1964年","1933年","2007年","1897年"],"answer":2,"explanation":"2007年、連邦議会は9月を『ナショナル・バーボン・ヘリテージ・マンス』として定め、バーボンがアメリカの文化・産業に果たす役割を記念する月間とした。","difficulty":5},{"id":"USA-080","domain":"usa","level":"master","category":"regulation","tags":["27-cfr-part-5","standards-of-identity","ttb","regulation"],"region":null,"question":"バーボンを含む蒸留酒の『規格の基準(Standards of Identity)』を定めている連邦規則の条項として正しいものはどれか。","choices":["21 CFR Part 101","19 CFR Part 4","26 CFR Part 40","27 CFR Part 5"],"answer":3,"explanation":"蒸留酒の規格の基準は財務省酒類たばこ税貿易局(TTB)が管轄する27 CFR Part 5に定められており、バーボンやライウイスキーなど各カテゴリーの原料・熟成・度数要件はこの条項に基づく。","difficulty":5},{"id":"USA-081","domain":"usa","level":"master","category":"chemistry","tags":["vanillin","lignin","char-chemistry","maturation"],"region":null,"question":"樽の内側を焦がす工程で、木材のリグニンが熱分解することにより生じ、バニラのような香りの主要因となる化合物はどれか。","choices":["バニリン","フルフラール","タンニン","エタノール"],"answer":0,"explanation":"樽材を焦がす際、木材の主要成分であるリグニンが熱分解することでバニリンが生成され、これが熟成中にウイスキーへ溶け出してバニラ様の甘い香りをもたらす主要因の一つとなる。","difficulty":4},{"id":"USA-082","domain":"usa","level":"master","category":"chemistry","tags":["red-layer","caramelized-wood-sugar","char-chemistry"],"region":null,"question":"樽の焦がし層のすぐ下に形成される、カラメル化した木糖を多く含む層を俗に何と呼ぶか。","choices":["ブラックレイヤー","レッドレイヤー","ホワイトレイヤー","アンバーレイヤー"],"answer":1,"explanation":"樽の炭化層(チャー)のすぐ下には、加熱によりカラメル化した木材由来の糖分を多く含む層が形成され、これは俗に『レッドレイヤー』と呼ばれる。この層はウイスキーの色や甘い風味の抽出に大きく関わるとされる。","difficulty":5},{"id":"USA-083","domain":"usa","level":"master","category":"maturation","tags":["rickhouse","rackhouse","barrel-placement","aging-speed"],"region":"usa-kentucky","question":"ケンタッキーの伝統的な熟成庫(リックハウス/ラックハウス)における樽の配置と熟成の関係として一般に語られるものはどれか。","choices":["上階と下階で熟成速度に差はほとんどない","地下階の樽が最も熟成が早い","上階は気温変化が大きく熟成が早く進みやすい","樽の配置による熟成速度の差は存在しない"],"answer":2,"explanation":"木造の熟成庫(リックハウス)は階層によって温度変化の幅が異なり、屋根に近い上階ほど夏冬の寒暖差が大きく熟成が早く進みやすいとされる。このため多くの蒸留所が階層をローテーションさせたり、階層ごとにブレンドしたりする工夫を行う。","difficulty":4},{"id":"USA-084","domain":"usa","level":"master","category":"people","tags":["harlen-wheatley","buffalo-trace","master-distiller"],"region":"usa-kentucky","question":"2005年からバッファロートレース蒸留所のマスターディスティラーを務める人物は誰か。","choices":["ジミー・ラッセル","フレッド・ノー","クリス・モリス","ハーラン・ウィートリー"],"answer":3,"explanation":"ハーラン・ウィートリーは2005年 転売市場でも高額取引されている。","difficulty":4},{"id":"USA-089","domain":"usa","level":"master","category":"distillery","tags":["george-dickel","cold-mellowing","charcoal-filtering","comparison"],"region":"usa-tennessee","question":"ジョージディッケルの木炭ろ過工程が、ジャックダニエルのリンカーン・カウンティ・プロセスと異なるとされる点はどれか。","choices":["蒸留液を冷却してから木炭層に通す『コールドメロウイング』を行う","木炭を使わずセラミックフィルターでろ過する","ろ過を瓶詰め直前に行う","樽詰め前ではなく樽出し後にろ過を行う"],"answer":0,"explanation":"ジョージディッケルは蒸留液を一度冷却してから木炭層に通す『コールドメロウイング』を行うとされ、常温に近い状態で木炭ろ過を行うジャックダニエルとの違いとしてしばしば語られる。","difficulty":4},{"id":"USA-090","domain":"usa","level":"master","category":"history","tags":["national-distillers","medicinal-spirits","prohibition","industry-consolidation"],"region":null,"question":"禁酒法期間中、医薬品用途のウイスキー在庫が集約された結果、戦後のバーボン産業の再編に影響を与えたとされる企業合同はどれか。","choices":["ディアジオ・ノースアメリカ","ナショナル・ディスティラーズ(アメリカン・メディシナル・スピリッツ)","サゼラック・カンパニー","ブラウンフォーマン・コーポレーション"],"answer":1,"explanation":"禁酒法期間中、複数の蒸留所在庫を集約したアメリカン・メディシナル・スピリッツ(後のナショナル・ディスティラーズ)のような企業合同が薬用ウイスキーの供給を担い、禁酒法解禁後の業界再編にも大きな影響を及ぼしたとされる。","difficulty":5},{"id":"WLD-001","domain":"wld","level":"expert","category":"regulation","tags":["canada","legal-definition","minimum-aging","regulation"],"region":"canada","question":"カナダのウイスキーに関する法規で定められた最低熟成期間として正しいものはどれか。","choices":["3年","2年","4年","5年"],"answer":0,"explanation":"カナダの規則ではウイスキーは容量700リットル以下の木製容器(small wood)で最低3年熟成させることが義務付けられている。スコッチやアイリッシュウイスキーの規定と同様に「3年以上」が国際的に一般的な最低熟成基準となっている。","difficulty":1},{"id":"WLD-002","domain":"wld","level":"expert","category":"history","tags":["crown-royal","seagram","history","canada"],"region":"canada","question":"カナダを代表するブレンデッドウイスキー「クラウン・ローヤル」が1939年に発売された契機として正しいものはどれか。","choices":["カナダ建国70周年を記念して","英国王ジョージ6世夫妻のカナダ訪問を記念して","第二次世界大戦の終結を記念して","シーグラム社の創業50周年を記念して"],"answer":1,"explanation":"クラウン・ローヤルはシーグラム社が1939年、英国王ジョージ6世とエリザベス王妃のカナダ公式訪問を記念して製造した。紫色のベルベット袋に入ったボトルパッケージでも知られる。","difficulty":2},{"id":"WLD-003","domain":"wld","level":"expert","category":"distillery","tags":["crown-royal","gimli","manitoba","distillery"],"region":"canada","question":"クラウン・ローヤルが現在も生産されているシーグラム由来の蒸留所が所在するカナダの州はどれか。","choices":["オンタリオ州","ブリティッシュコロンビア州","マニトバ州","ケベック州"],"answer":2,"explanation":"クラウン・ローヤルはマニトバ州ギムリ(Gimli)にある蒸留所で生産されている。ギムリ蒸留所はシーグラム社が稼働させ、同社解体後も生産拠点として存続した。","difficulty":1},{"id":"WLD-004","domain":"wld","level":"expert","category":"people","tags":["canadian-club","hiram-walker","history","walkerville"],"region":"canada","question":"カナディアン・クラブを生み出した人物として正しいものはどれか。","choices":["サム・ブロンフマン","ジョセフ・E・シーグラム","J.P.ワイザー","ハイラム・ウォーカー"],"answer":3,"explanation":"カナディアン・クラブはハイラム・ウォーカーが1858年頃にオンタリオ州ウォーカーヴィルで創業した蒸留所に由来する。「クラブ」の名は当時の高級社交クラブで愛飲されたことにちなむ。","difficulty":2},{"id":"WLD-005","domain":"wld","level":"expert","category":"regulation","tags":["rye-whisky","canada","regulation","terminology"],"region":"canada","question":"カナダの法規において「ライウイスキー(Rye Whisky)」という表示について正しい説明はどれか。","choices":["「カナディアンウイスキー」とほぼ同義語として用いられる","ライ麦を51%以上使用したウイスキーのみを指す","ライ麦100%のウイスキーのみに許される呼称である","スコットランド産のライ麦ウイスキーを指す"],"answer":0,"explanation":"アメリカのライウイスキーはマッシュビルにライ麦51%以上を義務付けるが、カナダでは「ライウイスキー」と「カナディアンウイスキー」は法律上ほぼ同義語であり、原料にライ麦を必ずしも多く含む必要はない。","difficulty":1},{"id":"WLD-006","domain":"wld","level":"expert","category":"blending","tags":["base-whisky","flavouring-whisky","canada","blending"],"region":"canada","question":"カナディアンウイスキーの伝統的な製法で、ほぼ中性でクセの少ない大量生産用の原酒を指す用語はどれか。","choices":["フレーバリングウイスキー","ベースウイスキー","シングルバレルウイスキー","ボトムウイスキー"],"answer":1,"explanation":"カナディアンウイスキーは、風味の主体となる「フレーバリングウイスキー」とほぼ中性でクセの少ない「ベースウイスキー」を別々に蒸留・熟成し、ブレンドすることで仕上げる伝統的製法を取る。","difficulty":2},{"id":"WLD-007","domain":"wld","level":"expert","category":"production","tags":["flavouring-whisky","canada","rye","production"],"region":"canada","question":"カナディアンウイスキーにおける「フレーバリングウイスキー」の一般的な特徴として正しいものはどれか。","choices":["連続式蒸留機のみで蒸留され純度が非常に高い","法律上は熟成義務がない","ライ麦などの割合を高め風味を強く出すよう造られる","主にトウモロコシ100%で造られる"],"answer":2,"explanation":"フレーバリングウイスキーはライ麦などの比率を高め、単式蒸留(ポットスチル)などを併用して風味成分(コンジェナー)を多く残すように造られ、ベースウイスキーとブレンドして全体の香味を決定づける。","difficulty":1},{"id":"WLD-008","domain":"wld","level":"expert","category":"history","tags":["seagram","waterloo","ontario","history"],"region":"canada","question":"ジョセフ・E・シーグラム社の蒸留所が創業した都市として正しいものはどれか。","choices":["ケベック州モントリオール","マニトバ州ウィニペグ","オンタリオ州トロント","オンタリオ州ウォータールー"],"answer":3,"explanation":"シーグラム社はオンタリオ州ウォータールーの蒸留所を起源とし、ジョセフ・E・シーグラムが経営を引き継いで一族の名を冠した企業に発展させた。","difficulty":2},{"id":"WLD-009","domain":"wld","level":"expert","category":"business","tags":["seagram","diageo","pernod-ricard","business","history"],"region":"canada","question":"2000年前後にシーグラム社の酒類事業が解体された際、主要ブランドの多くを取得した企業として正しい組み合わせはどれか。","choices":["ディアジオとペルノ・リカール","バカルディとブラウン・フォーマン","サントリーとバカルディ","ペルノ・リカールとサントリー"],"answer":0,"explanation":"シーグラム社の飲料事業は2000年前後に解体され、クラウン・ローヤルなど主要ブランドの多くはディアジオとペルノ・リカールに分割取得された。","difficulty":1},{"id":"WLD-010","domain":"wld","level":"expert","category":"regulation","tags":["canada","regulation","abv","bottling"],"region":"canada","question":"カナダの規則でウイスキーとして販売する際に定められている最低アルコール度数はどれか。","choices":["37.5%","40%","43%","45%"],"answer":1,"explanation":"カナダの規則ではウイスキーは40%(80プルーフ)以上のアルコール度数で瓶詰めされることが義務付けられている。これはスコッチやアメリカンウイスキーの一般的な最低基準とも一致する。","difficulty":2},{"id":"WLD-011","domain":"wld","level":"expert","category":"regulation","tags":["canada","regulation","small-wood","maturation"],"region":"canada","question":"カナダの規則における熟成用容器「small wood」の一般的な条件として正しいものはどれか。","choices":["新樽であること","必ずオーク材であること","容量700リットルを超えないこと","内容量が200リットル以下であること"],"answer":2,"explanation":"カナダの規則では熟成に用いる木製容器(small wood)は容量700リットルを超えないことが定められており、この条件を満たす樽で最低3年間熟成させる必要がある。","difficulty":1},{"id":"WLD-012","domain":"wld","level":"expert","category":"regulation","tags":["canada","regulation","legal-definition","production"],"region":"canada","question":"カナダの規則で「カナディアンウイスキー」を名乗るために満たすべき条件として正しいものはどれか。","choices":["原料の大麦がカナダ産であること","蒸留のみカナダ国内で行えばよい","瓶詰めのみカナダ国内で行えばよい","糖化・蒸留・熟成のすべてをカナダ国内で行うこと"],"answer":3,"explanation":"カナディアンウイスキーを名乗るには、糖化(マッシング)、発酵、蒸留、熟成のすべての工程をカナダ国内で行うことが規則で義務付けられている。","difficulty":2},{"id":"WLD-013","domain":"wld","level":"expert","category":"distillery","tags":["kavalan","yilan","taiwan","distillery"],"region":"taiwan","question":"台湾のウイスキー蒸留所「カバラン(Kavalan)」が所在する県として正しいものはどれか。","choices":["宜蘭県","台北市","南投県","高雄市"],"answer":0,"explanation":"カバラン蒸留所はKing Car Groupにより台湾北東部の宜蘭県に設立された。名称は同地域の先住民族カバラン族に由来する。","difficulty":1},{"id":"WLD-014","domain":"wld","level":"expert","category":"business","tags":["kavalan","king-car-group","taiwan","business"],"region":"taiwan","question":"カバラン蒸留所を運営する企業グループとして正しいものはどれか。","choices":["台湾煙酒公司","金車集団(King Car Group)","三得利(サントリー)台湾法人","台湾ビール公司"],"answer":1,"explanation":"カバラン蒸留所は飲料・食品事業を展開する金車集団(King Car Group)によって設立された民間企業のウイスキー蒸留所である。","difficulty":2},{"id":"WLD-015","domain":"wld","level":"expert","category":"maturation","tags":["taiwan","maturation","climate","angels-share"],"region":"taiwan","question":"台湾のような亜熱帯気候がウイスキーの熟成に与える一般的な影響として正しいものはどれか。","choices":["熟成が遅くなり天使の分け前が減少する","熟成速度に変化はないが色だけ濃くなる","熟成が早まり天使の分け前が増加する","熟成には全く影響しない"],"answer":2,"explanation":"高温多湿な亜熱帯気候では樽内での化学反応や木材からの成分抽出が促進され熟成が早まる一方、蒸発によるアルコール等の損失(天使の分け前)もスコットランドなどに比べて大幅に増加する。","difficulty":1},{"id":"WLD-016","domain":"wld","level":"expert","category":"distillery","tags":["omar","nantou","taiwan-tobacco-liquor","distillery"],"region":"taiwan","question":"台湾煙酒公司(TTL)が運営する南投蒸留所が生産するシングルモルトウイスキーブランドはどれか。","choices":["カバラン(Kavalan)","バランタイン","タロ","オマー(Omar)"],"answer":3,"explanation":"南投蒸留所は国営の台湾煙酒公司(Taiwan Tobacco & Liquor Corporation)が運営し、シングルモルトウイスキーブランド「オマー(Omar)」を生産している。","difficulty":2},{"id":"WLD-017","domain":"wld","level":"expert","category":"region-knowledge","tags":["nantou","taiwan","geography","distillery"],"region":"taiwan","question":"南投蒸留所が所在する台湾の行政区分として正しいものはどれか。","choices":["南投県","宜蘭県","花蓮県","嘉義県"],"answer":0,"explanation":"南投蒸留所は台湾中部の南投県に位置する。同県は台湾で唯一海に面していない内陸県で、山間の気候がウイスキー熟成に用いられている。","difficulty":1},{"id":"WLD-018","domain":"wld","level":"expert","category":"brand","tags":["kavalan","solist","single-cask","brand"],"region":"taiwan","question":"カバランが手掛けるシングルカスク・カスクストレングス仕様のシリーズ名として正しいものはどれか。","choices":["キング・カー・コンセルトゥ","ソリスト(Solist)","ヴィンテージ・トリビュート","タロコ・エディション"],"answer":1,"explanation":"「ソリスト(Solist)」はカバランが展開するシングルカスク・カスクストレングスのプレミアムシリーズで、シェリー樽やポートワイン樽など複数のカスクタイプで展開されている。","difficulty":2},{"id":"WLD-019","domain":"wld","level":"expert","category":"history","tags":["taiwan","regulation","history","business"],"region":"taiwan","question":"台湾で民間企業によるウイスキー生産が本格的に可能になった背景として正しいものはどれか。","choices":["19世紀の英国植民地統治の名残","第二次世界大戦後の米軍統治の影響","酒類専売制度の緩和とWTO加盟に伴う規制緩和","1980年代の観光産業振興策"],"answer":2,"explanation":"台湾ではかつて酒類の生産が政府専売であったが、2002年のWTO加盟前後に規制が緩和され、民間企業による酒類製造が可能となったことでカバランなどの民間蒸留所設立が実現した。","difficulty":1},{"id":"WLD-020","domain":"wld","level":"expert","category":"distillery","tags":["amrut","bangalore","india","distillery"],"region":"india","question":"インドのシングルモルトウイスキー「アムルット(Amrut)」の蒸留所が所在する都市として正しいものはどれか。","choices":["ムンバイ","ゴア","デリー","バンガロール"],"answer":3,"explanation":"アムルットはインド南部の都市バンガロール(ベンガルール)に蒸留所を構えるアムルット・ディスティラリーズ社の銘柄である。","difficulty":2},{"id":"WLD-021","domain":"wld","level":"expert","category":"distillery","tags":["paul-john","goa","india","distillery"],"region":"india","question":"「ポール・ジョン(Paul John)」ウイスキーの蒸留所が所在するインドの州として正しいものはどれか。","choices":["ゴア州","ケーララ州","タミル・ナードゥ州","パンジャブ州"],"answer":0,"explanation":"ポール・ジョンはジョン・ディスティラリーズ社によりインド西海岸のゴア州で生産されているシングルモルトウイスキーである。","difficulty":1},{"id":"WLD-022","domain":"wld","level":"expert","category":"ingredients","tags":["india","barley","ingredients","punjab"],"region":"india","question":"アムルットやポール・ジョンで用いられる大麦の主な産地として正しいものはどれか。","choices":["南インドのタミル・ナードゥ地方","ヒマラヤ山麓のパンジャブ・ラジャスタン地方","北海道","スコットランド産の輸入大麦のみ"],"answer":1,"explanation":"インドのシングルモルトの多くはヒマラヤ山麓に近いパンジャブ州やラジャスタン州で栽培された大麦を主原料としている。","difficulty":2},{"id":"WLD-023","domain":"wld","level":"expert","category":"regulation","tags":["india","imfl","molasses","regulation","culture"],"region":"india","question":"インド国内で流通する「ウイスキー」の多くが、国際的な定義(EU等)で正式なウイスキーと認められない主な理由はどれか。","choices":["熟成年数が不足しているため","すべて無濾過で出荷されているため","穀物ではなく糖蜜(モラセス)を原料とした蒸留酒がベースとなっているため","カスクストレングスで出荷されているため"],"answer":2,"explanation":"インド国内で大量に消費される「ウイスキー」(いわゆるIMFL: Indian Made Foreign Liquor)の多くは、穀物ではなくサトウキビ由来の糖蜜(モラセス)を原料とする中性スピリッツをベースとしており、EUなど国際的な穀物原料の定義を満たさない。","difficulty":1},{"id":"WLD-024","domain":"wld","level":"expert","category":"business","tags":["india","market","business","culture"],"region":"india","question":"消費量ベースで見た場合、世界最大の「ウイスキー」市場とされる国として正しいものはどれか。","choices":["アメリカ合衆国","日本","イギリス","インド"],"answer":3,"explanation":"インドはIMFLと呼ばれる糖蜜ベースの製品を含む広義の「ウイスキー」の消費量において、量的には世界最大の市場とされる。","difficulty":2},{"id":"WLD-025","domain":"wld","level":"expert","category":"blending","tags":["amrut","amrut-fusion","peated","blending"],"region":"india","question":"アムルットの代表銘柄「アムルット・フュージョン」の特徴として正しいものはどれか。","choices":["インド産大麦とスコットランド産ピーテッド大麦をブレンドしている","100%輸入モルトのみを使用している","糖蜜由来のスピリッツを一部使用している","バーボン由来のトウモロコシを主原料としている"],"answer":0,"explanation":"アムルット・フュージョンは、インド産の大麦モルトとスコットランド産のピーテッド大麦モルトを組み合わせて造られる代表銘柄で、国際的にも高い評価を受けた。","difficulty":1},{"id":"WLD-026","domain":"wld","level":"expert","category":"maturation","tags":["india","maturation","climate","angels-share"],"region":"india","question":"インドの高温多湿な気候が熟成に与える影響として正しいものはどれか。","choices":["天使の分け前がスコットランドよりも小さくなる","天使の分け前がスコットランドより著しく大きくなる","気候の影響は無視できるほど小さい","熟成が極端に遅くなる"],"answer":1,"explanation":"インドの高温多湿な気候下では熟成が大幅に促進される一方、樽からの蒸発量(天使の分け前)もスコットランドに比べ著しく大きくなる。","difficulty":2},{"id":"WLD-027","domain":"wld","level":"expert","category":"region-knowledge","tags":["tasmania","australia","region-knowledge"],"region":"australia","question":"現代オーストラリアのウイスキー産業の中心地として広く知られる州はどれか。","choices":["ニューサウスウェールズ州","クイーンズランド州","タスマニア州","西オーストラリア州"],"answer":2,"explanation":"冷涼な気候を持つタスマニア州は、ビル・ラークらによる蒸留所設立を契機に現代オーストラリアウイスキー産業の中心地となった。","difficulty":1},{"id":"WLD-028","domain":"wld","level":"expert","category":"people","tags":["bill-lark","lark-distillery","people","history"],"region":"australia","question":"「オーストラリアン・ウイスキーの父」と称され、タスマニアでラーク蒸留所を設立した人物はどれか。","choices":["パトリック・マグワイア","ケイシー・オーバーヒル","デビッド・ベイン","ビル・ラーク"],"answer":3,"explanation":"ビル・ラークは1992年にタスマニアの蒸留規制緩和を働きかけたのちラーク蒸留所を設立し、「オーストラリアンウイスキーの父」と称される。","difficulty":2},{"id":"WLD-029","domain":"wld","level":"expert","category":"distillery","tags":["lark-distillery","hobart","tasmania","distillery"],"region":"australia","question":"ラーク蒸留所が拠点を置くタスマニアの都市として正しいものはどれか。","choices":["ホバート近郊","ロンセストン近郊","バーニー近郊","デボンポート近郊"],"answer":0,"explanation":"ラーク蒸留所はタスマニア州都ホバート近郊に拠点を置く。","difficulty":1},{"id":"WLD-030","domain":"wld","level":"expert","category":"distillery","tags":["sullivans-cove","cambridge","tasmania","distillery"],"region":"australia","question":"サリバンズ・コーヴ蒸留所が所在するタスマニアの地域として正しいものはどれか。","choices":["ロンセストン","ケンブリッジ(ホバート近郊)","バララット","ジーロング"],"answer":1,"explanation":"サリバンズ・コーヴ蒸留所はホバート近郊のケンブリッジに所在するタスマニアの蒸留所である。","difficulty":2},{"id":"WLD-031","domain":"wld","level":"expert","category":"production","tags":["australia","cask-size","maturation","production"],"region":"australia","question":"オーストラリアの多くの蒸留所が小容量の樽を用いる主な理由として正しいものはどれか。","choices":["法律で大容量樽の使用が禁止されているため","輸送コストを下げるため","気候や生産規模に応じ熟成を早め効率よく風味を得るため","スコットランドから中古の小樽しか輸入できないため"],"answer":2,"explanation":"オーストラリアの蒸留所は比較的小規模な生産が多く、小容量の樽を用いることで木材との接触面積を増やし、熟成を効率的に進める狙いがある。","difficulty":1},{"id":"WLD-032","domain":"wld","level":"expert","category":"distillery","tags":["penderyn","wales","brecon-beacons","distillery"],"region":"england-wales","question":"ウェールズ初の近代的ウイスキー蒸留所とされる「ペンダーウィン(Penderyn)」が所在する地域として正しいものはどれか。","choices":["スノードニア","カーディフ市内","スウォンジー近郊","ブレコン・ビーコンズ"],"answer":3,"explanation":"ペンダーウィン蒸留所はウェールズ南部のブレコン・ビーコンズ国立公園付近に位置し、近代におけるウェールズ初のウイスキー蒸留所とされる。","difficulty":2},{"id":"WLD-033","domain":"wld","level":"expert","category":"history","tags":["english-whisky-co","st-georges","norfolk","history"],"region":"england-wales","question":"イギリス・ノーフォーク州のセント・ジョージズ蒸留所(The English Whisky Co.)について正しい説明はどれか。","choices":["100年以上ぶりに設立されたイングランドのウイスキー蒸留所である","スコットランドのシングルモルトのみを瓶詰めする会社である","アイルランドのポットスチルウイスキーを生産している","王室御用達として設立された蒸留所である"],"answer":0,"explanation":"セント・ジョージズ蒸留所は2006年に設立され、100年以上ぶりに操業したイ pert","category":"distillery","tags":["warenghem","france","brittany","distillery"],"region":"europe-other","question":"フランスのウイスキー蒸留所ワレンゲム(Warenghem)が所在する地域として正しいものはどれか。","choices":["アルザス地方","ボルドー近郊","ブルターニュ地方","ノルマンディー地方"],"answer":2,"explanation":"ワレンゲム蒸留所はフランス北西部のブルターニュ地方に所在し、「アルモリック(Armorik)」などのブランドでウイスキーを生産する老舗蒸留所である。","difficulty":1},{"id":"WLD-040","domain":"wld","level":"expert","category":"culture","tags":["world-whisky","five-great-whiskies","culture","region-knowledge"],"region":"world-other","question":"伝統的に「世界5大ウイスキー」と呼ばれる生産国・地域の組み合わせとして正しいものはどれか。","choices":["スコットランド・アイルランド・インド・台湾・日本","アメリカ・カナダ・オーストラリア・イングランド・日本","スコットランド・アイルランド・アメリカ・オーストラリア・台湾","スコットランド・アイルランド・アメリカ・カナダ・日本"],"answer":3,"explanation":"「世界5大ウイスキー」とは伝統的にスコットランド、アイルランド、アメリカ、カナダ、日本の5つの生産国を指す表現として広く用いられてきた。","difficulty":2},{"id":"WLD-041","domain":"wld","level":"professional","category":"regulation","tags":["canada","regulation","flavouring","blending"],"region":"canada","question":"カナダの規則でカナディアンウイスキーに認められている、風味づけのための他の蒸留酒等の添加割合の上限として正しいものはどれか。","choices":["9.09%(11分の1)","1.5%","20%","49%"],"answer":0,"explanation":"カナダの規則では、最低2年熟成した他の蒸留酒やワインなどを、全体量の9.09%(11分の1)を上限として風味づけに添加することが認められている。","difficulty":3},{"id":"WLD-042","domain":"wld","level":"professional","category":"brand","tags":["alberta-distillers","rye-100","canada","brand"],"region":"canada","question":"アルバータ・ディスティラーズが得意とすることで知られる、ライ麦を100%使用したウイスキーの通称として正しいものはどれか。","choices":["カナディアンミスト","アルバータプレミアム(Alberta Premium)","ブラックベルベット","シーグラムVO"],"answer":1,"explanation":"アルバータ州カルガリーのアルバータ・ディスティラーズはライ麦100%のマッシュビルによるウイスキー造りで知られ、代表銘柄にアルバータプレミアムがある。","difficulty":4},{"id":"WLD-043","domain":"wld","level":"professional","category":"business","tags":["corby","wisers","lot-no-40","business"],"region":"canada","question":"J.P.ワイザーやロット・ナンバー40、パイク・クリークなどのブランドを展開するカナダの蒸留・飲料会社として正しいものはどれか。","choices":["ハイウッド・ディスティラーズ","ディアジオ・カナダ","コルビー・スピリット・アンド・ワイン(Corby)","キング・カー・グループ"],"answer":2,"explanation":"J.P.ワイザーやロット・ナンバー40、パイク・クリークなどはコルビー・スピリット・アンド・ワイン(Cor
