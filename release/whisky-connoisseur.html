℃前後、あるいはそれ以下","常温(20℃前後)","100℃近く"],"answer":1,"explanation":"チルフィルタレーションでは通常ウイスキーを0℃前後、場合によってはそれ以下まで冷却してから濾過し、低温で析出する成分を除去する。","difficulty":3},{"id":"PRD2-067","domain":"prd2","level":"professional","category":"production","tags":["chill-filtration","haze","fatty-acids","esters"],"region":null,"question":"チルフィルタレーションで主に取り除かれる、加水や冷却時に白濁(ヘイズ)を引き起こす原因物質は何か。","choices":["エタノール","水分","脂肪酸やエステルなどの油性成分","カラメル色素"],"answer":2,"explanation":"チルフィルタレーションで主に除去されるのは脂肪酸やエステルなどの油性成分で、これらは低温や加水時に結晶化して白濁(ヘイズ)を引き起こす原因となる。","difficulty":3},{"id":"PRD2-068","domain":"prd2","level":"professional","category":"production","tags":["non-chill-filtered","abv-threshold","bottling-style"],"region":null,"question":"ノンチルフィルタード(非冷却濾過)で瓶詰めされるウイスキーの多くが採用しているアルコール度数の目安はどれか。","choices":["30%前後","20%以下","100%","46%以上"],"answer":3,"explanation":"ノンチルフィルタードのウイスキーの多くは46%以上のアルコール度数で瓶詰めされることが多く、これは高いアルコール度数自体が濁りを抑制する効果を持つためとされる。","difficulty":3},{"id":"PRD2-069","domain":"prd2","level":"professional","category":"regulation","tags":["scotch-whisky-regulations-2009","e150a","additive-rule"],"region":null,"question":"2009年の英国「スコッチ・ウイスキー規則」において、スコッチウイスキーへの添加が明確に認められている物質は何か。","choices":["カラメル色素(E150a)のみ","香料と甘味料","グリセリン","保存料全般"],"answer":0,"explanation":"2009年の英国スコッチ・ウイスキー規則では、スコッチウイスキーに添加が認められている物質はカラメル色素(E150a)のみと明確に定められている。","difficulty":4},{"id":"PRD2-070","domain":"prd2","level":"professional","category":"production","tags":["cask-strength","abv-range","bottling"],"region":null,"question":"カスクストレングスとして瓶詰めされるウイスキーのアルコール度数として、一般的に見られる範囲はどれか。","choices":["およそ20〜30%程度","およそ50〜65%程度","正確に40%固定","100%(無水アルコール)"],"answer":1,"explanation":"カスクストレングス製品のアルコール度数は樽の種類や熟成年数によって幅があるが、おおむね50〜65%程度に収まることが多い。","difficulty":3},{"id":"PRD2-071","domain":"prd2","level":"professional","category":"production","tags":["single-cask","cask-strength","non-chill-filtered","bottling-combination"],"region":null,"question":"シングルカスク製品の多くが併せて採用する傾向にある瓶詰め仕様として、正しい組み合わせはどれか。","choices":["40%加水・チルフィルタード","カラメル色素多用・低アルコール","カスクストレングス・ノンチルフィルタード","連続蒸留原酒のみ使用"],"answer":2,"explanation":"シングルカスク製品は個性を強く打ち出す目的から、カスクストレングスかつノンチルフィルタードで瓶詰めされる傾向が強い。","difficulty":3},{"id":"PRD2-072","domain":"prd2","level":"professional","category":"production","tags":["worm-tub","mortlach","dalwhinnie","condenser-examples"],"region":null,"question":"現在もワームタブ式コンデンサーを使用していることで知られる蒸留所として適切な組み合わせはどれか。","choices":["グレンモーレンジィ、オーヘントッシャン","グレンフィディック、グレンリベット","ザ・マッカラン、ハイランドパーク","モートラック、ダルウィニー"],"answer":3,"explanation":"モートラックやダルウィニーは現在もワームタブ式コンデンサーを使用していることで知られ、硫黄香を伴う重厚な酒質の一因とされている。","difficulty":4},{"id":"PRD2-073","domain":"prd2","level":"master","category":"history","tags":["robert-stein","patent-1826","precise-date"],"region":null,"question":"ロバート・スタインが連続式蒸留機の特許を取得したとされる年はいつか。","choices":["1826年","1830年","1850年","1800年"],"answer":0,"explanation":"ロバート・スタインが連続式蒸留機の特許を取得したのは1826年とされる。この発明はイーニアス・コフィーによる改良の礎となった。","difficulty":5},{"id":"PRD2-074","domain":"prd2","level":"master","category":"history","tags":["aeneas-coffey","patent-1830","precise-date"],"region":null,"question":"イーニアス・コフィーが改良型連続式蒸留機の特許を取得した年はいつか。","choices":["1826年","1830年","1845年","1860年"],"answer":1,"explanation":"イーニアス・コフィーが改良型連続式蒸留機の特許を取得したのは1830年で、以後「コフィー・スチル」としてグレーンウイスキー生産の標準的な設備となった。","difficulty":5},{"id":"PRD2-075","domain":"prd2","level":"master","category":"people","tags":["aeneas-coffey","excise-officer","biography"],"region":null,"question":"イーニアス・コフィーが連続式蒸留機を開発する以前に務めていた役職は何か。","choices":["スコットランド蒸留協会会長","王室醸造技師","アイルランド消費税(エクサイズ)監督官","英国下院議員"],"answer":2,"explanation":"イーニアス・コフィーは連続式蒸留機を開発する以前、アイルランドの消費税(エクサイズ)監督官を務めており、その実務経験が蒸留機開発に活かされたとされる。","difficulty":4},{"id":"PRD2-076","domain":"prd2","level":"master","category":"people","tags":["robert-stein","haig-family","biography"],"region":null,"question":"ロバート・スタインは、著名なウイスキー蒸留一族とどのような関係にあったとされるか。","choices":["ウォーカー(Walker)家の直系子孫である","グラント(Grant)家の創業者である","ディュワー(Dewar)家の使用人であった","ヘイグ(Haig)家の親戚(いとこ)にあたる"],"answer":3,"explanation":"ロバート・スタインは著名な蒸留一族ヘイグ家の親戚(いとこ)にあたるとされ、家系のつながりが彼の蒸留技術への関心に影響したと言われる。","difficulty":5},{"id":"PRD2-077","domain":"prd2","level":"master","category":"maturation","tags":["quarter-cask","surface-to-volume-ratio","maturation-speed"],"region":null,"question":"クォーターカスクが標準的なホグスヘッドより熟成の進行が速いとされる主な理由は何か。","choices":["容量に対する木材(内面)接触面積の比率が大きいため","アルコール度数が高いため","使用木材がすべて新樽であるため","気圧の影響を受けやすいため"],"answer":0,"explanation":"クォーターカスクは容量が小さい分、内容量に対して木材と接触する内面積の比率が大きくなるため、同じ期間でも熟成が進みやすいとされる。","difficulty":4},{"id":"PRD2-078","domain":"prd2","level":"master","category":"maturation","tags":["puncheon-cask","cask-size","sherry-cask"],"region":null,"question":"バットとほぼ同等の容量(約500リットル)を持つ樽で、シェリー樽や熟成用に用いられることがあるものはどれか。","choices":["クォーターカスク","パンチョン(puncheon)","バレル","オクタブ"],"answer":1,"explanation":"パンチョンはバットとほぼ同容量(約500リットル)の大型樽で、シェリー樽やラム樽としても使われることがある。","difficulty":4},{"id":"PRD2-079","domain":"prd2","level":"master","category":"maturation","tags":["octave-cask","small-cask","finishing"],"region":null,"question":"容量が約50リットル程度と非常に小さく、フィニッシングなどに用いられることがある樽を何と呼ぶか。","choices":["パンチョン","バット","オクタブ(octave)","ホグスヘッド"],"answer":2,"explanation":"オクタブは容量約50リットル程度の非常に小さな樽で、木材との接触面積比率が極めて高く、短期間のフィニッシングなどに用いられる。","difficulty":4},{"id":"PRD2-080","domain":"prd2","level":"master","category":"regulation","tags":["irish-whiskey","distillation-exceptions","regulation-nuance"],"region":null,"question":"近年のアイルランドウイスキー業界の実態として正しい記述はどれか。","choices":["アイルランドでは法律により全銘柄が3回蒸留と定められている","アイルランドでは連続式蒸留が禁止されている","アイルランドではポットスチルの使用が禁止されている","蒸留所によっては2回蒸留を採用する例もあり、3回蒸留は必須の法規定ではない"],"answer":3,"explanation":"アイルランドウイスキーは伝統的に3回蒸留が語られることが多いが、現在では蒸留所によって2回蒸留を採用する例もあり、3回蒸留が法律で義務付けられているわけではない。","difficulty":5},{"id":"PRD2-081","domain":"prd2","level":"master","category":"regulation","tags":["scotch-whisky-regulations-2009","cask-capacity-limit","legal-requirement"],"region":null,"question":"英国「スコッチ・ウイスキー規則2009」において、熟成に用いる木製容器の容量上限として定められているものはどれか。","choices":["700リットル以下","500リットル以下","1000リットル以下","上限規定はない"],"answer":0,"explanation":"英国のスコッチ・ウイスキー規則2009では、熟成に用いる木製容器の容量上限は700リットルと定められている。","difficulty":5},{"id":"PRD2-082","domain":"prd2","level":"master","category":"regulation","tags":["scotch-whisky-regulations-2009","minimum-maturation","legal-requirement"],"region":null,"question":"スコッチウイスキーが「スコッチウイスキー」と名乗るために法律で定められている最低熟成期間はどれか。","choices":["1年以上","3年以上","5年以上","10年以上"],"answer":1,"explanation":"スコッチウイスキーと名乗るためには、スコットランド国内の保税倉庫でオーク製容器を用いて3年以上熟成させることが法律で義務付けられている。","difficulty":4},{"id":"PRD2-083","domain":"prd2","level":"master","category":"regulation","tags":["bourbon-regulation","new-charred-oak","legal-requirement"],"region":null,"question":"米国のバーボンウイスキーが法規上、熟成に使用しなければならない容器の条件として正しいものはどれか。","choices":["使用済みのシェリー樽","内面を焦がしていない新樽","新品で内面を焦がしたオーク製容器","ステンレス製タンク"],"answer":2,"explanation":"米国の連邦規則により、バーボンウイスキーは新品で内面を焦がしたオーク製容器のみを熟成に使用しなければならないと定められている。","difficulty":4},{"id":"PRD2-084","domain":"prd2","level":"master","category":"production","tags":["talisker","purifier-pipe","partial-condenser","technical-detail"],"region":null,"question":"タリスカー蒸留所のピュリファイアーが果たす機能として、より正確な説明はどれか。","choices":["蒸気を完全に凝縮させ新酒として取り出す最終コンデンサーである","発酵槽内の温度を下げる冷却装置である","麦芽の焙煎度合いを調整する装置である","リンアームの途中で蒸気の一部を予備的に凝縮させ、重い成分をスチルへ戻す部分凝縮器として働く"],"answer":3,"explanation":"タリスカーのピュリファイアーはリンアームの途中に設けられた小型の部分凝縮器で、蒸気の一部をあらかじめ凝縮させて重い成分をスチルへ戻す役割を果たす。これにより最終的な酒質がよりクリーンでスパイシーになるとされる。","difficulty":5},{"id":"PRD2-085","domain":"prd2","level":"master","category":"maturation","tags":["dunnage-warehouse","humidity","temperature-stability"],"region":null,"question":"ダンネージ式倉庫がラック式倉庫と比較して一般に語られる特徴として適切なものはどれか。","choices":["土間で湿度が高く、庫内温度変化が比較的小さいとされる","コンクリート床で乾燥しており高層積みに向く","樽を必ず立てて保管する","樽の容量が全て統一される"],"answer":0,"explanation":"ダンネージ式倉庫は土間で外気の影響を受けにくく湿度が高い環境にあり、庫内の温度変化がラック式倉庫に比べて比較的小さいとされる。","difficulty":4},{"id":"PRD2-086","domain":"prd2","level":"master","category":"blending","tags":["filler-malt","blended-whisky-composition","key-malt-contrast"],"region":null,"question":"ブレンデッドウイスキーの構成要素のうち、「フィラーモルト」と呼ばれる原酒の一般的な役割は何か。","choices":["ブレンドの香味を決定づける最重要原酒としての役割","個性は強くないが量を確保し、ブレンドの土台を支える役割","グレーンウイスキーの代替品としての役割","瓶詰め後の色調整の役割"],"answer":1,"explanation":"フィラーモルトはブレンド全体の個性を強く主張しないが、量的な土台を支える役割を担う原酒で、キーモルトと対比される概念である。","difficulty":4},{"id":"PRD2-087","domain":"prd2","level":"master","category":"history","tags":["anthony-perrier","continuous-still-history","1822-patent"],"region":null,"question":"ロバート・スタインより前、1822年に連続式蒸留機の特許を取得していたとされる人物は誰か。","choices":["セリエ=ブルーマンタール","イーニアス・コフィー","アンソニー・ペリエ(Anthony Perrier)","ジョン・スタイン"],"answer":2,"explanation":"アンソニー・ペリエは1822年に連続式蒸留機の特許を取得していたとされ、ロバート・スタインやイーニアス・コフィーに先立つ初期の試みの一つとされる。","difficulty":5},{"id":"PRD2-088","domain":"prd2","level":"master","category":"chemistry","tags":["char","activated-carbon-effect","maturation-chemistry"],"region":null,"question":"バーボン樽のチャー(内面焼成)によって生じる炭化層が熟成中に果たすとされる働きとして正しいものはどれか。","choices":["アルコール度数を上昇させる","樽材からの色素抽出を完全に遮断する","発酵を促進する","活性炭に似た作用で不純物を吸着し、スピリッツを濾過的に浄化する"],"answer":3,"explanation":"バーボン樽のチャーで生じる炭化層は活性炭に近い性質を持ち、熟成中にスピリッツ中の不純物を吸着して風味を浄化する働きがあるとされる。","difficulty":5},{"id":"PRD2-089","domain":"prd2","level":"master","category":"maturation","tags":["angels-share","tropical-climate","india-maturation","evaporation-rate"],"region":null,"question":"インドや台湾などケンタッキーよりもさらに高温多湿な気候で熟成を行う蒸留所において、エンジェルズシェアが年間どの程度に達することがあるとされるか。","choices":["10%を超えることがある","常に1%未満に収まる","存在しない(蒸発は起きない)","スコットランドと全く同じ"],"answer":0,"explanation":"インドや台湾など高温多湿な気候で熟成する蒸留所では、年間のエンジェルズシェアが10%を超えることがあり、熟成が非常に速く進むとされる。","difficulty":4},{"id":"PRD2-090","domain":"prd2","level":"master","category":"maturation","tags":["hogshead","cask-reconstruction","cooperage-practice"],"region":null,"question":"ホグスヘッドの製造方法として実務上よく行われる手法はどれか。","choices":["完全に新品のオーク材のみで一から製作する","解体したバーボンバレルの側板を用い、新たな鏡板(トップ・ボトム)を追加して組み直す","シェリー樽の側板をそのまま流用し縮小加工する","ステンレス製の帯で全体を覆う"],"answer":1,"explanation":"ホグスヘッドは解体したバーボンバレルの側板を再利用し、新たなオーク材の鏡板(トップ・ボトム板)を追加して組み直すことで容量を約250リットル前後に拡大した樽である。","difficulty":5},{"id":"spey-001","domain":"spey","level":"expert","category":"region-knowledge","tags":["scotch-whisky-regulations","five-regions","speyside-definition"],"region":null,"question":"スコッチウイスキー規則(Scotch Whisky Regulations 2009)が定める5つの生産地域に含まれないものはどれか。","choices":["ダブリン","スペイサイド","アイラ","キャンベルタウン"],"answer":0,"explanation":"同規則が定めるスコッチウイスキーの5地域はハイランド、ローランド、スペイサイド、キャンベルタウン、アイラである。ダブリンはアイルランドの都市でありスコッチの産地区分には含まれない。","difficulty":1},{"id":"spey-002","domain":"spey","level":"expert","category":"region-knowledge","tags":["river-spey","geography","moray-firth","second-longest-river"],"region":"scotland-speyside","question":"スペイサイドの名の由来となった川「スペイ川」について正しい説明はどれか。","choices":["スコットランドで最も短い川である","モーレイ湾(モーレイ・ファース)に注ぐ","アイラ島を流れる","イングランドとの国境を形成する"],"answer":1,"explanation":"スペイ川はスコットランドで2番目に長い川で、ケアンゴームズ山地に源を発しモーレイ湾に注ぐ。流域一帯に多数の蒸留所が集中していることから地域名の由来となった。","difficulty":1},{"id":"spey-003","domain":"spey","level":"expert","category":"region-knowledge","tags":["dufftown","seven-stills","town-lore"],"region":"scotland-speyside","question":"「ローマは七つの丘の上に、ダフタウンは七つの蒸留所の上に建つ」という言い伝えがある町はどれか。","choices":["ロジス(ロゼス)","エルギン","ダフタウン","キース"],"answer":2,"explanation":"ダフタウンにはグレンフィディック、バルヴェニー、モートラックなど複数の蒸留所が集中しており、この言い伝えは町の蒸留所密度の高さを表す有名な慣用句である。","difficulty":1},{"id":"spey-004","domain":"spey","level":"expert","category":"region-knowledge","tags":["rothes","distillery-cluster","town-lore"],"region":"scotland-speyside","question":"グレンロセス、グレングラント、スペイバーンなど多数の蒸留所が集まる、スペイサイド有数の「蒸留所の町」はどこか。","choices":["ダフタウン","キース","バッキー","ロジス(ロゼス)"],"answer":3,"explanation":"ロジスはスペイ川の支流沿いに位置し、グレングラントやグレンロセス、スペイバーンなど複数の蒸留所が集中する町として知られる。","difficulty":1},{"id":"spey-005","domain":"spey","level":"expert","category":"history","tags":["excise-act-1823","legal-distilling","tax-reform"],"region":"scotland-speyside","question":"1823年の消費税法(Excise Act)改正がスコットランドのウイスキー産業にもたらした最も重要な変化はどれか。","choices":["ライセンス料と税率が引き下げられ合法蒸留が普及した","ウイスキーの海外輸出が禁止された","樽熟成の義務化が撤廃された","スコッチという呼称が初めて法的に定義された"],"answer":0,"explanation":"1823年の消費税法改正によりライセンス料と酒税が大幅に引き下げられ、それまで横行していた密造から合法蒸留への転換が進んだ。この改正はスペイサイドの蒸留所発展の出発点とされる。","difficulty":2},{"id":"spey-006","domain":"spey","level":"expert","category":"people","tags":["george-smith","the-glenlivet","licensed-distillery"],"region":"scotland-speyside","question":"1824年に政府公認第一号のライセンスを取得し、後の「ザ・グレンリベット」を興した人物は誰か。","choices":["ウィリアム・グラント","ジョージ・スミス","アレクサンダー・リード","ジョン・カミング"],"answer":1,"explanation":"ジョージ・スミスは1823年の消費税法改正を受けて1824年に正式なライセンスを取得し、合法蒸留に踏み切った先駆者として知られる。","difficulty":1},{"id":"spey-007","domain":"spey","level":"expert","category":"history","tags":["illicit-distilling","smuggling","moonshine"],"region":"scotland-speyside","question":"1823年の改正以前、スペイサイドの山中で広く行われていた合法化されていない蒸留を何と呼ぶか。","choices":["樽出し蒸留","二次蒸留","密造(不法蒸留)","連続式蒸留"],"answer":2,"explanation":"高い酒税を逃れるため、スペイサイドの山中では税務当局の目を逃れた密造が横行しており、これが1823年の税制改革以前のスコッチウイスキー産業の実態であった。","difficulty":1},{"id":"spey-008","domain":"spey","level":"expert","category":"people","tags":["william-grant","glenfiddich","founder"],"region":"scotland-speyside","question":"1886年にグレンフィディック蒸留所を創業した人物は誰か。","choices":["ジョージ・スミス","ジョン・グラント","ジェームズ・フレミング","ウィリアム・グラント"],"answer":3,"explanation":"ウィリアム・グラントは1886年にグレンフィディック蒸留所の建設に着手し、1887年のクリスマスに初留を行った。現在も一族経営が続いている。","difficulty":1},{"id":"spey-009","domain":"spey","level":"expert","category":"distillery","tags":["glenfiddich","stag-logo","gaelic-meaning"],"region":"scotland-speyside","question":"グレンフィディックのロゴに用いられる牡鹿(スタッグ)のモチーフの由来として正しいものはどれか。","choices":["蒸留所名がゲール語で「鹿の谷」を意味することにちなむ","創業者の家紋に鹿が描かれていたため","近隣の狩猟場の名物にちなむ","初代マスターブレンダーの愛称にちなむ"],"answer":0,"explanation":"「グレンフィディック」はゲール語で「鹿の谷」を意味するとされ、この由来からブランドシンボルに牡鹿(スタッグ)が用いられている。","difficulty":2},{"id":"spey-010","domain":"spey","level":"expert","category":"distillery","tags":["balvenie","william-grant-and-sons","ownership"],"region":"scotland-speyside","question":"バルヴェニー蒸留所を所有する企業として正しいものはどれか。","choices":["エドリントン・グループ","ウィリアム・グラント・アンド・サンズ","ペルノ・リカール(シーバス・ブラザーズ)","ディアジオ"],"answer":1,"explanation":"バルヴェニーはグレンフィディックの隣接地に建設され、グレンフィディックと同じくウィリアム・グラント・アンド・サンズが所有する家族経営の蒸留所である。","difficulty":1},{"id":"spey-011","domain":"spey","level":"expert","category":"distillery","tags":["macallan","sherry-cask","house-style"],"region":"scotland-speyside","question":"伝統的にシェリー樽での熟成にこだわることで知られるスペイサイドの蒸留所はどれか。","choices":["グレンモーレンジィ","オーヘントッシャン","マッカラン","タリスカー"],"answer":2,"explanation":"マッカランはスペインから調達するシェリーオーク樽での熟成を重視する方針を長年掲げており、シェリー樽原酒の代表的存在として知られる。","difficulty":1},{"id":"spey-012","domain":"spey","level":"expert","category":"distillery","tags":["macallan","small-stills","distillation"],"region":"scotland-speyside","question":"マッカラン蒸留所の特徴として知られるものはどれか。","choices":["スコットランド最大のポットスチルを使用する","連続式蒸留機のみを使用する","蒸留を一度しか行わない","スコットランド屈指の小型ポットスチルを使用する"],"answer":3,"explanation":"マッカランはスコットランドの中でも特に小型のポットスチルを多数使用することで知られ、これが独特の重厚な酒質形成に寄与しているとされる。","difficulty":2},{"id":"spey-013","domain":"spey","level":"expert","category":"distillery","tags":["glenfarclas","family-owned","grant-family"],"region":"scotland-speyside","question":"1865年以来、グラント家(J&Gグラント)による家族経営を続けているスペイサイドの蒸留所はどれか。","choices":["グレンファークラス","グレンフィディック","カーデュ","ロングモーン"],"answer":0,"explanation":"グレンファークラスは1865年にグラント家が買収して以来、現在まで独立した家族経営を維持している数少ない蒸留所である。なおグレンフィディックのグラント家とは別系統である。","difficulty":2},{"id":"spey-014","domain":"spey","level":"expert","category":"people","tags":["helen-cumming","cardhu","smuggling-lore"],"region":"scotland-speyside","question":"密造時代に夫とともに違法蒸留を営み、旗を使って徴税官の接近を近隣に知らせたという逸話で知られる女性は誰か。","choices":["ジェシー・グラント","ヘレン・カミング","エリザベス・カスバート","メアリー・スミス"],"answer":1,"explanation":"カーデュの創業者一族であるジョン・カミングの妻ヘレンは、密造時代に徴税官の接近を旗で近隣の密造業者に知らせていたという逸話で知られる。","difficulty":2},{"id":"spey-015","domain":"spey","level":"expert","category":"blending","tags":["cardhu","johnnie-walker","key-malt"],"region":"scotland-speyside","question":"カーデュ蒸留所のモルト原酒が特にキーモルトとして重視されているブレンデッドウイスキーはどれか。","choices":["シーバスリーガル","バランタイン","ジョニーウォーカー","デュワーズ"],"answer":2,"explanation":"カーデュはディアジオが所有し、世界最大級の販売量を誇るブレンデッドウイスキー、ジョニーウォーカーの重要なキーモルトの一つとして位置づけられている。","difficulty":1},{"id":"spey-016","domain":"spey","level":"expert","category":"distillery","tags":["strathisla","oldest-distillery","1786"],"region":"scotland-speyside","question":"1786年創業とされ、ハイランド地方で最も古くから操業を続ける蒸留所の一つとされるのはどれか。","choices":["グレンリベット","マッカラン","グレングラント","ストラスアイラ"],"answer":3,"explanation":"ストラスアイラは1786年創業とされ、現存する中で最も古い操業蒸留所の一つに数えられる。現在はスペイサイド地域に区分される。","difficulty":2},{"id":"spey-017","domain":"spey","level":"expert","category":"blending","tags":["strathisla","chivas-regal","spiritual-home"],"region":"scotland-speyside","question":"ストラスアイラ蒸留所が「心の故郷(スピリチュアル・ホーム)」とされるブレンデッドウイスキーはどれか。","choices":["シーバスリーガル","ジョニーウォーカー","カティサーク","ホワイトホース"],"answer":0,"explanation":"ストラスアイラはシーバス・ブラザーズが所有し、代表的ブレンデッドウイスキーであるシーバスリーガルの「心の故郷」として位置づけられ、蒸留所内に展示施設を持つ。","difficulty":2},{"id":"spey-018","domain":"spey","level":"expert","category":"distillery","tags":["glen-grant","founders","rothes"],"region":"scotland-speyside","question":"1840年にロジスでグレングラント蒸留所を創業した兄弟の姓はどれか。","choices":["スミス","グラント","カミング","フレミング"],"answer":1,"explanation":"グレングラントは1840年にジョンとジェームズのグラント兄弟によってロジスに創業された。","difficulty":1},{"id":"spey-019","domain":"spey","level":"expert","category":"distillery","tags":["aberlour","lour-burn","waterfall"],"region":"scotland-speyside","question":"アベラワー蒸留所の名の由来にもなっている、蒸留所近くの滝がある小川はどれか。","choices":["フィディック・バーン","リベット川","ラワー・バーン","ロセス・バーン"],"answer":2,"explanation":"アベラワーの名は「ラワー川の河口」を意味し、蒸留所近くを流れるラワー・バーンとその滝にちなんでいる。","difficulty":2},{"id":"spey-020","domain":"spey","level":"expert","category":"distillery","tags":["craigellachie","bacardi","ownership"],"region":"scotland-speyside","question":"クレイゲラヒ蒸留所を所有する企業(ジョン・デュワー・アンド・サンズを通じて)はどれか。","choices":["ディアジオ","ペルノ・リカール","エドリントン・グループ","バカルディ"],"answer":3,"explanation":"クレイゲラヒはバカルディ傘下のジョン・デュワー・アンド・サンズが所有し、デュワーズブランドの重要な原酒供給元となっている。","difficulty":2},{"id":"spey-021","domain":"spey","level":"expert","category":"distillery","tags":["mortlach","nickname","dufftown"],"region":"scotland-speyside","question":"複雑で力強い個性から「ダフタウンの獣(ビースト・オブ・ダフタウン)」の異名で呼ばれる蒸留所はどれか。","choices":["モートラック","グレンダラン","コンヴァルモア","キニンヴィー"],"answer":0,"explanation":"モートラックは独自の複雑な蒸留工程から生まれる重厚で力強い酒質から「ビースト・オブ・ダフタウン」の異名を持つ。","difficulty":2},{"id":"spey-022","domain":"spey","level":"expert","category":"history","tags":["pagoda-roof","charles-doig","dailuaine"],"region":"scotland-speyside","question":"モルト乾燥棟に用いられる「パゴダ屋根」を考案し、1889年にダルユーイン蒸留所で初めて採用させた建築家は誰か。","choices":["アルバート・リチャードソン","チャールズ・ドイグ","ロデリック・マッケンジー","ピーター・マッケンジー"],"answer":1,"explanation":"建築家チャールズ・ドイグが考案した通気塔「ドイグ・ベンチレーター」は東洋の塔を思わせる形状からパゴダ屋根と呼ばれ、1889年にダルユーインで初めて採用された。","difficulty":2},{"id":"spey-023","domain":"spey","level":"expert","category":"distillery","tags":["cragganmore","classic-malts","diageo"],"region":"scotland-speyside","question":"ディアジオの「クラシック・モルト」シリーズにおいてスペイサイド地域の代表として選ばれている蒸留所はどれか。","choices":["カーデュ","グレンドロナック","クラガンモア","トミントール"],"answer":2,"explanation":"ディアジオが1988年に発表したクラシック・モルト・シリーズにおいて、クラガンモアはスペイサイド地域の代表銘柄として選定されている。","difficulty":2},{"id":"spey-024","domain":"spey","level":"expert","category":"distillery","tags":["tamdhu","sherry-cask-only","house-style"],"region":"scotland-speyside","question":"熟成に用いる樽をシェリー樽のみに限定していることで知られるスペイサイドの蒸留所はどれか。","choices":["グレンモーレイ","スペイバーン","トミントール","タムデュー"],"answer":3,"explanation":"タムデューは熟成に用いる樽をシェリーシーズニングされたオーク樽に限定する方針を掲げており、スペイサイドの中でも独自性の高いハウススタイルを持つ。","difficulty":2},{"id":"spey-025","domain":"spey","level":"expert","category":"distillery","tags":["tormore","albert-richardson","architecture"],"region":"scotland-speyside","question":"建築家サー・アルバート・リチャードソンの設計により、フランス風の意匠や庭園、音楽時計で知られる蒸留所はどれか。","choices":["トーモア","ベンリアック","オルトモア","グレンタウカーズ"],"answer":0,"explanation":"トーモアは1958年開設で、サー・アルバート・リチャードソンによる意匠的な建築と庭園、音楽を奏でる時計塔で知られる。","difficulty":2},{"id":"spey-026","domain":"spey","level":"expert","category":"distillery","tags":["benromach","gordon-and-macphail","forres"],"region":"scotland-speyside","question":"1983年に閉鎖後、1998年にゴードン&マクファイル社によって再興された、フォレスにある蒸留所はどれか。","choices":["ベンリネス","ベンロマック","ロングモーン","リンクウッド"],"answer":1,"explanation":"ベンロマックは1983年に操業停止となったが、独立系ボトラーのゴードン&マクファイル社が買収し1998年に再稼働させた。","difficulty":2},{"id":"spey-027","domain":"spey","level":"expert","category":"production","tags":["floor-malting","balvenie","malting-process"],"region":"scotland-speyside","question":"現在もフロアモルティング(床式製麦)を自社で行っている数少ないスペイサイドの蒸留所として知られるのはどれか。","choices":["カーデュ","ダフタウン","バルヴェニー","トミントール"],"answer":2,"explanation":"バルヴェニーは自社畑での大麦栽培や製材・製樽まで自社で手がける稀有な蒸留所であり、伝統的なフロアモルティングを現在も継続している。","difficulty":2},{"id":"spey-028","domain":"spey","level":"expert","category":"maturation","tags":["sherry-cask","oloroso","pedro-ximenez"],"region":"scotland-speyside","question":"シェリー樽熟成で用いられる樽の種類として一般的でないものはどれか。","choices":["オロロソ・シェリー樽","ペドロヒメネス(PX)シェリー樽","フィノ・シェリー樽","アメリカンスタンダードバレル"],"answer":3,"explanation":"アメリカンスタンダードバレルはバーボン熟成に用いられる規格樽であり、シェリー樽の種類には該当しない。オロロソ、PX、フィノはいずれもシェリーワインの種類にちなむシェリー樽の分類である。","difficulty":2},{"id":"spey-029","domain":"spey","level":"expert","category":"culture","tags":["malt-whisky-trail","tourism","culture"],"region":"scotland-speyside","question":"スペイサイド地方に設定されている観光ルートで、グレンフィディックやグレンリベットなどの蒸留所を巡ることができるものは何と呼ばれるか。","choices":["モルト・ウイスキー・トレイル","スコッチ・ヘリテージ・ロード","ハイランド・ドラム・ルート","ウイスキー・コースト・トレイル"],"answer":0,"explanation":"モルト・ウイスキー・トレイルはスペイサイド地方に設定された観光ルートで、複数の稼働蒸留所や旧蒸留所博物館を巡ることができる。","difficulty":1},{"id":"spey-030","domain":"spey","level":"expert","category":"region-knowledge","tags":["distillery-count","speyside-concentration","region-knowledge"],"region":"scotland-speyside","question":"スコットランド国内の稼働蒸留所のうち、最も多くの数が集中している地域はどこか。","choices":["アイラ","スペイサイド","キャンベルタウン","ローランド"],"answer":1,"explanation":"スペイサイドはスコットランド国内で稼働蒸留所の数が最も多く集中する地域であり、全体のおよそ半数近くを占めるとされる。","difficulty":1},{"id":"spey-031","domain":"spey","level":"expert","category":"history","tags":["the-glenlivet","naming-dispute","trademark"],"region":"scotland-speyside","question":"19世紀後半、多くの蒸留所が自社名に「グレンリベット」を付して販売した結果生じた問題への対応として正しいものはどれか。","choices":["スコットランド議会が「グレンリベット」の使用を全面禁止した","グレンリベット蒸留所が名称を放棄した","裁判の結果、定冠詞付きの「ザ・グレンリベット」を名乗れるのは1社のみとされた","EUが地理的表示として全蒸留所に使用を認めた"],"answer":2,"explanation":"グレンリベットの人気にあやかり多数の蒸留所が名称に「グレンリベット」を付した結果、法的紛争に発展し、最終的に定冠詞付きの「ザ・グレンリベット」を単独で名乗れるのはジョージ・スミス創業の蒸留所のみと認められた。","difficulty":2},{"id":"spey-032","domain":"spey","level":"expert","category":"distillery","tags":["glen-moray","elgin","location"],"region":"scotland-speyside","question":"グレンモーレイ蒸留所が位置する町はどこか。","choices":["ダフタウン","キース","バッキー","エルギン"],"answer":3,"explanation":"グレンモーレイはエルギンの町にあり、スペイ川ではなくロッシー川のほとりに位置するがスペイサイド地域に区分される。","difficulty":2},{"id":"spey-033","domain":"spey","level":"expert","category":"distillery","tags":["longmorn","chivas-brothers","ownership"],"region":"scotland-speyside","question":"エルギン近郊にあり、ブレンダーから高く評価されてきたロングモーン蒸留所を現在所有する企業はどれか。","choices":["シーバス・ブラザーズ(ペルノ・リカール)","ディアジオ","バカルディ","ウィリアム・グラント・アンド・サンズ"],"answer":0,"explanation":"ロングモーンは1894年創業で、その良質な原酒からブレンダーの間で高く評価されてきた。現在はペルノ・リカール傘下のシーバス・ブラザーズが所有する。","difficulty":2},{"id":"spey-034","domain":"spey","level":"expert","category":"history","tags":["duke-of-gordon","excise-act","landowner"],"region":"scotland-speyside","question":"密造の横行を憂い、1823年の消費税法改正を後押ししたとされるスペイサイドの大地主は誰か。","choices":["アーガイル公爵","ゴードン公爵","バックルー公爵","アソール公爵"],"answer":1,"explanation":"スペイサイドに広大な土地を持つゴードン公爵は密造の横行を憂い、合法蒸留への転換を促す1823年の消費税法改正を後押ししたとされる。","difficulty":2},{"id":"spey-035","domain":"spey","level":"expert","category":"people","tags":["william-grant","glenfiddich","founding-story"],"region":"scotland-speyside","question":"ウィリアム・グラントがグレンフィディック蒸留所を建設した際の逸話として正しいものはどれか。","choices":["銀行から巨額の融資を受けて建設した","政府の補助金により建設した","家族とともに自らの手で低予算で蒸留所を建てた","既存の蒸留所を買収して改名した"],"answer":2,"explanation":"ウィリアム・グラントは9人の子どもたちを含む家族の協力を得て、限られた予算の中で自ら建設作業に携わりグレンフィディックを完成させたと伝えられる。","difficulty":1},{"id":"spey-036","domain":"spey","level":"expert","category":"distillery","tags":["knockando","gaelic-meaning","etymology"],"region":"scotland-speyside","question":"蒸留所名「ノッカンドゥ」のゲール語における意味として伝えられているものはどれか。","choices":["風の谷","静かな泉","鹿の隠れ家","小さな黒い丘"],"answer":3,"explanation":"ノッカンドゥはゲール語の「クノック・アン・ドゥ」に由来し「小さな黒い丘」を意味するとされる。","difficulty":2},{"id":"spey-037","domain":"spey","level":"expert","category":"distillery","tags":["aultmore","keith","location"],"region":"scotland-speyside","question":"オルトモア蒸留所が位置する町はどこか。","choices":["キース","ダフタウン","ロジス","フォレス"],"answer":0,"explanation":"オルトモアは1896年頃キース近郊に創業された蒸留所で、主にブレンド用原酒として用いられてきた。","difficulty":2},{"id":"spey-038","domain":"spey","level":"expert","category":"blending","tags":["glendullan","old-parr","key-malt"],"region":"scotland-speyside","question":"グレンダラン蒸留所の原酒が歴史的にキーモルトとして用いられてきたブレンデッドウイスキーはどれか。","choices":["ホワイトホース","オールド・パー","ベルズ","カティサーク"],"answer":1,"explanation":"グレンダランはダフタウンにある蒸留所で、歴史的にブレンデッドウイスキー「オールド・パー」のキーモルトとして重視されてきた。","difficulty":2},{"id":"spey-039","domain":"spey","level":"expert","category":"tasting","tags":["speyside-style","fruity","tasting-profile"],"region":"scotland-speyside","question":"一般的にスペイサイドのシングルモルトの特徴として語られる風味傾向はどれか。","choices":["強いヨード香とピート香が支配的なものが大半を占める","塩気の強い潮風のような香りが必ず感じられる","リンゴや洋梨、蜂蜜を思わせるエレガントでフルーティな味わいが多い","無条件に低アルコール度数で瓶詰めされる"],"answer":2,"explanation":"スペイサイドの蒸留所は多様な酒質を持つが、全体としてはリンゴや洋梨、蜂蜜を思わせるエレガントでフルーティな味わいが特徴として語られることが多い。","difficulty":1},{"id":"spey-040","domain":"spey","level":"expert","category":"region-knowledge","tags":["speyside-classification","highland","region-knowledge"],"region":"scotland-speyside","question":"スペイサイド地域について正しい説明はどれか。","choices":["スペイサイドはローランド地方の一部として法的に定義されている","スペイサイドはアイラ島と同じ生産地域区分に属する","スペイサイドという名称は近年新設された行政区画に由来する","地理的にはハイランド地方に含まれるが、ウイスキーの生産地域としては独立区分として扱われる"],"answer":3,"explanation":"スペイサイドは地理的にはハイランド地方の一部に含まれるが、蒸留所の密集度と独自の産業的重要性から、ウイスキーの生産地域としてはハイランドとは別の独立区分として扱われる。","difficulty":2},{"id":"spey-041","domain":"spey","level":"professional","category":"history","tags":["excise-act-1823","license-fee","tax-rate"],"region":"scotland-speyside","question":"1823年消費税法(Excise Act)による具体的な変更として正しいものはどれか。","choices":["ライセンス料が10ポンドに引き下げられ、ガロン当たりの税率も大幅に下げられた","蒸留は年間を通じて禁止され、冬季のみ解禁された","樽熟成年数が最低10年と定められた","スコットランドでの輸出用蒸留のみが合法化された"],"answer":0,"explanation":"1823年の消費税法改正では蒸留免許の取得料が大幅に引き下げられ、あわせてガロン当たりの酒税率も引き下げられたことで、合法蒸留への移行が経済的に現実的な選択肢となった。","difficulty":3},{"id":"spey-042","domain":"spey","level":"professional","category":"people","tags":["george-smith","pistols","threats"],"region":"scotland-speyside","question":"密造業者からの脅迫にさらされたジョージ・スミスが、護身のために携行したと伝えられる品はどれか。","choices":["短剣二振り","ヘアトリガー式の拳銃一対","猟銃","杖に仕込んだ剣"],"answer":1,"explanation":"合法化に踏み切ったジョージ・スミスは、既得権を失う密造業者たちから命を狙われる脅威にさらされ、護身用にヘアトリガー式の拳銃一対を常に携行していたと伝えられる。","difficulty":3},{"id":"spey-043","domain":"spey","level":"professional","category":"production","tags":["mortlach","partial-triple-distillation","2-81-times"],"region":"scotland-speyside","question":"モートラック蒸留所の独自の蒸留法を象徴する数値としてしばしば紹介されるものはどれか。","choices":["3.5回蒸留","1.5回蒸留","2.81回蒸留","4回蒸留"],"answer":2,"explanation":"モートラックは大きさの異なる複数のスチルを使い分け、原酒の一部だけを部分的に三回蒸留する独自方式を採用しており、これが「2.81回蒸留」という数値でしばしば紹介される。","difficulty":3},{"id":"spey-044","domain":"spey","level":"professional","category":"tasting","tags":["craigellachie","worm-tub","meaty-character"],"region":"scotland-speyside","question":"クレイゲラヒ蒸留所がワームタブ式冷却器の使用によって生み出す特徴的な風味として知られるものはどれか。","choices":["トロピカルフルーツのような甘い香り","強いピート香","バニラを思わせる樽由来の甘さ","硫黄を帯びたミーティー(肉様)な風味"],"answer":3,"explanation":"クレイゲラヒは伝統的なワームタブ式冷却器を用いており、銅との接触が少ないことで硫黄成分が残りやすく、肉様(ミーティー)な重厚な風味を持つ原酒を生み出す。","difficulty":3},{"id":"spey-045","domain":"spey","level":"professional","category":"production","tags":["worm-tub","condenser","copper-contact"],"region":null,"question":"ワームタブ式冷却器がシェル&チューブ式に比べて生成する蒸留液の傾向として正しいものはどれか。","choices":["銅との接触時間が短く、硫黄化合物が残りやすく重厚な酒質になりやすい","銅との接触時間が長く、軽やかでフルーティな酒質になりやすい","冷却効率が高く、アルコール度数が上がりやすい","糖化工程に直接影響し、甘味が強くなる"],"answer":0,"explanation":"ワームタブは屋外の水槽内でコイル状の管を蒸気が通る構造で、シェル&チューブ式に比べ銅との接触時間が短くなりやすく、硫黄化合物が残存しやすいため重厚な酒質になる傾向がある。","difficulty":3},{"id":"spey-046","domain":"spey","level":"professional","category":"production","tags":["glenfarclas","direct-fired-stills","distillation"],"region":"scotland-speyside","question":"グレンファークラス蒸留所の蒸留工程における特徴として知られるものはどれか。","choices":["世界で唯一の連続式ポットスチルを採用している","直火式(ガス直火)によるポットスチル加熱を続けている","減圧蒸留によって低温で蒸留を行う","蒸留を一度も行わずニューポットを出荷する"],"answer":1,"explanation":"グレンファークラスは現在も直火式(ガスによる直接加熱)でポットスチルを加熱する数少ない蒸留所の一つであり、これが力強い酒質形成の一因とされる。","difficulty":3},{"id":"spey-047","domain":"spey","level":"professional","category":"distillery","tags":["glenfarclas","largest-stills","pot-still"],"region":"scotland-speyside","question":"グレンファークラス蒸留所のポットスチルについて正しい説明はどれか。","choices":["スペイサイドで最小の大きさを持つ","形状がストレートヘッド型のみである","スペイサイドで最大級の大きさを持つ","スチル数は1基のみである"],"answer":2,"explanation":"グレンファークラスのポットスチルはスペイサイドの中でも最大級の容量を誇り、大型のスチルによる緩やかな蒸留が特徴とされる。","difficulty":3},{"id":"spey-048","domain":"spey","level":"professional","category":"history","tags":["cardhu","john-cumming","founding-history"],"region":"scotland-speyside","question":"カーデュ蒸留所の創業に関する説明として正しいものはどれか。","choices":["ウィリアム・グラントが余剰資金で買収し創業した","もともとブレンダー企業が新設した蒸留所である","19世紀末に初めて建設された比較的新しい蒸留所である","ジョン・カミングが妻ヘレンとともに営んでいた密造の拠点を1824年に合法化した"],"answer":3,"explanation":"カーデュはジョン・カミングと妻ヘレンが営んでいた密造の拠点を起源とし、1823年の法改正を受けて1824年に正式なライセンスを取得して合法化された。","difficulty":3},{"id":"spey-049","domain":"spey","level":"professional","category":"history","tags":["dailuaine","pagoda-roof","first-adoption"],"region":"scotland-speyside","question":"パゴダ屋根を建築様式として最初に採用した蒸留所はどこか。","choices":["ダルユーイン","グレンフィディック","マッカラン","ストラスアイラ"],"answer":0,"explanation":"建築家チャールズ・ドイグが考案した通気塔は1889年にダルユーイン蒸留所で初めて採用され、以後スコットランド各地の蒸留所に広まった。","difficulty":3},{"id":"spey-050","domain":"spey","level":"professional","category":"people","tags":["charles-doig","architect","doig-ventilator"],"region":"scotland-speyside","question":"数多くのスペイサイド蒸留所の建物設計を手がけ、「ドイグ・ベンチレーター」の考案者として知られる建築家は誰か。","choices":["アルバート・リチャードソン","チャールズ・ドイグ","ジェームズ・ファウラー","ウィリアム・デロイテ"],"answer":1,"explanation":"エルギンを拠点とした建築家チャールズ・ドイグは、通気塔「ドイグ・ベンチレーター」(パゴダ屋根)の考案者として知られ、多数のスペイサイド蒸留所の設計に携わった。","difficulty":3},{"id":"spey-051","domain":"spey","level":"professional","category":"business","tags":["diageo","blending-stock","business"],"region":"scotland-speyside","question":"ディアジオが所有するスペイサイド蒸留所の多くに共通する役割として最も適切なものはどれか。","choices":["すべてがシングルモルト専用ブランドとして大規模に展開されている","観光客向けの体験施設のみを目的として稼働している","主にブレンデッドウイスキー用の原酒供給を目的としている","すべて2010年以降に新設された蒸留所である"],"answer":2,"explanation":"ディアジオは多数のスペイサイド蒸留所を傘下に持つが e","question":"2015年、閉鎖・解体されたインペリアル蒸留所の跡地に、シーバス・ブラザーズによって新設された近代的な円形デザインの蒸留所はどれか。","choices":["ダルムナック","ローズアイル","ブレイヴァル","キニンヴィー"],"answer":0,"explanation":"ダルムナックは、閉鎖・解体された旧インペリアル蒸留所の跡地に2015年、シーバス・ブラザーズによって建設された近代的な円形デザインの蒸留所である。","difficulty":4},{"id":"spey-082","domain":"spey","level":"master","category":"distillery","tags":["roseisle","diageo","modern-distillery"],"region":"scotland-speyside","question":"2010年にディアジオが開設した、高度に自動化されバイオマス発電設備も備える大規模なスペイサイドの蒸留所はどれか。","choices":["ダルムナック","ローズアイル","カーデュ","グレンドロナック"],"answer":1,"explanation":"ローズアイルは2010年にディアジオが開設した大規模な蒸留所で、高度な自動化とバイオマス発電設備を備えた最新鋭の設備で知られる。","difficulty":4},{"id":"spey-083","domain":"spey","level":"master","category":"distillery","tags":["dufftown-distillery","singleton","mill-conversion"],"region":"scotland-speyside","question":"1896年、製粉所を転用する形で創業し、後に「シングルトン・オブ・ダフタウン」のキーモルトとなった蒸留所はどれか。","choices":["グレンダラン","モートラック","ダフタウン蒸留所","コンヴァルモア"],"answer":2,"explanation":"ダフタウン蒸留所は1896年、もとの製粉所を転用する形で創業され、後年ディアジオのシングルモルトブランド「シングルトン・オブ・ダフタウン」のキーモルトとなった。","difficulty":4},{"id":"spey-084","domain":"spey","level":"master","category":"history","tags":["dailuaine","private-siding","railway-history"],"region":"scotland-speyside","question":"19世紀後半、ダルユーインが自社製品の出荷や石炭搬入のために敷設した独自の鉄道設備として伝えられているものはどれか。","choices":["地下トンネル輸送路","ケーブルカー","運河式水路","専用引き込み線(プライベート・シディング)"],"answer":3,"explanation":"ダルユーインはヴィクトリア朝期にスペイサイド有数の規模を誇り、製品出荷や石炭搬入の効率化のため自社専用の鉄道引き込み線を敷設していたと伝えられる。","difficulty":4},{"id":"spey-085","domain":"spey","level":"master","category":"maturation","tags":["sherry-butt","cask-size","maturation-vessel"],"region":null,"question":"シェリー樽で伝統的に使われる「バット(butt)」の一般的な容量に最も近いものはどれか。","choices":["約500リットル","約200リットル","約250リットル","約700リットル"],"answer":0,"explanation":"シェリーバットは伝統的なシェリー樽の規格で、容量はおよそ500リットル程度とされ、ホグスヘッド(約250リットル)やアメリカンスタンダードバレル(約200リットル)より大型である。","difficulty":4},{"id":"spey-086","domain":"spey","level":"master","category":"chemistry","tags":["sulfur-compounds","worm-tub","meaty-notes"],"region":"scotland-speyside","question":"ワームタブ式冷却器を用いる蒸留所で顕著になりやすいとされる、ゆで卵や肉様のニュアンスに関与する成分群はどれか。","choices":["エステル類","硫黄系化合物","フェノール類(ピート由来)","ラクトン類"],"answer":1,"explanation":"ワームタブ式冷却器は銅との接触が限られるため、ゆで卵や肉様のニュアンスに関与する硫黄系化合物が蒸留液中に残存しやすい。","difficulty":4},{"id":"spey-087","domain":"spey","level":"master","category":"blending","tags":["glen-elgin","white-horse","victorian-era"],"region":"scotland-speyside","question":"1900年創業で、スペイサイドにおけるヴィクトリア朝拡張期最後期の蒸留所の一つとされ、ホワイトホースのキーモルトとして知られるのはどれか。","choices":["リンクウッド","ミルトンダフ","グレンエルギン","グレンタウカーズ"],"answer":2,"explanation":"グレンエルギンは1900年創業で、19世紀末のウイスキーブーム期に建設された最後期の蒸留所の一つとされ、ブレンデッドウイスキー「ホワイトホース」のキーモルトとして知られる。","difficulty":4},{"id":"spey-088","domain":"spey","level":"master","category":"business","tags":["speyside-cooperage","cask-repair","craigellachie"],"region":"scotland-speyside","question":"クレイゲラヒ近郊にあり、スコットランド有数の樽修理・再生を行う施設として知られるのはどれか。","choices":["スコティッシュ・カスク・ワークス","ハイランド・バレル・センター","モーレイ・カスク・ヤード","スペイサイド・クーパレッジ"],"answer":3,"explanation":"スペイサイド・クーパレッジはクレイゲラヒ近郊にある大規模な樽修理・再生施設で、スコットランド各地の蒸留所へ再生樽を供給している。","difficulty":4},{"id":"spey-089","domain":"spey","level":"master","category":"culture","tags":["linkwood","spider-web-lore","manager-tradition"],"region":"scotland-speyside","question":"蒸留室内の蜘蛛の巣が風味に影響すると信じ、清掃を最小限に留めていたという逸話で知られる蒸留所はどれか。","choices":["リンクウッド","グレンダラン","オーヘンブレイク","トミントール"],"answer":0,"explanation":"リンクウッドはかつての支配人が、蒸留室内の蜘蛛の巣を含む環境をできる限り変えないことが酒質維持に重要だと信じ、清掃を最小限に留めていたという逸話で知られる。","difficulty":5},{"id":"spey-090","domain":"spey","level":"master","category":"regulation","tags":["speyside","protected-designation","scotch-whisky-regulations-2009"],"region":"scotland-speyside","question":"スコッチウイスキー規則(2009年)において、「スペイサイド」がハイランドとは別に単独の生産地域として明記された法的位置づけについて正しい説明はどれか。","choices":["スペイサイドは法令上ハイランドの下位区分として扱われ、単独表示は認められない","ハイランド地方に地理的には包含されつつも、法令上は独立した産地表示区分として保護されている","スペイサイドという表示はEU法にのみ存在し、英国国内法には存在しない","スペイサイドの表示を用いるには蒸留所がスペイ川本流の水を使用することが義務付けられている"],"answer":1,"explanation":"スコッチウイスキー規則2009では、スペイサイドは地理的にはハイランド地方に包含されつつも、法令上は独立した産地表示区分として明記され保護されている。","difficulty":5},{"id":"TST-001","domain":"tst","level":"expert","category":"tasting","tags":["glass-selection","tasting-method","tulip-glass"],"region":null,"question":"ウイスキーのテイスティングで香りを集中させるために適しているとされるグラス形状はどれか。","choices":["チューリップ型（すぼまった形状）","ストレートタンブラー型","ワイングラスの広口型","ショットグラス型"],"answer":0,"explanation":"すぼまった形状（チューリップ型）は香気成分をグラス上部に集め、ノージングしやすくする。グレンケアングラスはこの代表例である。","difficulty":1},{"id":"TST-002","domain":"tst","level":"expert","category":"tasting","tags":["neat","tasting-method","alcohol-strength"],"region":null,"question":"「ニート」とは何も加えずウイスキーをそのまま飲む・テイスティングすることを指すが、この飲み方の主な目的として正しいものはどれか。","choices":["必ず氷を入れて飲むこと","加水せずに原酒本来の香味を評価すること","必ず炭酸で割って飲むこと","樽の香りを消すこと"],"answer":1,"explanation":"ニート（straight）は何も加えない状態でのテイスティングを指し、原酒そのものの香味プロファイルを評価する基本手法である。","difficulty":1},{"id":"TST-003","domain":"tst","level":"expert","category":"tasting","tags":["dilution","water-addition","aroma"],"region":null,"question":"テイスティングの際に少量の水を加える「加水」の主な目的として正しいものはどれか。","choices":["色を濃くすること","甘味を完全に消すこと","アルコールの刺激を和らげ隠れていた香りを引き出すこと","保存性を高めること"],"answer":2,"explanation":"加水によりアルコール刺激が緩和され、揮発性の高い香気成分が立ちやすくなり、閉じていた香りが開くとされる。","difficulty":1},{"id":"TST-004","domain":"tst","level":"expert","category":"tasting","tags":["color-evaluation","straw-color","appearance"],"region":null,"question":"ウイスキーの色調表現で「麦わら色（ストローカラー）」が示す一般的な熟成の傾向として正しいものはどれか。","choices":["20年以上熟成した最も濃い色調","シェリー樽熟成特有の色調","必ずノンカラーリングの証明になる色調","比較的若い原酒や淡色な熟成に多く見られる薄い色調"],"answer":3,"explanation":"麦わら色は色調表現の中でも淡い部類に分類され、比較的若い原酒やバーボン樽リフィル熟成などで見られやすい。","difficulty":1},{"id":"TST-005","domain":"tst","level":"expert","category":"tasting","tags":["color-evaluation","amber","appearance"],"region":null,"question":"ウイスキーの色調表現「琥珀色（アンバー）」の位置づけとして正しいものはどれか。","choices":["麦わら色より濃く、マホガニー色より淡い中間的な色調","色調表現の中で最も淡い色","色調表現の中で最も濃い色","無色に近い色調"],"answer":0,"explanation":"琥珀色は淡色から濃色までのグラデーションの中間に位置づけられる代表的な色調表現である。","difficulty":1},{"id":"TST-006","domain":"tst","level":"expert","category":"tasting","tags":["color-evaluation","mahogany","sherry-cask"],"region":null,"question":"「マホガニー色」と表現される濃い赤褐色の色調は、主にどのような熟成に由来することが多いか。","choices":["スチール製タンクでの短期貯蔵","シェリー樽など濃色系の樽での長期熟成","未熟成のニューポット","フィルターで着色料を除去した場合"],"answer":1,"explanation":"マホガニー色のような濃い赤褐色はシェリー樽（特にオロロソ等）由来のタンニンや色素成分の抽出により生じやすい。","difficulty":2},{"id":"TST-007","domain":"tst","level":"expert","category":"tasting","tags":["legs","tears","viscosity"],"region":null,"question":"グラスを傾けた後に内壁を伝う「レッグ（脚）」または「涙」と呼ばれる現象は、主に何を示す手がかりとされるか。","choices":["熟成年数の正確な数値","使用した樽の種類","アルコール度数や粘性（オイリーさ）の目安","蒸留所の所在地"],"answer":2,"explanation":"レッグの太さや流れる速さは、アルコール度数やグリセリン等の粘性成分の多寡を視覚的に推測する手がかりとされる。","difficulty":1},{"id":"TST-008","domain":"tst","level":"expert","category":"tasting","tags":["glencairn-glass","tasting-glass","nosing"],"region":null,"question":"ウイスキーのノージング・テイスティング用グラスとして広く使われている、チューリップ型の代表的なグラス名はどれか。","choices":["フルートグラス","ロックグラス","ブランデーグラス（大型スニフター）","グレンケアングラス"],"answer":3,"explanation":"グレンケアングラスはスコットランドで開発された、香りを集めやすいチューリップ型のウイスキー専用テイスティンググラスである。","difficulty":1},{"id":"TST-009","domain":"tst","level":"expert","category":"tasting","tags":["finish","aftertaste","tasting-terminology"],"region":null,"question":"テイスティング用語における「フィニッシュ」とは何を指すか。","choices":["飲み込んだ（または吐き出した）後に残る余韻・後味","最初に感じる香りの第一印象","色調の評価","アルコール度数の表示"],"answer":0,"explanation":"フィニッシュは飲み込んだ後に口中や喉に残る香味の余韻を指し、長さや変化の様子が評価対象となる。","difficulty":1},{"id":"TST-010","domain":"tst","level":"expert","category":"tasting","tags":["attack","first-impression","palate"],"region":null,"question":"テイスティング用語における「アタック」とは何を指すか。","choices":["熟成に使用した樽の種類","口に含んだ瞬間に感じる最初の香味の印象","瓶詰め時のアルコール度数","蒸留回数"],"answer":1,"explanation":"アタックは口に含んだ直後に感じる第一印象の香味を指し、その後に続く味わいの展開（ミドル、フィニッシュ）と対比して語られる。","difficulty":1},{"id":"TST-011","domain":"tst","level":"expert","category":"chemistry","tags":["peat","phenol","smoky-aroma"],"region":null,"question":"ピート香（スモーキーな香り）の主な化学的要因として最も適切なものはどれか。","choices":["糖類","タンパク質","フェノール類化合物","有機酸"],"answer":2,"explanation":"ピートを焚いて麦芽を乾燥させる際に生じるグアイアコールなどのフェノール類化合物が、スモーキー・薬品的な香りの主因となる。","difficulty":2},{"id":"TST-012","domain":"tst","level":"expert","category":"chemistry","tags":["vanilla-aroma","vanillin","oak-cask"],"region":null,"question":"ウイスキーに感じられる「バニラ香」の主な由来として正しいものはどれか。","choices":["大麦の発芽時に生じる成分","蒸留時に添加される香料","酵母の細胞壁成分","樽材（オーク）に含まれるリグニンに由来するバニリン"],"answer":3,"explanation":"樽材のリグニンが熟成中に分解されることでバニリンが生成され、これがバニラ様の甘い香りの主な由来となる。","difficulty":1},{"id":"TST-013","domain":"tst","level":"expert","category":"chemistry","tags":["coconut-aroma","whisky-lactone","oak-cask"],"region":null,"question":"ウイスキーに見られる「ココナッツのような香り」の主な由来とされる樽由来成分はどれか。","choices":["ウイスキーラクトン（オークラクトン）","酢酸エチル","グアイアコール","ジアセチル"],"answer":0,"explanation":"ウイスキーラクトン（オークラクトン）はオーク材由来の香気成分で、ココナッツを思わせる甘い香りを与えることで知られる。","difficulty":2},{"id":"TST-014","domain":"tst","level":"expert","category":"chemistry","tags":["fruity-aroma","esters","fermentation"],"region":null,"question":"ウイスキーの香りの中で「フルーティーな香り」を生み出す代表的な化合物群はどれか。","choices":["フェノール類","エステル類","硫黄化合物","タンニン"],"answer":1,"explanation":"エステル類は発酵過程で酵母によって生成される化合物群で、リンゴやバナナ、洋梨などフルーティーな香りの主要因となる。","difficulty":1},{"id":"TST-015","domain":"tst","level":"expert","category":"chemistry","tags":["isoamyl-acetate","banana-aroma","ester"],"region":null,"question":"「バナナのような香り」を特徴づける代表的なエステル化合物はどれか。","choices":["グアイアコール","ジアセチル","酢酸イソアミル","バニリン"],"answer":2,"explanation":"酢酸イソアミルは発酵中に酵母が生成するエステルで、バナナ様の芳香を持つことで知られる代表的な香気成分である。","difficulty":2},{"id":"TST-016","domain":"tst","level":"expert","category":"tasting","tags":["sherry-cask","dried-fruit","maturation-aroma"],"region":null,"question":"シェリー樽で熟成されたウイスキーに特徴的に感じられやすい香りはどれか。","choices":["青リンゴやライムなどの爽やかな柑橘香","松脂のような強いピート香","生の穀物のような青臭さ","レーズンやドライフルーツ、ナッツ様の香り"],"answer":3,"explanation":"シェリー樽由来のウイスキーは、ドライフルーツ、レーズン、ナッツ、チョコレートなどの豊かでリッチな香味を帯びやすいとされる。","difficulty":1},{"id":"TST-017","domain":"tst","level":"expert","category":"tasting","tags":["bourbon-cask","vanilla-aroma","coconut-aroma"],"region":null,"question":"バーボン樽で熟成されたウイスキーに特徴的に感じられやすい香りの組み合わせとして最も適切なものはどれか。","choices":["バニラ、ココナッツ、はちみつのような甘い香り","生ハムのような塩気のある香り","強い硫黄臭","ミネラル的な塩気"],"answer":0,"explanation":"バーボン樽（新樽由来のアメリカンオーク）は、バニリンやウイスキーラクトンを多く含み、バニラやココナッツ様の甘い香りを与えやすい。","difficulty":1},{"id":"TST-018","domain":"tst","level":"expert","category":"tasting","tags":["smoky-aroma","peaty-aroma","terminology"],"region":null,"question":"テイスティング用語の「スモーキー」と「ピーティー」の一般的な使い分けとして適切な説明はどれか。","choices":["両者は完全に同義で使い分けは存在しない","「ピーティー」はピート由来の薬品的・土っぽい香りを、「スモーキー」はより広く燻煙・焦げたような香り全般を指すことが多い","「スモーキー」はシェリー樽由来の香りのみを指す","「ピーティー」はバーボン樽由来の香りのみを指す"],"answer":1,"explanation":"厳密な定義に幅はあるが、一般に「ピーティー」はピート由来のヨード・薬品的な香りを、「スモーキー」は燻製・焦げ臭全般を指す語として使い分けられることが多い。","difficulty":2},{"id":"TST-019","domain":"tst","level":"expert","category":"tasting","tags":["basic-taste","sweetness","bitterness","palate"],"region":null,"question":"官能評価の基本味覚として一般的に挙げられる組み合わせはどれか。","choices":["甘味のみ","苦味と渋味の2種のみ","甘味・酸味・塩味・苦味・うま味","アルコール味という単一の味覚"],"answer":2,"explanation":"一般的な基本味覚は甘味・酸味・塩味・苦味・うま味の5種とされ、ウイスキーのテイスティングでもこれらの要素の強弱が評価される。","difficulty":1},{"id":"TST-020","domain":"tst","level":"expert","category":"tasting","tags":["caramel-coloring","e150a","color-evaluation"],"region":null,"question":"一部のウイスキーで色調を均一にするために添加されるカラメル色素の主な目的はどれか。","choices":["アルコール度数を上げること","香りを強くすること","保存料として腐敗を防ぐこと","ロット間の色調のばらつきを補正し、消費者に一貫した外観を提供すること"],"answer":3,"explanation":"カラメル色素（E150a）は風味にほとんど影響を与えないとされる一方、樽ごとに異なる色調のばらつきを補正し、製品の外観を均一にするために使用される。","difficulty":2},{"id":"TST-021","domain":"tst","level":"expert","category":"tasting","tags":["cask-strength","alcohol-content","undiluted"],"region":null,"question":"「カスクストレングス」と呼ばれるウイスキーの特徴として正しいものはどれか。","choices":["加水調整をせず、樽出しの状態に近い高いアルコール度数で瓶詰めされたもの","必ず40度に統一されたもの","必ず無着色・無濾過のもの","必ず単一樽から瓶詰めされたもの"],"answer":0,"explanation":"カスクストレングスは、瓶詰め前の加水調整をほとんど行わず、樽出しに近い高めのアルコール度数のまま瓶詰めしたウイスキーを指す。","difficulty":1},{"id":"TST-022","domain":"tst","level":"expert","category":"tasting","tags":["chill-filtration","cloudiness","mouthfeel"],"region":null,"question":"低温で行う「チルフィルタリング（冷却濾過）」を行わない「ノンチルフィルタード」のウイスキーに見られやすい現象として正しいものはどれか。","choices":["必ず色が濃くなる","加水や低温で脂肪酸エステルなどが析出し白く濁ることがある","必ずアルコール度数が上がる","必ず甘味が消える"],"answer":1,"explanation":"チルフィルタリングを行わないと、脂肪酸エステルなどの油性成分が残るため、低温や加水時に白濁（ルーシェ効果）が生じやすくなる。","difficulty":2},{"id":"TST-023","domain":"tst","level":"expert","category":"tasting","tags":["body","mouthfeel","terminology"],"region":null,"question":"テイスティング用語の「ボディ」が主に表す評価項目はどれか。","choices":["色の濃淡","蒸留所の所在地","口当たりの重厚感・コクの強さ","瓶のデザイン"],"answer":2,"explanation":"「ボディ」は口に含んだ際に感じる重厚感やコクの強さを表す官能評価用語である。","difficulty":1},{"id":"TST-024","domain":"tst","level":"expert","category":"tasting","tags":["flavor-wheel","aroma-terminology","tasting-method"],"region":null,"question":"香味表現を体系的に整理し、フローラル・フルーティー・ウッディ・スモーキーなどのカテゴリーに分類した図はどのように呼ばれるか。","choices":["カラーチャート","ボディインデックス","フィニッシュマップ","フレーバーホイール"],"answer":3,"explanation":"フレーバーホイールは香味表現を放射状のカテゴリーに整理した図で、テイスティング用語の共通言語化に用いられる。","difficulty":1},{"id":"TST-025","domain":"tst","level":"expert","category":"tasting","tags":["off-flavor","sulfur-note","defect"],"region":null,"question":"ウイスキーのオフフレーバー（好ましくない香り）の代表例として挙げられるものはどれか。","choices":["ゴム臭やマッチを擦ったような硫黄系の臭い","心地よいバニラ香","上品なフローラル香","熟したフルーツ香"],"answer":0,"explanation":"硫黄化合物に由来するゴム臭やマッチ臭のような刺激臭は、代表的なオフフレーバーの一つとして挙げられる。","difficulty":2},{"id":"TST-026","domain":"tst","level":"expert","category":"chemistry","tags":["diacetyl","buttery-note","fermentation"],"region":null,"question":"バタースコッチやバターのような香りの原因となる化合物はどれか。","choices":["グアイアコール","ジアセチル","ウイスキーラクトン","酢酸イソアミル"],"answer":1,"explanation":"ジアセチル（2,3-ブタンジオン）は発酵中に生成される化合物で、バターやバタースコッチを思わせる香りを与える。","difficulty":2},{"id":"TST-027","domain":"tst","level":"expert","category":"tasting","tags":["alcohol-content","aroma-intensity","tasting-method"],"region":null,"question":"アルコール度数が高すぎる状態でノージングを行うと起こりやすい現象として正しいものはどれか。","choices":["必ず甘味が強く感じられること","必ず色が濃く見えること","エタノールの刺激により繊細な香りが感じ取りにくくなること","香りが全く感じられなくなること"],"answer":2,"explanation":"高濃度のエタノールは鼻腔への刺激（エタノールバーン）を引き起こし、繊細な香気成分の知覚を妨げることがあるため、加水して評価することが多い。","difficulty":1},{"id":"TST-028","domain":"tst","level":"expert","category":"tasting","tags":["water-addition","aroma-opening","tasting-method"],"region":null,"question":"「加水すると香りが開く」と表現される現象の説明として最も適切なものはどれか。","choices":["アルコール度数が上がり刺激が強くなること","色調が濃くなること","甘味が完全に消えること","アルコール刺激が和らぎ、それまで隠れていた香気成分が知覚しやすくなること"],"answer":3,"explanation":"加水によりエタノール濃度が下がり刺激が緩和されることで、それまで感じ取りにくかった繊細な香りが立ちやすくなる現象を指す。","difficulty":1},{"id":"TST-029","domain":"tst","level":"expert","category":"tasting","tags":["malty-aroma","cereal-note","new-make"],"region":null,"question":"「モルティーな香り」という表現が主に指す香りの系統はどれか。","choices":["麦芽由来の穀物的・シリアルのような香り","海藻のような潮の香り","バニラのような甘い香り","レザーのような香り"],"answer":0,"explanation":"「モルティー」は麦芽由来のシリアル・パンのような穀物系の香りを指す表現で、大麦を主原料とするウイスキーの基本的な香調の一つである。","difficulty":1},{"id":"TST-030","domain":"tst","level":"expert","category":"tasting","tags":["color-evaluation","maturation-length","cask-type"],"region":null,"question":"ウイスキーの色の濃さと熟成年数の関係についての説明として最も適切なものはどれか。","choices":["色の濃さは熟成年数のみで決まり、樽の種類は無関係である","色の濃さは熟成年数だけでなく樽の種類や貯蔵環境にも左右されるため、必ずしも熟成年数に比例しない","色が濃いほど必ず熟成年数が短い","色は熟成とは無関係にランダムに決まる"],"answer":1,"explanation":"色調は樽の種類（新樽・リフィル樽・シェリー樽等）や貯蔵環境、着色料の有無によって大きく変わるため、熟成年数だけを色から正確に判断することはできない。","difficulty":2},{"id":"TST-031","domain":"tst","level":"expert","category":"tasting","tags":["spicy-note","phenol","oak-cask"],"region":null,"question":"ウイスキーに感じられる「スパイシーな香り」の由来として一般的に挙げられるものはどれか。","choices":["発酵前の麦芽の水分量","ボトルのガラス素材","樽材由来のフェノール系化合物やオーク特有の香気成分","ラベルのデザイン"],"answer":2,"explanation":"シナモンやクローブを思わせるようなスパイシーな香りは、樽材由来のフェノール系化合物やオークの香気成分に由来するとされることが多い。","difficulty":2},{"id":"TST-032","domain":"tst","level":"expert","category":"tasting","tags":["copita-glass","sherry-tasting","glass-history"],"region":null,"question":"伝統的なシェリーのテイスティングに用いられてきた、チューリップ型の脚付きグラスの名称はどれか。","choices":["デキャンタ","ジガーグラス","パイントグラス","コピタ"],"answer":3,"explanation":"コピタはスペインのシェリー酒のテイスティングに伝統的に用いられてきたチューリップ型の脚付きグラスで、後にウイスキーのノージンググラスの設計にも影響を与えたとされる。","difficulty":2},{"id":"TST-033","domain":"tst","level":"expert","category":"tasting","tags":["off-flavor","rubbery-note","defect"],"region":null,"question":"ウイスキーのオフフレーバーの一種として挙げられる「ゴムのような臭い」は、多くの場合どのような要因に関連づけられるか。","choices":["硫黄系化合物や還元的な貯蔵環境","過度な樽の焦がし","大麦の品種差","ボトリング時の加水量"],"answer":0,"explanation":"ゴム臭やマッチ臭のような刺激的な香りは、硫黄系化合物の存在や還元的な環境（酸素不足）に関連づけられることが多いオフフレーバーの一種である。","difficulty":2},{"id":"TST-034","domain":"tst","level":"expert","category":"tasting","tags":["flavor-wheel","category","aroma-terminology"],"region":null,"question":"フレーバーホイールで用いられる代表的な香りのカテゴリーとして適切な組み合わせはどれか。","choices":["赤、青、緑、黄色のみの色分類","フローラル、フルーティー、ウッディ、スモーキーなど","高い、低いの2区分のみ","甘い、辛いの2区分のみ"],"answer":1,"explanation":"フレーバーホイールは、フローラル・フルーティー・ウッディ・スモーキー・シリアルなど複数の系統的なカテゴリーで香味表現を整理している。","difficulty":1},{"id":"TST-035","domain":"tst","level":"expert","category":"tasting","tags":["tasting-method","sequence","appearance"],"region":null,"question":"一般的なテイスティングの基本的な手順として適切な順序はどれか。","choices":["フィニッシュの評価 → 色調の観察 → 香りの評価","味わいの評価 → 色調の観察 → 香りの評価","色調の観察 → 香りの評価（ノージング）→ 味わいの評価 → フィニッシュの評価","香りの評価のみで完結する"],"answer":2,"explanation":"一般的なテイスティングは、まず外観（色調）を観察し、次にノージングで香りを評価し、口に含んで味わいを評価し、最後にフィニッシュ（余韻）を確認するという順序で進められる。","difficulty":1},{"id":"TST-036","domain":"tst","level":"expert","category":"tasting","tags":["serving-temperature","aroma-intensity","tasting-method"],"region":null,"question":"ウイスキーをテイスティングする際の一般的な適温についての説明として適切なものはどれか。","choices":["必ず氷点下まで冷やしてから評価する","温度は香りの評価に一切影響しない","必ず沸騰寸前まで温めてから評価する","冷やしすぎると香気成分の揮発が抑えられるため、常温に近い温度での評価が好まれることが多い"],"answer":3,"explanation":"過度に冷やすと香気成分の揮発が抑制され香りが閉じてしまうため、常温に近い温度でのテイスティングが一般的に推奨される。","difficulty":2},{"id":"TST-037","domain":"tst","level":"expert","category":"tasting","tags":["tannin","astringency","oak-cask"],"region":null,"question":"樽材由来の「タンニン」がウイスキーの味わいに与える主な影響として正しいものはどれか。","choices":["渋みや骨格を与える要素となる","甘味を完全に打ち消す","アルコール度数を下げる","香りを完全に消す"],"answer":0,"explanation":"タンニンは樽材やシェリー樽の内容物由来のポリフェノール成分で、ウイスキーに渋みや味わいの骨格（構造感）を与える要素となる。","difficulty":2},{"id":"TST-038","domain":"tst","level":"expert","category":"tasting","tags":["new-make","young-spirit","cereal-note"],"region":null,"question":"熟成期間の短い若い原酒に特徴的に感じられやすい香味の傾向として正しいものはどれか。","choices":["樽由来の深いバニラ香が支配的になる","穀物香やアルコールの刺激が前面に出やすい","必ず極めて滑らかな口当たりになる","必ずピート香が強くなる"],"answer":1,"explanation":"若い原酒は樽熟成による丸みや複雑さがまだ十分に付与されていないため、穀物由来の香りやアルコールの刺激が目立ちやすい傾向がある。","difficulty":2},{"id":"TST-039","domain":"tst","level":"expert","category":"tasting","tags":["new-make-spirit","sulfur-note","distillation"],"region":null,"question":"蒸留直後の「ニューポット（ニューメイクスピリット）」に感じられることがある刺激的な硫黄様の香りについての説明として正しいものはどれか。","choices":["熟成が進むほど必ず強くなっていく","ウイスキーには一切現れない特徴である","熟成初期段階の原酒に見られやすく、熟成が進むにつれて減少していく傾向がある","加水すると必ず消える香りである"],"answer":2,"explanation":"蒸留直後のニューメイクスピリットには硫黄由来の刺激的な香りが感じられることがあるが、多くの場合、樽熟成が進むにつれて銅との接触や酸化により穏やかになっていく傾向がある。","difficulty":2},{"id":"TST-040","domain":"tst","level":"expert","category":"tasting","tags":["glencairn-glass","glass-design","nosing"],"region":null,"question":"グレンケアングラスがチューリップ型（すぼまった口部）に設計されている理由として最も適切なものはどれか。","choices":["保温性を高め温かいまま飲むため","割れにくくするため","洗浄しやすくするため","香気成分をグラス上部に集中させ、ノージングしやすくするため"],"answer":3,"explanation":"グレンケアングラスの膨らんだボウルとすぼまった開口部は、香気成分を上部に集中させることでノージングの精度を高めるよう設計されている。","difficulty":1},{"id":"TST-041","domain":"tst","level":"professional","category":"chemistry","tags":["isoamyl-acetate","ester","fermentation","banana-aroma"],"region":null,"question":"バナナ様の香りを与える「酢酸イソアミル」の生成過程について、最も適切な説明はどれか。","choices":["発酵中に酵母がアミノ酸代謝を経て生成するエステル化合物である","樽材のリグニンが熱分解して生じる化合物である","麦芽の乾燥工程でピートの燃焼により生じる化合物である","蒸留後にボトリング段階で人工的に添加される香料である"],"answer":0,"explanation":"酢酸イソアミルは発酵中に酵母がアミノ酸（ロイシン等）を代謝する過程で生成される代表的なエステルで、バナナ様の芳香を与える。","difficulty":3},{"id":"TST-042","domain":"tst","level":"professional","category":"chemistry","tags":["guaiacol","phenol","peat","smoky-aroma"],"region":null,"question":"ピート由来のフェノール類化合物のうち、「燻製香・薬品的な香り」の主要因の一つとされるグアイアコールについての説明として適切なものはどれか。","choices":["発酵中に酵母が生成する主要なエステル化合物である","ピートの燃焼により生じ、燻製香や薬品的な香りの主要因の一つとなるフェノール化合物である","樽材のみに含まれ、ピートとは無関係な化合物である","熟成中にのみ新たに生成され、蒸留前には存在しない化合物である"],"answer":1,"explanation":"グアイアコールはピートの燃焼により生じるフェノール系化合物で、燻製香・薬品的な香りの主要因の一つとされる。","difficulty":3},{"id":"TST-043","domain":"tst","level":"professional","category":"chemistry","tags":["cresol","phenol","medicinal-aroma","peat"],"region":null,"question":"フェノール類化合物の一つである「クレゾール」がウイスキーの香りに与える印象として、一般的に指摘される特徴はどれか。","choices":["必ず甘いバニラ香として知覚される","必ずフルーティーな香りとして知覚される","グアイアコールなどと比較して、より薬品的・動物的で刺激の強い印象を与えるとされる","樽由来のラクトン香と完全に同一の印象を与える"],"answer":2,"explanation":"クレゾールはグアイアコールに比べてより薬品的・動物的で刺激の強い香りに関連づけられることが指摘されている。","difficulty":4},{"id":"TST-044","domain":"tst","level":"professional","category":"chemistry","tags":["whisky-lactone","oak-lactone","cis-trans-isomer","oak-cask"],"region":null,"question":"「ウイスキーラクトン（オークラクトン）」に関する説明として最も適切なものはどれか。","choices":["発酵中にのみ生成され、樽材には一切含まれない化合物である","ピートの燃焼によってのみ生じる化合物である","蒸留機の銅との反応でのみ生成される化合物である","シス体とトランス体の立体異性体が存在し、樽材の種類や処理によって含有比率が異なるとされる"],"answer":3,"explanation":"ウイスキーラクトンにはシス体とトランス体の立体異性体が存在し、樽材の樹種や処理方法によって含有比率が異なるとされる。","difficulty":4},{"id":"TST-045","domain":"tst","level":"professional","category":"chemistry","tags":["dimethyl-sulfide","dms","malting","off-flavor"],"region":null,"question":"硫黄化合物の一種であるジメチルサルファイド（DMS）がウイスキーに与えうる香りの特徴と、その由来として適切な説明はどれか。","choices":["調理したトウモロコシや野菜様の香りを与えることがあり、麦芽の製麦・煮沸工程の管理と関連するとされる","必ずバニラ様の甘い香りを与える化合物である","樽材のリグニン分解によってのみ生成される化合物である","必ず好ましい香りとしてのみ評価される化合物である"],"answer":0,"explanation":"DMSは調理した野菜・トウモロコシ様の香りを与えることがあり、麦芽の製麦・煮沸工程での管理不足と関連づけられることがある。","difficulty":4},{"id":"TST-046","domain":"tst","level":"professional","category":"chemistry","tags":["fusel-alcohol","amino-acid","fermentation","ehrlich-pathway"],"region":null,"question":"発酵中に生成される「フーゼルアルコール」の主な生成メカニズムについての説明として適切なものはどれか。","choices":["蒸留機の銅と反応して初めて生成される","酵母がアミノ酸を代謝する過程（アミノ酸由来経路）で副産物として生成される","樽材のタンニンが加水分解されて生成される","ピートの燃焼ガスが麦芽に吸着して生成される"],"answer":1,"explanation":"フーゼルアルコールは、酵母がアミノ酸を代謝する過程の副産物として生成される高級アルコール類である。","difficulty":4},{"id":"TST-047","domain":"tst","level":"professional","category":"chemistry","tags":["phenol-ppm","peating-level","malt-analysis"],"region":null,"question":"麦芽の「フェノール値（ppm）」が示す測定対象として最も適切なものはどれか。","choices":["発酵液中の糖度","蒸留後のニューメイクスピリットのアルコール度数","乾燥（ピーティング）後の麦芽に含まれるフェノール系化合物の濃度","樽材に含まれるタンニンの濃度"],"answer":2,"explanation":"フェノール値（ppm）は、ピーティング処理後の麦芽に含まれるフェノール系化合物の濃度を示す指標である。","difficulty":3},{"id":"TST-048","domain":"tst","level":"professional","category":"chemistry","tags":["sulfur-compound","off-flavor","reductive-aroma"],"region":null,"question":"「マッチを擦ったような臭い」に代表される硫黄系のオフフレーバーが生じやすい状況として指摘されるものはどれか。","choices":["十分な酸素供給がある酸化的な環境での長期熟成","ピートを一切使用しない麦芽のみの使用","加水率を極端に下げた高濃度での瓶詰め","酸素との接触が少ない還元的な環境での貯蔵・熟成"],"answer":3,"explanation":"硫黄系のオフフレーバーは、酸素との接触が少ない還元的な貯蔵環境で生じやすいとされる。","difficulty":3},{"id":"TST-049","domain":"tst","level":"professional","category":"chemistry","tags":["caramel-coloring","e150a","color-adjustment"],"region":null,"question":"スコッチウイスキーの製品規格において、着色に用いることが認められているカラメル色素の分類として一般的に知られているものはどれか。","choices":["E150a（プレーンカラメル、アンモニアや亜硫酸塩を用いずに製造されるもの）","人工的なアゾ系合成着色料","天然の果実由来アントシアニン色素","鉄分を含む鉱物由来の着色料"],"answer":0,"explanation":"スコッチウイスキーで認められているカラメル色素はE150a（プレーンカラメル）であり、色調の均一化のために用いられる。","difficulty":3},{"id":"TST-050","domain":"tst","level":"professional","category":"chemistry","tags":["water-addition","louche-effect","ester-solubility"],"region":null,"question":"高濃度のウイスキーに加水した際、白く濁ることがある「ルーシェ効果」の化学的な説明として適切なものはどれか。","choices":["加水によりタンニンが結晶化するため","エタノール濃度の低下により、疎水性の高い脂肪酸エステル等の溶解度が下がり析出するため","加水により糖分が急速に沈殿するため","加水によりカラメル色素が分解されるため"],"answer":1,"explanation":"ルーシェ効果は、エタノール濃度の低下により疎水性の高い脂肪酸エステル等の溶解度が下がり、微粒子として析出することで生じる白濁現象である。","difficulty":4},{"id":"TST-051","domain":"tst","level":"professional","category":"tasting","tags":["flavor-wheel","swri","tasting-terminology","research-institute"],"region":null,"question":"ウイスキーの体系的なフレーバーホイールの開発に関わった、スコッチウイスキー業界の研究機関として知られるのはどれか。","choices":["国際ワイン機構（OIV）","世界保健機関（WHO）","スコッチ・ウイスキー・リサーチ・インスティテュート（SWRI、旧ペントランズ・スコッチ・ウイスキー・リサーチ）","国際標準化機構（ISO）本部"],"answer":2,"explanation":"スコッチ・ウイスキー・リサーチ・インスティテュート（SWRI、旧ペントランズ・スコッチ・ウイスキー・リサーチ）は、フレーバーホイールの開発など香味研究に関わってきた研究機関である。","difficulty":3},{"id":"TST-052","domain":"tst","level":"professional","category":"chemistry","tags":["organic-acid","acetic-acid","lactic-acid","fermentation"],"region":null,"question":"ウイスキーに含まれる酢酸や乳酸などの有機酸の主な由来として適切な説明はどれか。","choices":["樽材から溶出するリグニンが唯一の由来である","蒸留時に銅と反応して初めて生成される","ボトリング工程で人工的に添加される","発酵過程における酵母や乳酸菌などの微生物の代謝によって生成される"],"answer":3,"explanation":"酢酸や乳酸などの有機酸は、発酵過程における酵母や乳酸菌などの微生物の代謝によって主に生成される。","difficulty":3},{"id":"TST-053","domain":"tst","level":"professional","category":"chemistry","tags":["tannin","oak-cask","sherry-cask","astringency"],"region":null,"question":"ウイスキーに渋みを与える「タンニン」の主な由来についての説明として適切なものはどれか。","choices":["オーク材そのもの、およびシェリー樽など前もって別の酒類が入っていた樽の内容物に由来する","麦芽の発芽時にのみ生成される","蒸留機の銅にのみ由来する","酵母の細胞壁が分解されて生じる"],"answer":0,"explanation":"タンニンはオーク材そのもの、およびシェリー樽など前もって別の酒類が入っていた樽の内容物由来のポリフェノール成分に由来する。","difficulty":3},{"id":"TST-054","domain":"tst","level":"professional","category":"chemistry","tags":["char-toast","caramelization","cask-preparation"],"region":null,"question":"樽の内側を処理する「チャー（内側を焦がす）」と「トースト（じっくりと焼く）」の違いについての説明として適切なものはどれか。","choices":["チャーとトーストは完全に同一の工程を指す別名にすぎない","チャーは短時間で表面を炭化させる強い加熱、トーストはより低温で長時間かけて木材成分を穏やかに変化させる加熱であるとされる","チャーは樽材を全く加熱しない工程を指す","トーストは樽の外側にのみ行う工程である"],"answer":1,"explanation":"チャーは短時間で表面を炭化させる強い加熱、トーストはより低温で長時間かけて木材成分を穏やかに変化させる加熱工程であるとされる。","difficulty":3},{"id":"TST-055","domain":"tst","level":"professional","category":"chemistry","tags":["vanillin","lignin","thermal-degradation","oak-cask"],"region":null,"question":"樽材のリグニンが熱分解されることでバニリンが生成される過程についての説明として適切なものはどれか。","choices":["リグニンは加熱に対して極めて安定しており、分解によってバニリンが生じることはない","バニリンは麦芽由来の成分でありリグニンとは無関係である","チャーやトーストなどの加熱処理によりリグニンの分解が進み、バニリンをはじめとするフェノール性アルデヒドが生じる","バニリンは蒸留機の銅とエタノールの反応でのみ生成される"],"answer":2,"explanation":"チャーやトーストなどの加熱処理によって樽材のリグニンの分解が進み、バニリンをはじめとするフェノール性アルデヒドが生成される。","difficulty":4},{"id":"TST-056","domain":"tst","level":"professional","category":"chemistry","tags":["oak-lactone","american-oak","european-oak","cis-trans-ratio"],"region":null,"question":"アメリカンオークとヨーロピアンオークにおける「ウイスキーラクトン」の含有傾向についての一般的な説明として適切なものはどれか。","choices":["ラクトン含有量はどちらの樹種でも常に完全に同一である","ラクトンはヨーロピアンオークにのみ含まれ、アメリカンオークには一切含まれない","ラクトンはアメリカンオークにのみ含まれ、ヨーロピアンオークには一切含まれない","樹種や産地によってシス体・トランス体の含有比率や総量に違いが見られるとされる"],"answer":3,"explanation":"ウイスキーラクトンの含有比率や総量は、樹種や産地によって傾向差が見られるとされる。","difficulty":4},{"id":"TST-057","domain":"tst","level":"professional","category":"chemistry","tags":["copper-catalysis","pot-still","sulfur-removal","distillation"],"region":null,"question":"蒸留機に銅が用いられることが、硫黄系オフフレーバーの低減に寄与するとされる理由として適切な説明はどれか。","choices":["銅が硫黄化合物と反応し、これを除去・低減する触媒的な作用を持つとされるため","銅は硫黄化合物の生成を促進するため、あえて硫黄臭を強めるために用いられる","銅はアルコール度数を下げる目的でのみ使用される","銅は色調を濃くする目的でのみ使用される"],"answer":0,"explanation":"銅は硫黄化合物と反応してこれを除去・低減する触媒的な作用を持つとされ、蒸留機の材質として重用されてきた。","difficulty":4},{"id":"TST-058","domain":"tst","level":"professional","category":"tasting","tags":["body","glycerin","alcohol-content","mouthfeel"],"region":null,"question":"「腰がある」「粘性が強い」といった官能表現とグリセリンやアルコール度数の関係についての説明として適切なものはどれか。","choices":["粘性は熟成年数の長さのみで決まり、グリセリンやアルコール度数とは無関係である","グリセリンなどの粘性成分やアルコール度数の高さが、口当たりの重厚感やレッグの太さに影響するとされる","粘性はラベルの表記のみで判断すべきものである","粘性は色調の濃さと完全に比例する"],"answer":1,"explanation":"グリセリンなどの粘性成分やアルコール度数の高さは、口当たりの重厚感やレッグの太さに影響するとされる。","difficulty":3},{"id":"TST-059","domain":"tst","level":"professional","category":"tasting","tags":["cask-strength","aroma-volatility","alcohol-content"],"region":null,"question":"カスクストレングスのウイスキーを高いアルコール度数のままノージングした際に起こりやすい現象として適切な説明はどれか。","choices":["高いアルコール度数は香りの知覚に一切影響を与えない","高いアルコール度数では必ず甘味成分のみが強調される","高濃度のエタノールが香気成分の知覚を妨げることがあるため、加水して段階的に評価することが推奨される","高いアルコール度数では色調が必ず薄く見える"],"answer":2,"explanation":"高濃度のエタノールは香気成分の知覚を妨げることがあるため、カスクストレングスは加水しながら段階的に評価することが推奨される。","difficulty":3},{"id":"TST-060","domain":"tst","level":"professional","category":"tasting","tags":["maturation-length","color-density","cask-type"],"region":null,"question":"熟成年数とウイスキーの色調の濃さの関係について、より詳細な観点から適切な説明はどれか。","choices":["色調の濃さは熟成年数のみに完全に比例するため、色を見れば正確な熟成年数がわかる","色調は瓶詰め後の光の当たり方だけで決まり、熟成条件とは無関係である","色調の濃さはアルコール度数のみに比例する","同じ熟成年数であっても、樽の種類（新樽・リフィル回数・シェリー樽等）や貯蔵庫の環境によって色調の濃さは大きく異なりうる"],"answer":3,"explanation":"同じ熟成年数であっても、樽の種類やリフィル回数、貯蔵庫の環境によって色調の濃さは大きく異なりうる。","difficulty":3},{"id":"TST-061","domain":"tst","level":"professional","category":"tasting","tags":["angels-share","evaporation","flavor-concentration","maturation"],"region":null,"question":"熟成中に樽から自然に蒸発して失われる分を指す「エンジェルズシェア」が香味に与える影響として一般的に説明されるものはどれか。","choices":["水分とアルコールの蒸発比率の違いにより、残った液体の香味成分が相対的に濃縮される側面があるとされる","蒸発は香味成分の生成には一切関与しない現象である","蒸発により必ずアルコール度数が上昇し続ける","蒸発は瓶詰め後のウイスキーにのみ起こる現象である"],"answer":0,"explanation":"水分とアルコールの蒸発比率の違いにより、樽内に残った液体の香味成分が相対的に濃縮される側面があるとされる。","difficulty":3},{"id":"TST-062","domain":"tst","level":"professional","category":"chemistry","tags":["phenol-threshold","perception","concentration-dependent"],"region":null,"question":"フェノール類化合物の知覚される香りの印象が濃度によって変化することについての説明として適切なものはどれか。","choices":["濃度にかかわらず常に全く同じ香りの印象を与える","低濃度では薬品的・スモーキーな香りとして、高濃度になるほど焦げたような刺激的な香りとして知覚されやすいとされる","低濃度では必ず甘い香りとして知覚される","フェノール類は無臭の化合物であり濃度に関係なく知覚されない"],"answer":1,"explanation":"フェノール類化合物は、低濃度では薬品的・スモーキーな香りとして、高濃度になるほど焦げたような刺激的な香りとして知覚されやすいとされる。","difficulty":4},{"id":"TST-063","domain":"tst","level":"professional","category":"chemistry","tags":["acetaldehyde","green-apple-aroma","oxidation","fermentation"],"region":null,"question":"青リンゴのような刺激的な香りに関連するとされる化合物「アセトアルデヒド」についての説明として適切なものはどれか。","choices":["樽材のリグニンからのみ生成される不揮発性の化合物である","ピートの燃焼によってのみ生成される化合物である","発酵初期や蒸留初留（ヘッド）に多く含まれ、エタノールの酸化中間体としても生じる揮発性の高い化合物である","常に好ましいフルーティーな熟成香としてのみ評価される"],"answer":2,"explanation":"アセトアルデヒドは発酵初期や蒸留初留（ヘッド）に多く含まれ、エタノールの酸化中間体としても生じる揮発性の高い化合物である。","difficulty":3},{"id":"TST-064","domain":"tst","level":"professional","category":"chemistry","tags":["furfural","almond-aroma","toasted-bread","maillard"],"region":null,"question":"焦げたパンやアーモンドのような香りに関連するとされる化合物「フルフラール」についての説明として適切なものはどれか。","choices":["発酵中に酵母のみによって生成される化合物である","蒸留機の銅とエタノールが反応して生じる化合物である","ボトリング後に光によってのみ生成される化合物である","糖分の加熱分解（メイラード反応系の反応）により生じ、樽のチャー・トースト工程との関連が指摘される"],"answer":3,"explanation":"フルフラールは糖分の加熱分解によって生じる化合物で、樽のチャー・トースト工程との関連が指摘
