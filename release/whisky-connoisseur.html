,"canadian-rye-whisky"],"region":null,"question":"カナディアンウイスキーにおける「カナディアンライウイスキー」という呼称についての説明として正しいものは。","choices":["法規上「カナディアンウイスキー」と互換的に使用できる呼称であり、ライ麦の使用義務は必須ではない","ライ麦を51%以上使用したものだけがこの呼称を名乗れる","ライ麦100%のウイスキーのみが対象である","ライ麦の使用は法律で禁止されている"],"answer":0,"explanation":"カナダの規則上、「カナディアンライウイスキー」と「カナディアンウイスキー」は法的に同義の互換表現として扱われ、米国のライウイスキーのようなライ麦比率の法定義務はない。歴史的にライ麦を使った蒸留が盛んだった名残の呼称である。","difficulty":4},{"id":"law-054","domain":"law","level":"professional","category":"regulation","tags":["canadian-whisky","regulation"],"region":null,"question":"カナダの規則が定めるカナディアンウイスキーの性格規定として正しいものは。","choices":["蒸留時のアルコール度数を94.8%未満に限定すること","一般にカナディアンウイスキーに帰属するとされる味・香り・特性を備えていること","単式蒸留機の使用を義務付けること","とうもろこしの使用を禁止すること"],"answer":1,"explanation":"カナダの食品・医薬品規則はカナディアンウイスキーについて、具体的な蒸留度数の数値基準よりも「一般にカナディアンウイスキーに帰属するとされる味・香り・特性」を備えることという性格規定を用いる点が特徴的である。","difficulty":3},{"id":"law-055","domain":"law","level":"professional","category":"regulation","tags":["japan-whisky","liquor-tax-act"],"region":null,"question":"日本の酒税法上のウイスキー類の分類・定義に関する説明として適切なものは。","choices":["3年以上の熟成が酒税法上義務付けられている","木製樽での熟成が酒税法上義務付けられている","発芽させた穀類を使用して糖化・発酵・蒸留したものを基本要件とし、国際的な主要生産国の基準より緩やかな側面がある","麦芽以外の原料使用が酒税法で禁止されている"],"answer":2,"explanation":"酒税法は課税分類としてのウイスキーの定義を定めるが、熟成期間や樽の種類・容量についての義務規定はなく、スコッチ等の主要生産国の基準に比べ緩やかであった。この間隙を埋める目的で日本洋酒酒造組合の自主基準が制定された。","difficulty":3},{"id":"law-056","domain":"law","level":"professional","category":"regulation","tags":["japan-whisky","ingredients"],"region":null,"question":"「ジャパニーズウイスキーの表示に関する基準」で使用が認められる水の要件は。","choices":["水源国は問われない","EU域内で採水された水に限る","蒸留所と同一都道府県内の水に限る","国内で採水された水に限る"],"answer":3,"explanation":"本基準では仕込みに用いる水を日本国内で採水したものに限定しており、輸入水を用いた場合は「ジャパニーズウイスキー」を名乗れない。","difficulty":3},{"id":"law-057","domain":"law","level":"professional","category":"history","tags":["japan-whisky","history"],"region":null,"question":"「ジャパニーズウイスキーの表示に関する基準」における経過措置期間は。","choices":["2021年4月から2024年3月まで","2021年4月から2022年3月まで","2018年4月から2021年3月まで","経過措置は設けられていない"],"answer":0,"explanation":"本基準は2021年4月1日に適用開始されたが、既存在庫や仕込み中の原酒に配慮し2024年3月31日までの3年間の経過措置期間が設けられた。","difficulty":3},{"id":"law-058","domain":"law","level":"professional","category":"culture","tags":["nas","market-trend"],"region":null,"question":"NAS（No Age Statement）ウイスキーが近年増加した背景として一般に挙げられる要因は。","choices":["法規制により年数表記が禁止されたこと","需要増加に対して長期熟成原酒の在庫が不足したこと","熟成年数表記に追加課税が課されるようになったこと","消費者からの年数表記廃止の要望が法制化されたこと"],"answer":1,"explanation":"世界的なウイスキーブームによる需要急増に対し、あらかじめ仕込んでおいた長期熟成原酒の在庫が追いつかなくなったことが、各社がNAS表記の製品を増やした主な背景として挙げられる。","difficulty":3},{"id":"law-059","domain":"law","level":"professional","category":"regulation","tags":["vintage","label-regulation"],"region":null,"question":"ヴィンテージ表記とボトリング年（瓶詰め年）の関係について正しいものは。","choices":["ヴィンテージと瓶詰め年は常に同一年でなければならない","ヴィンテージ表記があれば瓶詰め年の表記は禁止される","ヴィンテージは蒸留年を示すもので、瓶詰め年とは別に併記されることがある","ヴィンテージは熟成終了年を示す法定用語である"],"answer":2,"explanation":"ヴィンテージ表記は原酒の蒸留年を示すもので、瓶詰め年をあわせてラベルに記載することで消費者が実際の熟成期間を計算できるようにする例が多い。","difficulty":3},{"id":"law-060","domain":"law","level":"professional","category":"chemistry","tags":["chill-filtration","chemistry"],"region":null,"question":"チルフィルタードが必要となる主な化学的要因として正しいものは。","choices":["エタノールが低温で結晶化するため","カラメル色素が低温で沈殿するため","糖分が低温で結晶化するため","樽由来の脂肪酸エステル等が低温や加水で析出し白濁を生じるため"],"answer":3,"explanation":"熟成中に樽材から溶出する脂肪酸エステル等の成分は常温のアルコール中には溶けているが、低温や加水で溶解度が下がると析出し白濁の原因となるため、これを除去する目的でチルフィルトレーションが行われる。","difficulty":3},{"id":"law-061","domain":"law","level":"professional","category":"regulation","tags":["eu-spirits-regulation","label-regulation"],"region":null,"question":"EUスピリッツ規則における「ウイスキー／ウイスキー」表記の言語別綴りの扱いとして正しいものは。","choices":["規則上は加盟国ごとの綴り（whisky/whiskey）を一律には強制しておらず、各国・生産者の伝統的表記が用いられる","EU域内では常に\"whisky\"表記のみが認められる","EU域内では常に\"whiskey\"表記のみが認められる","綴りの違いにより異なる分類として扱われる"],"answer":0,"explanation":"EUスピリッツ規則は「whisky」「whiskey」いずれの綴りも同一カテゴリーの名称として扱い、生産国や生産者の伝統的な綴り方（スコットランド・カナダはwhisky、アイルランド・米国はwhiskeyが一般的）を排除していない。","difficulty":4},{"id":"law-062","domain":"law","level":"professional","category":"regulation","tags":["eu-spirits-regulation","sweetening"],"region":null,"question":"EUスピリッツ規則におけるウイスキーへの甘味添加についての規定として正しいものは。","choices":["一定量までの甘味添加が認められている","他の多くのスピリッツ区分と異なり、ウイスキーへの甘味添加は一切認められていない","蜂蜜による甘味添加のみ特別に認められている","甘味添加についての規定は存在しない"],"answer":1,"explanation":"ラムやブランデーなど他の多くのスピリッツ区分では一定量までの甘味添加（ラウンディング・オフ）が認められているのに対し、ウイスキーはEUスピリッツ規則上、甘味添加が一切認められていない最も厳格な区分の一つである。","difficulty":4},{"id":"law-063","domain":"law","level":"professional","category":"regulation","tags":["scotch-whisky-regulations-2009","label-regulation","cask-type"],"region":null,"question":"スコッチウイスキーのラベルにある「シェリーカスク」等の熟成樽表記について正しいものは。","choices":["シェリーカスク使用時は必ず表記しなければならない","熟成樽の種類表記自体が規則で禁止されている","表示自体は規則上の義務事項ではないが、不当表示・誤認表示は規則により禁止されている","シェリーカスク表記があるウイスキーは別カテゴリーとして分類される"],"answer":2,"explanation":"熟成に使用した樽の種類（シェリーカスク、バーボンバレル等）をラベルに表記するかどうかは任意だが、実際とは異なる樽種を表示するなどの誤認表示は規則により禁止されている。","difficulty":3},{"id":"law-064","domain":"law","level":"professional","category":"regulation","tags":["scotch-whisky-regulations-2009","barrel-entry-proof"],"region":null,"question":"スコッチウイスキーの熟成樽詰め時のアルコール度数について、規則上の扱いは。","choices":["62.5%を超えてはならないと規則で定められている（バーボンと同様）","70%を超えてはならないと規則で定められている","40%を超えてはならないと規則で定められている","特定の上限度数は規則で定められていない（実務上は63.5%前後が一般的）"],"answer":3,"explanation":"バーボンでは新樽詰め時のアルコール度数上限が62.5%と法定されているのに対し、スコッチウイスキー規則には樽詰め時の度数に関する明文の上限規定はなく、各蒸留所が経験的に定めた度数（多くは63.5%前後）で樽詰めを行っている。","difficulty":4},{"id":"law-065","domain":"law","level":"professional","category":"regulation","tags":["bottled-in-bond","us-regulation"],"region":null,"question":"米国の「ボトルド・イン・ボンド（Bottled-in-Bond）」表示の要件として正しいものは。","choices":["単一の蒸留所で製造され、保税倉庫で4年以上熟成し、100プルーフ（50%）で瓶詰めされること","複数の蒸留所の原酒をブレンドし、2年以上熟成すればよい","熟成期間の規定はなく、瓶詰め度数のみが規定されている","保税倉庫での熟成義務はない"],"answer":0,"explanation":"ボトルド・イン・ボンド法（1897年）に由来する表示で、単一の蒸留所で製造されたウイスキーを政府監督下の保税倉庫で4年以上熟成し、100プルーフ（アルコール度数50%）ちょうどで瓶詰めすることが要件とされる。","difficulty":4},{"id":"law-066","domain":"law","level":"professional","category":"regulation","tags":["corn-whiskey","us-regulation"],"region":null,"question":"米国基準における「コーンウイスキー」の定義として正しいものは。","choices":["とうもろこしを51%以上使用し、新樽での熟成が義務付けられている","とうもろこしを80%以上使用し、新樽での熟成義務がない","とうもろこしを100%使用しなければならない","とうもろこしの使用が禁止されている"],"answer":1,"explanation":"コーンウイスキーは原料穀物の80%以上をとうもろこしとする点でバーボンより比率が高く、逆に新樽・内側焦がしの熟成義務はなく、無熟成または中古樽・無焦がし樽での熟成が認められる。","difficulty":3},{"id":"law-067","domain":"law","level":"professional","category":"regulation","tags":["malt-whiskey","us-regulation","mash-bill"],"region":null,"question":"米国基準における「モルトウイスキー」の原料規定は。","choices":["発芽大麦を100%使用すること","発芽大麦とライ麦を等量使用すること","発芽大麦を51%以上使用すること","発芽の有無を問わず大麦を51%以上使用すること"],"answer":2,"explanation":"米国基準のモルトウイスキーは原料穀物の51%以上を発芽大麦（モルト）とすることが要件で、バーボン（とうもろこし51%以上）やライウイスキー（ライ麦51%以上）と同様の考え方に基づく分類である。","difficulty":3},{"id":"law-068","domain":"law","level":"professional","category":"regulation","tags":["single-malt-scotch-whisky","bottling-location"],"region":null,"question":"シングルモルト・スコッチ・ウイスキーの瓶詰め地について規則上正しいものは。","choices":["瓶詰め地に規定はなく輸出先で瓶詰めしてもよい","熟成のみスコットランド国内であれば瓶詰めはEU域内で自由","瓶詰め地の規制はブレンデッド・スコッチのみに適用される","スコットランド国外での瓶詰め・再瓶詰めは認められていない"],"answer":3,"explanation":"スコッチウイスキー規則2009により、シングルモルト・スコッチ・ウイスキーはスコットランド国内で瓶詰めされなければならず、小売用のボトル詰め状態でのみ輸出できる。この要件は2012年11月23日から本格適用された。","difficulty":4},{"id":"law-070","domain":"law","level":"professional","category":"regulation","tags":["canadian-whisky","production-location"],"region":null,"question":"カナダの規則が定めるカナディアンウイスキーの熟成場所要件は。","choices":["熟成場所の規定はない","カナダ国内で熟成すること","北米大陸内であればよい","輸出前に一部を国外で追加熟成することが義務付けられている"],"answer":1,"explanation":"カナディアンウイスキーはマッシング・蒸留・熟成のすべてをカナダ国内で行うことが規則上求められており、これは他の主要生産国と共通する国内完結型の要件である。","difficulty":3},{"id":"law-071","domain":"law","level":"professional","category":"regulation","tags":["japan-whisky","distillation-strength"],"region":null,"question":"「ジャパニーズウイスキーの表示に関する基準」における蒸留時アルコール度数の上限は。","choices":["94.8%未満","90度未満","95度未満","上限規定はない"],"answer":2,"explanation":"本基準では蒸留時のアルコール分を95度未満とすることを定めており、スコッチウイスキー規則の94.8%未満という数値とはわずかに異なる独自の基準となっている。","difficulty":3},{"id":"law-072","domain":"law","level":"professional","category":"regulation","tags":["scotch-whisky-regulations-2009","geographical-indication"],"region":null,"question":"スコッチウイスキー規則2009における地理的表示地域として法的に定められていないものはどれか。","choices":["キャンベルタウン","ローランド","スペイサイド","アイランズ（Islands）"],"answer":3,"explanation":"同規則が法的に定める地理的表示地域はハイランド、ローランド、スペイサイド、キャンベルタウン、アイラの5地域であり、「アイランズ」は業界内で慣用的に使われる非公式な区分でハイランドの一部として扱われる。","difficulty":4},{"id":"law-073","domain":"law","level":"master","category":"history","tags":["scotch-whisky-regulations-2009","statutory-instrument","history"],"region":null,"question":"スコッチウイスキー規則2009（SI 2009/2890）の法的性格として正しいものは。","choices":["イギリス議会に提出された制定法上位委任立法（statutory instrument）であり、2009年11月23日に施行された","EU規則を単に翻訳した行政通達に過ぎない","スコットランド議会が単独で制定した地域限定条例である","SWAが自主的に策定した業界内規である"],"answer":0,"explanation":"スコッチウイスキー規則2009はSI 2009/2890として英国議会に提出された制定法上位委任立法（法定文書）であり、2009年10月30日に議会提出、同年11月23日に施行された。","difficulty":5},{"id":"law-074","domain":"law","level":"master","category":"history","tags":["blended-grain-scotch-whisky","scotch-whisky-regulations-2009","history"],"region":null,"question":"ブレンデッドグレーン・スコッチ・ウイスキーというカテゴリーの成立経緯として正しいものは。","choices":["1988年法の時点ですでに正式カテゴリーとして存在していた","2009年規則により、5分類の一つとして初めて正式なカテゴリーとして明文化された","EU規則により2005年に初めて定義された","現在も正式カテゴリーとしては認められていない"],"answer":1,"explanation":"1988年スコッチウイスキー法の時代には「ブレンデッドグレーン」は正式な法定カテゴリーではなく、2009年規則によってシングルモルト等とあわせた5分類体系の一つとして初めて明文化された。","difficulty":5},{"id":"law-075","domain":"law","level":"master","category":"regulation","tags":["scotch-whisky-regulations-2009","single-malt-scotch-whisky","single-grain-scotch-whisky"],"region":null,"question":"スコッチウイスキー規則2009の定義文言における「単一の蒸留所で全て行われる（entirely at one distillery）」という要件が適用される分類は。","choices":["5分類すべて","ブレンデッド・スコッチ・ウイスキーのみ","シングルモルトとシングルグレーンのみ","ブレンデッドモルトとブレンデッドグレーンのみ"],"answer":2,"explanation":"「単一の蒸留所で全ての工程が行われる」という定義上の要件はシングルモルトとシングルグレーンにのみ適用され、複数蒸留所の原酒を組み合わせるブレンデッド系のカテゴリーには（定義上）適用されない。","difficulty":5},{"id":"law-076","domain":"law","level":"master","category":"history","tags":["bottled-in-bond","us-regulation","history"],"region":null,"question":"米国の「ボトルド・イン・ボンド法（Bottled-in-Bond Act, 1897年）」が定める「単一の蒸留期間」の区分として正しいものは。","choices":["四半期（3か月）単位","暦年（1月から12月）単位","収穫期基準の可変期間","1月から6月、または7月から12月の半年単位"],"answer":3,"explanation":"ボトルド・イン・ボンドの要件でいう「単一の蒸留シーズン」は暦年を1月〜6月と7月〜12月の半年ずつに区切った単位であり、その一つの期間内に単一蒸留所で製造されたものであることが求められる。","difficulty":5},{"id":"law-077","domain":"law","level":"master","category":"regulation","tags":["canadian-whisky","flavouring"],"region":null,"question":"カナダの規則で知られる、いわゆる「9.09%ルール」の内容として正しいものは。","choices":["2年以上熟成した他の蒸留酒やワインを、最終製品量の9.09%まで表示義務なく混和できる規定","熟成年数を実際より9.09%割り増して表示できる規定","とうもろこしの使用比率を9.09%以下に制限する規定","輸出時の関税を9.09%減免する規定"],"answer":0,"explanation":"カナダの規則は、2年以上熟成した他の蒸留酒やワインを「フレーバリング」として、元のウイスキー量の10%（＝最終製品量の9.09%）まで、表示義務や年数表記の変更なしに混和することを認めている。この規定は業界内外で賛否が分かれる。","difficulty":5},{"id":"law-079","domain":"law","level":"master","category":"regulation","tags":["japan-whisky","liquor-tax-act","japan-spirits-liqueurs-makers-association"],"region":null,"question":"日本の酒税法（旧級別制度廃止後の現行体系）とジャパニーズウイスキー表示基準の関係として正しいものは。","choices":["酒税法が改正され表示基準の内容がそのまま法定義務化された","表示基準は酒税法の下位法令として制定されている","酒税法上の「ウイスキー」区分は課税分類であり、日本洋酒酒造組合の表示基準は業界の自主基準として別途原料・製法・熟成等をより厳格に定めている","酒税法上の定義と表示基準の内容は完全に一致している"],"answer":2,"explanation":"酒税法上のウイスキー定義はあくまで課税上の分類であり、熟成期間や樽容量などの厳格な要件を含まない。これを補う形で日本洋酒酒造組合が法令とは別の業界自主基準として「ジャパニーズウイスキー」表示基準を制定した。","difficulty":5},{"id":"law-080","domain":"law","level":"master","category":"regulation","tags":["blended-scotch-whisky","geographical-indication","label-regulation"],"region":null,"question":"ブレンデッド・スコッチ・ウイスキーのラベルにおいて、原酒の産地（地域）表示に関する規則上の扱いとして正しいものは。","choices":["いずれか一部の原酒が該当地域産であれば地域名を表示できる","地域名表示は完全に自由であり規制の対象外である","ブレンデッド製品には地域名表示自体が一律禁止されている","使用原酒の全てが単一の法定地域（例:スペイサイド）で蒸留された場合に限り、その地域名を表示できる"],"answer":3,"explanation":"スコッチウイスキー規則2009は、地理的表示地域名をラベルに表示する場合、使用された原酒のすべてがその単一地域で蒸留・熟成されたものであることを要求しており、一部混在の場合は地域名を表示できない。","difficulty":5},{"id":"law-081","domain":"law","level":"master","category":"history","tags":["scotch-whisky-regulations-2009","geographical-indication","eu-spirits-regulation","history"],"region":null,"question":"EUにおける「スコッチウイスキー」の地理的表示（GI）としての保護が制度上開始された起点として最も適切なものは。","choices":["1989年のEC規則（旧スピリッツ規則の前身）による地理的表示保護の枠組み以降、順次強化されてきた","2019年規則（EU）2019/787で初めて保護対象となった","1988年スコッチウイスキー法制定と同時にEUレベルでの保護が開始された","WTO/TRIPS協定発効時に初めてEUで保護対象となった"],"answer":0,"explanation":"「スコッチウイスキー」のEUレベルでの地理的表示保護は1980年代末のEC規則に遡り、その後1989年の関連規則、2008年の規則（EC）110/2008、2019年の規則（EU）2019/787へと法制度が改正・強化されながら継承されてきた。","difficulty":5},{"id":"law-082","domain":"law","level":"master","category":"regulation","tags":["irish-whiskey","single-malt","pot-still"],"region":null,"question":"アイリッシュウイスキーにおける「シングルモルト・アイリッシュウイスキー」の蒸留器規定として正しいものは。","choices":["連続式蒸留機のみが認められる","ポットスチルのみが認められ、連続式蒸留機は使用できない","ポットスチルと連続式蒸留機のいずれも使用できる","蒸留器の種類に規定はない"],"answer":1,"explanation":"シングルモルト・アイリッシュウイスキーはスコッチのシングルモルトと同様、単一蒸留所においてポットスチルのみを用いて蒸留されることが要件であり、連続式蒸留機の使用は認められない。","difficulty":4},{"id":"law-083","domain":"law","level":"master","category":"regulation","tags":["scotch-whisky-regulations-2009","maturation"],"region":null,"question":"スコッチウイスキー規則2009における「熟成」の起算時点として正しいものは。","choices":["蒸留が完了した時点","樽が製造された時点","蒸留された原酒がスコットランド国内で樽に詰められた時点","瓶詰めのために樽から取り出された時点"],"answer":2,"explanation":"熟成期間は、蒸留された原酒（ニューメイクスピリッツ）がスコットランド国内でオーク樽に詰められた時点から起算されるとされ、蒸留完了時点そのものではない。","difficulty":4},{"id":"law-084","domain":"law","level":"master","category":"regulation","tags":["japan-whisky","caramel-coloring-e150a"],"region":null,"question":"「ジャパニーズウイスキーの表示に関する基準」において、色調調整のために使用が認められている添加物は。","choices":["カラメル色素と天然香料","添加物は一切認められていない","砂糖および蜂蜜による着色","カラメル色素のみ"],"answer":3,"explanation":"本基準は色調の微調整を目的としたカラメル色素の使用のみを認めており、香味料や甘味料など他の添加物の使用は認めていない。この点はスコッチウイスキー規則のE150A限定規定と同様の考え方である。","difficulty":4},{"id":"law-085","domain":"law","level":"master","category":"regulation","tags":["eu-spirits-regulation"],"region":null,"question":"EU規則の定義において、ウイスキーの糖化に関する規定として正しいものは。","choices":["麦芽の持つジアスターゼ酵素によって糖化されなければならない","外部から添加した工業用酵素でも糖化が認められる","糖化工程についての規定はない","糖化は酵母によって行われると規定されている"],"answer":0,"explanation":"EUスピリッツ規則はウイスキーの定義において、麦芽（モルト）に含まれるジアスターゼ酵素の作用によりでんぷんを糖化することを要件としており、工業用酵素剤による糖化を代替とは規定していない。","difficulty":5},{"id":"law-086","domain":"law","level":"master","category":"history","tags":["single-malt-scotch-whisky","bottling-location","history"],"region":null,"question":"シングルモルト・スコッチ・ウイスキーについて、スコットランド国内での瓶詰めが義務化されたのはいつからか。","choices":["2009年11月23日の規則施行と同時に","2012年11月23日から（2009年の規則施行から3年の経過措置を経て）","1988年のスコッチウイスキー法制定時から","義務化はされておらず今も任意である"],"answer":1,"explanation":"スコッチウイスキー規則2009は2009年11月23日に施行されたが、シングルモルトのスコットランド国内瓶詰め義務については業界の準備期間を考慮し3年間の経過措置が設けられ、2012年11月23日から本格適用となった。","difficulty":5},{"id":"law-087","domain":"law","level":"master","category":"regulation","tags":["bourbon","minimum-maturation"],"region":null,"question":"バーボンウイスキーにおいて「ストレートバーボン」以外の単なる「バーボン」表示に必要な最低熟成期間として正しいものは。","choices":["1年以上","2年以上","法規上の最低熟成期間の定めはない","6か月以上"],"answer":2,"explanation":"「バーボン」の名称そのものには最低熟成期間の法定義務はなく、新樽で短期間熟成しただけの製品も「バーボン」を名乗ることができる。2年以上の熟成が義務付けられるのは「ストレートバーボン」を名乗る場合のみである。","difficulty":4},{"id":"law-088","domain":"law","level":"master","category":"regulation","tags":["scotch-whisky-regulations-2009","label-regulation","extraterritorial"],"region":null,"question":"スコッチウイスキー規則2009は、スコットランド域外（イングランドや輸出先国）における「Scotch Whisky」表示の使用にも規制が及ぶか。","choices":["及ばない。スコットランド国内での表示のみが規制対象である","及ぶが、イギリス国内に限られ輸出先国では対象外である","規則の適用範囲は蒸留・熟成工程のみで表示規制は含まれない","及ぶ。域外での不当表示・誤認表示についても規則の執行対象となる"],"answer":3,"explanation":"スコッチウイスキー規則2009は、スコットランド国内に限らずイギリス国内および輸出先国での「Scotch Whisky」の不当表示・誤認表示に対してもSWA等を通じて執行される、実質的に域外にも及ぶ保護の枠組みを持つ。","difficulty":5},{"id":"law-089","domain":"law","level":"master","category":"regulation","tags":["bottled-in-bond","us-regulation"],"region":null,"question":"「ボトルド・イン・ボンド」表示において、瓶詰め後に加えることが認められている物質は。","choices":["水のみ","プレーンカラメル色素","水と少量の中性スピリッツ","特に規定はなく自由に添加できる"],"answer":0,"explanation":"ボトルド・イン・ボンド表示の要件では、規定の100プルーフに度数を調整するための水以外の物質を加えることは認められておらず、着色料・香味料等の添加は一切許されない。","difficulty":4},{"id":"law-090","domain":"law","level":"master","category":"regulation","tags":["single-grain-scotch-whisky","grain-whisky","ingredients"],"region":null,"question":"スコッチウイスキー規則2009は、グレーンウイスキーにおける麦芽（大麦麦芽）の使用比率について具体的な下限を定めているか。","choices":["10%以上と定めている","具体的な数値の下限は定めていない（実務上は酵素力確保のため一定割合が使われる）","51%以上と定めている","使用比率は麦芽100%でなければならないと定めている"],"answer":1,"explanation":"規則は水・麦芽・他の穀類を原料として認めるのみで、麦芽の使用比率について具体的な数値下限は定めていない。実務上は、他の穀類のでんぷんを糖化するために必要な酵素力を確保する目的で一定割合の麦芽が使用される。","difficulty":5},{"id":"PRD1-001","domain":"prd1","level":"expert","category":"ingredients","tags":["barley","two-row-barley","malt","ingredients"],"region":null,"question":"スコッチウイスキーの製造に主に使われる大麦の条性はどれか。","choices":["二条大麦","六条大麦","四条大麦","八条大麦"],"answer":0,"explanation":"二条大麦はデンプン含有量が高くタンパク質含有量が低いため、モルトウイスキー原料として広く用いられる。六条大麦は主に飼料用や一部のビール醸造用途に使われる。","difficulty":1},{"id":"PRD1-002","domain":"prd1","level":"expert","category":"ingredients","tags":["golden-promise","barley","two-row-barley","macallan"],"region":null,"question":"大麦品種「ゴールデンプロミス」に関する説明として正しいものはどれか。","choices":["アメリカ原産のトウモロコシの一品種である","1960年代に登場した二条大麦の品種で、マッカラン蒸留所などで長く用いられてきた","六条大麦の代表的品種である","ピートの一種である"],"answer":1,"explanation":"ゴールデンプロミスは1960年代に登場した二条大麦品種で、多くの蒸留所が高収量品種へ切り替えた後もマッカランなどが長く使用し続けたことで知られる。収量は低めだが酒質への好影響が語られてきた。","difficulty":1},{"id":"PRD1-003","domain":"prd1","level":"expert","category":"ingredients","tags":["barley","spirit-yield","variety-selection","production"],"region":null,"question":"現代のスコッチウイスキー蒸留所が使用する大麦品種を選定する際に最も重視する基準はどれか。","choices":["大麦粒の色の濃淡","品種名の由来","トン当たりのアルコール収量(スピリット・イールド)","栽培に要する年数"],"answer":2,"explanation":"蒸留業者は経済性の観点から、トン当たりのアルコール収量(LPA: litres of alcohol per tonne)を重視して大麦品種を選ぶことが多い。この基準により栽培品種は年々高収量なものへと更新されてきた。","difficulty":2},{"id":"PRD1-004","domain":"prd1","level":"expert","category":"ingredients","tags":["barley","spring-barley","cultivation"],"region":null,"question":"スコッチウイスキー用大麦の栽培形態として伝統的に中心となってきたのはどれか。","choices":["秋播き(ウィンター)大麦のみ","水耕栽培大麦","野生採取された大麦","春播き(スプリング)大麦"],"answer":3,"explanation":"伝統的にスコッチウイスキー用大麦は春播きの二条大麦が中心だった。近年は収量に優れる秋播き品種の採用も進んでいるが、依然として春播き品種が広く使われている。","difficulty":1},{"id":"PRD1-005","domain":"prd1","level":"expert","category":"ingredients","tags":["optic","barley","two-row-barley","variety-selection"],"region":null,"question":"大麦品種オプティック(Optic)の位置づけとして正しいものはどれか。","choices":["1990年代以降にゴールデンプロミスに代わって広く栽培された高収量の二条大麦品種","ピーテッドモルト専用に開発された大麦品種","アイリッシュウイスキー専用の六条大麦品種","トウモロコシとの交配品種"],"answer":0,"explanation":"オプティックは1990年代以降に広く普及した二条大麦品種で、ゴールデンプロミスより高いアルコール収量が得られることから多くの蒸留所で採用された。","difficulty":2},{"id":"PRD1-006","domain":"prd1","level":"expert","category":"ingredients","tags":["concerto","barley","two-row-barley","spirit-yield"],"region":null,"question":"大麦品種コンチェルト(Concerto)についての説明として適切なものはどれか。","choices":["フロアモルティング専用に開発された品種","2010年代にスコットランドで広く作付けされた高アルコール収量の蒸留用二条大麦品種","ピート由来のフェノール化合物を特に多く含む品種","トウモロコシの一品種"],"answer":1,"explanation":"コンチェルトは2010年代にオプティックなどに代わって広く作付けされた二条大麦品種で、高いアルコール収量が評価されて主要な蒸留用品種の一つとなった。","difficulty":2},{"id":"PRD1-007","domain":"prd1","level":"expert","category":"ingredients","tags":["barley","nitrogen-content","starch","malting-quality"],"region":null,"question":"大麦の「蒸留適性」を判定する上で重視される特性はどれか。","choices":["粒の色の濃さ","茎の高さ","低い窒素(タンパク質)含有量と高いデンプン含有量","収穫時期の早さのみ"],"answer":2,"explanation":"蒸留適性の高い大麦は窒素(タンパク質)含有量が低くデンプン含有量が相対的に高い傾向があり、糖化効率とアルコール収量の向上につながるとされる。","difficulty":2},{"id":"PRD1-008","domain":"prd1","level":"professional","category":"ingredients","tags":["six-row-barley","two-row-barley","protein-content","malting-quality"],"region":null,"question":"六条大麦がスコッチモルトウイスキーの主原料としてほとんど用いられない理由として最も適切なものはどれか。","choices":["法律により六条大麦の使用が禁止されているため","六条大麦は発芽しない性質を持つため","六条大麦にはデンプンが含まれないため","二条大麦に比べタンパク質含有量が高く、デンプン含有量が相対的に低い傾向があるため"],"answer":3,"explanation":"六条大麦は二条大麦に比べ粒が小さく不揃いでタンパク質含有量が高い傾向があり、糖化効率や収量の点で二条大麦が好まれる。六条大麦は主に飼料用や一部のビール醸造で用いられる。","difficulty":3},{"id":"PRD1-009","domain":"prd1","level":"professional","category":"ingredients","tags":["terroir","single-farm","bruichladdich","barley"],"region":null,"question":"一部の生産者(ブルイックラディックやウォーターフォードなど)が単一農場・単一品種の大麦にこだわったウイスキーを展開する背景にある考え方はどれか。","choices":["テロワール(産地・栽培環境がもたらす個性)の探求","法規制による混合大麦の使用禁止","ピート由来フェノール値の均質化義務","トウモロコシとの表示上の差別化義務"],"answer":0,"explanation":"近年一部の生産者は、単一農場・単一品種の大麦を用いることで土壌や気候といったテロワールがウイスキーの個性に与える影響を探求しており、産地や品種を明示した商品展開を行っている。","difficulty":3},{"id":"PRD1-010","domain":"prd1","level":"professional","category":"ingredients","tags":["ahdb","recommended-list","barley","variety-selection"],"region":null,"question":"英国で蒸留・製麦業者向けに大麦の推奨品種を評価・公表する業界機関のリストとして知られるものはどれか。","choices":["国際連合食糧農業機関による直接認証制度","AHDB(Agriculture and Horticulture Development Board)などによる推奨品種リスト","EU規則のみが定める単一品種リスト","各蒸留所が独自に無審査で決定する慣行"],"answer":1,"explanation":"英国ではAHDBなどの機関が実施する栽培試験に基づく推奨品種リストが公表されており、蒸留・製麦業者が新しい大麦品種を採用する際の重要な目安となっている。","difficulty":3},{"id":"PRD1-011","domain":"prd1","level":"professional","category":"ingredients","tags":["chevallier","history","barley","heritage-variety"],"region":null,"question":"19世紀のスコットランドやイングランドで広く栽培されていた歴史的な大麦品種として知られるものはどれか。","choices":["コンチェルト(Concerto)","ローリエイト(Laureate)","シュヴァリエ(Chevallier)","オプティック(Optic)"],"answer":2,"explanation":"シュヴァリエは19世紀に広く普及した歴史的な二条大麦品種で、近代の育種品種が登場する以前の主要品種の一つとされる。現在の高収量品種とは対照的に低収量だが評価されていた。","difficulty":4},{"id":"PRD1-012","domain":"prd1","level":"professional","category":"ingredients","tags":["barley","starch","malting","enzyme"],"region":null,"question":"大麦の胚乳に蓄積され、製麦・糖化工程で酵素によって発酵可能な糖に変換される主な物質は何か。","choices":["セルロース","リグニン","タンニン","デンプン"],"answer":3,"explanation":"大麦の胚乳にはデンプンが蓄積されており、製麦工程で生成される酵素(アミラーゼ)の働きによって糖化工程で発酵可能な糖に変換される。これがアルコール収量の源となる。","difficulty":3},{"id":"PRD1-013","domain":"prd1","level":"master","category":"ingredients","tags":["macallan","golden-promise","spirit-character","history"],"region":null,"question":"マッカラン蒸留所が他の主要蒸留所より長くゴールデンプロミスを使用し続けたことについて一般的に説明される理由はどれか。","choices":["収量よりも酒質への影響を重視し、高収量品種への切り替えに慎重だったとされるため","法律でゴールデンプロミス以外の使用が禁じられていたため","ゴールデンプロミスしか栽培できない土地に立地しているため","ピート含有量が最も高い品種だったため"],"answer":0,"explanation":"多くの蒸留所が1970年代以降に高収量品種へ切り替える中、マッカランは酒質への影響を懸念し、ゴールデンプロミスを比較的長く使用し続けたと一般に説明される。","difficulty":4},{"id":"PRD1-014","domain":"prd1","level":"master","category":"ingredients","tags":["nitrogen-content","barley","spirit-yield","malting-quality"],"region":null,"question":"大麦の「窒素含有量」が低いことがウイスキー製造上有利とされる主な理由はどれか。","choices":["窒素含有量が高いほど発芽が完全に停止するため","窒素(タンパク質)含有量が低いほどデンプン含有量が相対的に高くなり、アルコール収量が上がりやすいため","窒素はピート燻蒸の効率に直接影響するため","窒素含有量が熟成可能年数の上限を決めるため"],"answer":1,"explanation":"大麦粒内の窒素(タンパク質)とデンプンは相補的な関係にあり、窒素含有量が低い大麦ほど相対的にデンプン含有量が高く、糖化効率とアルコール収量の向上が期待できる。","difficulty":5},{"id":"PRD1-015","domain":"prd1","level":"master","category":"ingredients","tags":["laureate","barley","two-row-barley","variety-selection"],"region":null,"question":"大麦品種ローリエイト(Laureate)に関する記述として適切なものはどれか。","choices":["アイラ島特有のピーテッド大麦専用品種である","トウモロコシとの交配により開発された品種である","コンチェルトなどに続いて登場した高収量二条大麦品種の一つである","フロアモルティング専用に品種改良された大麦である"],"answer":2,"explanation":"ローリエイトはコンチェルトなど先行する高収量品種に続いて登場した二条大麦品種の一つで、蒸留用途向けにさらなるアルコール収量の向上が図られている。","difficulty":4},{"id":"PRD1-016","domain":"prd1","level":"expert","category":"production","tags":["steeping","malting","process"],"region":null,"question":"製麦(モルティング)工程において、収穫した大麦を水に浸して吸水させ発芽を促す最初の工程を何と呼ぶか。","choices":["乾燥(キルニング)","糖化(マッシング)","発酵(ファーメンテーション)","浸麦(スティーピング)"],"answer":3,"explanation":"製麦は浸麦・発芽・乾燥の三段階で構成される。浸麦(スティーピング)は大麦を水に浸して吸水させ、発芽に必要な水分を与える最初の工程である。","difficulty":1},{"id":"PRD1-017","domain":"prd1","level":"expert","category":"production","tags":["germination","malting","process"],"region":null,"question":"浸麦後の大麦を広げて数日間発芽させる製麦工程を何と呼ぶか。","choices":["発芽(ジャーミネーション)","浸麦(スティーピング)","キルニング(乾燥)","蒸留(ディスティレーション)"],"answer":0,"explanation":"浸麦で吸水させた大麦は、その後数日間発芽(ジャーミネーション)させることで酵素が生成され、後の糖化工程でデンプンを糖に変換できる状態になる。","difficulty":1},{"id":"PRD1-018","domain":"prd1","level":"expert","category":"production","tags":["kilning","malting","process"],"region":null,"question":"発芽を止めるために大麦を熱風で乾燥させる製麦の最終工程を何と呼ぶか。","choices":["浸麦(スティーピング)","乾燥(キルニング)","発芽(ジャーミネーション)","濾過(フィルトレーション)"],"answer":1,"explanation":"発芽が進んだ大麦をキルン(乾燥炉)で熱風により乾燥させ発芽を止める工程をキルニングと呼ぶ。この際にピートを焚けばピーテッドモルトになる。","difficulty":1},{"id":"PRD1-019","domain":"prd1","level":"expert","category":"production","tags":["floor-malting","turning","malting"],"region":null,"question":"フロアモルティングにおいて、発芽中の大麦を人手やショベルで定期的に返す作業を何と呼ぶか。","choices":["サラディンボックスの回転","ドラムの回転","天地返し(ターニング)","スパージング"],"answer":2,"explanation":"フロアモルティングでは、発芽中の大麦の温度と通気を均一に保つため、モルトショベルなどを用いて人手で定期的に天地返し(ターニング)を行う。","difficulty":2},{"id":"PRD1-020","domain":"prd1","level":"expert","category":"production","tags":["floor-malting","traditional","malting"],"region":null,"question":"フロアモルティングの説明として正しいものはどれか。","choices":["大麦を回転ドラムの中で発芽させる工業的方式である","ピートを一切使わない製麦方式のみを指す","糖化槽内で発芽させる方式である","床に大麦を広げて発芽させる伝統的な製麦方式である"],"answer":3,"explanation":"フロアモルティングは石敷きなどの床に大麦を薄く広げ、人手で天地返しをしながら発芽させる伝統的な製麦方式である。ピートの使用有無とは無関係の分類である。","difficulty":1},{"id":"PRD1-021","domain":"prd1","level":"expert","category":"production","tags":["saladin-box","mechanical-malting","malting"],"region":null,"question":"サラディンボックス式製麦の特徴として正しいものはどれか。","choices":["通気式の細長い箱の中でスクリュー(ターナー)が大麦を機械的に撹拌・移動させる方式である","大麦を回転する円筒ドラムの中で発芽させる方式である","床に人力で広げて発芽させる伝統的方式である","ピート専用に開発された発酵方式である"],"answer":0,"explanation":"サラディンボックス式は通気式の細長い箱(ボックス)の中に大麦を敷き詰め、回転するスクリュー状のターナーが機械的に撹拌・移動させることで発芽を管理する方式である。","difficulty":2},{"id":"PRD1-022","domain":"prd1","level":"expert","category":"production","tags":["drum-malting","mechanical-malting","malting"],"region":null,"question":"ドラムモルティング方式の特徴として正しいものはどれか。","choices":["床に大麦を広げて手作業で返す伝統的方式である","回転する円筒形のドラムの中で大麦を発芽させる工業的な方式である","糖化槽内で直接発芽させる方式である","ピートを燻蒸せずに乾燥のみ行う方式である"],"answer":1,"explanation":"ドラムモルティングは通気孔を備えた回転式の円筒ドラムの中で大麦を発芽させる工業的方式で、大規模なコマーシャルモルトスターで広く採用されている。","difficulty":2},{"id":"PRD1-023","domain":"prd1","level":"professional","category":"production","tags":["steeping","wet-dry-steep","moisture-content","malting"],"region":null,"question":"浸麦(スティーピング)工程で一般的に用いられる「湿式と乾式を交互に行う」操作の目的として適切なものはどれか。","choices":["ピートの煙を大麦に均一に吸着させるため","タンパク質を完全に除去するため","大麦に酸素を供給しつつ吸水率を目標(約45%前後)まで段階的に高めるため","発酵に必要な酵母を大麦表面に付着させるため"],"answer":2,"explanation":"浸麦では水に浸す湿式と、水を抜いて空気に触れさせる乾式を交互に繰り返すことで、大麦に酸素を供給しながら発芽に適した含水率(概ね45%前後)まで段階的に高めていく。","difficulty":3},{"id":"PRD1-024","domain":"prd1","level":"professional","category":"production","tags":["germination","enzyme","amylase","malting"],"region":null,"question":"発芽工程で大麦の中に生成され、後の糖化工程でデンプンを糖に変換する働きをする物質は何か。","choices":["ペクチン","リグニン","フェノール化合物のみ","アミラーゼなどの酵素"],"answer":3,"explanation":"発芽の過程で大麦はアミラーゼをはじめとする各種酵素を生成する。これらの酵素は乾燥工程を経ても失活せず麦芽中に保持され、後の糖化工程でデンプンを発酵可能な糖に変換する。","difficulty":3},{"id":"PRD1-025","domain":"prd1","level":"professional","category":"production","tags":["germination","acrospire","rootlet","malting"],"region":null,"question":"発芽中の大麦の胚から伸び、製麦の進行度を示す指標として観察される部位はどれか。","choices":["アクロスパイア(幼芽)とルートレット(根)","外殻(ハスク)の厚み","ピートの吸着層","グリストの粒度"],"answer":0,"explanation":"発芽が進むと大麦の胚からアクロスパイア(幼芽)とルートレット(根)が伸び始める。これらの伸び具合は発芽・モジフィケーションの進行度を確認する目安として観察される。","difficulty":3},{"id":"PRD1-026","domain":"prd1","level":"professional","category":"production","tags":["commercial-maltster","floor-malting","industry-practice"],"region":null,"question":"現代のスコッチウイスキー業界において、多くの蒸留所が採用している製麦の調達形態として最も一般的なものはどれか。","choices":["全蒸留所が今なお自社フロアモルティングのみで賄っている","自社で製麦を行わず、コマーシャルモルトスター(商業製麦業者)から購入する","製麦は法律で蒸留所内での実施が義務付けられている","全量を輸入モルトウイスキーから調達している"],"answer":1,"explanation":"現代では大半のスコッチウイスキー蒸留所が自社製麦を行わず、大規模なコマーシャルモルトスターから麦芽を購入している。自社フロアモルティングを続ける蒸留所はごく一部にとどまる。","difficulty":4},{"id":"PRD1-027","domain":"prd1","level":"professional","category":"production","tags":["floor-malting","bowmore","balvenie","springbank"],"region":null,"question":"フロアモルティングを現在も一部継続している蒸留所の例として一般に知られるものはどれか。","choices":["グレンフィディックとバランタインのみ","すべてのアイラ島蒸留所","ボウモアやバルヴェニー、スプリングバンクなど","グレーンウイスキー蒸留所全般"],"answer":2,"explanation":"自社フロアモルティングを一部でも継続している蒸留所は少数派で、ボウモアやバルヴェニー、スプリングバンクなどが代表例として知られる。多くの場合、必要量の一部のみを自社製麦で賄っている。","difficulty":4},{"id":"PRD1-028","domain":"prd1","level":"master","category":"production","tags":["saladin-box","history","mechanical-malting"],"region":null,"question":"サラディンボックス式製麦を考案したとされる人物・国にちなむ名称の由来として一般に説明されるものはどれか。","choices":["スコットランドの地名アイラ島の古称に由来する","ピート採掘業者サラディン社の社名に由来する","大麦品種の名称に由来する","19世紀にフランス人シャルル・サラダンが考案した機械式製麦装置に由来する"],"answer":3,"explanation":"サラディンボックスという名称は、19世紀にフランス人技術者シャルル・サラダンが考案した機械式製麦装置に由来するとされる。人力の天地返しを機械化した画期的な方式として各国に広まった。","difficulty":4},{"id":"PRD1-029","domain":"prd1","level":"master","category":"production","tags":["modification","germination","malting","cell-wall"],"region":null,"question":"製麦工程における「モジフィケーション(Modification)」という用語が指す内容として適切なものはどれか。","choices":["発芽の進行に伴い胚乳内の細胞壁やタンパク質構造が分解され、デンプンが糖化しやすい状態になる度合い","ピートの燻蒸強度そのものを表す指標","大麦の水分含有率の別称","糖化槽内でのグリスト粒度の調整作業"],"answer":0,"explanation":"モジフィケーションとは、発芽の進行に伴い大麦胚乳内の細胞壁やタンパク質構造が酵素によって分解され、デンプンが後の糖化工程で利用しやすい状態になる度合いを指す用語である。","difficulty":5},{"id":"PRD1-030","domain":"prd1","level":"master","category":"production","tags":["floor-malting","malt-shovel","tools","tradition"],"region":null,"question":"フロアモルティングにおいて発芽の進行を人力で確認・管理する際、伝統的に用いられてきた道具はどれか。","choices":["サラディンスクリューのみ","モルトショベル(木製のシャベル)や「Shiel」と呼ばれる道具","蒸気コイル","スピリットセーフ"],"answer":1,"explanation":"フロアモルティングでは、モルトショベルと呼ばれる木製のシャベルや「Shiel」と呼ばれる専用道具を用いて発芽中の大麦を返し、進行状況を確認しながら管理してきた。","difficulty":4},{"id":"PRD1-031","domain":"prd1","level":"expert","category":"chemistry","tags":["peat","composition","bog","plant-material"],"region":null,"question":"ピート(泥炭)の主な成分・由来として正しいものはどれか。","choices":["石炭の一種で鉱物由来である","トウモロコシの茎を圧縮したものである","湿地で堆積し、部分的に分解した植物遺骸(コケ・ヘザーなど)","火山灰が堆積したものである"],"answer":2,"explanation":"ピート(泥炭)は湿地(ボグ)において酸欠状態でコケ類やヘザーなどの植物が長い年月をかけて部分的に分解・堆積してできたものである。地域ごとに堆積した植物の種類が異なる。","difficulty":1},{"id":"PRD1-032","domain":"prd1","level":"expert","category":"chemistry","tags":["peating","kilning","phenol","malting"],"region":null,"question":"製麦工程でピートを燃焼させ、その煙を大麦に吸着させる操作を一般に何と呼ぶか。","choices":["スティーピング(浸麦)","マッシング(糖化)","ラッキング(樽詰め)","ピーティング(燻蒸)"],"answer":3,"explanation":"キルニング(乾燥)工程でピートを焚き、その煙を大麦に吸着させる操作をピーティングと呼ぶ。これによりフェノール化合物由来のスモーキーな香味が麦芽に付与される。","difficulty":2},{"id":"PRD1-033","domain":"prd1","level":"expert","category":"chemistry","tags":["phenol","ppm","peat","chemistry"],"region":null,"question":"ピート由来の香味成分を評価する際に用いられる単位「フェノール値(ppm)」の意味として正しいものはどれか。","choices":["100万分率で表したフェノール化合物の濃度","アルコール度数を表す単位","樽の炭化度合いを表す単位","熟成年数を換算した単位"],"answer":0,"explanation":"ppm(parts per million)は100万分率を表す単位で、フェノール値としてはモルトなどの試料中に含まれるフェノール化合物の濃度を示す指標として用いられる。","difficulty":2},{"id":"PRD1-034","domain":"prd1","level":"expert","category":"chemistry","tags":["ardbeg","phenol","ppm","peated-whisky"],"region":null,"question":"一般にフェノール値が非常に高いピーテッドウイスキーの例として知られる蒸留所はどれか。","choices":["グレンリベット","アードベッグ","オーヘントッシャン","クライヌリッシュ"],"answer":1,"explanation":"アードベッグはアイラ島の蒸留所で、モルトのフェノール値がおよそ50ppm台に達する強いピーティーさで知られる。対照的にグレンリベットやオーヘントッシャンはアンピーテッドが基本である。","difficulty":2},{"id":"PRD1-035","domain":"prd1","level":"expert","category":"chemistry","tags":["phenol","ppm","malt","measurement"],"region":null,"question":"フェノール値の測定は通常どの段階の試料に対して行われるか。","choices":["熟成後の原酒のみ","蒸留前のもろみ(ウォッシュ)のみ","乾燥後のモルト(麦芽)","出荷前のボトリング原酒のみ"],"answer":2,"explanation":"フェノール値は一般に、乾燥工程を終えた後のモルト(麦芽)を試料として測定される。蒸留や熟成を経ると成分が変化するため、モルト段階の値が原料スペックとして用いられる。","difficulty":2},{"id":"PRD1-036","domain":"prd1","level":"expert","category":"chemistry","tags":["islay","peat","coastal-peat","phenol"],"region":null,"question":"アイラ島のウイスキーが一般に「ピーティ」で「ヨード香・潮風のような風味」を持つとされる要因として挙げられるものはどれか。","choices":["糖化槽の素材が銅であること","グレーンウイスキーとのブレンドのみによるもの","熟成に使うシェリー樽の影響のみによるもの","海に近い湿地帯で堆積した、海藻・塩分の影響を受けたピートの使用"],"answer":3,"explanation":"アイラ島のピートは海に近い湿地帯で堆積しており、海藻や塩分の影響を受けているとされる。これがヨード香・潮風のような独特の風味の一因として挙げられることが多い。","difficulty":1},{"id":"PRD1-037","domain":"prd1","level":"expert","category":"chemistry","tags":["unpeated-malt","peat","kilning"],"region":null,"question":"「アンピーテッド(ノンピーテッド)モルト」の説明として正しいものはどれか。","choices":["乾燥工程でピートをほとんど、あるいは全く用いない麦芽","浸麦を行わない麦芽","六条大麦のみを用いた麦芽","発酵を行わない麦芽"],"answer":0,"explanation":"アンピーテッドモルトとは、キルニング(乾燥)工程でピートをほとんど、あるいは全く用いずに乾燥させた麦芽を指す。フェノール値はごく低い値(数ppm未満)にとどまる。","difficulty":1},{"id":"PRD1-038","domain":"prd1","level":"professional","category":"chemistry","tags":["phenol","ppm","distillation","new-make-spirit"],"region":null,"question":"モルトのフェノール値(ppm)と、最終的な蒸留原酒(ニューメイクスピリット)中のフェノール濃度との関係について一般に言われることはどれか。","choices":["両者は工程を通じて完全に同一の値を維持する","糖化・発酵・蒸留の過程でフェノール成分の一部が失われるため、原酒のフェノール濃度はモルトのppm値より低くなる傾向がある","蒸留によってフェノール濃度はモルトの数倍に増加する","フェノール値は熟成後にのみ発生し蒸留前には存在しない"],"answer":1,"explanation":"モルトに含まれるフェノール化合物は糖化・発酵・蒸留の各工程を経る過程で一部が失われるため、最終的なニューメイクスピリットのフェノール濃度はモルト段階のppm値よりも低くなる傾向があるとされる。","difficulty":3},{"id":"PRD1-039","domain":"prd1","level":"professional","category":"chemistry","tags":["peat","regional-variation","composition"],"region":null,"question":"ピートの構成が地域によって異なる要因として挙げられるものはどれか。","choices":["すべてのピートは化学的に同一組成であるため差はない","ピートは人工的に配合され産地差はない","堆積した植物の種類(ヘザー・コケ・草本・樹木質など)や土壌環境の違い","フェノール値は気温のみで決まりピート組成とは無関係である"],"answer":2,"explanation":"ピートは長い年月をかけて堆積した植物遺骸から成るため、その地域に生育していた植物の種類(ヘザー・コケ・草本・樹木質など)や土壌・湿地環境の違いによって組成が異なるとされる。","difficulty":3},{"id":"PRD1-040","domain":"prd1","level":"professional","category":"chemistry","tags":["phenol","guaiacol","cresol","chemistry"],"region":null,"question":"「トータルフェノール」と呼ばれる測定値に含まれる代表的な化合物として知られるものはどれか。","choices":["エタノールとメタノールのみ","タンニンとリグニンのみ","乳酸とクエン酸のみ","グアイアコール、フェノール、クレゾール類"],"answer":3,"explanation":"トータルフェノール値には、グアイアコール、フェノール、各種クレゾール類など複数のフェノール系化合物が含まれ、これらが合算されてppm値として示される。","difficulty":3},{"id":"PRD1-041","domain":"prd1","level":"professional","category":"chemistry","tags":["phenol","ppm","lightly-peated","malt"],"region":null,"question":"一般的な「ライトリーピーテッド」とされるモルトのフェノール値のおおよその範囲として近いものはどれか。","choices":["概ね2〜10ppm程度","概ね150〜200ppm程度","概ね0.001ppm未満","概ね1000ppm以上"],"answer":0,"explanation":"ライトリーピーテッドとされるモルトのフェノール値は概ね2〜10ppm程度とされることが多く、アンピーテッド(数ppm未満)とヘビリーピーテッド(30ppm以上)の中間に位置づけられる。","difficulty":3},{"id":"PRD1-042","domain":"prd1","level":"professional","category":"chemistry","tags":["octomore","phenol","ppm","bruichladdich"],"region":null,"question":"オクトモアが「世界で最もピーティーなウイスキー」の一つとして知られる理由として挙げられるものはどれか。","choices":["熟成年数が他銘柄より突出して長いため","モルトのフェノール値が100ppmを超え、時に200ppm台に達する例もあるため","使用する大麦がすべて六条大麦であるため","ピートを一切使用していないため"],"answer":1,"explanation":"オクトモアはブルイックラディック蒸留所がリリースするブランドで、モルトのフェノール値が100ppmを大きく超え、リリースによっては200ppm台に達する例もあり、極めて高いピーティーさで知られる。","difficulty":4},{"id":"PRD1-043","domain":"prd1","level":"master","category":"chemistry","tags":["phenol","ppm","uv-spectrophotometry","measurement"],"region":null,"question":"フェノール値の測定に一般に用いられる分析手法として知られるものはどれか。","choices":["ガスクロマトグラフィーのみが公式規格である","味覚官能検査のみで数値化される","紫外線吸光光度法(UV分光光度計)による測定","放射性炭素年代測定法"],"answer":2,"explanation":"フェノール値の測定には、試料を蒸留してフェノール成分を抽出した上で紫外線吸光光度法(UV分光光度計)を用いて数値化する方法が一般に用いられる。","difficulty":4},{"id":"PRD1-044","domain":"prd1","level":"master","category":"chemistry","tags":["peating","kilning","phenol","airflow"],"region":null,"question":"ピートの燻蒸強度とキルン(乾燥炉)内の気流・時間管理の関係について、フェノール値を高めるために一般に行われる操作はどれか。","choices":["乾燥温度を極端に低く保ち発芽を継続させる","ピートを燃やさず粉末のまま大麦に混合する","浸麦時間を短縮しフェノール吸着を促す","ピート由来の煙にさらす時間を長く取り、通気を制御して煙を大麦層に十分浸透させる"],"answer":3,"explanation":"フェノール値を高めるためには、キルン内でピート由来の煙にさらす時間を長く取り、通気(エアフロー)を制御して煙が大麦層全体に十分浸透するよう管理することが一般に行われる。","difficulty":5},{"id":"PRD1-045","domain":"prd1","level":"master","category":"chemistry","tags":["peat","environment","sustainability","carbon-storage"],"region":null,"question":"ピートの採掘に関する近年の議論として挙げられるものはどれか。","choices":["泥炭地が炭素貯蔵庫として重要であり、採掘による環境負荷が課題視されている","ピートは無尽蔵に再生されるため環境負荷は皆無とされている","ピート採掘は法律上完全に禁止されている","ピートはすべて輸入品であり国内採掘は行われていない"],"answer":0,"explanation":"泥炭地は長期にわたり炭素を蓄積してきた重要な生態系であり、採掘による炭素放出や環境への負荷が近年の議論の対象となっている。一部の生産者は持続可能な調達への取り組みを進めている。","difficulty":4},{"id":"PRD1-046","domain":"prd1","level":"expert","category":"production","tags":["mashing","mash-tun","process"],"region":null,"question":"粉砕した麦芽(グリスト)と温水を混ぜてデンプンを糖に変換する工程、およびその容器をそれぞれ何と呼ぶか。","choices":["発酵(ファーメンテーション)工程、ウォッシュバック","糖化(マッシング)工程、糖化槽(マッシュタン)","蒸留(ディスティレーション)工程、ポットスチル","熟成(マチュレーション)工程、樽"],"answer":1,"explanation":"粉砕した麦芽(グリスト)に温水を加えてデンプンを糖に変換する工程を糖化(マッシング)、その容器を糖化槽(マッシュタン)と呼ぶ。","difficulty":1},{"id":"PRD1-047","domain":"prd1","level":"expert","category":"production","tags":["grist","husk","grits","flour","milling"],"region":null,"question":"麦芽を粉砕した際に得られる「グリスト」を構成する3つの粒度区分として正しいものはどれか。","choices":["大粒・中粒・小粒のみの区分","ピーテッド・アンピーテッド・混合の区分","ハスク(外殻)、グリッツ(粗粉)、フラワー(微粉)","一番麦汁・二番麦汁・三番麦汁の区分"],"answer":2,"explanation":"麦芽粉砕機(ミル)で挽かれたグリストは、粒度によりハスク(外殻)、グリッツ(粗粉)、フラワー(微粉)の3区分に分けられ、この比率が糖化効率に影響する。","difficulty":1},{"id":"PRD1-048","domain":"prd1","level":"expert","category":"production","tags":["grist","husk-grits-flour-ratio","milling"],"region":null,"question":"一般的なグリストの粒度比率として知られる近似値はどれか。","choices":["ハスク約70%・グリッツ約20%・フラワー約10%","ハスク約10%・グリッツ約10%・フラワー約80%","各33%ずつの均等比率","ハスク約20%・グリッツ約70%・フラワー約10%"],"answer":3,"explanation":"一般的なグリストの粒度比率はハスク約20%・グリッツ約70%・フラワー約10%程度とされる。ハスクが少なすぎたりフラワーが多すぎたりすると濾過効率が悪化しやすい。","difficulty":2},{"id":"PRD1-049","domain":"prd1","level":"expert","category":"production","tags":["wort","mashing","terminology"],"region":null,"question":"糖化工程で生成される糖分を含む液体を何と呼ぶか。","choices":["ウォート(麦汁)","ウォッシュ(もろみ)","ニューメイクスピリット","フェインツ"],"answer":0,"explanation":"糖化槽でグリストと温水を混ぜて得られる糖分を含む液体をウォート(麦汁)と呼ぶ。ウォートに酵母を加えて発酵させるとウォッシュ(もろみ)になる。","difficulty":1},{"id":"PRD1-050","domain":"prd1","level":"expert","category":"production","tags":["mashing","water-temperature","sparging"],"region":null,"question":"糖化工程で温水を複数回に分けて投入する際、一般に水温がどのように変化していくか。","choices":["毎回同じ温度で投入する","1回目より2回目、2回目より3回目の湯温を高くしていく","回を追うごとに湯温を下げていく","水温は無関係であり常温で行う"],"answer":1,"explanation":"糖化工程では通常2〜3回に分けて湯を投入し、回を追うごとに湯温を高くしていく。これにより酵素活性を保ちながら糖分を効率よく抽出できる。","difficulty":2},{"id":"PRD1-051","domain":"prd1","level":"expert","category":"production","tags":["mash-tun","false-bottom","filtration"],"region":null,"question":"糖化槽(マッシュタン)の底部に設けられた、麦汁を漉し取るための構造物を何と呼ぶか。","choices":["コンデンサー","スピリットセーフ","偽底(フォールスボトム、スロット付きプレート)","ラマジャー"],"answer":2,"explanation":"糖化槽の底部にはスロット(細い溝)が入ったプレートを敷いた偽底(フォールスボトム)が設けられており、グリストの殻(ハスク)がろ過層となって澄んだウォートを漉し取る役割を果たす。","difficulty":2},{"id":"PRD1-052","domain":"prd1","level":"expert","category":"production","tags":["mashing","enzyme","temperature","amylase"],"region":null,"question":"糖化温度を過度に高く設定した場合に生じやすい問題として挙げられるものはどれか。","choices":["フェノール値が大幅に上昇する","発酵時間が大幅に短縮される","樽由来の香味が強調される","デンプンを糖化する酵素(アミラーゼ)が失活し、糖化効率が低下する"],"answer":3,"explanation":"糖化温度が高すぎると麦芽中のアミラーゼなどの酵素が失活し、デンプンを糖に変換する効率が低下してしまう。適切な温度管理が糖化効率を左右する重要な要素となる。","difficulty":2},{"id":"PRD1-053","domain":"prd1","level":"professional","category":"production","tags":["mash-tun","stainless-steel","materials"],"region":null,"question":"糖化槽の素材として現代の多くの蒸留所で採用されているものはどれか。","choices":["ステンレススチール","木製のみが法律で義務付けられている","銅製のみが認められている","プラスチック製のみが使用される"],"answer":0,"explanation":"現代の多くの蒸留所では、洗浄性や耐久性、温度管理のしやすさからステンレススチール製の糖化槽が広く採用されている。伝統的な木製の糖化槽は現在では少数派である。","difficulty":3},{"id":"PRD1-054","domain":"prd1","level":"professional","category":"production","tags":["full-lauter-mash-tun","rake","mashing"],"region":null,"question":"「フルロイタータン」と呼ばれる糖化槽の特徴として正しいものはどれか。","choices":["糖化槽内で発酵まで完結させる一体型設備である","回転する熊手状の刃(レーキ/ナイフ)を上下させ、効率的な濾過とスパージングを行える構造を持つ","ピートを直接投入して燻蒸を行う設備である","蒸留機と一体化した設備である"],"answer":1,"explanation":"フルロイタータンは回転するレーキ(熊手状の刃)を上下させながら撹拌・濾過を行える構造を持ち、グリスト層を崩さずに効率的な濾過とスパージング(追い湯)を実現できる。","difficulty":3},{"id":"PRD1-055","domain":"prd1","level":"professional","category":"production","tags":["wort-clarity","cloudy-wort","clear-wort","spirit-character"],"region":null,"question":"ウォート(麦汁)の「清澄(クリア)」と「濁り(クラウディ)」に関する一般的な傾向として言われることはどれか。","choices":["清澄・濁りは酒質に一切影響しないとされる","濁ったウォートは必ずピーティーな酒質になる","清澄なウォートは軽やかでフルーティーな酒質に、濁ったウォートは重厚で穀物香の強い酒質になりやすいとされる","清澄なウォートはアルコール度数を直接高める"],"answer":2,"explanation":"ウォートの清澄度は最終的な酒質の傾向に影響するとされ、固形分の少ない清澄なウォートは軽やかでフルーティーな酒質に、固形分を多く含む濁ったウォートは重厚で穀物香の強い酒質になりやすいと一般に言われる。","difficulty":3},{"id":"PRD1-056","domain":"prd1","level":"professional","category":"production","tags":["grist","milling","filtration","mash-tun"],"region":null,"question":"グリストの粒度が細かすぎる(フラワーが過多になる)場合に糖化槽で起きやすい問題として挙げられるものはどれか。","choices":["発酵が完全に停止する","ピートのフェノール値が急上昇する","蒸留収率が理論値を超えて増加する","濾過層が目詰まりし、麦汁の濾過(ランオフ)が滞りやすくなる"],"answer":3,"explanation":"グリストのフラワー(微粉)が過多になると、糖化槽内の濾過層が目詰まりしやすくなり、ウォートの濾過(ランオフ)が滞る原因となる。適切な粒度比率の維持が重要である。","difficulty":3},{"id":"PRD1-057","domain":"prd1","level":"professional","category":"production","tags":["mashing","sparging","water-reuse","mash-tun"],"region":null,"question":"糖化工程で最後に投入される最も高温の湯(スパージ水)は、通常どのように再利用されるか。","choices":["排出後に加熱し直し、次の仕込みの1回目の湯として再利用される","廃棄され再利用されることはない","そのまま発酵槽に直接投入される","蒸留機の冷却水としてのみ用いられる"],"answer":0,"explanation":"最終回に投入される高温のスパージ水は糖分抽出後にホットリカーとして回収され、加熱し直した上で次の仕込みの1回目の湯として再利用されるのが一般的である。","difficulty":4},{"id":"PRD1-058","domain":"prd1","level":"master","category":"production","tags":["full-lauter-mash-tun","semi-lauter-mash-tun","mash-tun"],"region":null,"question":"セミロイタータンとフルロイタータンの違いとして一般に説明されるものはどれか。","choices":["セミロイタータンはピート専用設備である","フルロイタータンはレーキの角度や高さを精密に制御できるのに対し、セミロイタータンは簡易な機構にとどまる","フルロイタータンは発酵まで一体で行う","両者に構造上の違いはなく呼称のみが異なる"],"answer":1,"explanation":"フルロイタータンはレーキ(刃)の角度や高さを精密に制御でき、効率的な濾過を実現する。一方セミロイタータンはより簡易な撹拌機構にとどまり、伝統的な糖化槽に近い構造を持つ。","difficulty":4},{"id":"PRD1-059","domain":"prd1","level":"master","category":"production","tags":["wort-clarity","turbidity","mashing","mash-tun"],"region":null,"question":"麦汁の濁度(ターイビディティ)を左右する要因として、グリスト比率以外に挙げられる工程上の要素はどれか。","choices":["樽の焼成レベル","蒸留機の材質のみ","麦汁の濾過(ランオフ)速度や糖化槽内での撹拌強度","熟成庫の湿度のみ"],"answer":2,"explanation":"麦汁の濁度はグリストの粒度比率だけでなく、濾過(ランオフ)速度や糖化槽内での撹拌の強さなど、糖化工程における操作条件によっても左右されるとされる。","difficulty":5},{"id":"PRD1-060","domain":"prd1","level":"master","category":"production","tags":["mash-tun","oars","tools","tradition"],"region":null,"question":"伝統的な糖化槽で用いられていた、麦汁を撹拌するための道具「オールズ(oars)」の説明として正しいものはどれか。","choices":["樽材を加工するための専用工具","蒸留機のネック形状の一種","ピート採掘用の道具","手動で麦汁とグリストを撹拌するための木製の櫂状の道具"],"answer":3,"explanation":"オールズは古い時代の糖化槽で用いられた、麦汁とグリストを手動で撹拌するための木製の櫂状の道具である。現代では機械式のレーキやスターラーに取って代わられている。","difficulty":4},{"id":"PRD1-061","domain":"prd1","level":"expert","category":"production","tags":["washback","fermentation","process"],"region":null,"question":"糖化後の麦汁に酵母を加えてアルコール発酵させる工程で使われる発酵槽を何と呼ぶか。","choices":["ウォッシュバック","マッシュタン","ポットスチル","スピリットセーフ"],"answer":0,"explanation":"糖化後のウォートに酵母を加えてアルコール発酵させる際に使われる発酵槽をウォッシュバックと呼ぶ。木製またはステンレス製が一般的である。","difficulty":1},{"id":"PRD1-062","domain":"prd1","level":"expert","category":"production","tags":["wash","fermentation","terminology"],"region":null,"question":"発酵によって生成される、アルコール分を含む液体を何と呼ぶか。","choices":["ウォート(麦汁)","ウォッシュ(もろみ)","ニューメイクスピリット","フェインツ"],"answer":1,"explanation":"ウォートに酵母を加えて発酵させると、アルコール分を含む液体であるウォッシュ(もろみ)が生成される。ウォッシュはこの後蒸留工程に送られる。","difficulty":1},{"id":"PRD1-063","domain":"prd1","level":"expert","category":"production","tags":["distillers-yeast","yeast","fermentation"],"region":null,"question":"ウイスキー製造で一般的に使われる「ディスティラーズ酵母」の特徴として正しいものはどれか。","choices":["ビール醸造用に選抜され香味重視で培養された酵母株である","野生酵母のみを指す用語である","風味よりもアルコール収量・発酵速度を重視して選抜・培養された酵母株である","乳酸菌の別称である"],"answer":2,"explanation":"ディスティラーズ酵母は、香味の複雑さよりもアルコール収量と発酵速度を重視して選抜・培養された酵母株である。多くの蒸留所が専用の培養酵母を使用している。","difficulty":2},{"id":"PRD1-064","domain":"prd1","level":"expert","category":"production","tags":["washback","wood","materials","oregon-pine"],"region":null,"question":"ウォッシュバックの伝統的な素材として知られるものはどれか。","choices":["ガラス","コンクリートのみ","陶器","木材(オレゴンパインなど)"],"answer":3,"explanation":"ウォッシュバックの伝統的な素材としてはオレゴンパイン(ダグラスファー)などの木材が広く用いられてきた。現代では洗浄性に優れるステンレス製も多く採用されている。","difficulty":1},{"id":"PRD1-065","domain":"prd1","level":"expert","category":"production","tags":["fermentation-time","spirit-character","short-fermentation"],"region":null,"question":"発酵時間が比較的短い(48時間程度)場合、一般に生成されやすいとされる酒質の傾向はどれか。","choices":["穀物香・ナッティーな風味が比較的強く出やすい","フルーティーなエステル香が最大化される","ピート香が完全に消失する","熟成年数が自動的に延びる"],"answer":0,"explanation":"発酵時間が短い(48時間程度)場合、酵母主体の発酵にとどまりやすく、穀物香やナッティーな風味が比較的強く残るとされる。長時間発酵ではより複雑なフルーティーさが生まれやすい。","difficulty":2},{"id":"PRD1-066","domain":"prd1","level":"expert","category":"production","tags":["fermentation-time","ester","long-fermentation","spirit-character"],"region":null,"question":"発酵時間を長く取る(72時間以上など)ことで一般に増加するとされる香味成分の傾向はどれか。","choices":["ピート由来のフェノール香のみ","フルーティーなエステル香や複雑な酸由来の風味","樽由来のバニラ香のみ","塩味成分のみ"],"answer":1,"explanation":"発酵時間を長く取ると、酵母の活動が落ち着いた後に乳酸菌などの働きが活発になり、フルーティーなエステル香や複雑な酸由来の風味が増加しやすいとされる。","difficulty":2},{"id":"PRD1-067","domain":"prd1","level":"professional","category":"production","tags":["lactic-acid-bacteria","fermentation","flavor-development"],"region":null,"question":"発酵過程において、酵母の活動が弱まった発酵後半に活発化するとされる乳酸菌(LAB)の役割として挙げられるものはどれか。","choices":["デンプンを直接分解してアルコールを生成する","ピートのフェノール値を人為的に高める","乳酸や関連する香味前駆体を生成し、フルーティーで複雑な風味形成に寄与する","樽材を分解してタンニンを生成する"],"answer":2,"explanation":"発酵後半になり酵母の活動が弱まると乳酸菌(LAB)が優勢になりやすく、乳酸をはじめとする有機酸やエステルの前駆体を生成することでフルーティーで複雑な風味形成に寄与するとされる。","difficulty":3},{"id":"PRD1-068","domain":"prd1","level":"professional","category":"production","tags":["washback","wood","stainless-steel","lactic-acid-bacteria"],"region":null,"question":"ウォッシュバックの素材として木製とステンレス製を比較した際、一般に言われる違いとして適切なものはどれか。","choices":["木製ウォッシュバックは金属製より発酵時間を必ず短縮する","ステンレス製は乳酸菌の活動を最大化する","素材の違いは酒質に一切影響しないとされる","木製は木材の導管に生息する微生物(乳酸菌等)が発酵に関与しやすく、ステンレス製は洗浄・温度管理がしやすく安定性に優れるとされる"],"answer":3,"explanation":"木製ウォッシュバックは木材の導管部分に生息する微生物(乳酸菌など)が発酵に関与しやすく複雑な香味に寄与するとされる一方、ステンレス製は洗浄や温度管理がしやすく安定した発酵を行いやすいとされる。","difficulty":3},{"id":"PRD1-069","domain":"prd1","level":"professional","category":"production","tags":["brewers-yeast","distillers-yeast","flavor-complexity","fermentation"],"region":null,"question":"一部の蒸留所が「ブリュワーズ酵母(ビール酵母)」をディスティラーズ酵母と併用する目的として挙げられるものはどれか。","choices":["アルコール収量だけでなく香味の複雑性を高めるため","アルコール収量のみを最大化するため","ピートのフェノール値を高めるため","発酵を完全に停止させるため"],"answer":0,"explanation":"一部の蒸留所ではディスティラーズ酵母にブリュワーズ酵母(ビール酵母)を併用することで、アルコール収量だけでなく発酵由来の香味の複雑性を高めることを狙っているとされる。","difficulty":3},{"id":"PRD1-070","domain":"prd1","level":"professional","category":"production","tags":["washback","switcher","fermentation","foam-control"],"region":null,"question":"発酵中にウォッシュバック内で泡立ちが激しくなった際、伝統的に泡を抑えるために使われてきた装置・仕組みはどれか。","choices":["ラマジャー","スイッチャー(回転式の泡消し羽根)","スピリットセーフ","コンデンサー"],"answer":1,"explanation":"発酵中は炭酸ガスの発生により泡立ちが激しくなることがあり、これを抑えるために回転式の羽根を持つスイッチャーと呼ばれる装置が伝統的に用いられてきた。","difficulty":4},{"id":"PRD1-071","domain":"prd1","level":"professional","category":"production","tags":["fermentation-temperature","yeast","off-flavor","spirit-character"],"region":null,"question":"発酵温度の管理に関して、酵母の活動と発酵で生じる香味成分の関係について一般に言われることはどれか。","choices":["発酵温度は酒質に一切影響しない","発酵温度が低いほど必ずピート香が増す","発酵温度が高すぎると酵母がストレスを受け、望ましくないオフフレーバーが生じやすい","発酵温度は蒸留収率のみに影響し香味には無関係である"],"answer":2,"explanation":"発酵温度が高くなりすぎると酵母がストレスを受けやすくなり、望ましくないオフフレーバーが生じる原因となり得るとされる。多くの蒸留所は発酵温度の管理を重視している。","difficulty":3},{"id":"PRD1-072","domain":"prd1","level":"professional","category":"production","tags":["lactic-acid-bacteria","ester","ethyl-lactate","fermentation"],"region":null,"question":"乳酸菌がウォッシュ中で生成に関与するとされる、フルーティーな香気成分の前駆体の一つとして知られるものはどれか。","choices":["グアイアコール","タンニン","リグニン","乳酸エチルなどのエステル類の前駆体となる有機酸"],"answer":3,"explanation":"乳酸菌は発酵過程で乳酸をはじめとする有機酸を生成し、これが後にエステル化することで乳酸エチルなどのフルーティーな香気成分の前駆体になるとされる。","difficulty":4},{"id":"PRD1-073","domain":"prd1","level":"master","category":"production","tags":["fermentation","lactic-acid-bacteria","yeast","two-stage-fermentation"],"region":null,"question":"発酵初期(酵母主体の段階)と発酵後期(乳酸菌が優勢になる段階)の二段階性について、一般的な学術的説明として適切なものはどれか。","choices":["発酵前半は酵母によるアルコール生成が主体で、後半になるにつれ乳酸菌が優勢となり複雑な副産物を生成するとされる","発酵は常に酵母のみが単独で進行し乳酸菌は関与しないとされる","発酵後半はピート由来菌のみが活動するとされる","発酵は前半・後半とも同一の化学反応のみで進行するとされる"],"answer":0,"explanation":"発酵は前半が酵母主体のアルコール生成段階、後半が乳酸菌をはじめとする微生物が優勢になり複雑な副産物を生成する段階という二段階性を持つと一般に説明される。","difficulty":4},{"id":"PRD1-074","domain":"prd1","level":"master","category":"production","tags":["washback","oregon-pine","douglas-fir","materials"],"region":null,"question":"ウォッシュバックの木材としてオレゴンパイン(ダグラスファー)が伝統的に好まれてきた理由として挙げられるものはどれか。","choices":["ピートを豊富に含む木材であるため","大径の木材が入手しやすく、加工性や耐久性のバランスに優れていたため","発酵を完全に阻害する抗菌性を持つため","フェノール値を人為的に上昇させるため"],"answer":1,"explanation":"オレゴンパイン(ダグラスファー)は大径の木材が比較的入手しやすく、大型のウォッシュバックを作る上で加工性や耐久性のバランスに優れていたことから伝統的に好まれてきたとされる。","difficulty":5},{"id":"PRD1-075","domain":"prd1","level":"master","category":"production","tags":["fermentation-time","spirit-character","lactic-acid-bacteria"],"region":null,"question":"発酵時間の長短が最終的な原酒の酒質に与える影響について、蒸留所が発酵時間を意図的に延長する主な狙いとして挙げられるものはどれか。","choices":["アルコール収量を法律上の上限まで高めるため","ピートのフェノール値を発酵段階で追加するため","乳酸菌由来の香味成分を増やし、より複雑でフルーティーな酒質を目指すため","樽由来の香味を発酵段階で先取りするため"],"answer":2,"explanation":"発酵時間を意図的に延長することで、酵母主体の発酵の後に乳酸菌の活動を促し、その代謝物由来の香味成分を増やすことでより複雑でフルーティーな酒質を目指す狙いがあるとされる。","difficulty":4},{"id":"PRD1-076","domain":"prd1","level":"expert","category":"ingredients","tags":["grain-whisky","corn","wheat","malted-barley"],"region":null,"question":"グレーンウイスキーの主原料として一般に用いられる穀物として正しい組み合わせはどれか。","choices":["ピーテッドモルトのみ","ライ麦のみを100%使用","米のみを100%使用","トウモロコシや小麦などの未発芽穀物と、酵素供給用の少量のモルト大麦"],"answer":3,"explanation":"グレーンウイスキーは一般にトウモロコシや小麦などの未発芽穀物を主原料とし、デンプンを糖化するための酵素を供給する少量のモルト大麦を加えて仕込まれる。","difficulty":1},{"id":"PRD1-077","domain":"prd1","level":"expert","category":"ingredients","tags":["coffey-still","column-still","grain-whisky"],"region":null,"question":"グレーンウイスキーの連続式蒸留に一般に使われる蒸留機を何と呼ぶか。","choices":["コフィスチル(カラムスチル、連続式蒸留機)","ポットスチル","ワームタブ","スピリットセーフ"],"answer":0,"explanation":"グレーンウイスキーの蒸留には一般にコフィスチル(カラムスチル)と呼ばれる連続式蒸留機が用いられ、モルトウイスキーの単式蒸留(ポットスチル)とは異なる方式で蒸留される。","difficulty":1},{"id":"PRD1-078","domain":"prd1","level":"expert","category":"ingredients","tags":["aeneas-coffey","coffey-still","history","column-still"],"region":null,"question":"連続式蒸留機(コフィスチル)を考案したとされる人物は誰か。","choices":["アラン・シェンリー","イーニアス・コフィー","ウィリアム・グラント","ジョン・ウォーカー"],"answer":1,"explanation":"連続式蒸留機は1830年頃にアイルランド人のイーニアス・コフィーによって特許化された。これによりグレーンウイスキーの効率的な大量生産が可能になった。","difficulty":2},{"id":"PRD1-079","domain":"prd1","level":"expert","category":"ingredients","tags":["grain-whisky","spirit-character","column-still"],"region":null,"question":"グレーンウイスキーの一般的な酒質の特徴として正しいものはどれか。","choices":["モルトウイスキーより必ず重厚でオイリーな酒質になる","熟成を一切必要としない","モルトウイスキーに比べ軽やかでクセの少ない酒質になりやすい","ピート香が最も強く出る酒質になる"],"answer":2,"explanation":"連続式蒸留により高い純度で蒸留されるグレーンウイスキーは、一般にモルトウイスキーに比べ軽やかでクセの少ない酒質になりやすく、ブレンデッドウイスキーの土台として重宝される。","difficulty":1},{"id":"PRD1-080","domain":"prd1","level":"expert","category":"ingredients","tags":["corn","maize","grain-whisky","spirit-yield"],"region":null,"question":"グレーンウイスキー原料としてのトウモロコシに関する記述として正しいものはどれか。","choices":["ピートを豊富に含む穀物である","発芽させてから使用するのが必須である","スコットランド国内でのみ栽培される穀物である","高いデンプン含有量から高いアルコール収量が得られるため、伝統的に多用されてきた"],"answer":3,"explanation":"トウモロコシはデンプン含有量が高くアルコール収量に優れるため、グレーンウイスキーの原料として伝統的に多用されてきた。歴史的には北米などから輸入されることが多かった。","difficulty":2},{"id":"PRD1-081","domain":"prd1","level":"expert","category":"ingredients","tags":["wheat","grain-whisky","malted-barley","mashing"],"region":null,"question":"グレーンウイスキー原料として小麦が用いられる際の一般的な扱いとして正しいものはどれか。","choices":["未発芽の小麦をそのまま糖化原料とし、酵素源として別途モルト大麦を加える","小麦のみを発芽させモルトとして用いる","小麦は法律でグレーンウイスキーに使用できない","小麦は必ずピーティングを施してから使用する"],"answer":0,"explanation":"グレーンウイスキーに用いられる小麦は発芽させずにそのまま糖化原料とし、デンプンを糖に変換する酵素を供給するために別途モルト大麦を加えるのが一般的な製法である。","difficulty":2},{"id":"PRD1-082","domain":"prd1","level":"professional","category":"ingredients","tags":["wheat","corn","grain-whisky","supply-chain"],"region":null,"question":"近年、一部のスコットランドのグレーン蒸留所がトウモロコシから小麦へ主原料を切り替えてきた背景として挙げられる理由はどれか。","choices":["小麦の方がフェノール値が高いため","輸入トウモロコシに比べ国内・欧州産小麦の調達コストや安定供給の面で有利になったため","法律により小麦の使用が義務化されたため","小麦の方が発酵時間を大幅に短縮できるため"],"answer":1,"explanation":"一部のグレーン蒸留所では、輸入に頼るトウモロコシに比べ国内・欧州産の小麦の方が調達コストや供給の安定性で有利になったことから、原料を小麦へ切り替えた例が知られている。","difficulty":3},{"id":"PRD1-083","domain":"prd1","level":"professional","category":"ingredients","tags":["grain-whisky","cooking","gelatinization","mashing"],"region":null,"question":"グレーンウイスキーの糖化・発酵工程が、モルトウイスキーのそれと異なる点として挙げられるものはどれか。","choices":["糖化槽を一切使用しない","発酵を行わずに直接蒸留する","未発芽の穀物を糊化(ゲル化)させる高温処理(クッキング)工程を経てから糖化する場合が多い","ピートを必ず添加する"],"answer":2,"explanation":"グレーンウイスキーの原料である未発芽のトウモロコシや小麦はデンプンが硬い状態にあるため、高温での糊化(ゲル化)処理(クッキング)を経てから糖化槽でモルト大麦の酵素と混合されるのが一般的である。","difficulty":3},{"id":"PRD1-084","domain":"prd1","level":"professional","category":"ingredients","tags":["coffey-still","analyzer","rectifier","column-still"],"region":null,"question":"連続式蒸留機(コフィスチル)の基本構造として正しいものはどれか。","choices":["単一のポット部分のみで構成される","3本以上のポットが直列に並ぶ","銅製の部品を一切使用しない構造である","アナライザーとレクティファイヤーと呼ばれる2本の塔で構成される"],"answer":3,"explanation":"コフィスチルは基本的にアナライザー(分析塔)とレクティファイヤー(精留塔)と呼ばれる2本の塔で構成され、ウォッシュを連続的に投入しながら蒸留を行う。","difficulty":4},{"id":"PRD1-085","domain":"prd1","level":"professional","category":"ingredients","tags":["grain-whisky","blended-whisky","spirit-character"],"region":null,"question":"グレーンウイスキーが主にブレンデッドウイスキーの原酒として用いられる理由として挙げられるものはどれか。","choices":["軽やかでクセの少ない酒質がモルト原酒の個性を支え、飲みやすいブレンドに仕上げやすいため","グレーンウイスキーは熟成が不要でコストがかからないため","法律でブレンデッドウイスキーにはグレーンの使用が義務付けられているため","グレーンウイスキーはモルトより必ず高価であるため"],"answer":0,"explanation":"軽やかでクセの少ないグレーンウイスキーは、個性の強いモルト原酒同士をつなぎ、全体として飲みやすくまとまりのあるブレンドに仕上げる役割を果たすため、ブレンデッドウイスキーの土台として広く用いられる。","difficulty":3},{"id":"PRD1-086","domain":"prd1","level":"professional","category":"ingredients","tags":["corn","maize","import","grain-whisky"],"region":null,"question":"グレーンウイスキー原料として使われるトウモロコシの主要な生産・輸入元として歴史的に知られる地域はどれか。","choices":["アイラ島","北米(アメリカなど)","アイスランド","オーストラリア南極圏"],"answer":1,"explanation":"スコットランドのグレーン蒸留所が用いるトウモロコシは、歴史的にアメリカなど北米地域からの輸入に頼ることが多かった。近年は調達先や原料構成の見直しも進んでいる。","difficulty":4},{"id":"PRD1-087","domain":"prd1","level":"professional","category":"ingredients","tags":["malted-barley","enzyme","grain-whisky","mashing"],"region":null,"question":"グレーンウイスキー製造で少量加えられるモルト大麦の主な役割として正しいものはどれか。","choices":["ピートのフェノール香を付与する","蒸留機を洗浄する","デンプンを糖化するための酵素(アミラーゼ)を供給する","樽の焼成度を高める"],"answer":2,"explanation":"グレーンウイスキーの仕込みに加えられる少量のモルト大麦は、主原料である未発芽穀物のデンプンを糖化するための酵素(アミラーゼ)を供給する役割を担っている。","difficulty":3},{"id":"PRD1-088","domain":"prd1","level":"master","category":"ingredients","tags":["grain-whisky","regulation","scotch-whisky-regulations","malted-barley"],"region":null,"question":"スコッチウイスキーの法規制上、グレーンウイスキーの原料として麦芽以外に使用できる穀物について定められている内容として正しいものはどれか。","choices":["グレーンウイスキーは麦芽のみで製造しなければならないと定められている","外部から抽出した工業用酵素を自由に添加してよいと定められている","グレーンウイスキーはトウモロコシの使用が禁止されている","大麦以外の穀物(トウモロコシ・小麦など)を原料に使用できるが、糖化はその仕込みに含まれるモルト大麦自身が持つ酵素(ジアスターゼ)のみで行うことが求められる"],"answer":3,"explanation":"スコッチウイスキー規則ではグレーンウイスキーは大麦以外の穀物を原料に使えるが、デンプンの糖化はその仕込みに含まれるモルト大麦自体の酵素(ジアスターゼ)のみで行うことが求められ、外部酵素の添加は認められていない。この点はモルトウイスキーと共通する厳格な規定である。","difficulty":4},{"id":"PRD1-090","domain":"prd1","level":"master","category":"ingredients","tags":["column-still","pot-still","copper-contact","distillation-efficiency"],"region":null,"question":"グレーンウイスキー製造における連続式蒸留と、モルトウイスキーのポットスチルによる単式蒸留との収率・銅接触の一般的な違いとして正しいものはどれか。","choices":["連続式蒸留は銅を一切使用しないため個性豊かな酒質になる","連続式蒸留は理論段数が多く効率的に高純度のスピリットを得やすいが、銅との接触時間や個性の作り込みという点ではポットスチルに劣るとされる","ポットスチル蒸留の方が常にアルコール収量が高い","両者に蒸留効率の差はないとされる"],"answer":1,"explanation":"連続式蒸留機は理論段数が多く高純度のスピリットを効率的に得やすい一方、蒸気と銅との接触時間はポットスチルに比べ限定的で、個性の作り込みという点ではポットスチル蒸留に劣るとされる。","difficulty":4},{"id":"PRD2-001","domain":"prd2","level":"expert","category":"production","tags":["pot-still","straight-neck","distillation","reflux"],"region":null,"question":"ポットスチルのネック形状のうち、ネックが真っ直ぐに伸びる「ストレート型」の特徴として正しいものはどれか。","choices":["還流(リフラックス)が少なく、重厚でオイリーな酒質になりやすい","還流が多く、軽やかな酒質になりやすい","銅との接触面積が最大化される","ワームタブ式コンデンサーの一種である"],"answer":0,"explanation":"ストレート型はネックが真っ直ぐで還流が少なく、蒸気が銅と接触する時間が短いため、重厚でオイリーな酒質になりやすいとされる。対照的にバルジ型やランタン型は還流を促し軽い酒質を生みやすい。","difficulty":2},{"id":"PRD2-002","domain":"prd2","level":"expert","category":"production","tags":["pot-still","bulge-still","boil-ball","reflux","spirit-character"],"region":null,"question":"ポットスチルのネックに膨らみ(ボイルボール)を持つ「バルジ型」の一般的な効果として正しいものはどれか。","choices":["加熱効率が上がり蒸留時間が短縮される","蒸気の一部が凝縮して還流し、より軽く華やかな酒質になりやすい","銅との接触が完全に失われる","フェインツの回収量が増える"],"answer":1,"explanation":"バルジ型(ボイルボール型)はネック途中に膨らみを持ち、重い蒸気成分がここで一部凝縮して還流するため、より軽く華やかな酒質になりやすいとされる。背の高いスチルはこの還流効果をさらに強める傾向がある。","difficulty":2},{"id":"PRD2-003","domain":"prd2","level":"expert","category":"production","tags":["pot-still","lantern-shaped","still-shape","reflux"],"region":null,"question":"ポットスチルの形状のうち、胴部からネックにかけて提灯のように膨らむ「ランタン型」の説明として適切なものはどれか。","choices":["蒸留を一切行わない貯蔵専用設備である","連続式蒸留機の一部品である","ストレート型とバルジ型の中間的な還流特性を持つ形状である","木製で作られるのが一般的である"],"answer":2,"explanation":"ランタン型は胴部からネックにかけて提灯のように膨らむ形状で、還流の度合いがストレート型とバルジ型の中間的とされる。スチル形状は酒質を決める重要な要因の一つである。","difficulty":2},{"id":"PRD2-004","domain":"prd2","level":"expert","category":"production","tags":["direct-fire","rummager","pot-still","heating-method"],"region":null,"question":"直火式(ダイレクトファイア)でポットスチルを加熱する蒸留所が、内部の液体が焦げ付くのを防ぐために取り付ける回転式の装置は何と呼ばれるか。","choices":["ワームタブ","スピリットセーフ","パーコレーター","ラマジャー(rummager)"],"answer":3,"explanation":"直火式蒸留では液体が焦げ付きやすいため、スチル内部で回転する鎖状の装置ラマジャーを用いて焦げ付きを防ぐ。直火式はスプリングバンクやグレンファークラスなど一部の蒸留所で今も採用されている。","difficulty":1},{"id":"PRD2-005","domain":"prd2","level":"expert","category":"production","tags":["steam-heating","indirect-heating","pot-still"],"region":null,"question":"現代の多くの蒸留所で採用されている、蒸気コイルや蒸気パンを用いてポットスチルを間接的に加熱する方式を何と呼ぶか。","choices":["スチーム(間接)加熱方式","直火加熱方式","電気抵抗加熱方式","マイクロ波加熱方式"],"answer":0,"explanation":"現代の多くの蒸留所ではスチル内部または外部に設置した蒸気コイル・蒸気パンで間接的に加熱する方式が主流である。直火式に比べ温度管理がしやすく焦げ付きのリスクも低い。","difficulty":1},{"id":"PRD2-006","domain":"prd2","level":"expert","category":"production","tags":["lyne-arm","line-arm","pot-still-parts"],"region":null,"question":"ポットスチルのネック上部からコンデンサーへ蒸気を導く管を何と呼ぶか。","choices":["スピリットセーフ","ラインアーム(リンアーム)","ウォッシュバック","マッシュタン"],"answer":1,"explanation":"ラインアーム(リンアーム)はネック上部からコンデンサーへ蒸気を導く管で、その角度や長さが還流の度合い、ひいては酒質に影響を与える。","difficulty":1},{"id":"PRD2-007","domain":"prd2","level":"expert","category":"production","tags":["condenser","shell-and-tube","cooling"],"region":null,"question":"現代の多くの蒸留所で採用されている、多数の細い管の中を蒸気が通り外側を冷却水が流れる方式のコンデンサーを何と呼ぶか。","choices":["ワームタブ式","スピリットセーフ式","シェル・アンド・チューブ式","ラマジャー式"],"answer":2,"explanation":"シェル・アンド・チューブ式コンデンサーは多数の細管の中を蒸気が通り、外側を冷却水が流れることで効率よく凝縮させる。ワームタブ式より銅との接触面積が大きく、軽くクリーンな酒質になりやすい。","difficulty":1},{"id":"PRD2-008","domain":"prd2","level":"expert","category":"production","tags":["worm-tub","condenser","traditional-distillation"],"region":null,"question":"冷却水を張った大きな桶の中に、渦巻き状の銅管を沈めて蒸気を凝縮させる伝統的なコンデンサー方式を何と呼ぶか。","choices":["シェル・アンド・チューブ式","パーコレーター式","ラック式","ワームタブ式"],"answer":3,"explanation":"ワームタブ式は冷却水を張った桶の中に渦巻き状の銅管を沈めて蒸気を凝縮させる伝統的な方式で、銅との接触が少ないため硫黄様の重厚な酒質になりやすいとされる。","difficulty":1},{"id":"PRD2-009","domain":"prd2","level":"expert","category":"production","tags":["middle-cut","spirit-safe","cut-points"],"region":null,"question":"スピリッツセーフで蒸留液を観察しながら、新酒として樽詰めする部分のみを選び取る工程を何と呼ぶか。","choices":["ミドルカット(ハートカット)","フォアショッツ","フェインツ","チャーニング"],"answer":0,"explanation":"ミドルカット(ハートカット)はスピリットセーフで比重やアルコール度数を確認しながら、新酒として樽詰めする良質な部分だけを選び取る工程である。","difficulty":1},{"id":"PRD2-010","domain":"prd2","level":"expert","category":"production","tags":["foreshots","heads","distillation-cuts"],"region":null,"question":"蒸留の初留分のうち、メタノールなど揮発性の高い不快な成分を多く含み、通常は再留に回される最初の留出液を何と呼ぶか。","choices":["ミドルカット","フォアショッツ(ヘッズ)","フェインツ","ローワイン"],"answer":1,"explanation":"フォアショッツ(ヘッズ)は蒸留初期に出る留出液で、メタノールなど揮発性の高い不快な成分を多く含むため通常は廃棄せず次の蒸留に回される。","difficulty":1},{"id":"PRD2-011","domain":"prd2","level":"expert","category":"production","tags":["feints","tails","distillation-cuts"],"region":null,"question":"ミドルカットの後に得られる、オイリーで重い成分を多く含む留出液を何と呼ぶか。","choices":["フォアショッツ","ローワイン","フェインツ(テイルズ)","ウォッシュ"],"answer":2,"explanation":"フェインツ(テイルズ)はミドルカットの後に得られる留出液で、オイリーで重い成分を多く含み、フォアショッツと同様に次のローワインと合わせて再留されることが多い。","difficulty":1},{"id":"PRD2-012","domain":"prd2","level":"expert","category":"production","tags":["double-distillation","wash-still","spirit-still"],"region":null,"question":"多くのスコッチ・モルトウイスキーで採用されている、ウォッシュスチルとスピリットスチルの2基を用いる蒸留方式を何と呼ぶか。","choices":["3回蒸留","連続式蒸留","単式蒸留1回","2回蒸留(ダブル・ディスティレーション)"],"answer":3,"explanation":"多くのスコッチ・モルトウイスキーはウォッシュスチルで一次蒸留した後、スピリットスチルで二次蒸留する2回蒸留方式を採用している。","difficulty":1},{"id":"PRD2-013","domain":"prd2","level":"expert","category":"production","tags":["triple-distillation","auchentoshan","lowland"],"region":null,"question":"ローランド地方の蒸留所オーヘントッシャンが採用していることで知られる、3基のポットスチルを用いる蒸留方式を何と呼ぶか。","choices":["3回蒸留(トリプル・ディスティレーション)","2回蒸留","連続式蒸留","バッチ式蒸留"],"answer":0,"explanation":"ローランド地方のオーヘントッシャン蒸留所は全量を3回蒸留することで知られ、軽くまろやかな酒質を生み出している。3回蒸留はアイルランドの伝統的手法としても知られる。","difficulty":1},{"id":"PRD2-014","domain":"prd2","level":"expert","category":"production","tags":["wash-still","first-distillation","pot-still"],"region":null,"question":"モルトウイスキーの2回蒸留において、発酵液(ウォッシュ)を最初に蒸留するために使われるポットスチルを何と呼ぶか。","choices":["スピリットスチル(再留釜)","ウォッシュスチル(初留釜)","パテントスチル","コラムスチル"],"answer":1,"explanation":"ウォッシュスチル(初留釜)は発酵を終えたウォッシュ(もろみ)を最初に蒸留し、低アルコールのローワインを得るためのポットスチルである。","difficulty":1},{"id":"PRD2-015","domain":"prd2","level":"expert","category":"production","tags":["spirit-still","second-distillation","new-make"],"region":null,"question":"ローワインをさらに蒸留し、新酒(ニューメイクスピリッツ)を得るために使われるポットスチルを何と呼ぶか。","choices":["ウォッシュスチル","アナライザー","スピリットスチル(再留釜)","レクティファイヤー"],"answer":2,"explanation":"スピリットスチル(再留釜)はローワインをさらに蒸留し、ミドルカットによって新酒(ニューメイクスピリッツ)を取り出すためのポットスチルである。","difficulty":1},{"id":"PRD2-016","domain":"prd2","level":"expert","category":"people","tags":["robert-stein","continuous-still","history"],"region":null,"question":"1820年代に連続式蒸留機を発明したスコットランドの蒸留家は誰か。","choices":["イーニアス・コフィー","アンドリュー・アッシャー","アレクサンダー・ウォーカー","ロバート・スタイン"],"answer":3,"explanation":"ロバート・スタインは1820年代に連続式蒸留機を発明したスコットランドの蒸留家で、ヘイグ家の親戚にあたる。彼の発明は後にイーニアス・コフィーによってさらに改良された。","difficulty":1},{"id":"PRD2-017","domain":"prd2","level":"expert","category":"people","tags":["aeneas-coffey","patent-still","continuous-still"],"region":null,"question":"1830年に特許を取得し、後に「コフィー・スチル」と呼ばれる連続式蒸留機を実用化したアイルランド出身の人物は誰か。","choices":["イーニアス・コフィー","ロバート・スタイン","ジョン・ウォーカー","ウィリアム・グラント"],"answer":0,"explanation":"イーニアス・コフィーはアイルランド出身で、元アイルランド消費税監督官という経歴を持つ。1830年に特許を取得した彼の連続式蒸留機は「コフィー・スチル」と呼ばれ、グレーンウイスキー生産の主流となった。","difficulty":1},{"id":"PRD2-018","domain":"prd2","level":"expert","category":"production","tags":["coffey-still","patent-still","column-still"],"region":null,"question":"コフィー・スチルの別名として一般的に使われる呼称はどれか。","choices":["ポットスチル","パテントスチル(連続式蒸留機)","ワームタブ","スピリットセーフ"],"answer":1,"explanation":"コフィー・スチルは連続的に蒸留を行える蒸留機で、特許(パテント)を取得したことから「パテントスチル」、また構造上「コラムスチル(塔式蒸留機)」とも呼ばれる。","difficulty":2},{"id":"PRD2-019","domain":"prd2","level":"expert","category":"maturation","tags":["american-white-oak","bourbon-cask","oak-species"],"region":null,"question":"バーボン樽の材料として最も一般的に使われるオーク材はどれか。","choices":["コモンオーク(ヨーロピアンオーク)","ミズナラ","アメリカンホワイトオーク","チェスナット(栗材)"],"answer":2,"explanation":"アメリカンホワイトオークはバーボン樽の材料として最も一般的で、バニラやココナッツを思わせる甘い香り(バニリン・ラクトン由来)を酒に与えやすい。","difficulty":1},{"id":"PRD2-020","domain":"prd2","level":"expert","category":"maturation","tags":["common-oak","european-oak","sherry-cask"],"region":null,"question":"シェリー樽の材料として伝統的に使われることが多いオーク材はどれか。","choices":["アメリカンホワイトオーク","ミズナラ","レッドオーク","コモンオーク(ヨーロピアンオーク)"],"answer":3,"explanation":"コモンオーク(ヨーロピアンオーク)はシェリー樽に伝統的に使われる木材で、アメリカンホワイトオークよりタンニン分が多く、ドライフルーツやスパイスの風味を与えやすい。","difficulty":1},{"id":"PRD2-021","domain":"prd2","level":"expert","category":"maturation","tags":["mizunara","japanese-oak","oak-species"],"region":null,"question":"日本原産のオーク材で、サンダルウッドやお香に似た独特の香りを樽材に与えることで知られるものはどれか。","choices":["ミズナラ","アメリカンホワイトオーク","コモンオーク","チェスナット"],"answer":0,"explanation":"ミズナラは日本原産のオーク材で、サンダルウッドやお香を思わせる独特な香りを与えることで知られ、サントリー山崎などが積極的に採用してきた。木目が粗く漏れやすいため樽づくりが難しいとされる。","difficulty":1},{"id":"PRD2-022","domain":"prd2","level":"expert","category":"maturation","tags":["sherry-cask","ex-sherry","cask-types"],"region":null,"question":"スペインでシェリー酒の熟成に使われた後、ウイスキーの熟成に転用される樽を一般に何と呼ぶか。","choices":["バーボン樽","シェリー樽","ワインカスク","ラムカスク"],"answer":1,"explanation":"シェリー樽はスペインでシェリー酒(オロロソ、ペドロヒメネスなど)の熟成に使われた後、ウイスキーの熟成用に転用される樽で、コモンオーク製が一般的である。","difficulty":1},{"id":"PRD2-023","domain":"prd2","level":"expert","category":"maturation","tags":["bourbon-cask","ex-bourbon","cask-types"],"region":null,"question":"米国でバーボンウイスキーの熟成に一度だけ使われた後、スコッチなどの熟成に多用される樽を一般に何と呼ぶか。","choices":["シェリー樽","ポートパイプ","バーボン樽(ex-bourbonカスク)","マデイラドラム"],"answer":2,"explanation":"米国の連邦規則によりバーボンは新品の内面を焦がしたオーク樽を一度しか使用できないため、使用済みのバーボン樽は世界のウイスキー熟成用として大量に流通している。","difficulty":1},{"id":"PRD2-024","domain":"prd2","level":"expert","category":"maturation","tags":["butt-cask","cask-size","sherry-cask"],"region":null,"question":"シェリー樽で標準的に用いられる、容量約500リットルの樽を何と呼ぶか。","choices":["ホグスヘッド","バレル","クォーターカスク","バット(butt)"],"answer":3,"explanation":"バットは容量約500リットルの大型樽で、シェリー樽として標準的に使われるサイズである。","difficulty":1},{"id":"PRD2-025","domain":"prd2","level":"expert","category":"maturation","tags":["hogshead","cask-size","ex-bourbon"],"region":null,"question":"バーボンバレルを解体・再構築して作られることが多い、容量約250リットル前後の樽を何と呼ぶか。","choices":["ホグスヘッド(hogshead)","バット","パンチョン","クォーターカスク"],"answer":0,"explanation":"ホグスヘッドはバーボンバレルを解体し、側板を組み直して容量を約250リットル前後に拡大した樽で、スコッチの熟成に広く使われる。","difficulty":2},{"id":"PRD2-026","domain":"prd2","level":"expert","category":"maturation","tags":["barrel-cask","american-standard-barrel","bourbon"],"region":null,"question":"米国でバーボン熟成に用いられる標準的な樽で、容量が約200リットル(約53USガロン)のものを何と呼ぶか。","choices":["バット","バレル(アメリカン・スタンダード・バレル)","ホグスヘッド","パンチョン"],"answer":1,"explanation":"米国のバーボン熟成に用いられる標準的な樽(アメリカン・スタンダード・バレル)は約53USガロン、およそ200リットルの容量である。","difficulty":2},{"id":"PRD2-027","domain":"prd2","level":"expert","category":"maturation","tags":["quarter-cask","small-cask","maturation-speed"],"region":null,"question":"バットの4分の1程度の容量(約125〜130リットル)で、小型で熟成が早く進むとされる樽を何と呼ぶか。","choices":["バット","ホグスヘッド","クォーターカスク","パンチョン"],"answer":2,"explanation":"クォーターカスクはバットのおよそ4分の1にあたる約125〜130リットルの小型樽で、木材との接触面積比率が高いため熟成が比較的早く進むとされる。","difficulty":2},{"id":"PRD2-028","domain":"prd2","level":"expert","category":"maturation","tags":["char","new-charred-oak","bourbon-regulation"],"region":null,"question":"米国のバーボン熟成規則で新樽に義務付けられている、樽内面を炎で焦がす処理を何と呼ぶか。","choices":["トースト","シーズニング","クーパレージ","チャー(char/内面焼成)"],"answer":3,"explanation":"米国の規則でバーボン熟成に用いる新樽は内面を焦がす「チャー」処理が義務付けられており、最も強い焼成度合いは俗に「アリゲーターチャー」と呼ばれる。","difficulty":1},{"id":"PRD2-029","domain":"prd2","level":"expert","category":"maturation","tags":["toast","sherry-cask","cask-preparation"],"region":null,"question":"シェリー樽などヨーロピアンオーク樽で一般的に行われる、開放炎を使わず穏やかな熱で樽内面をあぶる処理を何と呼ぶか。","choices":["トースト(toast)","チャー","クーパレージ","リチャー"],"answer":0,"explanation":"シェリー樽などヨーロピアンオーク樽では、開放炎を使わない穏やかな熱で樽内面をあぶる「トースト」処理が一般的で、チャーとは区別される。","difficulty":1},{"id":"PRD2-030","domain":"prd2","level":"expert","category":"maturation","tags":["angels-share","evaporation","maturation"],"region":null,"question":"熟成中に樽から蒸発して失われるウイスキーの分を一般に何と呼ぶか。","choices":["デビルズカット","エンジェルズシェア(天使の分け前)","ウィスキーロス","キャスクリーク"],"answer":1,"explanation":"熟成中に樽の隙間から蒸発して失われる分を「エンジェルズシェア(天使の分け前)」と呼び、気候によって蒸発率は大きく異なる。","difficulty":1},{"id":"PRD2-031","domain":"prd2","level":"expert","category":"maturation","tags":["dunnage-warehouse","traditional-storage","maturation"],"region":null,"question":"土間の床に樽を横積みで最大3段程度まで積む、伝統的な熟成庫の形式を何と呼ぶか。","choices":["ラック式倉庫","パラタイズド倉庫","ダンネージ式倉庫","メタルシェッド式倉庫"],"answer":2,"explanation":"ダンネージ式倉庫は土間の床に樽を横積みで通常最大3段程度まで積む伝統的な熟成庫で、湿度が高く庫内の温度変化が比較的小さいとされる。","difficulty":1},{"id":"PRD2-032","domain":"prd2","level":"expert","category":"maturation","tags":["racked-warehouse","modern-storage","maturation"],"region":null,"question":"樽を縦置きにし、金属製のラックで多段に積み上げる近代的な熟成庫の形式を何と呼ぶか。","choices":["ダンネージ式倉庫","石造倉庫","地下貯蔵庫","ラック式倉庫"],"answer":3,"explanation":"ラック式(パラタイズド)倉庫は樽を縦置きにして金属ラックで多段に積み上げる近代的な熟成庫で、省スペースだが高さによる温度差が生じやすい。","difficulty":1},{"id":"PRD2-033","domain":"prd2","level":"expert","category":"blending","tags":["key-malt","blended-whisky","flavor-profile"],"region":null,"question":"ブレンデッドウイスキーにおいて、その銘柄の風味の骨格を形づくる中心的な役割を担うシングルモルトを何と呼ぶか。","choices":["キーモルト","フィラーモルト","グレーンモルト","ヴァッテッドモルト"],"answer":0,"explanation":"キーモルトはブレンデッドウイスキーの風味の骨格を形づくる中心的なシングルモルトで、例えばカーデュはジョニーウォーカーのキーモルトとして知られる。","difficulty":2},{"id":"PRD2-034","domain":"prd2","level":"expert","category":"blending","tags":["vatting","blended-malt","blending"],"region":null,"question":"複数のシングルモルトウイスキーをグレーンウイスキーを加えずに混和することを何と呼ぶか。","choices":["マリッジ","ヴァッティング","カッティング","レクティフィケーション"],"answer":1,"explanation":"ヴァッティングは複数のシングルモルトウイスキーをグレーンウイスキーを加えずに混和する工程で、その結果できる製品は現在「ブレンデッドモルト」と呼ばれる。","difficulty":2},{"id":"PRD2-035","domain":"prd2","level":"expert","category":"blending","tags":["marriage","blending-process","cask-marrying"],"region":null,"question":"ブレンドした複数の原酒を再び樽に詰め、一定期間なじませてから瓶詰めする工程を何と呼ぶか。","choices":["ヴァッティング","フィニッシング","マリッジ(marrying)","チルフィルタレーション"],"answer":2,"explanation":"マリッジはブレンドした原酒を再び樽に詰め、数か月程度なじませてから瓶詰めする工程で、風味の調和を高めるために行われる。","difficulty":2},{"id":"PRD2-036","domain":"prd2","level":"expert","category":"production","tags":["chill-filtration","haze-prevention","bottling"],"region":null,"question":"低温にしたウイスキーを濾過し、冷やしたり加水した際に生じる白濁の原因物質を取り除く工程を何と呼ぶか。","choices":["マリッジ","キャラメル添加","ヴァッティング","チルフィルタレーション(冷却濾過)"],"answer":3,"explanation":"チルフィルタレーションはウイスキーを0℃前後まで冷却して濾過し、低温時や加水時に白濁の原因となる脂肪酸やエステルを取り除く工程である。","difficulty":1},{"id":"PRD2-037","domain":"prd2","level":"expert","category":"production","tags":["caramel-coloring","e150a","additive","scotch-regulation"],"region":null,"question":"スコッチウイスキーで色調を均一にするために添加が認められている唯一の添加物はどれか。","choices":["カラメル色素(E150a)","香料","甘味料","保存料"],"answer":0,"explanation":"スコッチウイスキーで色調の均一化のために添加が認められている唯一の添加物がカラメル色素(E150a)であり、風味への影響はほとんどないとされる。","difficulty":1},{"id":"PRD2-038","domain":"prd2","level":"expert","category":"production","tags":["cask-strength","undiluted","bottling-style"],"region":null,"question":"加水調整をせず、樽から出した状態に近いアルコール度数のまま瓶詰めされるウイスキーを何と呼ぶか。","choices":["チルフィルタード","カスクストレングス","シングルカスク","ブレンデッド"],"answer":1,"explanation":"カスクストレングスは加水調整をせず、樽出しに近いアルコール度数(おおむね50〜65%程度)のまま瓶詰めされるウイスキーを指す。","difficulty":1},{"id":"PRD2-039","domain":"prd2","level":"expert","category":"production","tags":["single-cask","one-cask-bottling","bottling-style"],"region":null,"question":"複数の樽を合わせず、一つの樽の原酒だけを瓶詰めしたウイスキーを何と呼ぶか。","choices":["ヴァッテッドモルト","ブレンデッドモルト","シングルカスク","カスクストレングス"],"answer":2,"explanation":"シングルカスクは複数の樽を混和せず、一つの樽の原酒だけを瓶詰めした製品で、カスクストレングス・ノンチルフィルタードで出されることが多い。","difficulty":2},{"id":"PRD2-040","domain":"prd2","level":"expert","category":"production","tags":["spirit-safe","excise","distillation-equipment"],"region":null,"question":"蒸留された液体をエクサイズ(税関)の監督下で確認・分配するために用いられる、施錠可能なガラス張りの装置を何と呼ぶか。","choices":["ワームタブ","ラマジャー","マッシュタン","スピリットセーフ"],"answer":3,"explanation":"スピリットセーフは蒸留液の比重やアルコール度数を確認しながらカットを判断するための施錠可能なガラス張り装置で、かつては税務当局(エクサイズ)が施錠を管理していた。","difficulty":2},{"id":"PRD2-041","domain":"prd2","level":"professional","category":"production","tags":["glenmorangie","tall-still","giraffe-still","spirit-character"],"region":null,"question":"スコットランドで最も背が高いポットスチルの一つ(約5.14m)を持ち、「ジラフ・スチル」の愛称で知られる蒸留所はどこか。","choices":["グレンモーレンジィ","マッカラン","タリスカー","グレンファークラス"],"answer":0,"explanation":"グレンモーレンジィは約5.14mという業界最高クラスの背高スチルを持ち、その形状から「ジラフ・スチル」と呼ばれる。背が高いほど還流が増え、軽くフルーティーな酒質になりやすい。","difficulty":3},{"id":"PRD2-042","domain":"prd2","level":"professional","category":"production","tags":["macallan","small-still","oily-spirit"],"region":null,"question":"小型のポットスチルを多数保有し、リッチでオイリーな酒質の新酒を生み出すことで知られる蒸留所はどこか。","choices":["グレンモーレンジィ","マッカラン","オーヘントッシャン","グレンリベット"],"answer":1,"explanation":"マッカランは小型のポットスチルを多数保有することで知られ、蒸気と銅の接触が相対的に少なく、リッチでオイリーな酒質の新酒を生み出すとされる。","difficulty":3},{"id":"PRD2-043","domain":"prd2","level":"professional","category":"production","tags":["talisker","purifier-pipe","reflux","skye"],"region":null,"question":"リンアームに「ピュリファイアー」と呼ばれる小型の還流管を備え、蒸気の一部を再びスチルへ戻すことで知られる蒸留所はどこか。","choices":["ボウモア","スプリングバンク","タリスカー","グレンファークラス"],"answer":2,"explanation":"タリスカーはリンアームに「ピュリファイアー」と呼ばれる小型の部分凝縮器を備え、重い蒸気成分を再びスチルへ戻すことでスパイシーかつクリーンな酒質を作り出している。","difficulty":4},{"id":"PRD2-044","domain":"prd2","level":"professional","category":"production","tags":["lyne-arm-angle","reflux","spirit-character","upward-lyne-arm"],"region":null,"question":"リンアーム(ラインアーム)が上向きに傾斜している場合、一般に酒質にどのような影響を与えるとされるか。","choices":["蒸気がそのまま流れ落ち、重厚な酒質になりやすい","銅との接触が一切なくなる","蒸留時間が半減する","蒸気の還流が増え、より軽く華やかな酒質になりやすい"],"answer":3,"explanation":"リンアームが上向きに傾斜していると、重い蒸気成分が管内で凝縮して還流に回りやすくなるため、一般に軽く華やかな酒質になりやすいとされる。下向きの場合は逆に重厚な酒質になりやすい。","difficulty":4},{"id":"PRD2-045","domain":"prd2","level":"professional","category":"production","tags":["springbank","campbeltown","distillation-count"],"region":null,"question":"キャンベルタウンのスプリングバンク蒸留所が標準品「スプリングバンク」で採用していることで知られる、独特な蒸留回数はどれか。","choices":["2.5回蒸留","2回蒸留","3回蒸留","単式1回蒸留"],"answer":0,"explanation":"キャンベルタウンのスプリングバンクは標準品で2.5回蒸留という独特な方式を採用しており、これは同蒸留所の代表的な個性の一つである。","difficulty":3},{"id":"PRD2-046","domain":"prd2","level":"professional","category":"production","tags":["springbank","hazelburn","triple-distillation","campbeltown"],"region":null,"question":"スプリングバンク蒸留所が生産するブランドのうち、3回蒸留で造られる軽やかなスタイルのものはどれか。","choices":["ロングロウ(Longrow)","ヘーゼルバーン(Hazelburn)","スプリングバンク","キルケラン"],"answer":1,"explanation":"スプリングバンク蒸留所が生産するヘーゼルバーンは3回蒸留によって造られる軽やかなスタイルで、標準品のスプリングバンク(2.5回蒸留)やロングロウ(2回蒸留、ヘビーピート)と対照的な個性を持つ。","difficulty":3},{"id":"PRD2-047","domain":"prd2","level":"professional","category":"production","tags":["irish-whiskey","triple-distillation","tradition"],"region":null,"question":"アイルランドのウイスキーが伝統的に採用してきた蒸留回数として、しばしば語られるものはどれか。","choices":["2回蒸留","4回蒸留","3回蒸留","連続式のみ"],"answer":2,"explanation":"アイルランドのウイスキーは伝統的に3回蒸留を採用してきたとされ、軽くまろやかな酒質を生む一因とされてきた。ただし近年は蒸留所によって2回蒸留を採用する例もある。","difficulty":3},{"id":"PRD2-048","domain":"prd2","level":"professional","category":"history","tags":["robert-stein","patent-year","continuous-still-history"],"region":null,"question":"ロバート・スタインが連続式蒸留機の特許を取得したのはおよそ何年ごろか。","choices":["1850年代","1900年前後","1930年代","1820年代半ば"],"answer":3,"explanation":"ロバート・スタインが連続式蒸留機の特許を取得したのは1820年代半ば(1826年頃)とされ、これが後のコフィー・スチルの礎となった。","difficulty":3},{"id":"PRD2-049","domain":"prd2","level":"professional","category":"production","tags":["coffey-still","analyzer-column","column-still-structure"],"region":null,"question":"コフィー・スチル(連続式蒸留機)を構成する2本の塔のうち、発酵液から蒸気を分離する側の塔を何と呼ぶか。","choices":["アナライザー(分析塔)","レクティファイヤー(精留塔)","コンデンサー","スピリットセーフ"],"answer":0,"explanation":"コフィー・スチルはアナライザー(分析塔)とレクティファイヤー(精留塔)の2本の塔で構成され、アナライザー側で発酵液から蒸気を分離する。","difficulty":3},{"id":"PRD2-050","domain":"prd2","level":"professional","category":"production","tags":["coffey-still","rectifier-column","column-still-structure"],"region":null,"question":"コフィー・スチルの2本の塔のうち、アルコール蒸気を凝縮・濃縮しながら分離する側の塔を何と呼ぶか。","choices":["アナライザー","レクティファイヤー(精留塔)","ローワインレシーバー","ウォッシュチャージャー"],"answer":1,"explanation":"レクティファイヤー(精留塔)はアナライザーから送られたアルコール蒸気を段階的に凝縮・濃縮しながら分離する役割を持ち、連続的に高純度のスピリッツを取り出せる。","difficulty":3},{"id":"PRD2-051","domain":"prd2","level":"professional","category":"people","tags":["cellier-blumenthal","continuous-still-origin","france"],"region":null,"question":"ロバート・スタインやイーニアス・コフィーに先立ち、1808年にフランスで連続式蒸留機の原型を考案したとされる人物は誰か。","choices":["ジョン・デュワー","アンドリュー・アッシャー","セリエ=ブルーマンタール","ジェームズ・チャルマーズ"],"answer":2,"explanation":"フランスのセリエ=ブルーマンタールは1808年に連続式蒸留機の原型となる装置を考案したとされ、後のロバート・スタインやイーニアス・コフィーの発明に影響を与えたと言われる。","difficulty":4},{"id":"PRD2-052","domain":"prd2","level":"professional","category":"production","tags":["grain-whisky","column-still","continuous-distillation"],"region":null,"question":"スコッチ・グレーンウイスキーの蒸留に一般的に用いられる蒸留機はどれか。","choices":["単式蒸留機(ポットスチル)のみ","減圧蒸留機","分子蒸留機","連続式蒸留機(コラムスチル)"],"answer":3,"explanation":"スコッチ・グレーンウイスキーは主にトウモロコシなどの穀物を原料とし、連続式蒸留機(コラムスチル)で効率よく蒸留されるのが一般的である。","difficulty":3},{"id":"PRD2-053","domain":"prd2","level":"professional","category":"maturation","tags":["american-white-oak","vanillin","lactones","flavor-compounds"],"region":null,"question":"アメリカンホワイトオークがバーボン樽としてウイスキーに与える代表的な風味の傾向として正しいものはどれか。","choices":["バニラやココナッツを思わせる甘い香り","渋みの強いドライフルーツの香り","白檀やお香を思わせる香り","青リンゴのような酸味"],"answer":0,"explanation":"アメリカンホワイトオークはバニリンやオークラクトンを多く含み、バーボン樽として使われるとバニラやココナッツを思わせる甘い香りをウイスキーに与えやすい。","difficulty":3},{"id":"PRD2-054","domain":"prd2","level":"professional","category":"maturation","tags":["european-oak","sherry-cask","tannin","dried-fruit"],"region":null,"question":"ヨーロピアンオーク(コモンオーク)のシェリー樽が与えやすい風味傾向として正しいものはどれか。","choices":["バニラとココナッツの甘い香り","渋みとドライフルーツ、スパイスの香り","白檀のような香り","ミント様の清涼感"],"answer":1,"explanation":"コモンオーク(ヨーロピアンオーク)はタンニン分が多く、シェリー樽として使われると渋みやドライフルーツ、スパイスの風味を与えやすい傾向がある。","difficulty":3},{"id":"PRD2-055","domain":"prd2","level":"professional","category":"maturation","tags":["mizunara","porous-wood","cask-defect","cooperage-challenge"],"region":null,"question":"ミズナラ樽が他のオーク樽と比較して熟成に用いる際に注意が必要とされる欠点は何か。","choices":["極めて硬く加工できない","香りがまったくつかない","木目が粗く、樽材が漏れやすい","入手が容易すぎる"],"answer":2,"explanation":"ミズナラは木目が粗く漏れやすいため樽材への加工が難しく、締めるのに高い技術を要するとされる。それでも独特の芳香から高く評価されている。","difficulty":4},{"id":"PRD2-056","domain":"prd2","level":"professional","category":"maturation","tags":["sherry-seasoning","ex-sherry-cask","cask-preparation"],"region":null,"question":"近年多くの蒸留所が用いる「シーズニング(seasoning)」されたシェリー樽とは、どのような樽を指すか。","choices":["実際にシェリー酒を長期熟成・出荷に使った古樽","バーボン樽を再チャーしたもの","ワイン樽を転用したもの","シェリー酒を数か月〜数年入れてから空にした専用の新樽"],"answer":3,"explanation":"近年主流の「シーズニング樽」は、専用に作られた新樽にシェリー酒を数か月〜数年入れて木材にシェリーの風味を染み込ませてから空にしたもので、実際にシェリーの熟成・出荷に使われた古樽とは区別される。","difficulty":4},{"id":"PRD2-057","domain":"prd2","level":"professional","category":"maturation","tags":["char-level","alligator-char","new-charred-oak"],"region":null,"question":"バーボン樽の内面焼成(チャー)の中で、最も強い焼成度合いを俗に何と呼ぶか。","choices":["アリゲーターチャー","レベル1チャー","ライトトースト","ミディアムプラス"],"answer":0,"explanation":"バーボン樽の内面焼成(チャー)にはレベル分けがあり、最も強く焦がしたものは表面がワニ皮のように見えることから俗に「アリゲーターチャー」と呼ばれる。","difficulty":3},{"id":"PRD2-058","domain":"prd2","level":"professional","category":"maturation","tags":["char","red-layer","caramelization","cask-chemistry"],"region":null,"question":"樽内面を焼成(チャー)した際、炭化層のすぐ下にできる、糖分がカラメル化した層を一般に何と呼ぶか。","choices":["ブラックレイヤー","レッドレイヤー(赤い層)","ホワイトレイヤー","グレーレイヤー"],"answer":1,"explanation":"樽内面をチャーすると炭化層のすぐ下に糖分がカラメル化した「レッドレイヤー」ができ、これが熟成中に色や甘い風味を与える重要な層になるとされる。","difficulty":4},{"id":"PRD2-059","domain":"prd2","level":"professional","category":"maturation","tags":["angels-share","evaporation-rate","scotland-climate"],"region":null,"question":"スコットランドの冷涼な気候下での年間エンジェルズシェアはおよそどの程度とされるか。","choices":["約10%","約20%","約2%","ほぼ0%"],"answer":2,"explanation":"スコットランドの冷涼な気候では、年間のエンジェルズシェアはおよそ2%程度とされ、比較的緩やかな蒸発ペースで長期熟成が可能になる。","difficulty":3},{"id":"PRD2-060","domain":"prd2","level":"professional","category":"maturation","tags":["angels-share","kentucky","climate-effect","bourbon-maturation"],"region":null,"question":"気温差が大きく蒸発が進みやすい米国ケンタッキー州のバーボン熟成では、年間エンジェルズシェアがスコットランドと比べてどうなる傾向があるか。","choices":["より低くなる傾向がある","変わらない","蒸発は一切起きない","より高くなる傾向がある"],"answer":3,"explanation":"米国ケンタッキー州は寒暖差が大きく、樽材の伸縮が激しいため蒸発が進みやすく、スコットランドに比べて年間のエンジェルズシェアが高くなる傾向がある。","difficulty":3},{"id":"PRD2-061","domain":"prd2","level":"professional","category":"maturation","tags":["dunnage-warehouse","stacking-height","traditional-storage"],"region":null,"question":"伝統的なダンネージ式倉庫において、樽は通常最大何段程度まで横積みされるか。","choices":["3段程度","6段程度","12段程度","20段程度"],"answer":0,"explanation":"伝統的なダンネージ式倉庫では、木製のレール上に樽を横積みし、通常3段程度までに制限されるのが一般的である。","difficulty":3},{"id":"PRD2-062","domain":"prd2","level":"professional","category":"maturation","tags":["racked-warehouse","temperature-variation","maturation-environment"],"region":null,"question":"パラタイズド(ラック式)倉庫では、樽を高く積み上げることが可能だが、これによって生じる問題として指摘されることは何か。","choices":["樽が一切熟成しなくなる","倉庫内の高さによって熟成環境(温度)が異なりやすい","火災の心配が完全になくなる","樽の入替が不可能になる"],"answer":1,"explanation":"ラック式倉庫では樽を高く積み上げられる分、庫内の高さによって温度差が生じやすく、階層によって熟成の進み方が異なるとされる。","difficulty":3},{"id":"PRD2-063","domain":"prd2","level":"professional","category":"blending","tags":["key-malt","cardhu","johnnie-walker","blended-scotch"],"region":null,"question":"「ジョニーウォーカー」のキーモルトとして長年重要な役割を果たしてきたシングルモルト蒸留所はどこか。","choices":["マッカラン","グレンフィディック","カーデュ(Cardhu)","タリスカー"],"answer":2,"explanation":"カーデュ蒸留所はジョニーウォーカーのキーモルトとして長年重要な役割を果たしてきたスペイサイドのシングルモルト蒸留所である。","difficulty":3},{"id":"PRD2-064","domain":"prd2","level":"professional","category":"blending","tags":["blended-malt","vatted-malt","terminology-change"],"region":null,"question":"複数の蒸留所のシングルモルトのみを混和し、グレーンウイスキーを含まないウイスキーを現在何と呼ぶか。","choices":["ブレンデッドウイスキー","シングルグレーン","ブレンデッドグレーン","ブレンデッドモルト(旧ヴァッテッドモルト)"],"answer":3,"explanation":"かつて「ヴァッテッドモルト」と呼ばれていた、複数蒸留所のシングルモルトのみを混和した製品は、2009年のスコッチ・ウイスキー規則以降「ブレンデッドモルト」という名称に統一された。","difficulty":3},{"id":"PRD2-065","domain":"prd2","level":"professional","category":"blending","tags":["marriage","blending-duration","cask-marrying"],"region":null,"question":"ブレンド後の原酒を再度樽に戻し「マリッジ」させる期間として、一般的に語られる目安はどれ程度か。","choices":["数か月程度","数時間程度","20年以上","1日未満"],"answer":0,"explanation":"ブレンド後の原酒を樽に戻して風味をなじませる「マリッジ」期間は、一般に数か月程度とされることが多い。","difficulty":3},{"id":"PRD2-066","domain":"prd2","level":"professional","category":"production","tags":["chill-filtration","temperature","bottling-process"],"region":null,"question":"チルフィルタレーションにおいて、ウイスキーを一般的に何度程度まで冷却してから濾過するとされるか。","choices":["40℃前後","0
