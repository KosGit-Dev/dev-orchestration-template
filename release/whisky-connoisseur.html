<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#141009">
<title>ウイスキーコニサー道場</title>
<style>
/* ウイスキーコニサー道場 — ダーク・バーカウンターテーマ */

:root {
  --bg: #141009;
  --surface: #1f1810;
  --surface-2: #292015;
  --line: rgba(232, 178, 90, 0.16);
  --ink: #f3e9d6;
  --ink-2: #c4b295;
  --ink-3: #8f7d63;
  --accent: #e0a24e;
  --accent-deep: #b97a24;
  --ok: #7dc98a;
  --ng: #e2725b;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
  --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html { height: 100%; }

body {
  min-height: 100%;
  background:
    radial-gradient(1200px 500px at 85% -10%, rgba(224, 162, 78, 0.10), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(140, 70, 20, 0.12), transparent 55%),
    var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", sans-serif;
  font-size: 15.5px;
  line-height: 1.65;
  padding-bottom: calc(76px + env(safe-area-inset-bottom));
}

h1, h2, h3, .hero h2, .mode-title {
  font-family: Georgia, "Times New Roman", "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-weight: 600;
  letter-spacing: 0.02em;
}

/* ---- ヘッダー ---- */

.app-header {
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: center; gap: 10px;
  padding: calc(10px + env(safe-area-inset-top)) 18px 10px;
  background: rgba(20, 16, 9, 0.86);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}
.app-header .logo { font-size: 20px; }
.app-header h1 {
  font-size: 16.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  background: linear-gradient(100deg, #f3d9a4, var(--accent) 60%, #c8842f);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
.app-header .header-sub { margin-left: auto; font-size: 11px; color: var(--ink-3); }

#view { max-width: 760px; margin: 0 auto; padding: 16px 14px 24px; }

/* ---- 共通部品 ---- */

.card {
  background: linear-gradient(180deg, var(--surface-2), var(--surface));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px;
  margin-bottom: 14px;
}
.card-title { font-size: 15px; margin-bottom: 12px; color: var(--ink); }
.card-note { font-size: 11px; color: var(--ink-3); font-weight: 400; margin-left: 6px; }

.btn {
  display: inline-block;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.04);
  color: var(--ink);
  border-radius: 12px;
  padding: 12px 18px;
  font-size: 14.5px;
  font-family: inherit;
  cursor: pointer;
  transition: transform 0.06s, background 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
  border: none; color: #221605; font-weight: 700;
}
.btn.wide { width: 100%; margin-top: 10px; text-align: center; }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn.danger-line { border-color: rgba(226, 114, 91, 0.5); color: var(--ng); background: transparent; }
.btn small { font-weight: 400; color: inherit; opacity: 0.75; }

.icon-btn {
  background: rgba(255, 255, 255, 0.06); border: 1px solid var(--line);
  color: var(--ink-2); width: 34px; height: 34px; border-radius: 50%;
  font-size: 14px; cursor: pointer; flex: none;
}

.chip {
  border: 1px solid var(--line); background: transparent; color: var(--ink-2);
  border-radius: 999px; padding: 7px 14px; font-size: 13px; cursor: pointer; font-family: inherit;
  white-space: nowrap; flex: none;
}
.chip.active { background: var(--accent); border-color: var(--accent); color: #221605; font-weight: 700; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 16px; }

.badge {
  display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 999px;
  border: 1px solid var(--line); color: var(--ink-2); letter-spacing: 0.03em;
}
.badge.lv-expert { color: #a8d8b0; border-color: rgba(125, 201, 138, 0.4); }
.badge.lv-professional { color: #f0c778; border-color: rgba(224, 162, 78, 0.5); }
.badge.lv-master { color: #f0a08a; border-color: rgba(226, 114, 91, 0.5); }
.badge.done { color: var(--ok); border-color: rgba(125, 201, 138, 0.4); }
.badge.draft { color: var(--accent); border-color: rgba(224, 162, 78, 0.4); }

.tag {
  display: inline-block; font-size: 11px; color: var(--ink-3);
  background: rgba(255, 255, 255, 0.05); border-radius: 6px; padding: 2px 8px; margin: 2px 3px 0 0;
}
.tag.warn { color: #f0b9a5; background: rgba(226, 114, 91, 0.12); font-size: 12px; padding: 5px 10px; }
.tag.warn b { color: var(--ng); font-weight: 600; }

.select {
  width: 100%; padding: 11px 12px; border-radius: 12px; margin: 6px 0 14px;
  background: var(--surface); color: var(--ink); border: 1px solid var(--line);
  font-size: 14.5px; font-family: inherit;
  appearance: none; -webkit-appearance: none;
}

.empty { color: var(--ink-3); text-align: center; padding: 18px 8px; }

/* ---- ボトムナビ ---- */

.bottom-nav {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
  display: flex; justify-content: space-around;
  padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
  background: rgba(24, 18, 10, 0.92);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--line);
}
.bottom-nav.hidden { display: none; }
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; color: var(--ink-3);
  font-size: 10.5px; font-family: inherit; cursor: pointer; padding: 4px 12px; border-radius: 10px;
}
.nav-btn .nav-icon { font-size: 20px; filter: grayscale(1) opacity(0.65); }
.nav-btn.active { color: var(--accent); }
.nav-btn.active .nav-icon { filter: none; }

/* ---- ホーム ---- */

.hero { text-align: center; padding: 26px 18px 20px; position: relative; overflow: hidden; }
.hero-still { width: 76px; height: 76px; margin: 0 auto 6px; display: block; opacity: 0.9; }
.hero h2 { font-size: 24px; }
.hero-sub { color: var(--ink-2); font-size: 12.5px; margin-top: 4px; }
.hero-stats { display: flex; justify-content: center; gap: 8px; margin-top: 18px; }
.hero-last { margin-top: 12px; font-size: 12px; color: var(--ink-3); }

.stat-tile {
  flex: 1; max-width: 130px; background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--line); border-radius: 12px; padding: 10px 6px;
  display: flex; flex-direction: column; align-items: center;
}
.stat-num { font-size: 22px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
.stat-den { font-size: 12px; color: var(--ink-3); font-weight: 400; }
.stat-label { font-size: 10.5px; color: var(--ink-3); margin-top: 2px; }

.banner {
  display: flex; align-items: center; gap: 12px; width: 100%;
  text-align: left; color: var(--ink); font-family: inherit; font-size: 14px; cursor: pointer;
  border-color: rgba(224, 162, 78, 0.45);
}
.banner b { color: var(--accent); }
.banner-icon { font-size: 22px; }

.mode-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.mode-card {
  text-align: left; cursor: pointer; color: var(--ink); font-family: inherit;
  padding: 16px; margin: 0; transition: transform 0.08s;
}
.mode-card:active { transform: scale(0.98); }
.mode-card:disabled { opacity: 0.45; }
.mode-card .mode-icon { font-size: 26px; }
.mode-card h3 { font-size: 15.5px; margin: 8px 0 4px; }
.mode-card p { font-size: 12px; color: var(--ink-2); line-height: 1.5; }

.mode-title { font-size: 21px; margin: 6px 2px 10px; }
.mode-sub { font-size: 13px; color: var(--ink-3); font-family: inherit; }
.mode-desc { color: var(--ink-2); font-size: 13px; margin: 0 2px 14px; }

/* ---- 出題画面 ---- */

.q-head { display: flex; align-items: center; gap: 12px; margin: 4px 0 14px; }
.q-progress { flex: 1; height: 6px; background: rgba(255, 255, 255, 0.08); border-radius: 3px; overflow: hidden; }
.q-progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-deep)); border-radius: 3px; transition: width 0.3s; }
.q-count { font-size: 13px; color: var(--ink-2); font-variant-numeric: tabular-nums; }
.q-timer { font-size: 14px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
.q-timer.danger, .ess-timer.danger { color: var(--ng); }

.q-meta { display: flex; gap: 6px; margin-bottom: 12px; }
.q-text { font-size: 16.5px; font-weight: 600; line-height: 1.75; margin-bottom: 16px; }

.choices { display: flex; flex-direction: column; gap: 10px; }
.choice {
  display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
  background: rgba(255, 255, 255, 0.035); border: 1px solid var(--line); color: var(--ink);
  border-radius: 12px; padding: 13px 14px; font-size: 14.5px; font-family: inherit;
  cursor: pointer; line-height: 1.55; transition: background 0.15s, border-color 0.15s;
}
.choice:not(:disabled):hover { background: rgba(224, 162, 78, 0.08); border-color: rgba(224, 162, 78, 0.4); }
.choice-key {
  flex: none; width: 26px; height: 26px; border-radius: 8px; display: grid; place-items: center;
  background: rgba(224, 162, 78, 0.14); color: var(--accent); font-weight: 700; font-size: 12.5px;
}
.choice.is-correct { border-color: var(--ok); background: rgba(125, 201, 138, 0.12); }
.choice.is-correct .choice-key { background: var(--ok); color: #10240f; }
.choice.is-wrong { border-color: var(--ng); background: rgba(226, 114, 91, 0.12); }
.choice.is-wrong .choice-key { background: var(--ng); color: #2b0d06; }
.choice:disabled { cursor: default; }

.explain { margin-top: 16px; border-top: 1px dashed var(--line); padding-top: 14px; }
.explain-title { font-weight: 700; margin-bottom: 6px; }
.explain.ok .explain-title { color: var(--ok); }
.explain.ng .explain-title { color: var(--ng); }
.explain p { color: var(--ink-2); font-size: 14px; }
.explain-tags { margin: 8px 0 4px; }
.explain .btn { margin-top: 12px; width: 100%; text-align: center; }

.glass-wrap { display: flex; justify-content: center; margin: 4px 0 14px; }
.glass { width: 110px; height: 128px; filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.4)); }

/* ---- 結果画面 ---- */

.result { text-align: center; padding-top: 26px; }
.time-up { color: var(--ng); font-weight: 700; margin-bottom: 8px; }
.ring-wrap { display: flex; justify-content: center; }
.ring { width: 150px; }
.ring-num { fill: var(--ink); font-size: 27px; font-weight: 700; font-family: inherit; }
.ring-sub { fill: var(--ink-3); font-size: 10px; }
.result-score { font-size: 17px; font-weight: 700; margin-top: 8px; }
.result-grade { color: var(--ink-2); font-size: 13.5px; margin: 6px 0 18px; }
.result-cats { text-align: left; margin: 0 4px 8px; }
.result-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }

.mini-bar-row { display: flex; align-items: center; gap: 10px; margin: 7px 0; }
.mini-bar-label { flex: none; width: 92px; font-size: 12px; color: var(--ink-2); text-align: right; }
.mini-bar { flex: 1; height: 12px; background: rgba(255, 255, 255, 0.07); border-radius: 4px; overflow: hidden; }
.mini-bar > div { height: 100%; background: linear-gradient(90deg, var(--accent-deep), var(--accent)); border-radius: 4px 4px 4px 4px; min-width: 2px; }
.mini-bar-val { flex: none; width: 64px; font-size: 12px; color: var(--ink); font-variant-numeric: tabular-nums; }
.mini-bar-n { color: var(--ink-3); margin-left: 3px; font-size: 10.5px; }

.wrong-list { text-align: left; margin-top: 14px; border-top: 1px dashed var(--line); padding-top: 10px; }
.wrong-list summary { cursor: pointer; color: var(--accent); font-size: 14px; }
.wrong-item { border-bottom: 1px dashed var(--line); padding: 12px 2px; }
.wrong-q { font-size: 13.5px; font-weight: 600; }
.wrong-a { font-size: 13px; color: var(--ok); margin-top: 4px; }
.wrong-e { font-size: 12.5px; color: var(--ink-2); margin-top: 4px; }

/* ---- 地図 ---- */

.map-jumps { display: flex; gap: 8px; overflow-x: auto; padding: 2px 2px 10px; scrollbar-width: none; }
.map-jumps::-webkit-scrollbar { display: none; }
.map-frame {
  position: relative; border-radius: var(--radius); overflow: hidden;
  border: 1px solid var(--line); box-shadow: var(--shadow);
  touch-action: none; background: #0e131c;
}
#map-svg { display: block; width: 100%; height: min(62vh, 520px); }
.map-sea { fill: #0e131c; }
.map-land { fill: #2a2418; stroke: rgba(224, 162, 78, 0.28); stroke-width: 0.5; }
.map-dot { fill: var(--accent); stroke: #140f08; stroke-width: 0.8; }
.map-pt.kind-region .map-dot { fill: #e8c268; }
.map-pt.kind-landmark .map-dot { fill: #b8977a; }
.map-pt.seen .map-dot { fill: #8a6a33; }
.map-hit { fill: transparent; cursor: pointer; }
.map-pt { cursor: pointer; }
.map-label { fill: var(--ink-2); paint-order: stroke; stroke: rgba(10, 8, 4, 0.85); stroke-width: 2px; font-family: inherit; pointer-events: none; }
.map-hint {
  position: absolute; left: 10px; bottom: 10px; font-size: 10.5px; color: var(--ink-3);
  background: rgba(14, 11, 6, 0.7); border-radius: 8px; padding: 4px 10px; pointer-events: none;
}
.map-progress { font-size: 12px; color: var(--ink-3); margin: 10px 4px; }

.sheet {
  position: fixed; left: 50%; transform: translateX(-50%);
  bottom: calc(64px + env(safe-area-inset-bottom));
  width: min(720px, calc(100% - 20px)); z-index: 35;
  background: linear-gradient(180deg, #2e2517, #241c11);
  border: 1px solid rgba(224, 162, 78, 0.35); border-radius: 18px;
  box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.6);
  padding: 10px 18px 18px; max-height: 46vh; overflow-y: auto;
}
.sheet-grip { width: 44px; height: 4px; border-radius: 2px; background: var(--line); margin: 2px auto 10px; }
.sheet-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.sheet-head h3 { font-size: 18px; color: var(--accent); }
.sheet-sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
.sheet-trivia { font-size: 14px; color: var(--ink-2); margin: 10px 0 14px; }

/* ---- 演習設定 ---- */

.lv-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 8px 0 16px; }
.lv-btn {
  border: 1px solid var(--line); background: rgba(255, 255, 255, 0.03); color: var(--ink);
  border-radius: 12px; padding: 12px; cursor: pointer; font-family: inherit; text-align: left;
}
.lv-btn.active { border-color: var(--accent); background: rgba(224, 162, 78, 0.12); }
.lv-btn-name { display: block; font-weight: 700; font-size: 13.5px; }
.lv-btn-n { display: block; font-size: 11px; color: var(--ink-3); margin-top: 3px; }
.mock-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.mock-row .btn { padding: 10px 6px; font-size: 12.5px; text-align: center; line-height: 1.5; }

/* ---- 官能 ---- */

.color-chart { margin-top: 6px; }
.chart-title { font-size: 17px; margin: 14px 2px 8px; }
.color-row { display: flex; gap: 14px; align-items: center; padding: 12px 14px; }
.color-glass .glass { width: 64px; height: 74px; }
.color-info h4 { font-size: 14.5px; color: var(--accent); }
.color-en { font-size: 11px; color: var(--ink-3); font-weight: 400; margin-left: 4px; }
.color-info p { font-size: 12.5px; color: var(--ink-2); margin-top: 3px; }
.color-typical { color: var(--ink-3) !important; font-size: 11.5px !important; }

/* ---- 論文 ---- */

.ess-list { display: flex; flex-direction: column; gap: 10px; }
.ess-card { text-align: left; cursor: pointer; color: var(--ink); font-family: inherit; margin: 0; }
.ess-card-top { display: flex; gap: 6px; margin-bottom: 8px; }
.ess-card h3 { font-size: 15.5px; margin-bottom: 5px; }
.ess-q-preview {
  font-size: 12.5px; color: var(--ink-2);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.exam-paper { border-left: 3px solid var(--accent); }
.exam-label { font-size: 11px; letter-spacing: 0.14em; color: var(--ink-3); margin-bottom: 6px; }
.exam-q { font-size: 15.5px; font-weight: 600; line-height: 1.8; }
.exam-chars { font-size: 12px; color: var(--ink-3); margin-top: 8px; }
.timer-row { display: flex; gap: 8px; margin-top: 12px; }
.ess-timer { margin-left: auto; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }

.fold summary { cursor: pointer; color: var(--accent); font-size: 14px; }
.fold-hint { font-size: 12px; color: var(--ink-3); margin: 8px 0; }
.outline { margin: 12px 0 4px 22px; color: var(--ink-2); font-size: 13.5px; }
.outline li { margin: 6px 0; }
.check-row { display: flex; gap: 10px; align-items: flex-start; font-size: 13.5px; color: var(--ink-2); margin: 10px 0; cursor: pointer; }
.check-row input { accent-color: var(--accent); width: 17px; height: 17px; margin-top: 2px; flex: none; }

#ess-draft {
  width: 100%; background: rgba(0, 0, 0, 0.25); color: var(--ink);
  border: 1px solid var(--line); border-radius: 12px; padding: 12px;
  font-size: 14.5px; line-height: 1.8; font-family: inherit; resize: vertical;
}
#ess-draft:focus { outline: none; border-color: var(--accent); }
.char-count { text-align: right; font-size: 12px; color: var(--ink-3); margin-top: 6px; font-variant-numeric: tabular-nums; }
.model-answer .model-body p { font-size: 14px; color: var(--ink-2); margin: 10px 0; line-height: 1.9; }

/* ---- 分析 ---- */

.stats-hero { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; justify-content: center; }
.stats-hero-nums { display: flex; gap: 8px; flex: 1; min-width: 240px; }
.lv-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
.lv-name { flex: none; width: 128px; font-size: 12px; color: var(--ink-2); }
.mini-bar.dual { flex: 1; }
.mini-bar .cover { height: 100%; background: linear-gradient(90deg, var(--accent-deep), var(--accent)); border-radius: 4px; min-width: 2px; }
.lv-val { flex: none; font-size: 11px; color: var(--ink-3); font-variant-numeric: tabular-nums; }
.weak-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.stats-actions { margin: 4px 0 10px; }

@media (max-width: 460px) {
  .app-header .header-sub { display: none; }
}

@media (max-width: 480px) {
  .mode-grid { grid-template-columns: 1fr 1fr; }
  .mini-bar-label { width: 76px; font-size: 11px; }
  .mock-row { grid-template-columns: 1fr; }
  .lv-name { width: 108px; font-size: 11px; }
}

</style>
</head>
<body>
<header class="app-header">
  <span class="logo">🥃</span>
  <h1>ウイスキーコニサー道場</h1>
  <span class="header-sub">Whisky Connoisseur Dojo</span>
</header>
<main id="view"></main>
<nav class="bottom-nav"></nav>

world","alchemy"],"region":null,"question":"蒸留に用いる器具「アランビック(蒸留器)」の技術的起源として広く知られているのはどこか。","choices":["南米インカ帝国の技術","北欧ヴァイキングの醸造技術","中国の道教錬丹術","中東・イスラム世界の錬金術師による技術"],"answer":3,"explanation":"蒸留器(アランビック)は中東・イスラム世界の錬金術師たちによって発展させられた技術とされ、その名はアラビア語の「al-anbiq」に由来する。この技術がヨーロッパへ伝播し、修道院などで応用された。","difficulty":1},{"id":"HIS-010","domain":"his","level":"expert","category":"history","tags":["monastery","medieval-europe","knowledge-transfer","aqua-vitae"],"region":"europe-other","question":"中世ヨーロッパにおいて蒸留技術と「アクアヴィテ」の知識を保持し、各地へ広めた担い手として重要な役割を果たした組織はどれか。","choices":["ギルド商人組合","修道院(教会)","王立協会","東インド会社"],"answer":1,"explanation":"中世ヨーロッパでは修道院が医薬・学術の中心地であり、蒸留技術とアクアヴィテの知識は修道士たちを通じて各地へ伝えられ、後の蒸留酒文化の基盤となった。","difficulty":2},{"id":"HIS-011","domain":"his","level":"expert","category":"history","tags":["act-of-union","1707","great-britain"],"region":null,"question":"スコットランド議会とイングランド議会が統合され、グレートブリテン王国が成立した合同法が制定された年はどれか。","choices":["1603年","1651年","1707年","1745年"],"answer":2,"explanation":"1707年の合同法(Act of Union)によりスコットランドとイングランドの議会が統合され、グレートブリテン王国が成立した。これに伴いイングリッシュ式の物品税制度がスコットランドにも適用されることとなった。","difficulty":1},{"id":"HIS-012","domain":"his","level":"expert","category":"history","tags":["excise-tax","act-of-union","taxation","resentment"],"region":null,"question":"1707年の合同後、スコットランドの蒸留業者が強く反発することになった主な要因はどれか。","choices":["イングランド式の物品税(酒税)制度が導入されたこと","蒸留免許がすべて廃止されたこと","スコットランド国内での販売が禁止されたこと","樽材の輸入が禁止されたこと"],"answer":0,"explanation":"合同後、イングランドで運用されていた物品税制度がスコットランドにも適用され、原料や生産量に応じた重い課税が課されるようになったことが、後の密造の拡大につながった。","difficulty":2},{"id":"HIS-013","domain":"his","level":"expert","category":"history","tags":["illicit-distillation","smuggling","highland"],"region":"scotland-highland","question":"重税を逃れるため山間部などで非合法に行われた蒸留は一般に何と呼ばれるか。","choices":["ライセンス蒸留","密造(イリシット・ディスティレーション)","公認蒸留","王室蒸留"],"answer":1,"explanation":"18世紀から19世紀初頭にかけて、スコットランド各地、特にハイランド地方では重税を逃れるための密造(イリシット・ディスティレーション)が横行し、良質なウイスキーの産地として知られる土地も多く生まれた。","difficulty":1},{"id":"HIS-014","domain":"his","level":"expert","category":"cultu トランドの伝説的英雄ロブ・ロイを題材とするオペレッタにちなみ、ウォルドーフ・アストリアのバーで命名されたとされる。","difficulty":3},{"id":"HIS-066","domain":"his","level":"professional","category":"culture","tags":["sazerac","absinthe","new-orleans","cocktail-ingredient"],"region":"usa-other","question":"サゼラックにおいて、伝統的なレシピで用いられ、現在では規制の関係からハーブ系リキュールで代用されることが多い蒸留酒はどれか。","choices":["ジン","アブサン","ラム","テキーラ"],"answer":1,"explanation":"サゼラックの伝統的なレシピではグラスの内側をアブサンでリンスする工程があるが、アブサンが一時各国で規制されていた時期には他のハーブ系リキュールで代用されることが多かった。","difficulty":3},{"id":"HIS-067","domain":"his","level":"professional","category":"culture","tags":["highball-campaign","izakaya","suntory","marketing"],"region":"japan","question":"サントリーが2008年前後に展開したハイボール復興キャンペーンにおいて、主なターゲットとして重視された飲食業態はどれか。","choices":["高級レストラン","ホテルバー","ワインバー","居酒屋"],"answer":3,"explanation":"サントリーは2008年前後、若年層のビール離れ・ウイスキー離れが進む中、居酒屋を主なターゲットとしてハイボール復興キャンペーンを展開し、これが「とりあえずハイボール」ブームにつながった。","difficulty":3},{"id":"HIS-068","domain":"his","level":"professional","category":"history","tags":["torys-whisky","1946","postwar-japan","suntory"],"region":"japan","question":"トリスバーの展開を支えた「トリスウイスキー」が発売された年としてもっとも近いのはどれか。","choices":["1946年","1955年","1962年","1970年"],"answer":0,"explanation":"トリスウイスキーは1946年に発売された大衆向けウイスキーで、戦後復興期から高度経済成長期にかけて庶民に親しまれ、トリスバーの隆盛を支えた。","difficulty":4},{"id":"HIS-069","domain":"his","level":"professional","category":"culture","tags":["hot-toddy","etymology","toddy","colonial-india"],"region":"india","question":"ホットトディの名称の由来として広く紹介されている、インドなどでヤシの樹液を発酵させて作られていた酒の名はどれか。","choices":["アラック","フェニー","トディ(toddy)","バタービール"],"answer":2,"explanation":"ホットトディの「トディ」は、インドなど南アジアでヤシの樹液を発酵させて作られていた酒「トディ(toddy)」に由来するとされ、これが英国に伝わり温かい酒の飲み方の名として定着したとされる。","difficulty":3},{"id":"HIS-070","domain":"his","level":"professional","category":"culture","tags":["mint-julep","etymology","julab","persian-origin"],"region":"usa-kentucky","question":"ミントジュレップの「ジュレップ(julep)」という語の遠い語源とされる、バラ水を意味するアラビア語・ペルシャ語由来の言葉はどれか。","choices":["シャルバート","ジュラーブ(julab)","ラクフィ","ゴラーブ"],"answer":1,"explanation":"julepの語源はアラビア語・ペルシャ語の「julab(ジュラーブ、バラ水の意)」に遡るとされ、これがヨーロッパの言語を経て英語のjulepとなった。","difficulty":3},{"id":"HIS-071","domain":"his","level":"professional","category":"business","tags":["dcl","1877","grain-whisky-control","price-control"],"region":null,"question":"DCL(ディスティラーズ・カンパニー・リミテッド)が1877年の設立当初、主に統制しようとした対象は何か。","choices":["モルトウイスキーの熟成年数","樽材の輸入価格","小売店への販売網","グレーンウイスキーの生産量と価格"],"answer":3,"explanation":"DCLは1877年、複数のグレーンウイスキー蒸留業者が合併して発足した会社であり、当初の主な目的は乱立していたグレーンウイスキーの生産量と価格を統制し、業界の過当競争を抑えることであった。","difficulty":3},{"id":"HIS-072","domain":"his","level":"professional","category":"culture","tags":["whisky-sour","lemon-juice","cocktail-basics"],"region":"usa-other","question":"ウイスキーサワーに用いられる基本の材料の組み合わせとして正しいものはどれか。","choices":["ウイスキー、レモンジュース、シロップ(または砂糖)","ウイスキー、トニックウォーター、ライム","ウイスキー、オレンジジュース、グレナデン","ウイスキー、コーラ、ライム"],"answer":0,"explanation":"ウイスキーサワーはウイスキーにレモンジュースとシロップ(または砂糖)を加えたシンプルな構成のカクテルで、卵白を加えるスタイルも広く親しまれている。","difficulty":4},{"id":"HIS-073","domain":"his","level":"master","category":"history","tags":["1494","exchequer-rolls","primary-source","john-cor"],"region":null,"question":"1494年のスコットランド財務省記録における実際の記載文言に最も近いとされる英訳はどれか。","choices":["王の勅命により、王室のために蒸留酒を製造させる","ジョン・コー修道士に蒸留器の操業免許を与える","王命により、ジョン・コー修道士へアクアヴィテを製造させるため麦芽8ボルを与える","リンドアズ修道院に対し財務省へアクアヴィテを納入するよう命じる"],"answer":2,"explanation":"財務省記録の該当箇所は「To Friar John Cor, by order of the King, to make aquavitae, VIII bolls of malt(王命により、ジョン・コー修道士へアクアヴィテを製造させるため麦芽8ボルを与える)」に近い文言で記されているとされ、これがスコッチウイスキー史上最古の公式記録とされる根拠となっている。","difficulty":4},{"id":"HIS-074","domain":"his","level":"master","category":"history","tags":["red-book-of-ossory","1324","disputed-source","ireland"],"region":"ireland","question":"『レッド・ブック・オブ・オソリー』(1324年頃編纂とされる文書)に関する記述として、ウイスキー史の文脈でしばしば言及されるが慎重な扱いが必要とされる理由はどれか。","choices":["写本が現存せず内容が完全に不明であるため","文書内の\"aqua vitae\"の記述が蒸留酒(ウイスキー)を直接指すか学術的に議論があるため","文書自体が近代の偽作と断定されているため","スコットランドではなくウェールズの文書であるため"],"answer":1,"explanation":"『レッド・ブック・オブ・オソリー』はアイルランドの聖職者に関する文書で、\"aqua vitae\"の語が登場するとしてウイスキー史でしばしば引用されるが、それが現代的な意味での蒸留酒(ウイスキー)を直接指すかどうかは学術的に議論があり、慎重な扱いが必要とされる。","difficulty":4},{"id":"HIS-075","domain":"his","level":"master","category":"history","tags":["jabir-ibn-hayyan","alchemy","islamic-golden-age","distillation-origin"],"region":null,"question":"蒸留技術の発展に関わったとされる伝説的な人物として、しばしば「錬金術の父」の一人に数えられる8世紀頃のイスラム世界の学者は誰か。","choices":["ジャービル・イブン・ハイヤーン(Jabir ibn Hayyan)","イブン・スィーナー(アヴィセンナ)","アル・ラーズィー","フワーリズミー"],"answer":0,"explanation":"ジャービル・イブン・ハイヤーンは8世紀頃に活動したとされる錬金術師で、蒸留を含む化学的手法の体系化に貢献したとされ、しばしば「錬金術の父」の一人として言及される(その業績の多くは伝説的側面も強い)。","difficulty":4},{"id":"HIS-076","domain":"his","level":"master","category":"culture","tags":["illicit-distillation","quality-reputation","small-still","highland"],"region":"scotland-highland","question":"密造時代、ハイランドの密造ウイスキーが合法蒸留所の製品よりも高品質とみなされることが多かった理由として一般的に挙げられるのはどれか。","choices":["密造業者は必ず海外の樽を用いたため","密造ウイスキーは長期熟成が義務付けられていたため","課税逃れのため蒸留回数を減らしていたため","小規模な単式蒸留器でじっくりと丁寧に蒸留していたため"],"answer":3,"explanation":"密造業者は小規模な単式蒸留器を用い、目立たぬよう丁寧に少量ずつ蒸留する必要があったため、結果として品質の高いウイスキーが生まれることが多く、これが「密造ウイスキーは上物」という評判につながったとされる。","difficulty":4},{"id":"HIS-077","domain":"his","level":"master","category":"business","tags":["cadenheads","ja-mitchell","1972","springbank"],"region":"scotland-campbeltown","question":"ケイデンヘッドが現在のJ&Aミッチェル社(スプリングバンク蒸留所を擁する)の傘下に入った年としてもっとも近いのはどれか。","choices":["1955年","1972年","1988年","2001年"],"answer":1,"explanation":"ケイデンヘッドは1972年にJ&Aミッチェル社(スプリングバンク蒸留所のオーナー)の傘下に入り、以降同社のもとで独立瓶詰会社としての活動を続けている。","difficulty":4},{"id":"HIS-078","domain":"his","level":"master","category":"business","tags":["signatory-vintage","edradour","2002-acquisition","perthshire"],"region":"scotland-highland","question":"シグナトリー・ヴィンテージが2002年頃に買収し、傘下の蒸留所として運営するようになったパースシャーの小規模蒸留所はどれか。","choices":["グレンタレット","ダルウィニー","エドラダワー(Edradour)","ブレア・アソール"],"answer":2,"explanation":"シグナトリー・ヴィンテージは2002年頃、パースシャーの小規模蒸留所エドラダワーを買収し、独立瓶詰業者でありながら自社蒸留所を持つ稀な存在となった。","difficulty":4},{"id":"HIS-079","domain":"his","level":"master","category":"business","tags":["douglas-laing","hunter-laing","2013-split","family-business"],"region":"scotland-lowland","question":"ダグラス・レイングが2013年に一族内の経営方針の相違から分社化し、新たに設立された会社はどれか。","choices":["ハンター・レイング(Hunter Laing)","ワトソンズ・オブ・グラスゴー","スペイサイド・ディスティラーズ","マッキンレー・アンド・カンパニー"],"answer":0,"explanation":"ダグラス・レイングは2013年、創業家内での経営方針の相違により分社化し、スチュワート・レイングが新たにハンター・レイングを設立する一方、フレッド・レイングがダグラス・レイング&カンパニーを引き継いだ。以降、両社はそれぞれ独立して独立瓶詰事業を展開している。","difficulty":4},{"id":"HIS-080","domain":"his","level":"master","category":"history","tags":["phylloxera","scientific-name","taxonomy"],"region":"europe-other","question":"フィロキセラの現在の正式な学名として正しいものはどれか。","choices":["Phylloxera vitifoliae","Daktulosphaira vitifoliae","Viteus vinifera","Aphis vastatrix"],"answer":1,"explanation":"フィロキセラの現在の正式な学名はDaktulosphaira vitifoliaeであり、かつてはPhylloxera vastatrixなどの旧学名で呼ばれていたが、分類の見直しにより変更された。","difficulty":4},{"id":"HIS-081","domain":"his","level":"master","category":"people","tags":["george-smith","glenlivet","pistols","illicit-distillers-backlash"],"region":"scotland-speyside","question":"グレンリベットのジョージ・スミスが合法化直後に密造業者から強い反発を受けた際、身辺警護のために携行していたとされる武具はどれか。","choices":["剣とマスケット銃","短剣のみ","護身用の杖","一対のペア・ピストル"],"answer":3,"explanation":"ジョージ・スミスは合法蒸留を始めたことで密造業者から強い反発と脅迫を受け、身辺警護のため一対のペア・ピストルを常時携行していたという逸話が伝わっている。","difficulty":5},{"id":"HIS-082","domain":"his","level":"master","category":"business","tags":["guinness-affair","gerald-ronson","1986","share-support"],"region":null,"question":"アーネスト・サンダースが関与した1986年の「ギネス事件」において、株価を不正に支えるため協力させられたとされる著名な実業家(のちに有罪判決)は誰か。","choices":["ロバート・マクスウェル","トミー・デュワー2世","ジェラルド・ロナルド(ジェラルド・ロネイ)","アラン・シュガー"],"answer":2,"explanation":"ギネス事件では、アーネスト・サンダースの依頼を受けた実業家ジェラルド・ロナルド(通称ジェラルド・ロネイ)らが株価買い支え工作に協力したとされ、後に有罪判決を受けた関係者の一人となった。","difficulty":4},{"id":"HIS-083","domain":"his","level":"master","category":"business","tags":["seagram","canada","bronfman-family","2000s-breakup"],"region":"canada","question":"シーグラム社(Seagram)は本来どの国を拠点とする企業だったか。","choices":["カナダ","アメリカ合衆国","イギリス","フランス"],"answer":0,"explanation":"シーグラム社はカナダを拠点とするブロンフマン家によって発展させられた企業で、世界最大級の酒類複合企業となった時期もあったが、2000年代初頭に事業が解体され、スピリッツ部門はディアジオとペルノ・リカールに分割買収された。","difficulty":4},{"id":"HIS-084","domain":"his","level":"master","category":"people","tags":["william-grant","glenfiddich","family-labor","distillery-construction"],"region":"scotland-speyside","question":"ウィリアム・グラント&サンズの創業者ウィリアム・グラントがグレンフィディック蒸留所を建設した際、労働力として主に用いたとされるのは誰か。","choices":["雇用した季節労働者","自身の家族(子どもたち)","近隣の密造業者","石工組合の職人"],"answer":1,"explanation":"ウィリアム・グラントは1886年から自身の家族(9人の子どもたち)を主な労働力として動員し、1年でグレンフィディック蒸留所を完成させたという逸話が広く知られている。","difficulty":4},{"id":"HIS-085","domain":"his","level":"master","category":"culture","tags":["manhattan","print-record","1880s","cocktail-history"],"region":"usa-other","question":"マンハッタンカクテルに関する現存最古級の印刷レシピが掲載されたとされる年代として最も近いのはどれか。","choices":["1862年頃(ジェリー・トーマスの著作)","1930年頃(サヴォイ・カクテルブック)","1880年代のバーテンディング指南書","1950年代の家庭向け料理書"],"answer":2,"explanation":"マンハッタンカクテルの起源には諸説あるが、印刷物に登場する最古級のレシピは1880年代のバーテンディング指南書に見られるとされ、これより古い1862年のジェリー・トーマスの著作には掲載がないことが知られている。","difficulty":5},{"id":"HIS-086","domain":"his","level":"master","category":"culture","tags":["highball","etymology","railway-signal","theory"],"region":"usa-other","question":"「ハイボール」の語源として有力視される説の一つに、アメリカの鉄道信号に由来するというものがある。この信号が意味していたものはどれか。","choices":["進行(速度を上げてよい)の合図","停止の合図","徐行の合図","分岐点通過の合図"],"answer":0,"explanation":"ハイボールの語源説の一つに、アメリカの鉄道で用いられたボール式信号機において、ボールが高い位置にある状態が「進行(スピードを上げてよい)」を意味したことに由来するというものがある。諸説の一つとして紹介されることが多い。","difficulty":4},{"id":"HIS-087","domain":"his","level":"master","category":"culture","tags":["highball-boom","izakaya-menu","japan","2008"],"region":"japan","question":"日本にハイボールという飲み方自体は戦前から紹介されていたが、2008年前後の「ハイボールブーム」の主な特徴として正しいのはどれか。","choices":["主に家庭での水割りに代わる飲み方として広まった","高級ホテルバーを中心に広まった","主に女性層のみをターゲットとした","専用グラスやジョッキを用い居酒屋のメニューとして定着した"],"answer":3,"explanation":"2008年前後のハイボールブームは、専用のグラスやジョッキを用いた提供スタイルが居酒屋メニューとして定着したことが特徴で、若年層や女性層を含む幅広い客層に浸透し、国内ウイスキー消費回復の転機となった。","difficulty":5},{"id":"HIS-088","domain":"his","level":"master","category":"business","tags":["dcl","john-haig-and-co","1877-merger","haig-family"],"region":null,"question":"DCL(ディスティラーズ・カンパニー・リミテッド)設立(1877年)時に合併した創業各社の一つで、スコッチ史上でも古い蒸留業者一族として知られるヘイグ家の会社はどれか。","choices":["ロバート・ヘイグ・アンド・カンパニー","ジョン・ヘイグ・アンド・カンパニー(John Haig & Co)","ヘイグ・ブラザーズ","ヘイグ・ディスティリング・カンパニー"],"answer":1,"explanation":"1877年のDCL設立時に合併した6社のグレーンウイスキー蒸留業者の一つにジョン・ヘイグ・アンド・カンパニー(John Haig & Co)があり、ヘイグ家はスコッチウイスキー史上でも最も古い蒸留業者一族の一つとして知られる。","difficulty":5},{"id":"HIS-089","domain":"his","level":"master","category":"history","tags":["act-of-union","scottish-pound","currency","taxation"],"region":null,"question":"1707年合同法以前、スコットランド独自に存在していた通貨・課税制度に関して、合同後の物品税移行に伴い調整が必要となった単位はどれか。","choices":["スコットランド・シリング","スコットランド・ペニー","スコットランド・ポンド(単独通貨)","スコットランド・クラウン"],"answer":2,"explanation":"1707年の合同以前、スコットランドは独自のスコットランド・ポンドを用いており、合同後はイングランドの通貨・物品税制度への統合・調整が必要となった。これは酒税を含む新たな課税体系導入の背景の一つとされる。","difficulty":4},{"id":"HIS-090","domain":"his","level":"master","category":"business","tags":["blended-whisky","phylloxera","1880s","export-growth"],"region":null,"question":"フィロキセラ禍によるコニャック供給減少の影響を最も強く受け、その代替需要の受け皿として1880年代に急成長したスコッチウイスキーのカテゴリーはどれか。","choices":["ブレンデッドウイスキー","シングルモルトウイスキー","シングルカスクウイスキー","カスクストレングスウイスキー"],"answer":0,"explanation":"フィロキセラ禍によるコニャック不足の代替需要を最も強く取り込んだのはブレンデッドウイスキーであった。飲みやすく安定した品質のブレンデッドウイスキーは1880年代から国内外で急速に需要を拡大した。","difficulty":4},{"id":"IRL-001","domain":"irl","level":"expert","category":"history","tags":["uisce-beatha","etymology","gaelic","history"],"region":"ireland","question":"「ウイスキー」の語源となったアイルランド語（ゲール語）表現「ウシュクベーハー（uisce beatha）」の意味として正しいものはどれか。","choices":["生命の水","大地の恵み","神聖な蒸留","琥珀の滴"],"answer":0,"explanation":"uisce beathaはゲール語で「生命の水」を意味し、ラテン語のaqua vitaeに由来する。英語の\"whiskey\"はこの語が転訛したものである。","difficulty":1},{"id":"IRL-002","domain":"irl","level":"expert","category":"history","tags":["history","monks","distillation-origin"],"region":"ireland","question":"アイルランドへの蒸留技術の伝来について、伝統的にしばしば語られる説として正しいものはどれか。","choices":["ヴァイキングが北欧から伝えた","中世の修道士がヨーロッパ大陸から蒸留技術を持ち帰ったとされる","スペインの商人が交易でもたらした","産業革命期にイングランドから移植された"],"answer":1,"explanation":"諸説あるが、中世キリスト教の修道士が大陸での修道院生活を通 aterford-distillery","mark-reynier","founder"],"region":"ireland","question":"ウォーターフォード蒸留所(Waterford Distillery)を創業した人物として知られるのは誰か。","choices":["ジョン・ティーリング","マーク・レニエ","アイニアス・コフィー","ダニエル・E・ウィリアムズ"],"answer":1,"explanation":"マーク・レニエはスコットランドのブルイックラディ蒸留所を再生させた人物で、その後2014年頃にウォーターフォード蒸留所を立ち上げた。","difficulty":2},{"id":"IRL-019","domain":"irl","level":"expert","category":"business","tags":["irish-distillers","1966-merger","business-history"],"region":"ireland","question":"経営難にあったアイルランドの複数の蒸留会社が統合し、1966年に設立された企業はどれか。","choices":["ディアジオ","ペルノ・リカール","アイリッシュ・ディスティラーズ","ビーム・サントリー"],"answer":2,"explanation":"1966年、ジョン・パワー・アンド・サン、ジョン・ジェムソン・アンド・サン、コーク蒸留会社（ミドルトン）が統合し、アイリッシュ・ディスティラーズ社が設立された。","difficulty":2},{"id":"IRL-020","domain":"irl","level":"expert","category":"history","tags":["19th-century","golden-age","history"],"region":"ireland","question":"19世紀のアイリッシュウイスキーの世界的な地位について正しい説明はどれか。","choices":["国内消費のみに限られ、輸出はほとんどなかった","すでにこの時期から衰退が続いていた","ジンに市場を奪われ無名であった","スコッチを上回る人気を誇り、世界で最も飲まれる蒸留酒の一つだった"],"answer":3,"explanation":"19世紀のアイリッシュウイスキーは高品質と評され、イギリスやアメリカ市場でスコッチを上回る人気を博していたとされる。","difficulty":2},{"id":"IRL-021","domain":"irl","level":"expert","category":"history","tags":["prohibition","trade-war","decline","20th-century"],"region":"ireland","question":"20世紀のアイリッシュウイスキーが大きく衰退した要因として挙げられるものはどれか。","choices":["アメリカの禁酒法とアングロ・アイリッシュ貿易戦争による輸出市場の喪失","EUによる規制強化","原料大麦の壊滅的な不作","世界的なジン人気の高まりのみ"],"answer":0,"explanation":"アメリカの禁酒法（1920〜1933年）とイギリス連邦市場を失ったアングロ・アイリッシュ貿易戦争が、20世紀前半のアイリッシュウイスキー衰退の大きな要因とされる。","difficulty":2},{"id":"IRL-022","domain":"irl","level":"expert","category":"history","tags":["spelling","whiskey-vs-whisky","dublin-distillers"],"region":"ireland","question":"アイルランドの蒸留業者が自国のウイスキーを \"whiskey\" と e を付けて綴るようになった背景として一般に語られる説明はどれか。","choices":["単なる誤植が定着したものである","コフィー式連続式蒸留機由来の安価なブレンデッドウイスキーと区別し、自らの高品質なポットスチルウイスキーを差別化するためとされる","フランス語表記の影響である","EU規則で義務付けられたためである"],"answer":1,"explanation":"19世紀後半、コフィー式連続式蒸留機による安価な穀物由来のウイスキーと区別するため、ダブリンの大手蒸留業者が \"whiskey\" の綴りを用いて品質差を強調したという説明が広く語られ ory":"brand","tags":["powers","johns-lane-distillery","dublin"],"region":"ireland","question":"パワーズ・ゴールドラベル(Powers Gold Label)を生んだダブリンの旧蒸留所はどこか。","choices":["ボウ・ストリート蒸留所","オールド・ブッシュミルズ蒸留所","オールド・ミドルトン蒸留所","ジョンズ・レーン蒸留所"],"answer":3,"explanation":"パワーズはダブリンのジョンズ・レーン蒸留所を拠点としていたブランドで、現在はミドルトン蒸留所で生産されている。","difficulty":2},{"id":"IRL-029","domain":"irl","level":"expert","category":"history","tags":["roe-and-co","st-patricks-tower","windmill","dublin"],"region":"ireland","question":"かつてダブリンのトーマス・ストリートにあったジョージ・ロー社の蒸留所跡に現存し、ヨーロッパ最大級のスモック式風車塔と伝えられる建造物はどれか。","choices":["セント・パトリックス・タワー（風車塔）","ハーフペニー橋","ギネス醸造所の煙突","クライスト・チャーチ大聖堂の尖塔"],"answer":0,"explanation":"ジョージ・ロー社の蒸留所跡には、ヨーロッパ最大級とされるスモック式風車塔「セント・パトリックス・タワー」が現存している。","difficulty":2},{"id":"IRL-030","domain":"irl","level":"expert","category":"region-knowledge","tags":["geographical-indication","island-of-ireland","region-knowledge"],"region":"ireland","question":"アイリッシュウイスキーの地理的表示（GI）における「アイルランド」の範囲として正しいものはどれか。","choices":["アイルランド共和国のみ","アイルランド共和国と北アイルランドを含む「アイルランド島」全体","北アイルランドのみ","EU加盟国であるアイルランド共和国とその海外領土"],"answer":1,"explanation":"アイリッシュウイスキーの地理的表示は、政治的国境に関わらず「アイルランド島」全体（共和国および北アイルランド）を対象とする。","difficulty":2},{"id":"IRL-031","domain":"irl","level":"expert","category":"tasting","tags":["single-pot-still","tasting-notes","mouthfeel"],"region":"ireland","question":"シングルポットスチル・アイリッシュウイスキーの一般的なテイスティング特徴として語られるものはどれか。","choices":["強いヨード香とピート香","甘いコーンの香りが支配的","スパイシーでクリーミー、オイリーな口当たり","酸味の強いワインのような風味"],"answer":2,"explanation":"未発芽大麦由来のスパイシーさと、ポットスチル蒸留由来のクリーミーでオイリーな口当たりは、シングルポットスチル・アイリッシュウイスキーの典型的な特徴とされる。","difficulty":2},{"id":"IRL-032","domain":"irl","level":"expert","category":"business","tags":["irish-distillers","pernod-ricard","ownership"],"region":"ireland","question":"現在、ジェムソンなどを擁するアイリッシュ・ディスティラーズ社の親会社はどこか。","choices":["ディアジオ","ビーム・サントリー","ウィリアム・グラント・アンド・サンズ","ペルノ・リカール"],"answer":3,"explanation":"アイリッシュ・ディスティラーズ社はフランスのペルノ・リカール・グループ傘下にある。","difficulty":1},{"id":"IRL-033","domain":"irl","level":"expert","category":"business" illation-strength","eu-regulation","94-8-percent"],"region":"ireland","question":"EUのスピリッツ規則が定める、ウイスキーの蒸留アルコール度数の上限として正しいものはどれか。","choices":["100%（純粋アルコール）","99.9% vol","94.8% vol未満","90.0% vol未満"],"answer":2,"explanation":"EU規則では、原料由来の香味を残すため、ウイスキーの各蒸留はアルコール度数94.8% vol未満で行わなければならないと定められている。これを超えるとニュートラルスピリッツとみなされる。","difficulty":3},{"id":"IRL-044","domain":"irl","level":"professional","category":"history","tags":["malt-tax","unmalted-barley","economic-history","18th-century"],"region":"ireland","question":"18世紀アイルランドで導入された「モルト税（麦芽税）」が、シングルポットスチル・アイリッシュウイスキーの成立に与えた影響として正しい説明はどれか。","choices":["麦芽の輸出が禁止され国内消費のみとなった","税を逃れるため大麦麦芽の使用が完全に廃止された","税収確保のため蒸留自体が一時禁止された","課税対象の大麦麦芽の使用量を抑えるため、未発芽の生大麦を混ぜる仕込みが広まった"],"answer":3,"explanation":"1785年にアイルランドへ導入されたモルト税により、蒸留業者は課税対象である大麦麦芽の使用量を抑え、非課税の未発芽大麦を混ぜるようになった。これがシングルポットスチル・スタイル成立の一因とされる。","difficulty":3},{"id":"IRL-045","domain":"irl","level":"professional","category":"people","tags":["aeneas-coffey","excise","biography"],"region":"ireland","question":"アイニアス・コフィーが連続式蒸留機を開発する以前に就いていた職務として正しいものはどれか。","choices":["アイルランド物品税局の徴税監督官（インスペクター・ジェネラル）","ダブリン市長","王立造幣局の技師","スコットランド財務省の会計官"],"answer":0,"explanation":"アイニアス・コフィーは1819年にアイルランドの物品税（エクサイズ）のインスペクター・ジェネラルに任命され、その後蒸留業に転じて連続式蒸留機を改良した。","difficulty":3},{"id":"IRL-046","domain":"irl","level":"professional","category":"history","tags":["truths-about-whisky","dublin-big-four","1878","history"],"region":"ireland","question":"1878年に刊行された小冊子『Truths About Whisky』を共同で発行した「ダブリンの四大蒸留業者」の組み合わせとして正しいものはどれか。","choices":["ジェムソン、ブッシュミルズ、タラモア、キルベガン","ジョン・ジェムソン・アンド・サン、ウィリアム・ジェムソン・アンド・カンパニー、ジョン・パワー・アンド・サン、ジョージ・ロー・アンド・カンパニー","パワーズ、クーリー、ミドルトン、ティーリング","ジェムソン、レッドブレスト、グリーンスポット、タイコネル"],"answer":1,"explanation":"1878年、ジョン・ジェムソン・アンド・サン、ウィリアム・ジェムソン・アンド・カンパニー、ジョン・パワー・アンド・サン、ジョージ・ロー・アンド・カンパニーの「ダブリン四大蒸留業者」が共同で『Truths About Whisky』を刊行し、コフィー式連続式蒸留機による「偽ウイスキー」を批判した。","difficulty":4},{"id":"IRL-047","domain":"irl","level":"professional","category":"distillery","tags":["new-midleton-distillery","1975","midleton"],"re 87年","1966年","1980年","2007年"],"answer":3,"explanation":"キルベガン蒸留所は1950年代に操業を停止していたが、ライセンスは維持され続け、2007年に蒸留が再開された。","difficulty":3},{"id":"IRL-061","domain":"irl","level":"professional","category":"production","tags":["grain-whiskey","enzymes","mash-bill","maize"],"region":"ireland","question":"アイリッシュ・グレーンウイスキーの仕込みにおいて、主原料のトウモロコシに加えて少量の大麦麦芽が用いられる主な理由はどれか。","choices":["デンプンを糖化する酵素を供給するため","色合いを濃くするため","泡立ちを抑えるため","保存性を高める防腐効果のため"],"answer":0,"explanation":"トウモロコシ自体には糖化酵素がないため、少量の大麦麦芽を加えることでデンプンを糖に変換する酵素を補い、発酵を可能にしている。","difficulty":3},{"id":"IRL-062","domain":"irl","level":"professional","category":"history","tags":["truths-about-whisky","coffey-still-controversy","1878"],"region":"ireland","question":"『Truths About Whisky』（1878年）の主要な主張として正しいものはどれか。","choices":["アイリッシュウイスキーの輸出関税撤廃を求めるものだった","コフィー式連続式蒸留機による安価な穀物由来のスピリッツが『ウイスキー』を名乗ることに反対するものだった","スコットランド産大麦の輸入禁止を求めるものだった","禁酒運動への支持を表明するものだった"],"answer":1,"explanation":"ダブリンの四大蒸留業者は、コフィー式連続式蒸留機によって生産される安価な穀物スピリッツが自分たちの伝統的なポットスチルウイスキーと同様に「ウイスキー」を名乗ることに強く反対し、その主張を『Truths About Whisky』にまとめた。","difficulty":3},{"id":"IRL-063","domain":"irl","level":"professional","category":"history","tags":["anglo-irish-trade-war","1930s","export-decline"],"region":"ireland","question":"1930年代に発生し、イギリス連邦市場からアイリッシュウイスキーが締め出される一因となった英愛間の経済対立はどれか。","choices":["アイルランド内戦","北アイルランド分離独立運動","アングロ・アイリッシュ貿易戦争（経済戦争）","スエズ危機"],"answer":2,"explanation":"1930年代のアングロ・アイリッシュ貿易戦争（経済戦争）により、アイリッシュウイスキーはイギリス連邦市場への輸出で大きな打撃を受けた。","difficulty":3},{"id":"IRL-064","domain":"irl","level":"professional","category":"history","tags":["prohibition","export-market","usa"],"region":"ireland","question":"1920年から1933年までアメリカ合衆国で施行され、アイリッシュウイスキーの重要な輸出市場を奪った政策はどれか。","choices":["ヴォルステッド法制定前の関税引き上げ","マーシャル・プラン","スムート・ホーリー関税法","禁酒法（プロヒビション）"],"answer":3,"explanation":"1920年から1933年にかけてのアメリカの禁酒法により、アイリッシュウイスキーにとって重要だったアメリカ市場への輸出が事実上停止し、業界に深刻な打撃を与えた。","difficulty":3},{"id":"IRL-065","domain":"irl","level":"professional","category":"brand","tags":["powers","johns-lane-release","single-p チャールズ・トムリンソン"],"answer":0,"explanation":"イギリスの著述家アルフレッド・バーナードは1885〜1887年にかけて英国全土の稼働中の蒸留所をほぼすべて訪問し、アイルランドの28蒸留所を含む記録を『The Whisky Distilleries of the United Kingdom』としてまとめた。","difficulty":4},{"id":"IRL-070","domain":"irl","level":"professional","category":"business","tags":["irish-distillers","1966-merger","three-companies"],"region":"ireland","question":"1966年のアイリッシュ・ディスティラーズ社設立にあたり統合された3社の組み合わせとして正しいものはどれか。","choices":["ブッシュミルズ、クーリー、ティーリング","ジョン・パワー・アンド・サン、ジョン・ジェムソン・アンド・サン、コーク蒸留会社","ジョージ・ロー・アンド・カンパニー、タラモア、キルベガン","ウィリアム・ジェムソン、レッドブレスト、グリーンスポット"],"answer":1,"explanation":"1966年、ジョン・パワー・アンド・サン、ジョン・ジェムソン・アンド・サン、コーク蒸留会社（コーク・ディスティラリーズ、ミドルトンを含む）の3社が統合し、アイリッシュ・ディスティラーズ社が発足した。ブッシュミルズの参加は1972年である。","difficulty":3},{"id":"IRL-071","domain":"irl","level":"professional","category":"production","tags":["waterford-distillery","terroir","single-farm-origin"],"region":"ireland","question":"ウォーターフォード蒸留所が掲げる、原料大麦の生産農場ごとに個別のロットとして仕込み・熟成・リリースを行う醸造哲学はどれか。","choices":["カスクフィニッシュ主義","コンティニュアス・ブレンディング主義","シングル・ファーム・オリジン（テロワール）主義","ヴァッテッド・モルト主義"],"answer":2,"explanation":"ウォーターフォード蒸留所は、ワイン造りにおける「テロワール」の概念をウイスキーに応用し、原料大麦を生産農場ごとに区別して仕込み・熟成し、シングル・ファーム・オリジンとしてリリースする哲学を掲げている。","difficulty":3},{"id":"IRL-072","domain":"irl","level":"professional","category":"production","tags":["dingle-distillery","gin","vodka","product-timeline"],"region":"ireland","question":"2012年に蒸留を開始したディングル蒸留所が、法定熟成期間を満たすため最初のウイスキーが出るまでの間に先行して発売していた製品はどれか。","choices":["ラム","テキーラ","クラフトビール","ジンとウォッカ"],"answer":3,"explanation":"ディングル蒸留所は2012年にジンとウォッカの生産・販売を先行して開始し、法定の最低3年間の熟成を経た後、2016年にウイスキーをリリースした。","difficulty":3},{"id":"IRL-073","domain":"irl","level":"master","category":"people","tags":["aeneas-coffey","robert-stein","column-still","patent-history"],"region":"ireland","question":"アイニアス・コフィーが1830年に特許を取得した連続式蒸留機は、それ以前に別の人物が特許を得ていた設計を改良したものとされる。その人物とは誰か。","choices":["ロバート・ステイン","ダニエル・E・ウィリアムズ","ジョン・パワー","ジョージ・ロー"],"answer":0,"explanation":"1828年、ロバート・ステインが連続式蒸留機の特許を取得し、スコットランドのキャメロンブリッジで稼働させた。アイニアス・コフィーはこの設計を改良し、1830年に自らの特許（コフィー・スチル）を取得した。","difficulty":4},{"id":"IRL-074","domain":"irl","level":"master","category":"history","tags":["bow-street","closure","1971","jameson"],"region":"ireland","question":"ジェムソンのボウ・ストリート蒸留所がダブリンでの蒸留を終了したのはおおよそいつ頃とされるか。","choices":["1950年代初頭","1971年","1987年","2007年"],"answer":1,"explanation":"ボウ・ストリート蒸留所は1971年に蒸留を終了し、生産機能はミドルトンへ移管された。同蒸留所跡は1997年にビジターセンターとして再開された。","difficulty":4},{"id":"IRL-075","domain":"irl","level":"master","category":"distillery","tags":["great-northern-distillery","capacity","independent-distillery"],"region":"ireland","question":"2015年設立のグレート・ノーザン蒸留所（ダンドーク）についての説明として正しいものはどれか。","choices":["アイリッシュ・ディスティラーズ社の子会社である","グレーンウイスキーのみを生産する専業蒸留所である","年間生産能力約1,700万リットルとされ、アイルランド最大級の独立系蒸留所である","ピーテッド・モルトの生産を行わない方針を掲げている"],"answer":2,"explanation":"グレート・ノーザン蒸留所は年間約1,700万リットルの生産能力を持つとされ、グレーン・モルト・ピーテッドモルト・ポットスチルウイスキーなど幅広いスピリッツを生産するアイルランド最大級の独立系蒸留所である。","difficulty":4},{"id":"IRL-076","domain":"irl","level":"master","category":"regulation","tags":["additives","caramel-colouring","e150a","eu-regulation"],"region":"ireland","question":"EUのスピリッツ規則上、完成したウイスキーの原酒に対して添加が認められている物質の組み合わせとして正しいものはどれか。","choices":["水と大麦エキスのみ","水と蜂蜜のみ","水とオーク抽出物のみ","水と着色用の天然カラメル（プレーンカラメル）のみ"],"answer":3,"explanation":"EUスピリッツ規則では、ウイスキーの最終的な蒸留原酒に加えてよいのは水と着色用の天然カラメル（プレーンカラメル、E150a）のみであり、それ以外の添加物は認められていない。","difficulty":4},{"id":"IRL-077","domain":"irl","level":"master","category":"history","tags":["royal-commission-on-whisky","1909","what-is-whisky-case"],"region":"ireland","question":"『Truths About Whisky』(1878年)でダブリンの四大蒸留業者が提起した「何がウイスキーか」をめぐる論争が、公式に一つの決着をみたとされる出来事はどれか。","choices":["1909年の王立ウイスキー委員会(Royal Commission on Whisky)の報告書","1916年のイースター蜂起","1922年のアイルランド自由国成立","1966年のアイリッシュ・ディスティラーズ社設立"],"answer":0,"explanation":"ダブリンの四大蒸留業者が提起した「何がウイスキーか」論争は、1909年に発表された王立ウイスキー委員会の報告書によって公式な決着をみたとされる。","difficulty":4},{"id":"IRL-078","domain":"irl","level":"master","category":"history","tags":["dublin-whisky-genuine-and-spurious","1876","pamphlet-history"],"region":"ireland","question":"ダブ ":0,"explanation":"カリラはアイラ島最大の生産能力を持つ蒸留所の一つで、生産される原酒の多くはジョニーウォーカーをはじめとするブレンデッド・スコッチに使用される。","difficulty":2},{"id":"islay-038","domain":"islay","level":"expert","category":"maturation","tags":["sherry-cask","maturation","lagavulin","tasting"],"region":"scotland-islay","question":"ラガヴーリン16年など、アイラモルトにおいてシェリー樽熟成が使われる場合の一般的な効果として正しいものはどれか。","choices":["ドライフルーツやスパイスの甘みが加わり、ピート香と複雑に絡み合う","ピート香が完全に消失する","アルコール度数が上昇する","色調が透明に近づく"],"answer":0,"explanation":"シェリー樽で熟成させると、樽由来のドライフルーツやスパイス、甘みのニュアンスがピートのスモーキーさと組み合わさり、複雑な香味を生む。","difficulty":2},{"id":"islay-039","domain":"islay","level":"expert","category":"ingredients","tags":["islay","peat","seaweed","ingredients"],"region":"scotland-islay","question":"アイラ島のピートに含まれ、独特の薬品香・ヨード香の一因とされる要素として一般的に挙げられるものはどれか。","choices":["海藻など海洋性植物の堆積物","トウモロコシの穂軸","オーク材の樹脂","ライ麦の外皮"],"answer":0,"explanation":"アイラ島のピートは海に近い湿地で形成されるため、海藻など海洋性の植物質を多く含み、これが燻煙時に独特の薬品香・ヨード香を生む一因とされる。","difficulty":2},{"id":"islay-040","domain":"islay","level":"expert","category":"history","tags":["laphroaig","royal-warrant","prince-charles","history"],"region":"scotland-islay","question":"アイラ島の蒸留所で、1994年に当時のチャールズ皇太子(後の国王チャールズ3世)からロイヤル・ワラント(王室御用達)を授与されたのはどこか。","choices":["ラフロイグ","アードベッグ","ボウモア","カリラ"],"answer":0,"explanation":"ラフロイグは1994年に当時のチャールズ皇太子からロイヤル・ワラントを授与され、以来王室御用達ウイスキーの一つとして知られている。","difficulty":2},{"id":"islay-041","domain":"islay","level":"professional","category":"production","tags":["ardbeg","phenol","ppm","production"],"region":"scotland-islay","question":"アードベッグ「テン」に使用される麦芽の一般的なフェノール値として広く知られる数値はどれか。","choices":["約55ppm","約5ppm","約20ppm","約150ppm"],"answer":0,"explanation":"アードベッグで使用される麦芽は一般的に約55ppmという高いフェノール値で知られ、アイラモルトの中でも特にヘビーピーテッドな部類に位置づけられる。","difficulty":3},{"id":"islay-042","domain":"islay","level":"professional","category":"production","tags":["lagavulin","stills","production","distillation"],"region":"scotland-islay","question":"ラガヴーリン蒸留所の製法上の特徴として正しいものはどれか。","choices":["洋梨形の蒸留器と長い発酵時間により、ゆっくりとした蒸留を行う","連続式蒸留機で単式蒸留を行わない","フロアモルティングで全量を自家製麦している","キ テルヌ・カスク"],"answer":0,"explanation":"キルホーマンの「100%アイラ」レンジは、大麦の栽培・製麦・蒸留・熟成・瓶詰めのすべてをアイラ島内で行った製品として位置づけられている。","difficulty":3},{"id":"islay-048","domain":"islay","level":"professional","category":"history","tags":["port-ellen","maltings","history","islay"],"region":"scotland-islay","question":"ポート・エレン蒸留所が閉鎖された後も長く続いた、同蒸留所跡地における操業内容として正しいものはどれか。","choices":["モルティングス(製麦施設)としてアイラ島の複数蒸留所へ麦芽を供給し続けた","貯蔵庫として観光客向けに公開された","ブレンデッド・ウイスキーのボトリング工場として稼働した","蒸留は停止したが発酵のみ継続した"],"answer":0,"explanation":"ポート・エレンの蒸留設備は1983年に停止したが、隣接するモルティングス(製麦施設)はその後もアイラ島の各蒸留所に麦芽を供給する重要な役割を果たし続けた。","difficulty":3},{"id":"islay-049","domain":"islay","level":"professional","category":"production","tags":["talisker","purifier","stills","production"],"region":"scotland-islands","question":"タリスカー蒸留所の蒸留器に取り付けられている、還流を促し酒質を軽くする役割を持つ独特の装置はどれか。","choices":["ピュリファイアー(精留器)付きのラインアーム","ロータリー・チラー","ダブル・ワームタブ","コフィー・スティル"],"answer":0,"explanation":"タリスカーの蒸留器はラインアームにピュリファイアー(精留器)が取り付けられており、蒸気の一部を還流させることで酒質をコントロールする独特の設計になっている。","difficulty":3},{"id":"islay-050","domain":"islay","level":"professional","category":"ingredients","tags":["highland-park","peat","heather","chemistry"],"region":"scotland-islands","question":"ハイランドパーク蒸留所が自社のピートについて主張する、他地域(特にアイラ島)のピートとの違いとして一般に語られる特徴はどれか。","choices":["樹木の根をほとんど含まず、ヘザー(ヒース)由来の香りが強く出る","海藻由来の成分が非常に多い","石炭に近い硬質の泥炭である","主に杉の樹脂を含む"],"answer":0,"explanation":"オークニー諸島には樹木がほとんど育たないため、ハイランドパークが用いるピートは木質由来の成分が少なく、ヘザー(ヒース)由来のフローラルな香りが強く出るとされ、アイラ島の海藻・薬品的なピートとの違いとして語られる。","difficulty":3},{"id":"islay-051","domain":"islay","level":"professional","category":"production","tags":["scapa","lomond-still","stills","production"],"region":"scotland-islands","question":"スキャパ蒸留所のウォッシュ・スティル(初留釜)に用いられている特徴的な蒸留器の型式はどれか。","choices":["ロモンド・スティル","コフィー・スティル","ハイブリッド・カラム・スティル","トリプル・チェンバー・スティル"],"answer":0,"explanation":"スキャパのウォッシュ・スティルには、通常のポットスティルと連続式蒸留機の中間的な性質を持つロモンド・スティルが用いられていることで知られる。","difficulty":4},{"id":"islay-052","domain":"islay","level":"professional","category":"history","tags":["jura","rebuild 所を現在傘下に持つグループとして正しいものはどれか。","choices":["ロッホ・ローモンド・グループ","ディアジオ","ビーム サントリー","エドリントン・グループ"],"answer":0,"explanation":"グレンスコシアはロッホ・ローモンド・グループ傘下の蒸留所であり、キャンベルタウンに現存する数少ない稼働蒸留所の一つである。","difficulty":3},{"id":"islay-058","domain":"islay","level":"professional","category":"history","tags":["campbeltown","decline","prohibition","history"],"region":"scotland-campbeltown","question":"20世紀初頭にキャンベルタウンの蒸留所が急速に衰退した要因として一般に挙げられるものはどれか。","choices":["アメリカの禁酒法による主要輸出市場の喪失と、粗悪な樽材使用など品質低下の問題","スペイサイドとの合併による生産集約","第一次世界大戦後の大麦豊作による過剰在庫","EU加盟による関税制度の変更"],"answer":0,"explanation":"キャンベルタウンの蒸留所衰退は、アメリカ禁酒法による主要輸出先の喪失、粗悪な中古樽の使用など品質低下、地元炭鉱の衰退による燃料コスト上昇など複合的な要因によるとされる。","difficulty":3},{"id":"islay-059","domain":"islay","level":"professional","category":"history","tags":["campbeltown","peak","history","distillery-count"],"region":"scotland-campbeltown","question":"19世紀後半の最盛期、キャンベルタウンに存在した蒸留所の数はおおよそ何軒とされるか。","choices":["約30軒","約5軒","約100軒","約12軒"],"answer":0,"explanation":"19世紀後半の最盛期、キャンベルタウンにはおよそ30を超える蒸留所がひしめいており、当時「ウイスキーの首都」と称される所以となった。","difficulty":3},{"id":"islay-060","domain":"islay","level":"professional","category":"regulation","tags":["single-malt","regulation","scotch-whisky-regulations","definition"],"region":null,"question":"スコッチ・ウイスキー規則における「シングルモルト・スコッチ・ウイスキー」の定義として正しいものはどれか。","choices":["単一の蒸留所で単式蒸留機により蒸留された大麦麦芽のみを原料とするウイスキー","複数の蒸留所の原酒をヴァッティングしたウイスキー","単一の樽から瓶詰めされたウイスキー","単一年に蒸留された原酒のみを使用したウイスキー"],"answer":0,"explanation":"シングルモルト・スコッチ・ウイスキーは、単一の蒸留所において単式蒸留機(ポットスティル)で大麦麦芽のみを原料として蒸留されたウイスキーと定義される。","difficulty":3},{"id":"islay-061","domain":"islay","level":"professional","category":"maturation","tags":["caol-ila","bourbon-cask","maturation","islay"],"region":"scotland-islay","question":"カリラ蒸留所の主力原酒の熟成に一般的に多く用いられる樽の種類はどれか。","choices":["元バーボン樽","元マデイラ樽","新樽(バージンオーク)","元ポートワイン樽"],"answer":0,"explanation":"カリラの原酒はブレンデッド・ウイスキー向けの生産比率が高く、熟成には元バーボン樽が広く使用され、比較的軽やかでピート香が前面に出るスタイルにつながっている。","difficulty":3},{"id":"islay-062","domain":"islay","level":"professional","category":"history","tags":["ardbeg","closure","history","revival"],"region":"scotland-islay","question":"アードベッグ蒸留所が20世紀後半に経営難により操業を断続的に停止していた期間として正しい説明はどれか。","choices":["1980年代から1990年代にかけて断続的に閉鎖・減産の時期があった","一度も操業を停止したことがない","21世紀に入ってから初めて閉鎖された","創業以来一貫して24時間稼働を続けている"],"answer":0,"explanation":"アードベッグは1980年代から1990年代にかけて経営難により断続的な閉鎖・減産を経験し、1997年にグレンモーレンジィ社の傘下に入ったことで本格的な再興を果たした。","difficulty":3},{"id":"islay-063","domain":"islay","level":"professional","category":"people","tags":["highland-park","magnus-eunson","legend","people"],"region":"scotland-islands","question":"ハイランドパーク蒸留所の創業伝説に登場する、密造酒業者だったとされる人物は誰か。","choices":["マグナス・ユーンソン","ジム・マキュワン","ベッシー・ウィリアムソン","イアン・ハンター"],"answer":0,"explanation":"ハイランドパークの創業伝説には、密造業者だったマグナス・ユーンソンが教会の説教壇の下に密造ウイスキーを隠したという逸話が伝わっている。","difficulty":3},{"id":"islay-064","domain":"islay","level":"professional","category":"people","tags":["jim-mcewan","bruichladdich","revival","people"],"region":"scotland-islay","question":"2001年のブルックラディ蒸留所再稼働に際してマスターディスティラーとして招かれ、同蒸留所復活の中心人物となった人物は誰か。","choices":["ジム・マキュワン","ベッシー・ウィリアムソン","マグナス・ユーンソン","ジョン・グラント"],"answer":0,"explanation":"ジム・マキュワンは長年ボウモアで経験を積んだ後、2001年に再稼働したブルックラディでマスターディスティラーを務め、実験的な取り組みで同蒸留所の復活を牽引した。","difficulty":3},{"id":"islay-065","domain":"islay","level":"professional","category":"regulation","tags":["islands","regulation","scotch-whisky-regulations","highland"],"region":"scotland-islands","question":"いわゆる「アイランズ」(Islands)は、スコッチ・ウイスキー規則上どのように扱われるか。","choices":["公式な生産地域としては定義されず、法的にはハイランド地域に含まれる","アイラ地域の一部として法的に定義される","独立した第6の公式地域として法的に定義される","キャンベルタウン地域に法的に統合されている"],"answer":0,"explanation":"業界では「アイランズ」という呼称が慣用的に使われるが、スコッチ・ウイスキー規則が公式に定める生産地域はスペイサイド、ハイランド、ローランド、アイラ、キャンベルタウンの5つのみで、アイランズは法的にはハイランド地域に含まれる。","difficulty":4},{"id":"islay-066","domain":"islay","level":"professional","category":"history","tags":["caol-ila","rebuild","1974","distillery"],"region":"scotland-islay","question":"カリラ蒸留所旧設備が取り壊され、現在の大規模な設備に建て替えられたのはいつか。","choices":["1974年","1846年","1920年代","2000年代"],"answer":0,"explanation":"カリラは1846年創業だが、1974年 留所を構え、ブランド「あかし(AKASHI)」を展開する酒造会社はどれか。","choices":["小正醸造","本坊酒造","ベンチャーウイスキー","江井ヶ嶋酒造"],"answer":3,"explanation":"江井ヶ嶋酒造は兵庫県明石市の江井ヶ嶋蒸留所でウイスキーを製造しており、「あかし」のブランド名で知られる古参の酒造会社の一つである。","difficulty":5},{"id":"jpn-077","domain":"jpn","level":"master","category":"regulation","tags":["japanese-whisky-standard","transition-period"],"region":"japan","question":"「ジャパニーズウイスキー」表示基準について、経過措置期間が終了し完全適用となった時期はいつか。","choices":["2024年4月","2021年4月","2022年4月","2023年4月"],"answer":0,"explanation":"表示基準は2021年4月に運用が始まったが、3年間の経過措置が設けられ、2024年4月から完全適用となった。","difficulty":4},{"id":"jpn-078","domain":"jpn","level":"master","category":"regulation","tags":["liquor-tax-act","distilled-liquor-category"],"region":"japan","question":"日本の酒税法における酒類の大分類のうち、ウイスキーが含まれる区分はどれか。","choices":["発泡性酒類","蒸留酒類","醸造酒類","混成酒類"],"answer":1,"explanation":"酒税法は酒類を発泡性酒類・醸造酒類・蒸留酒類・混成酒類の4種に大別しており、ウイスキーは蒸留酒類に分類される。","difficulty":4},{"id":"jpn-079","domain":"jpn","level":"master","category":"people","tags":["iwai-kiichiro","education","osaka"],"region":"japan","question":"岩井喜一郎の出身校で、後年本人も教壇に立ったとされる学校はどれか。","choices":["東京帝国大学","京都帝国大学","大阪高等工業学校","北海道帝国大学"],"answer":2,"explanation":"岩井喜一郎は大阪高等工業学校(現・大阪大学工学部の前身の一つ)出身で、後に同校の教授も務めた技術者である。","difficulty":5},{"id":"jpn-080","domain":"jpn","level":"master","category":"history","tags":["takenaketakamasa","scotland-distillery","apprenticeship"],"region":"japan","question":"竹鶴政孝がスコットランド留学中に実習を行った蒸留所として知られるものはどれか。","choices":["マッカラン蒸留所","グレンフィディック蒸留所","タリスカー蒸留所","ヘーゼルバーン蒸留所"],"answer":3,"explanation":"竹鶴政孝はロングモーン蒸留所やヘーゼルバーン蒸留所など複数の蒸留所で実地研修を受け、竹鶴ノートにその製法を記録した。","difficulty":4},{"id":"jpn-081","domain":"jpn","level":"master","category":"maturation","tags":["mizunara","cask-processing","difficulty"],"region":"japan","question":"ミズナラ材が樽材としての加工が難しいとされる主な理由はどれか。","choices":["節が多く水分を通しやすいため漏れやすい","比重が軽すぎて浮いてしまうため","色が濃すぎて着色過多になるため","日本国外への持ち出しが禁止されているため"],"answer":0,"explanation":"ミズナラは節が多く木材として水分を通しやすい性質があり、樽材に適した無節の良材を得るのが難しいため加工には高い技術と手間を要する。","difficulty":5},{"id":"jpn-082","domain":"jpn","level":"master","category":"distillery","tags":["yoichi","pot-still-shape","straight-head"],"region":"japan","question":"ニッカウヰスキー余市蒸溜所のポットスチルの形状の特徴として知られるものはどれか。","choices":["首の長いスワンネック型","首の無いずんぐりとしたストレートヘッド型","ランタン型のバルジを持つ極端な曲線型","ボイルボール(球状の膨らみ)を持つ形状"],"answer":1,"explanation":"余市蒸溜所のポットスチルは首が短くずんぐりとしたストレートヘッド型で、力強く重厚な原酒の個性に寄与しているとされる。","difficulty":5},{"id":"jpn-083","domain":"jpn","level":"master","category":"distillery","tags":["chichibu","pot-still","small-scale"],"region":"japan","question":"秩父蒸溜所のポットスチルについて、日本の主要蒸留所の中での特徴としてもっとも適切なものはどれか。","choices":["日本最大級の容量を誇る","すべて連続式蒸留機に置き換えられている","日本の主要蒸留所の中でも際立って小型である","ステンレス製のみで木製部品を含まない"],"answer":2,"explanation":"秩父蒸溜所のポットスチルは日本の主要蒸留所の中でも際立って小型で、小ロットでも多様な原酒を試験的に造り分けられる利点がある。","difficulty":4},{"id":"jpn-084","domain":"jpn","level":"master","category":"chemistry","tags":["oak-lactone","whisky-lactone","cask-aroma"],"region":"japan","question":"オーク樽由来の甘い木質・ココナッツ様の香りに寄与するとされる代表的な化合物群はどれか。","choices":["硫化ジメチル","酢酸イソアミル","バニリン単体のみ","オークラクトン(ウイスキーラクトン)"],"answer":3,"explanation":"オークラクトン(ウイスキーラクトン)は樽材由来の木質・ココナッツ様の香りに寄与する代表的な化合物群で、ミズナラ樽を含む各種オーク樽の熟成香形成に関わるとされる。","difficulty":5},{"id":"jpn-085","domain":"jpn","level":"master","category":"business","tags":["suntory-kakubin","1937","product-history"],"region":"japan","question":"サントリーの代表的商品「角瓶」が発売された年はいつか。","choices":["1937年","1929年","1946年","1950年"],"answer":0,"explanation":"角形の瓶を用いた「サントリーウイスキー(角瓶)」は1937年に発売され、以後長くサントリーの主力商品として親しまれている。","difficulty":4},{"id":"jpn-086","domain":"jpn","level":"master","category":"history","tags":["nikka","dainippon-kaju","product-category"],"region":"japan","question":"大日本果汁が「日果」ブランドとしてウイスキー発売前に手がけていた主力製品分野はどれか。","choices":["ビール","りんごジュース・りんご酒などの果汁製品","味噌・醤油","清涼炭酸飲料"],"answer":1,"explanation":"大日本果汁はウイスキー原酒の熟成を待つ間、りんごジュースやりんご酒(アップルワイン)などの果汁製品の製造販売で経営基盤を築いた。","difficulty":4},{"id":"jpn-087","domain":"jpn","level":"master","category":"distillery","tags":["fuji-gotemba","kirin","integrated-production"],"region":"japan","question":"富士御殿場蒸溜所が国内の主要ウイスキー蒸留所の中でも珍しいとされる設備上の特徴はどれか。","choices":["石炭直火蒸留のみを行う","樽貯蔵設備を持たない","モルト・グレーン・スピリッツを一貫して1つの蒸留所で生産できる","麦芽を一切使用しない"],"answer":2,"explanation":"富士御殿場蒸溜所はモルトウイスキー、グレーンウイスキー、さらにスピリッツ類までを1つの蒸留所内で一貫生産できる稀有な設備を持つ。","difficulty":4},{"id":"jpn-088","domain":"jpn","level":"master","category":"regulation","tags":["japanese-whisky-standard","pre-2021-loophole"],"region":"japan","question":"2021年の「ジャパニーズウイスキー」表示基準制定前に問題視されていた状況として指摘されるものはどれか。","choices":["国内産大麦の使用が義務化されすぎていた","熟成年数表示が過剰に厳格だった","瓶詰めが必ず海外で行われていた","海外から輸入した原酒を使っても『ジャパニーズウイスキー』を名乗れる例があった"],"answer":3,"explanation":"表示基準制定前は法的な定義が明確でなく、海外から輸入した原酒をブレンドした製品でも『ジャパニーズウイスキー』と表示できる例があり、これを是正するために自主基準が設けられた。","difficulty":4},{"id":"jpn-089","domain":"jpn","level":"master","category":"region-knowledge","tags":["yamazaki","site-selection","rivers-confluence"],"region":"japan","question":"山崎の地が蒸留所建設地として選ばれた理由の一つとされる地理的特徴はどれか。","choices":["桂川・宇治川・木津川の合流点に位置し良質な水と霧が得やすい","日本海に面し潮風が吹き込む","富士山麓の湧水地帯である","北海道特有の冷涼な気候である"],"answer":0,"explanation":"山崎は桂川・宇治川・木津川が合流する地で、古くから良質な水に恵まれ、霧が立ち込める湿潤な気候が熟成に適するとされ建設地に選ばれた。","difficulty":4},{"id":"jpn-090","domain":"jpn","level":"master","category":"people","tags":["rita-taketsuru","maiden-name","cowan"],"region":"japan","question":"竹鶴政孝の妻リタの旧姓はどれか。","choices":["スミス(Smith)","カウン(Cowan)","マッケンジー(Mackenzie)","キャンベル(Campbell)"],"answer":1,"explanation":"リタの旧姓はカウン(Jessie Roberta Cowan)で、結婚後は竹鶴リタとして日本で暮らした。","difficulty":4},{"id":"law-001","domain":"law","level":"expert","category":"regulation","tags":["scotch-whisky-regulations-2009","classification"],"region":null,"question":"スコッチウイスキー規則2009（Scotch Whisky Regulations 2009）が定めるスコッチウイスキーの分類は何種類か。","choices":["5種類","3種類","4種類","6種類"],"answer":0,"explanation":"同規則はシングルモルト、シングルグレーン、ブレンデッドモルト、ブレンデッドグレーン、ブレンデッド・スコッチ・ウイスキーの5分類を正式に定義している。これは2009年の規則により初めて明文化された分類体系である。","difficulty":1},{"id":"law-002","domain":"law","level":"expert","category":"regulation","tags":["scotch-whisky-regulations-2009","minimum-maturation"],"region":null,"question":"スコッチウイスキー規則2009においてスコッチウイスキーとして認められるための最低熟成期間は。","choices":["2年","3年","4年","5年"],"answer":1,"explanation":"スコッチウイスキーはスコットランド国内でオーク樽により最低3年間熟成しなければならない。この最低熟成年数はアイリッシュウイスキーやカナディアンウイスキーなど他国の規則でも同様に採用されていることが多い。","difficulty":1},{"id":"law-003","domain":"law","level":"expert","category":"regulation","tags":["scotch-whisky-regulations-2009","cask-size"],"region":null,"question":"スコッチウイスキーの熟成に使用できるオーク樽の容量上限は。","choices":["500リットル","900リットル","700リットル","1000リットル"],"answer":2,"explanation":"規則上、熟成に用いるオーク樽は容量700リットル以下と定められている。これは適切な熟成速度と樽材との接触面積を確保するための規定である。","difficulty":2},{"id":"law-004","domain":"law","level":"expert","category":"regulation","tags":["scotch-whisky-regulations-2009","bottling-strength"],"region":null,"question":"スコッチウイスキーの瓶詰め時に法規上求められる最低アルコール度数は。","choices":["37.5%","43%","46%","40%"],"answer":3,"explanation":"瓶詰め時のアルコール度数は40%以上でなければならない。この基準はバーボンやアイリッシュウイスキーなど多くの国のウイスキー規則でも共通して採用されている。","difficulty":1},{"id":"law-005","domain":"law","level":"expert","category":"regulation","tags":["scotch-whisky-regulations-2009","distillation-strength"],"region":null,"question":"スコッチウイスキー規則2009において蒸留時のアルコール度数の上限は。","choices":["94.8%","96.0%","92.0%","100%"],"answer":0,"explanation":"蒸留時のアルコール度数は94.8%未満と定められている。これは原料由来の香味成分を残すための上限であり、これを超えると風味の乏しいニュートラルスピリッツに近づいてしまう。","difficulty":2},{"id":"law-006","domain":"law","level":"expert","category":"business","tags":["swa","trade-association"],"region":null,"question":"SWA（Scotch Whisky Association）の役割として正しいものは。","choices":["スコットランド政府が運営する酒税徴収機関","スコッチウイスキー業界を代表し、地理的表示の保護や規則の順守を推進する業界団体","各蒸留所の製造レシピを審査認可する認証機関","EUが設置したウイスキー品質検査機関"],"answer":1,"explanation":"SWAはスコッチウイスキー業界の利益を代表する非営利の業界団体であり、「Scotch Whisky」の地理的表示保護、模倣品対策、輸出促進、規則の順守啓発などを担う。","difficulty":1},{"id":"law-007","domain":"law","level":"expert","category":"regulation","tags":["blended-scotch-whisky","classification"],"region":null,"question":"ブレンデッド・スコッチ・ウイスキーの定義として正しいものは。","choices":["複数のシングルモルトのみをブレンドしたもの","単一蒸留所のモルトとグレーンをブレンドしたもの","1つ以上のシングルモルトと1つ以上のシングルグレーンをブレンドしたもの","複数のシングルグレーンのみをブレンドしたもの"],"answer":2,"explanation":"ブレンデッド・スコッチ・ウイスキーは1つ以上のシングルモルト・スコッチ・ウイスキーと1つ以上のシングルグレーン・スコッチ・ウイスキーを混和したものと定義される。市場に流通するスコッチウイスキーの大半はこのカテゴリーに属する。","difficulty":1},{"id":"law-008","domain":"law","level":"expert","category":"regulation","tags":["blended-malt-scotch-whisky","classification"],"region":null,"question":"ブレンデッドモルト・スコッチ・ウイスキー（旧称ヴァッテッドモルト）の定義は。","choices":["単一蒸留所内の異なる樽のモルト原酒をブレンドしたもの","モルトとグレーンをブレンドしたもの","モルトウイスキーに中性スピリッツを加えたもの","2つ以上の蒸留所のシングルモルトウイスキーをブレンドしたもの"],"answer":3,"explanation":"ブレンデッドモルトは2つ以上の異なる蒸留所のシングルモルト・スコッチ・ウイスキーをブレンドしたもので、グレーンウイスキーは一切含まない。かつては「ヴァッテッドモルト」「ピュアモルト」とも呼ばれた。","difficulty":2},{"id":"law-009","domain":"law","level":"expert","category":"regulation","tags":["single-grain-scotch-whisky","ingredients"],"region":null,"question":"シングルグレーン・スコッチ・ウイスキーの原料として正しいものは。","choices":["水と麦芽に加え、他の穀類（未発芽の穀類を含む）を使用できる","大麦麦芽のみを使用しなければならない","とうもろこしのみを使用しなければならない","中性スピリッツを主原料とする"],"answer":0,"explanation":"シングルグレーンは水・麦芽に加え、とうもろこしや未発芽小麦などの他の穀類も原料として使用できる点でシングルモルトと異なる。単一蒸留所で生産される必要がある。","difficulty":2},{"id":"law-010","domain":"law","level":"expert","category":"regulation","tags":["single-malt-scotch-whisky","pot-still"],"region":null,"question":"シングルモルト・スコッチ・ウイスキーの蒸留器として規則上定められているものは。","choices":["連続式蒸留機（コフィスチル）","ポットスチル","ハイブリッドスチル","いずれの蒸留器でもよい"],"answer":1,"explanation":"シングルモルト・スコッチ・ウイスキーは単式蒸留器（ポットスチル）によるバッチ蒸留が規則上の要件であり、連続式蒸留機の使用は認められない。","difficulty":1},{"id":"law-011","domain":"law","level":"expert","category":"regulation","tags":["scotch-whisky-regulations-2009","production-location"],"region":null,"question":"スコッチウイスキーとして名乗るために必須の生産地要件は。","choices":["イギリス国内であればどこで蒸留・熟成してもよい","蒸留はスコットランド、熟成は他国でもよい","スコットランド国内で蒸留され、かつスコットランド国内で熟成されること","熟成のみスコットランドで行えばよい"],"answer":2,"explanation":"スコッチウイスキーを名乗るには、水と麦芽からの糖化・発酵・蒸留、そして最低3年間の熟成のすべてをスコットランド国内で行わなければならない。","difficulty":1},{"id":"law-012","domain":"law","level":"expert","category":"regulation","tags":["irish-whiskey","minimum-maturation"],"region":null,"question":"アイリッシュウイスキーの法規上の最低熟成期間は。","choices":["2年","4年","1年","3年"],"answer":3,"explanation":"アイリッシュウイスキーもスコッチウイスキーと同様、木製の樽で最低3年間熟成することが法規上求められる。この点は主要ウイスキー生産国で共通する基準である。","difficulty":1},{"id":"law-013","domain":"law","level":"expert","category":"regulation","tags":["irish-whiskey","ireland","geographical-indication"],"region":null,"question":"アイリッシュウイスキーが法的に蒸留・熟成を行うべき地域は。","choices":["アイルランド島全域（北アイルランドを含む）","アイルランド共和国のみ","北アイルランドのみ","EU域内であればどこでもよい"],"answer":0,"explanation":"アイリッシュウイスキーの地理的表示は政治的国境ではなくアイルランド島全体を対象とし、アイルランド共和国と北アイルランド（英国領）の双方の蒸留所が対象となる。","difficulty":2},{"id":"law-014","domain":"law","level":"expert","category":"regulation","tags":["bourbon","production-location"],"region":null,"question":"バーボンウイスキーとして認められるために必要な生産国は。","choices":["アメリカ大陸であればどこでもよい","アメリカ合衆国","ケンタッキー州のみ","北米（米国・カナダ）"],"answer":1,"explanation":"バーボンはアメリカ合衆国内で生産されることが連邦規則上の要件であり、州は問われない。ケンタッキー州はバーボン生産の中心地だが法的必須要件ではない。","difficulty":1},{"id":"law-015","domain":"law","level":"expert","category":"regulation","tags":["bourbon","mash-bill"],"region":null,"question":"バーボンウイスキーのマッシュビル（原料穀物配合）に関する規定は。","choices":["ライ麦を51%以上使用すること","大麦麦芽を51%以上使用すること","とうもろこしを51%以上使用すること","小麦を51%以上使用すること"],"answer":2,"explanation":"バーボンは原料穀物の51%以上をとうもろこしとすることが定義上の要件である。ライ麦主体はライウイスキー、大麦麦芽主体はモルトウイスキーとして区別される。","difficulty":1},{"id":"law-016","domain":"law","level":"expert","category":"regulation","tags":["bourbon","new-charred-oak-barrel"],"region":null,"question":"バーボンウイスキーの熟成に使用しなければならない樽の条件は。","choices":["再使用可能な中古のオーク樽","シェリーの空き樽","内側を焦がしていない新品のオーク樽","内側を焦がした新品のオーク樽"],"answer":3,"explanation":"バーボンは内側を焦がした新品のオーク樽（ニューチャードオークバレル）での熟成が義務付けられており、これがスコッチなど他国のウイスキーとの大きな違いの一つである。","difficulty":1},{"id":"law-017","domain":"law","level":"expert","category":"regulation","tags":["bourbon","bottling-strength"],"region":null,"question":"バーボンウイスキーの瓶詰め時に求められる最低アルコール度数は。","choices":["40%（80プルーフ）","35%","45%","50%"],"answer":0,"explanation":"バーボンの瓶詰め最低度数は40%（米国基準で80プルーフ）であり、スコッチウイスキーと同水準である。","difficulty":2},{"id":"law-018","domain":"law","level":"expert","category":"regulation","tags":["tennessee-whiskey","lincoln-county-process"],"region":null,"question":"テネシーウイスキーの製法上の特徴として知られる木炭濾過工程の名称は。","choices":["ソレラ・システム","リンカーン・カウンティ・プロセス","コフィ式連続蒸留","サワーマッシュ法"],"answer":1,"explanation":"リンカーン・カウンティ・プロセスは、新樽詰め前の蒸留液をサトウカエデの木炭層に通す濾過工程で、テネシーウイスキーをバーボンと区別する特徴的な製法として州法上も位置づけられている。","difficulty":2},{"id":"law-019","domain":"law","level":"expert","category":"regulation","tags":["rye-whiskey","mash-bill"],"region":null,"question":"ライウイスキー（Rye Whiskey）の米国基準における原料規定は。","choices":["とうもろこしを51%以上使用すること","大麦麦芽を51%以上使用すること","ライ麦を51%以上使用すること","ライ麦を100%使用すること"],"answer":2,"explanation":"米国基準のライウイスキーは原料穀物の51%以上をライ麦とすることが要件で、残りにとうもろこしや大麦麦芽等を用いることができる。","difficulty":2},{"id":"law-020","domain":"law","level":"expert","category":"regulation","tags":["canadian-whisky","minimum-maturation"],"region":null,"question":"カナディアンウイスキーの法規上の最低熟成期間は。","choices":["2年","4年","熟成義務はない","3年"],"answer":3,"explanation":"カナダの規則でもカナディアンウイスキーは木製樽で最低3年間熟成することが義務付けられている。","difficulty":1},{"id":"law-021","domain":"law","level":"expert","category":"regulation","tags":["japan-whisky","japan-spirits-liqueurs-makers-association","ingredients"],"region":null,"question":"日本洋酒酒造組合が定める「ジャパニーズウイスキー」表示基準で必須とされる原料は。","choices":["麦芽","とうもろこし","ライ麦","米"],"answer":0,"explanation":"同基準では麦芽の使用を必須とし、麦芽に加え他の穀類や国内で採水した水を原料として認めている。麦芽を使用しないものは「ジャパニーズウイスキー」を名乗れない。","difficulty":1},{"id":"law-022","domain":"law","level":"expert","category":"history","tags":["japan-whisky","japan-spirits-liqueurs-makers-association","history"],"region":null,"question":"「ジャパニーズウイスキーの表示に関する基準」が日本洋酒酒造組合により制定された年は。","choices":["2018年","2021年","2024年","2015年"],"answer":1,"explanation":"本基準は2021年2月12日に制定され、同年4月1日から適用が開始された。制定当初は3年間の経過措置期間が設けられた。","difficulty":2},{"id":"law-023","domain":"law","level":"expert","category":"regulation","tags":["japan-whisky","minimum-maturation"],"region":null,"question":"「ジャパニーズウイスキーの表示に関する基準」における最低熟成期間は。","choices":["2年以上","1年以上","3年以上","5年以上"],"answer":2,"explanation":"本基準では日本国内において樽詰めの翌日から起算して3年以上貯蔵することが求められ、スコッチ等の国際的な主要基準と足並みを揃えている。","difficulty":1},{"id":"law-024","domain":"law","level":"expert","category":"regulation","tags":["japan-whisky","cask-size"],"region":null,"question":"「ジャパニーズウイスキーの表示に関する基準」における熟成樽の容量上限は。","choices":["500リットル以下の木製樽","700リットル以下の金属製タンク","上限規定はない","700リットル以下の木製樽"],"answer":3,"explanation":"本基準は容量700リットル以下の木製樽での貯蔵を求めており、これはスコッチウイスキー規則の樽容量規定と一致する。","difficulty":2},{"id":"law-025","domain":"law","level":"expert","category":"regulation","tags":["age-statement","label-regulation"],"region":null,"question":"熟成年数表記（例：「12年」）を持つウイスキーのラベル規則における一般原則は。","choices":["ブレンドまたはヴァッティングに含まれる原酒のうち、最も若い原酒の熟成年数を表記する","使用した原酒の平均熟成年数を表記する","最も古い原酒の熟成年数を表記する","蒸留所の創業年数を表記する"],"answer":0,"explanation":"複数の原酒をヴァッティング・ブレンドした製品では、最も若い原酒の熟成年数がラベルに表記される年数となる。これは各国の表示規則で共通する原則である。","difficulty":1},{"id":"law-026","domain":"law","level":"expert","category":"regulation","tags":["nas","label-regulation"],"region":null,"question":"NAS（No Age Statement）表記のウイスキーの説明として正しいものは。","choices":["熟成を一切行っていないウイスキー","ラベルに熟成年数が表記されていないウイスキー","3年未満しか熟成していないウイスキー","単一年に蒸留されたウイスキー"],"answer":1,"explanation":"NASウイスキーも各国の最低熟成期間規則は満たしているが、ラベル上に具体的な年数を表示していない製品を指す。年数を表記しないことで熟成年数の異なる原酒を柔軟に使える利点がある。","difficulty":1},{"id":"law-027","domain":"law","level":"expert","category":"regulation","tags":["vintage","label-regulation"],"region":null,"question":"ラベルの「ヴィンテージ（Vintage）」表記が一般に示すものは。","choices":["瓶詰めされた年","蒸留所が創業した年","原酒が蒸留された年","熟成樽が製造された年"],"answer":2,"explanation":"ヴィンテージ表記は原酒が蒸留された年を示すのが一般的で、瓶詰め年と併記されることで熟成期間を計算できる場合が多い。","difficulty":1},{"id":"law-028","domain":"law","level":"expert","category":"chemistry","tags":["chill-filtration","label-regulation"],"region":null,"question":"チルフィルタード（冷却濾過）が行われる主な目的は。","choices":["アルコール度数を調整すること","色調を濃くすること","熟成を促進すること","低温や加水時に生じる白濁を防ぐこと"],"answer":3,"explanation":"チルフィルトレーションはウイスキーを低温に冷やしてから濾過し、脂肪酸エステルなど白濁の原因となる成分を除去する工程で、主に流通・保管時の外観維持を目的とする。","difficulty":2},{"id":"law-029","domain":"law","level":"expert","category":"regulation","tags":["chill-filtration","label-regulation"],"region":null,"question":"「ノンチルフィルタード」表記が意味するものは。","choices":["冷却濾過を行わずに瓶詰めしたこと","熟成年数を表記しないこと","加水を一切行っていないこと","カラメル色素を使用していないこと"],"answer":0,"explanation":"ノンチルフィルタードは冷却濾過工程を経ずに瓶詰めした製品を指す表示で、香味成分をより多く残すことを謳う際に用いられる。","difficulty":1},{"id":"law-030","domain":"law","level":"expert","category":"regulation","tags":["eu-spirits-regulation"],"region":null,"question":"現行のEUスピリッツ規則（ウイスキーの定義を含む）の番号は。","choices":["規則（EC）110/2008","規則（EU）2019/787","規則（EU）1169/2011","規則（EC）1234/2007"],"answer":1,"explanation":"現行のEUスピリッツ規則は2019年制定の規則（EU）2019/787であり、旧規則（EC）110/2008を廃止して代わるものとして2021年5月から適用されている。","difficulty":2},{"id":"law-031","domain":"law","level":"expert","category":"regulation","tags":["eu-spirits-regulation","distillation-strength"],"region":null,"question":"EUスピリッツ規則が定めるウイスキーの蒸留時アルコール度数の上限は。","choices":["96%未満","90%未満","94.8%未満","上限規定はない"],"answer":2,"explanation":"EUスピリッツ規則もスコッチウイスキー規則と同様、蒸留時のアルコール度数を94.8%未満と定めており、原料由来の風味を残すことを求めている。","difficulty":2},{"id":"law-032","domain":"law","level":"expert","category":"regulation","tags":["eu-spirits-regulation","cask-size"],"region":null,"question":"EUスピリッツ規則が定めるウイスキー熟成用の木製容器の容量上限は。","choices":["500リットル","1000リットル","規定なし","700リットル"],"answer":3,"explanation":"EUスピリッツ規則は熟成用の木製容器の容量を700リットル以下と定めており、これはスコッチ・アイリッシュなど加盟国の国内規則とも整合している。","difficulty":2},{"id":"law-033","domain":"law","level":"expert","category":"regulation","tags":["scotch-whisky-regulations-2009","caramel-coloring-e150a"],"region":null,"question":"スコッチウイスキーへの着色料に関する規則として正しいものは。","choices":["プレーンカラメル色素（E150A）以外の添加物は認められない","天然果汁による着色が認められる","あらゆる食品添加物による着色が認められる","着色料の使用は一切禁止されている"],"answer":0,"explanation":"スコッチウイスキーには水とプレーンカラメル色素（E150A）以外の物質を加えることが認められておらず、香味料や甘味料の添加は一切禁止されている。","difficulty":2},{"id":"law-034","domain":"law","level":"expert","category":"regulation","tags":["blended-malt-scotch-whisky","label-regulation","pure-malt"],"region":null,"question":"かつて使われていた「ピュアモルト」や「ヴァッテッドモルト」という表記は、現在のスコッチウイスキー規則上どう扱われるか。","choices":["プレミアム表示として引き続き使用が認められる","使用が認められておらず、「ブレンデッドモルト」と表記しなければならない","シングルモルトと同義として使用できる","グレーンウイスキーの表示として新たに認められた"],"answer":1,"explanation":"2009年の規則により、複数蒸留所のシングルモルトをブレンドした製品は「ブレンデッドモルト・スコッチ・ウイスキー」と表記することが義務付けられ、「ピュアモルト」「ヴァッテッドモルト」の使用は認められなくなった。","difficulty":2},{"id":"law-035","domain":"law","level":"expert","category":"regulation","tags":["bourbon","straight-bourbon","minimum-maturation"],"region":null,"question":"バーボンにおける「ストレートバーボン」の最低熟成期間は。","choices":["1年以上","3年以上","2年以上","4年以上"],"answer":2,"explanation":"ストレートバーボンは新樽で2年以上熟成することが要件であり、これに満たない場合は「ストレートバーボン」を名乗れない。","difficulty":2},{"id":"law-036","domain":"law","level":"expert","category":"regulation","tags":["bourbon","age-statement","label-regulation"],"region":null,"question":"ストレートバーボンの熟成期間が4年未満の場合、ラベル表示について正しいものは。","choices":["表示義務は一切ない","「4年未満」とのみ表示すればよい","NAS表記にすることが義務付けられている","熟成年数（最も若い原酒の年数）を表示する義務がある"],"answer":3,"explanation":"米国規則では、熟成4年未満のストレートウイスキーは使用原酒のうち最も若いものの熟成年数をラベルに表示することが義務付けられている。4年以上であれば表示は任意となる。","difficulty":2},{"id":"law-037","domain":"law","level":"expert","category":"regulation","tags":["bourbon","distillation-strength"],"region":null,"question":"バーボンウイスキーの蒸留時アルコール度数の上限は。","choices":["80%（160プルーフ）","94.8%","70%","90%"],"answer":0,"explanation":"バーボンは蒸留時のアルコール度数を80%（160プルーフ）以下に抑えることが定められており、原料由来の風味成分を残すための規定である。","difficulty":2},{"id":"law-038","domain":"law","level":"expert","category":"regulation","tags":["bourbon","barrel-entry-proof"],"region":null,"question":"バーボンウイスキーが新樽に詰められる際のアルコール度数の上限は。","choices":["40%（80プルーフ）","62.5%（125プルーフ）","70%（140プルーフ）","80%（160プルーフ）"],"answer":1,"explanation":"バーボンは新樽への詰め入れ時のアルコール度数を62.5%（125プルーフ）以下とすることが定められており、蒸留直後の度数からこの水準まで加水調整して樽詰めされる。","difficulty":2},{"id":"law-039","domain":"law","level":"expert","category":"regulation","tags":["canadian-whisky","flavouring"],"region":null,"question":"カナディアンウイスキーの規則上の特徴として正しいものは。","choices":["添加物は一切認められていない","熟成義務がない","香味添加やカラメル色素の使用が一定の範囲で認められている","スコッチウイスキー規則と完全に同一の基準を採用している"],"answer":2,"explanation":"カナダの規則はスコッチウイスキー規則より添加物に対して緩やかで、一定の範囲でワインや熟成スピリッツによる香味付け、カラメル色素の使用が認められている。","difficulty":2},{"id":"law-040","domain":"law","level":"expert","category":"regulation","tags":["single-malt-scotch-whisky","classification"],"region":null,"question":"シングルモルト・スコッチ・ウイスキーの定義における「単一蒸留所」要件が意味するものは。","choices":["熟成のみ単一蒸留所で行われていること","瓶詰めのみ単一蒸留所で行われていること","原料の栽培地が単一であること","水と麦芽から一つの蒸留所内で全て蒸留されていること"],"answer":3,"explanation":"シングルモルトは水と麦芽のみを原料として、単一の蒸留所でポットスチルにより全て蒸留されたモルトウイスキーを指す。複数蒸留所の原酒を混ぜたものはシングルモルトを名乗れない。","difficulty":1},{"id":"law-041","domain":"law","level":"professional","category":"history","tags":["scotch-whisky-regulations-2009","scotch-whisky-act-1988","history"],"region":null,"question":"スコッチウイスキー規則2009（SI 2009/2890）と1988年スコッチウイスキー法（Scotch Whisky Act 1988）の関係として正しいものは。","choices":["スコッチウイスキー規則2009が1988年法を廃止し、これに代わる規則として制定された","1988年法の下位規則として現在も両方が並行して有効である","1988年法が2009年規則を補完する形で存続している","2009年規則は1988年法の一部条文のみを改正した"],"answer":0,"explanation":"スコッチウイスキー規則2009は1988年スコッチウイスキー法および北アイルランド向けの関連命令を廃止し、生産だけでなく表示・包装・広告まで対象を拡張した規則として全面的に置き換えた。","difficulty":3},{"id":"law-042","domain":"law","level":"professional","category":"regulation","tags":["scotch-whisky-regulations-2009","eu-spirits-regulation"],"region":null,"question":"スコッチウイスキー規則2009とEUスピリッツ規則の関係として正しいものは。","choices":["EUスピリッツ規則と矛盾するため適用が除外されている","EUスピリッツ規則の要件に加えて、より厳格な国内固有の要件を追加で課している","EUスピリッツ規則をそのまま国内法化しただけで独自要件はない","EUスピリッツ規則より緩やかな基準を定めている"],"answer":1,"explanation":"スコッチウイスキー規則2009は、EUスピリッツ規則が定めるウイスキーの一般的要件に加え、5分類の定義や地理的表示地域、熟成・表示に関するより詳細かつ厳格な国内独自の要件を上乗せしている。","difficulty":3},{"id":"law-043","domain":"law","level":"professional","category":"regulation","tags":["single-grain-scotch-whisky","coffey-still"],"region":null,"question":"シングルグレーン・スコッチ・ウイスキーの蒸留器について規則上の扱いとして正しいものは。","choices":["ポットスチルの使用が義務付けられている","連続式蒸留機の使用が義務付けられている","規則上は蒸留器の種類を限定しておらず、実務上は連続式蒸留機（コフィスチル）が広く使われている","ハイブリッドスチルの使用が義務付けられている"],"answer":2,"explanation":"シングルモルトと異なり、シングルグレーンの蒸留に用いる蒸留器の種類そのものは規則で限定されていないが、生産効率の観点から連続式蒸留機（コフィスチル）が広く採用されている。","difficulty":3},{"id":"law-044","domain":"law","level":"professional","category":"regulation","tags":["blended-malt-scotch-whisky","label-regulation"],"region":null,"question":"かつて使われていた「ピュアモルト」「ヴァッテッドモルト」という表記が規則で禁止された背景として最も適切なものは。","choices":["課税分類上の区分と一致しなかったため","EU規則で使用が禁止されている表現だったため","グレーンウイスキーの表示と重複していたため","「シングルモルト」との混同を招き、消費者に誤認を与える恐れがあったため"],"answer":3,"explanation":"「ピュアモルト」等の表記は複数蒸留所のモルトをブレンドした製品であるにもかかわらず、単一蒸留所のシングルモルトと誤認されやすいことが問題視され、消費者保護の観点から「ブレンデッドモルト」への表記統一が図られた。","difficulty":3},{"id":"law-045","domain":"law","level":"professional","category":"regulation","tags":["blended-scotch-whisky","label-regulation"],"region":null,"question":"ブレンデッド・スコッチ・ウイスキーのラベルにおいて、使用されたモルトとグレーンの配合比率表示について正しいものは。","choices":["配合比率の表示義務はない","比率を必ず%表示しなければならない","モルト比率50%以上でなければブレンデッドと表示できない","グレーン比率の上限が規則で定められている"],"answer":0,"explanation":"ブレンデッド・スコッチ・ウイスキーはモルト原酒とグレーン原酒の配合比率を公表する法的義務を負っておらず、比率は各社の企業秘密として扱われることが多い。","difficulty":3},{"id":"law-046","domain":"law","level":"professional","category":"history","tags":["irish-whiskey","history"],"region":null,"question":"アイリッシュウイスキー・テクニカルファイル（Irish Whiskey Technical File）が制定された年は。","choices":["2009年","2014年","2019年","2005年"],"answer":1,"explanation":"アイリッシュウイスキーの地理的表示（GI）保護のための技術文書は2014年に制定され、原料・蒸留・熟成に関する詳細な要件が明文化された。","difficulty":3},{"id":"law-047","domain":"law","level":"professional","category":"regulation","tags":["irish-whiskey","single-pot-still","mash-bill"],"region":null,"question":"シングルポットスチル・アイリッシュウイスキーの原料規定として正しいものは。","choices":["発芽大麦のみを100%使用する","未発芽大麦を最低51%使用する","発芽大麦を最低30%、未発芽大麦を最低30%使用し、その他穀類は最大5%まで","とうもろこしを最低30%使用する"],"answer":2,"explanation":"シングルポットスチル・アイリッシュウイスキーはテクニカルファイルにより、発芽大麦・未発芽大麦をそれぞれ最低30%使用し、その他の穀類は最大5%までとする配合が定められている。","difficulty":4},{"id":"law-048","domain":"law","level":"professional","category":"regulation","tags":["irish-whiskey","distillation"],"region":null,"question":"アイリッシュウイスキーの伝統である「3回蒸留」についての説明として正しいものは。","choices":["テクニカルファイルにより3回蒸留が義務付けられている","2回以下の蒸留は禁止されている","単式蒸留を3回以上行うことが義務である","一般的な慣習であるが、法規上の義務ではない"],"answer":3,"explanation":"3回蒸留はアイリッシュウイスキーで広く行われる伝統的手法だが、法規上の必須要件ではなく、実際には2回蒸留を採用する蒸留所も存在する。","difficulty":3},{"id":"law-049","domain":"law","level":"professional","category":"regulation","tags":["bourbon","new-charred-oak-barrel","cask-reuse"],"region":null,"question":"バーボン用の新樽（内側を焦がしたオーク樽）について、使用後の樽の扱いとして一般的に正しいものは。","choices":["バーボンの熟成には再使用できず、スコッチやラム等の熟成用として輸出されることが多い","同じ樽をバーボンの熟成に繰り返し使用できる","樽は熟成後に必ず廃棄しなければならないと規則で定められている","中古樽での再熟成は連邦法で禁止されている"],"answer":0,"explanation":"バーボンは新樽での熟成が要件のため、一度使用した樽はバーボンの熟成には再使用できない。使用済みバーボン樽はスコッチウイスキーやラム、テキーラなどの熟成樽として世界中に輸出される。","difficulty":3},{"id":"law-050","domain":"law","level":"professional","category":"regulation","tags":["tennessee-whiskey","lincoln-county-process"],"region":null,"question":"テネシーウイスキーがバーボンと区別される主な法的・製法的要件は。","choices":["とうもろこし比率が80%以上であること","テネシー州内で製造され、リンカーン・カウンティ・プロセス（木炭濾過）を経ること","熟成期間が4年以上であること","連続式蒸留機の使用が禁止されていること"],"answer":1,"explanation":"テネシーウイスキーはバーボンの要件（原料・樽等）を満たした上で、テネシー州法によりテネシー州内での製造とリンカーン・カウンティ・プロセスによる木炭濾過が追加要件として課される。","difficulty":3},{"id":"law-051","domain":"law","level":"professional","category":"regulation","tags":["straight-whiskey","us-regulation"],"region":null,"question":"米国基準における「ストレートウイスキー」の定義として正しいものは。","choices":["単一蒸留所で製造されたウイスキー全般","熟成を一切行わないウイスキー","2年以上熟成し、着色料・香味料・ブレンド材を添加していないウイスキー","中性スピリッツを主体としたウイスキー"],"answer":2,"explanation":"ストレートウイスキーは新樽等の要件を満たした上で2年以上熟成し、水以外の着色料・香味料・他のウイスキーとのブレンド材を加えていないものを指す米国の分類である。","difficulty":3},{"id":"law-052","domain":"law","level":"professional","category":"regulation","tags":["blended-whiskey","us-regulation"],"region":null,"question":"米国の「ブレンデッドウイスキー」表示について正しいものは。","choices":["ニュートラルスピリッツの混合は禁止されている","ストレートウイスキーの使用は禁止されている","熟成義務がストレートウイスキーより長い","ニュートラルスピリッツ（中性スピリッツ）を混合することが認められている"],"answer":3,"explanation":"米国の「ブレンデッドウイスキー」はストレートウイスキーにニュートラルスピリッツや着色・香味料を混合することが認められており、ストレートウイスキー単体より軽い風味に仕上げられることが多い。","difficulty":3},{"id":"law-053","domain":"law","level":"professional","category":"regulation","tags":["canadian-whisky"
