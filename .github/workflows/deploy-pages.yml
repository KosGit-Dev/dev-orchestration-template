# ウイスキーコニサー道場（app/）を GitHub Pages へ公開する。
# 前提: リポジトリ Settings → Pages → Source を「GitHub Actions」に一度設定すること。
# 未設定の間はデプロイをスキップして成功終了する（PR を赤くしない）。
# 公開 URL は https://<owner>.github.io/<repo>/
name: Deploy Pages

on:
  push:
    # 作業ブランチはマージ前の公開検証用。PR #36 マージ後に削除してよい
    branches: [main, master, claude/whiskey-exam-game-f1dx9h]
    paths:
      - "app/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Pages 有効化チェック（未有効ならスキップ）
        id: pages-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")
          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GitHub Pages が未有効のためデプロイをスキップした。Settings → Pages → Source: GitHub Actions を一度設定すると、次回 push から自動公開される。"
          fi

      - name: Configure Pages
        if: steps.pages-check.outputs.enabled == 'true'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload app/ as Pages artifact
        if: steps.pages-check.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: app

      - name: Deploy to GitHub Pages
        if: steps.pages-check.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
