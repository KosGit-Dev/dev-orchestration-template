# =============================================================================
# CI ワークフロー（汎用テンプレート）
# =============================================================================
# このファイルはプロジェクトの言語・ツールに合わせてカスタマイズしてください。
# bootstrap.sh 実行時に project-config.yml の設定で自動置換されます。
#
# 対応例:
#   Python (uv)     → uv sync / uv run ruff / uv run mypy / uv run pytest
#   Node.js (pnpm)  → pnpm install / pnpm lint / pnpm typecheck / pnpm test
#   Rust (cargo)    → cargo build / cargo clippy / cargo test
#   Go              → go build / golangci-lint run / go test

name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true


jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ---------------------------------------------------------------
      # 言語セットアップ（プロジェクトに合わせて1つ選択）
      # ---------------------------------------------------------------
      # 注意: サードパーティ Action は本番利用時に必ずコミットハッシュで
      # 固定すること（タグ指定は禁止）。以下のコメントアウト例はタグ指定
      # のままであるため、利用時にハッシュに置換する必要がある。

      # --- Python ---
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        if: hashFiles('pyproject.toml') != ''
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        if: hashFiles('pyproject.toml') != ''
        with:
          enable-cache: true
      - name: Sync dependencies
        if: hashFiles('pyproject.toml') != ''
        run: uv sync --all-extras --dev

      # --- Node.js ---
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      # - name: Install dependencies
      #   run: npm ci

      # --- Rust ---
      # - uses: dtolnay/rust-toolchain@stable
      # - uses: Swatinem/rust-cache@v2

      # --- Go ---
      # - uses: actions/setup-go@v5
      #   with:
      #     go-version: "1.22"

      # ---------------------------------------------------------------
      # 品質チェック（プロジェクトに合わせてコメント解除・編集）
      # ---------------------------------------------------------------

      - name: Policy check
        run: python ci/policy_check.py

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        if: hashFiles('src/**') != ''
        run: uv run mypy src/ tests/ ci/

      - name: Test (pytest)
        run: uv run pytest -q --tb=short

      # ---------------------------------------------------------------
      # 注意: ミューテーションテスト（mutmut）・依存パッケージ脆弱性スキャン（pip-audit）は
      # 個人開発の既定 CI からは意図的に除外している（重い承認ルートを増やさない方針）。
      # 導入したい場合は docs/TEMPLATE_CHANGELOG.md の記録を参照し、必要なジョブを追加すること。
      # ---------------------------------------------------------------
      # OpenTelemetry 計装確認（observability オプション有効時）
      # ---------------------------------------------------------------
      # 計装を有効化したプロジェクトでのみコメント解除すること。
      # 前提: uv sync --extra observability で OTel SDK がインストール済み。
      # - name: OpenTelemetry 計装確認
      #   env:
      #     OTEL_SERVICE_NAME: ${{ github.repository }}
      #     OTEL_EXPORTER_OTLP_ENDPOINT: "stdout"  # CI環境では標準出力へエクスポート
      #   run: |
      #     {{RUN_PREFIX}} python -c "
      #     from src.observability.tracing import get_tracer
      #     tracer = get_tracer()
      #     if tracer is not None:
      #         with tracer.start_as_current_span('ci-smoke-test'):
      #             pass
      #         print('OTel 計装の初期化: OK')
      #     else:
      #         print('OTel SDK 未インストール — スキップ')
      #     "

  # =====================================================================
  # シークレットスキャン（gitleaks）
  # =====================================================================
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # gitleaks-action は organization でライセンスキーが必要なため、
      # composite action で CLI を導入して直接実行する（version/sha256 の正本は同 action）
      - name: Install gitleaks
        uses: ./.github/actions/install-gitleaks

      - name: Run gitleaks
        run: gitleaks git --verbose --report-format=sarif --report-path=gitleaks-report.sarif .
